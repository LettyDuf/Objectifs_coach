# Déploiement automatique sur GitHub Pages à chaque push sur main.
# Build : npm ci + npm run build (Vite + viteSingleFile → dist/index.html).
# Publication : actions/deploy-pages@v5.
#
# Versions des actions vérifiées le 2026-06-25 (sources : releases GitHub officielles).
#
# Côté repo (à faire une fois) :
#   Settings → Pages → Source : « GitHub Actions »
#   Settings → Actions → General → Workflow permissions : « Read and write »
#
# Site accessible à : https://lettyduf.github.io/Objectifs_coach/

name: Déploiement GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Une seule exécution à la fois ; on n'annule pas un déploiement en cours.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
