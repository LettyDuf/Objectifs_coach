ler : qu'est-ce que le tableau de bord va faire bouger ? Adoption ? Temps gagnĂŠ ? Incidents ĂŠvitĂŠs ?`,trapWords:[`livrer`],expectedFailingCriteria:[`okr.keyResultQuality`]},{id:`okr-equipe.bad.kr-fuzzy`,verdict:`bad`,draft:{type:`okr-equipe`,text:`Devenir le partenaire technique prĂŠfĂŠrĂŠ des ĂŠquipes produit.`,audience:`dev`,hasExplicitDeadline:!0,isUnderTeamInfluence:!0,keyResults:[{text:`AmĂŠliorer la satisfaction client.`,confidence:60},{text:`Faire passer le temps d'intĂŠgration API de 4 h Ă  1 h.`,confidence:55},{text:`RĂŠduire de 50 % les tickets ÂŤ comment faire Âť (de 40 Ă  20 par semaine).`,confidence:65}]},rationale:`Le 1er KR n'a ni chiffre, ni unitĂŠ, ni seuil. Non falsifiable. Reformuler en nommant la mĂŠtrique (NPS, CSAT, etc.) avec un point de dĂŠpart et une cible.`,trapWords:[`amĂŠliorer`,`satisfaction`],expectedFailingCriteria:[`okr.keyResultQuality`]},{id:`okr-equipe.bad.composite-objective`,verdict:`bad`,draft:{type:`okr-equipe`,text:`AmĂŠliorer la performance et la satisfaction utilisateur.`,audience:`dev`,hasExplicitDeadline:!0,isUnderTeamInfluence:!0,keyResults:[{text:`Faire passer le temps de rĂŠponse p95 de 800 ms Ă  200 ms.`,confidence:60},{text:`Faire passer le NPS de 30 Ă  50.`,confidence:55},{text:`RĂŠduire le taux d'erreur de 2 % Ă  0,5 %.`,confidence:65}]},rationale:`L'Objectif contient ÂŤ et Âť : il y a deux Objectifs ici (performance et satisfaction). SĂŠpare en deux OKR distincts, chacun avec son propre lot de KR.`,trapWords:[`amĂŠliorer`,`et`,`performance`,`satisfaction`],expectedFailingCriteria:[`outcome`,`general.composite`]}],Sn=[{id:`okr-equipe.sheet.structure`,themeId:`okr.fondamentaux`,icon:`okr`,title:`OKR ĂŠquipe : 1 Objectif + 3 Ă  5 RĂŠsultats clĂŠs`,heroPhrase:`L'Objectif dit vers quoi. Les RĂŠsultats clĂŠs disent comment on saura qu'on y est arrivĂŠ.`,intro:``,practiceCtaLabel:`Va ĂŠcrire ton premier OKR ĂŠquipe`,sections:[{heading:`L'Objectif : qualitatif et mĂŠmorisable`,icon:`target`,body:`Pas de chiffre dans l'Objectif : le chiffre est l'affaire des KR. Une ĂŠquipe doit pouvoir le rĂŠciter sans le lire.`,examples:[{bad:`AmĂŠliorer notre observabilitĂŠ de 30 %.`,good:`Devenir l'outil de rĂŠfĂŠrence des ĂŠquipes data pour l'observabilitĂŠ.`,note:`Un Objectif est qualitatif et inspirant. Si tu as besoin d'un chiffre dans l'Objectif, c'est qu'il devrait ĂŞtre dans un KR.`}]},{heading:`Les RĂŠsultats clĂŠs : 3 Ă  5, chiffrĂŠs, outcome`,icon:`practice`,body:`Chaque KR vise un changement mesurable : ÂŤ de X Ă  Y Âť, ÂŤ par N Âť, ÂŤ Ă  N % Âť. Pas de RĂŠsultat clĂŠ projet (ÂŤ livrer Z Âť n'est pas un KR). Au-delĂ  de 5 KR, on dilue.`,bullets:[`3 Ă  5 KR par Objectif : assez pour couvrir, pas trop pour disperser.`,`Chaque KR a une mĂŠtrique nommĂŠe, un point de dĂŠpart, une cible.`,`ÂŤ Livrer Âť, ÂŤ Migrer Âť, ÂŤ ImplĂŠmenter Âť sont des moyens, pas des KR.`]},{heading:`Calibrage de l'ambition`,icon:`challenge`,body:`Chaque KR se vise avec 50 Ă  70 % de confiance d'atteinte. 100 % = c'est une tĂ˘che, pas un KR. Moins de 30 % = irrĂŠaliste, on s'ĂŠpuise.`},{heading:`La place de l'OKR ĂŠquipe`,icon:`learn`,body:`OKR entreprise (annuel, le pourquoi) â OKR ĂŠquipe (trimestriel, le vers oĂš) â objectifs de PI (8-12 sem, le quoi engagĂŠ) â objectifs de Sprint (1-4 sem, le comment). Chaque ĂŠtage a sa grammaire. Les confondre fait perdre une dimension du pilotage.`},{heading:`Qui le rĂŠdige, sur quelle base`,icon:`target`,body:`Co-construit par l'ĂŠquipe entiĂ¨re (incluant son PM ou PO), animĂŠ par un facilitateur (leader d'ĂŠquipe, coach OKR interne ou externe). Bottom-up, pas dictĂŠ top-down. Les OKR entreprise donnent la direction ; l'ĂŠquipe propose comment elle y contribue â elle n'attend pas qu'on lui dicte ses KR. Cadre de travail : atelier de cadrage en dĂŠbut de cycle (typiquement une demi-journĂŠe), puis check-in hebdomadaire de 15-30 min. L'OKR dictĂŠ d'en haut est un piĂ¨ge nommĂŠ : sa fiche t'attend dans ÂŤ Les piĂ¨ges classiques Âť.`,bullets:[`OKR entreprise du cycle en cours (le ÂŤ pourquoi Âť stratĂŠgique)`,`Retours du cycle OKR prĂŠcĂŠdent (ce qui a marchĂŠ, ce qui n'a pas)`,`Connaissance terrain de l'ĂŠquipe (ce qu'elle voit, que les autres ne voient pas)`,`CapacitĂŠs rĂŠelles (effort disponible et compĂŠtences)`,`HypothĂ¨ses produit en cours, notamment pour calibrer les KR stretch`]},{heading:`Source`,kind:`source`,body:`Niven, OKRs For Dummies. Lamorte, The OKRs Field Book (2021) â Phase 1 Deployment Coaching, distinction Top-Level vs Team-Level Ateliers. Morisseau, La boĂŽte Ă  outils OKR (Dunod). Wodtke, OKR Mistakes : ÂŤ OKRs are great bottom up, not just top down. Âť Cadence trimestrielle, bi-niveau strict et co-construction convergent dans ces sources.`}]},{id:`okr-equipe.sheet.kr-traps`,themeId:`okr.pieges-kr`,icon:`warn`,title:`Les 4 piĂ¨ges du RĂŠsultat clĂŠ`,heroPhrase:`Un KR vise un rĂŠsultat Ă  atteindre. Pas une livraison, pas un ĂŠtat Ă  maintenir, pas une certitude.`,intro:``,practiceCtaLabel:`Va corriger un KR mal posĂŠ`,sections:[{heading:`PiĂ¨ge 1 â Le RĂŠsultat clĂŠ projet`,icon:`bad`,body:`ÂŤ Livrer X Âť, ÂŤ Migrer Y Âť, ÂŤ DĂŠployer Z Âť = un moyen, pas un rĂŠsultat. SymptĂ´me : verbe d'output en tĂŞte.`},{heading:`PiĂ¨ge 2 â Le KR-flou`,icon:`bad`,body:`Pas de chiffre, pas d'unitĂŠ, pas de seuil. Non falsifiable.`},{heading:`PiĂ¨ge 3 â La health metric dĂŠguisĂŠe en KR`,icon:`bad`,body:`Une health metric est un garde-fou qu'on surveille en continu (uptime, code coverage, latence p95). Un KR vise un **changement Ă  atteindre**, pas un ĂŠtat Ă  maintenir.`},{heading:`PiĂ¨ge 4 â La sur-confiance`,icon:`bad`,body:`KR estimĂŠ atteint Ă  100 % = c'est une tĂ˘che planifiĂŠe, pas un KR. L'OKR pousse Ă  l'ambition calibrĂŠe : 50 Ă  70 % de confiance. Chacun de ces piĂ¨ges a sa fiche dĂŠtaillĂŠe dans ÂŤ Les piĂ¨ges classiques Âť, et le DĂŠfi te les fera reconnaĂŽtre sur des cas rĂŠels.`},{heading:`Source`,kind:`source`,body:`Lamorte, The OKRs Field Book : chapitres ÂŤ Examples of ineffective and effective key results Âť et ÂŤ Measurable objectives vs health metrics Âť.`}]},{id:`okr-equipe.sheet.anatomy-kr`,themeId:`okr.fondamentaux`,icon:`target`,title:`L'anatomie d'un RĂŠsultat clĂŠ`,heroPhrase:`Un RĂŠsultat clĂŠ tient en quatre briques. Si l'une manque, le KR est cassĂŠ.`,intro:``,practiceCtaLabel:`Va construire un KR brique par brique`,sections:[{heading:`Les quatre briques d'un RĂŠsultat clĂŠ`,icon:`target`,body:`Un KR bien posĂŠ est une phrase courte qui combine quatre ĂŠlĂŠments. Visualise-les pour repĂŠrer ce qui manque.`,kind:`bricks`,bricksSentence:`Faire passer le NPS dev du module pipeline de 28 Ă  50 d'ici la fin du trimestre.`,bricks:[{num:1,label:`Verbe d'outcome`,hint:`Le sens du mouvement.`,examples:`Faire passer, RĂŠduire, Atteindre, Diviser par`,snippet:`Faire passer`,color:`purple`},{num:2,label:`Indicateur`,hint:`La mĂŠtrique nommĂŠe, pas le projet.`,examples:`NPS dev, CSAT module commande, nombre d'incidents P1, temps moyen de rĂŠsolution`,snippet:`le NPS dev du module pipeline`,color:`teal`},{num:3,label:`Variation chiffrĂŠe`,hint:`De X Ă  Y. Le point de dĂŠpart rend l'effort visible.`,examples:`de 28 Ă  50, de 4,2 % Ă  1 %, par 3, Ă  90 %`,snippet:`de 28 Ă  50`,color:`pink`},{num:4,label:`ĂchĂŠance`,hint:`Sans date, ce n'est pas un KR.`,examples:`d'ici la fin du trimestre, d'ici fin Q3, d'ici le 30 septembre`,snippet:`d'ici la fin du trimestre`,color:`blue`}]},{heading:`Et la confiance ?`,icon:`challenge`,body:`La confiance d'atteinte (50 Ă  70 %) accompagne le KR mais n'est pas dans la phrase. Elle s'ĂŠcrit en note : ÂŤ (confiance : 60 %) Âť. Voir la fiche calibrage.`},{heading:`Test rapide`,icon:`practice`,body:`Lis ton KR Ă  voix haute. Si tu ne peux pas pointer les quatre briques, retravaille-le.`,bullets:[`Pas de verbe d'outcome (ÂŤ livrer Âť, ÂŤ migrer Âť) : c'est un projet, pas un KR.`,`Pas d'indicateur nommĂŠ : on ne saura pas mesurer.`,`Pas de point de dĂŠpart : on ne saura pas si la cible est ambitieuse.`,`Pas d'ĂŠchĂŠance : c'est une intention, pas un engagement.`]},{heading:`Source`,kind:`source`,body:`Niven, OKRs For Dummies (structure d'un KR mesurable). Lamorte, The OKRs Field Book : chapitre ÂŤ Effective vs ineffective key results Âť. Doerr, Measure What Matters (le ÂŤ from X to Y by when Âť).`}]},{id:`okr-equipe.sheet.too-many-okrs`,isNamedPitfall:!0,themeId:`okr.fondamentaux`,icon:`warn`,title:`Trop d'OKR par ĂŠquipe`,heroPhrase:`Plus tu ajoutes d'Objectifs, plus tu dilues la focalisation. Une ĂŠquipe = un Objectif par cycle.`,intro:``,practiceCtaLabel:`Va rĂŠduire ta liste Ă  un seul Objectif`,sections:[{heading:`Le principe : un seul Objectif par ĂŠquipe par cycle`,icon:`target`,body:`L'OKR sert Ă  concentrer l'ĂŠnergie sur ce qui compte le plus. Si une ĂŠquipe se donne trois ou quatre Objectifs en parallĂ¨le, elle n'en a plus aucun â elle a une liste de courses. Christina Wodtke est explicite : ÂŤ Have a maximum of one OKR per team per quarter Âť. [traduction : ÂŤ Avoir au maximum un OKR par ĂŠquipe par trimestre. Âť]`,bullets:[`1 Objectif + 3 Ă  5 RĂŠsultats clĂŠs : c'est le format de rĂŠfĂŠrence.`,`Au-delĂ , l'ĂŠquipe ne sait plus quoi arbitrer quand le temps manque.`,`La focalisation est une compĂŠtence d'ĂŠquipe : elle se travaille.`]},{heading:`Pourquoi on tombe dedans`,icon:`bad`,body:`Plusieurs rĂŠflexes poussent Ă  empiler les Objectifs, tous comprĂŠhensibles, tous coĂťteux.`,bullets:[`Peur de laisser un sujet de cĂ´tĂŠ (ÂŤ si on ne le met pas en OKR, personne ne s'en occupera Âť).`,`Pression descendante (le management ajoute des Objectifs au fil de l'eau).`,`Confusion OKR / liste de chantiers (on met dedans tout ce que l'ĂŠquipe fait, pas seulement ce qui doit changer).`]},{heading:`Signaux d'alerte`,icon:`warn`,kind:`signals`,body:``,bullets:[`Plus de 3 Objectifs actifs pour la mĂŞme ĂŠquipe sur le mĂŞme trimestre.`,`Chaque Objectif capte une part mineure de la capacitĂŠ de l'ĂŠquipe â aucun n'est clairement le cap du trimestre.`,`L'ĂŠquipe ne peut pas rĂŠciter ses Objectifs de mĂŠmoire sans les relire.`]},{heading:`Comment trancher`,icon:`good`,body:`Si la liste contient trois Objectifs, demande : ÂŤ Lequel des trois, si on ĂŠchoue, fait le plus mal au trimestre ? Âť. Garde celui-lĂ . Les autres sont du business as usual, des KR d'un autre Objectif, ou attendent le cycle suivant.`,examples:[{bad:`Objectif 1 : Devenir la rĂŠfĂŠrence observabilitĂŠ. Objectif 2 : RĂŠduire la dette technique. Objectif 3 : AmĂŠliorer la satisfaction des parties prenantes.`,good:`Objectif : Devenir la rĂŠfĂŠrence observabilitĂŠ. (Les autres sujets vivent dans le backlog ou dans un KR de cet Objectif.)`,note:`Trois Objectifs = trois ĂŠquipes en parallĂ¨le dans la mĂŞme ĂŠquipe. C'est exactement ce que l'OKR cherche Ă  ĂŠviter.`}]},{heading:`Source`,kind:`source`,body:`Wodtke, Radical Focus (2e ĂŠd., 2021) : ÂŤ Have a maximum of one OKR per team per quarter Âť. Lamorte, The OKRs Field Book : chapitre ÂŤ Common mistakes in OKR design Âť. Doerr, Measure What Matters (focus comme premier super-pouvoir des OKR).`}]},{id:`okr-equipe.sheet.sandbagging`,isNamedPitfall:!0,themeId:`okr.pieges-kr`,icon:`bad`,title:`Le sandbagging`,heroPhrase:`Quand on calibre un KR pour ĂŞtre sĂťr de l'atteindre, on a dĂŠjĂ  perdu l'esprit OKR.`,intro:``,practiceCtaLabel:`Va remonter ton niveau d'ambition`,sections:[{heading:`Le rĂŠflexe : poser la barre oĂš on sait l'atteindre`,icon:`bad`,kind:`signals`,body:`Sandbagging = poser un KR volontairement bas pour garantir un score de 100 %. C'est souvent rationnel Ă  court terme (bonus, image, peur de l'ĂŠchec) mais cela vide l'OKR de son sens : la cible n'est plus ambitieuse, elle dĂŠcrit ce qui allait se produire de toute faĂ§on.`,bullets:[`SymptĂ´me : tous les KR atteints Ă  100 %, cycle aprĂ¨s cycle.`,`SymptĂ´me : l'ĂŠquipe est trĂ¨s dĂŠtendue en fin de cycle, sans avoir rien dĂť arbitrer.`,`SymptĂ´me : la confiance dĂŠclarĂŠe en dĂŠbut de cycle est Ă  90 % ou plus.`]},{heading:`L'antidote : calibrer Ă  50 Ă  70 % de confiance`,icon:`good`,body:`Un bon KR est calibrĂŠ pour que l'ĂŠquipe se dise ÂŤ on a une vraie chance d'y arriver, mais on va devoir trouver des choses Âť. 100 % de confiance = c'est une tĂ˘che planifiĂŠe. Moins de 30 % = c'est de la pensĂŠe magique, l'ĂŠquipe va dĂŠcrocher.`,examples:[{bad:`Faire passer la couverture de tests de 78 % Ă  80 %. (confiance : 100 %)`,good:`Faire passer la couverture de tests de 78 % Ă  90 %. (confiance : 60 %)`,note:`Si l'ĂŠquipe est sĂťre Ă  100 %, l'ambition est trop faible. Vise un ĂŠcart qui demande un vrai effort.`}]},{heading:`Le rĂ´le du facilitateur`,icon:`challenge`,body:`Le sandbagging se nomme. Quand un KR sort avec une confiance affichĂŠe trop haute, le facilitateur pose la question : ÂŤ Si on y arrive Ă  coup sĂťr, qu'est-ce qu'on apprend ? Âť. Souvent, rien. Et c'est lĂ  qu'on remonte la barre.`},{heading:`Source`,kind:`source`,body:`Doerr, Measure What Matters (la culture du ÂŤ stretch Âť et la sĂŠparation OKR / ĂŠvaluation individuelle). Lamorte, The OKRs Field Book : section ÂŤ Avoiding sandbagging Âť. Wodtke, Radical Focus : importance du calibrage Ă  50-70 %.`}]},{id:`okr-equipe.sheet.project-tracking`,isNamedPitfall:!0,themeId:`okr.pieges-kr`,icon:`bad`,title:`L'OKR utilisĂŠ comme suivi de projet`,heroPhrase:`L'OKR n'est pas un tableau de bord de chantiers. Si tu listes ce que tu vas faire, ce n'est plus un OKR.`,intro:``,practiceCtaLabel:`Va recadrer ton OKR en outcome`,sections:[{heading:`Le glissement`,icon:`bad`,kind:`signals`,body:`L'ĂŠquipe ouvre son OKR comme un fichier de suivi : on coche les jalons, on remonte les pourcentages d'avancement projet. Le KR devient ÂŤ livrer le module X Ă  50 %, puis 80 %, puis 100 % Âť. On a transformĂŠ un outil d'outcome en un outil de gestion de projet.`,bullets:[`SymptĂ´me : les KR parlent de jalons (ÂŤ phase 1 livrĂŠe Âť, ÂŤ MVP dĂŠployĂŠ Âť).`,`SymptĂ´me : le check-in OKR ressemble Ă  un comitĂŠ de pilotage projet.`,`SymptĂ´me : impossible de distinguer un KR d'une ligne de feuille de route.`]},{heading:`Pourquoi c'est un problĂ¨me`,icon:`warn`,body:`Livrer un projet ne garantit pas l'outcome. On peut livrer le tableau de bord et que personne ne l'utilise. On peut migrer la stack et n'avoir aucun gain de performance perĂ§u. L'OKR demande la question d'aprĂ¨s : ÂŤ qu'est-ce que Ă§a doit faire bouger ? Âť.`,examples:[{bad:`KR : Migrer le service de paiement vers la nouvelle stack Ă  100 % d'ici fin Q2.`,good:`KR : RĂŠduire la latence p95 du service de paiement de 1,2 s Ă  400 ms d'ici fin Q2.`,note:`La migration est le moyen. Le KR mesure ce que le moyen est censĂŠ produire.`}]},{heading:`Comment redresser`,icon:`good`,body:`Pour chaque RĂŠsultat clĂŠ projet, pose la question : ÂŤ Ce projet existe pour faire bouger quoi ? Âť. La rĂŠponse devient le KR. Le projet retourne dans la feuille de route ou le backlog, oĂš il est suivi avec les outils de gestion de projet.`,bullets:[`OKR = ce qui doit changer dans le monde, mesurĂŠ chiffrĂŠ.`,`Feuille de route = ce que l'ĂŠquipe va faire pour y contribuer.`,`Backlog = comment l'ĂŠquipe va le faire, sprint aprĂ¨s sprint.`]},{heading:`Source`,kind:`source`,body:`Niven, OKRs For Dummies : distinction outcome / output. Lamorte, The OKRs Field Book : chapitre ÂŤ Output-based vs outcome-based key results Âť. Wodtke, Radical Focus : ÂŤ OKRs are not a task list Âť.`}]},{id:`okr-equipe.sheet.top-down`,isNamedPitfall:!0,themeId:`okr.pieges-kr`,icon:`bad`,title:`L'OKR ĂŠquipe dictĂŠ top-down`,heroPhrase:`Un OKR qu'une ĂŠquipe n'a pas posĂŠ n'engage personne. Bottom-up n'est pas une option.`,intro:``,practiceCtaLabel:`Va co-construire ton OKR avec ton ĂŠquipe`,sections:[{heading:`Le scĂŠnario`,icon:`bad`,kind:`signals`,body:`Le management dĂŠroule l'OKR entreprise puis distribue Ă  chaque ĂŠquipe son OKR ĂŠquipe prĂŠparĂŠ en comitĂŠ. L'ĂŠquipe dĂŠcouvre ses RĂŠsultats clĂŠs dans un slide. C'est efficace en apparence : tout est alignĂŠ, tout est documentĂŠ. C'est inefficace en rĂŠalitĂŠ : personne dans l'ĂŠquipe ne se sent comptable de cibles qu'elle n'a pas calibrĂŠes.`,bullets:[`SymptĂ´me : les KR sont ĂŠcrits avec un vocabulaire que l'ĂŠquipe n'emploie pas.`,`SymptĂ´me : la confiance affichĂŠe est haute par politesse, basse en off.`,`SymptĂ´me : le check-in OKR est une obligation, pas un outil de pilotage.`]},{heading:`Pourquoi le bottom-up est non nĂŠgociable`,icon:`warn`,body:`L'ĂŠquipe est la seule Ă  connaĂŽtre sa capacitĂŠ rĂŠelle, ses contraintes techniques, les hypothĂ¨ses produit qu'elle peut raisonnablement tester ce trimestre. Un OKR dictĂŠ ignore ces trois ĂŠlĂŠments : il est faux dĂ¨s qu'il est ĂŠcrit. Christina Wodtke l'a documentĂŠ comme l'un des plus grands ÂŤ OKR mistakes Âť : ÂŤ OKRs are great bottom up, not just top down Âť. [traduction : ÂŤ Les OKR fonctionnent trĂ¨s bien de maniĂ¨re ascendante, pas seulement descendante. Âť]`},{heading:`Le bon flux`,icon:`good`,body:`Le management partage l'OKR entreprise et les attendus stratĂŠgiques. Chaque ĂŠquipe se rĂŠunit en atelier de cadrage (demi-journĂŠe typique), facilitĂŠ par un coach ou un leader d'ĂŠquipe. Elle propose son OKR. Ce qui remonte est arbitrĂŠ et calibrĂŠ dans un dialogue, pas imposĂŠ.`,examples:[{bad:`Recevoir un slide ÂŤ OKR ĂŠquipe Q3 Âť du management et l'intĂŠgrer tel quel dans Jira.`,good:`Lire l'OKR entreprise Q3, tenir un atelier d'ĂŠquipe d'une demi-journĂŠe, proposer un OKR ĂŠquipe et le soumettre au management pour calibrage.`,note:`Le management arbitre ce qui remonte. Il ne fabrique pas ce qui descend.`}]},{heading:`Source`,kind:`source`,body:`Wodtke, OKR Mistakes : ÂŤ OKRs are great bottom up, not just top down Âť. Lamorte, The OKRs Field Book : Phase 1 Deployment Coaching, distinction Top-Level vs Team-Level Ateliers. Niven, OKRs For Dummies (co-construction comme condition d'engagement).`}]},{id:`okr-equipe.sheet.individual-cascade`,isNamedPitfall:!0,themeId:`okr.pieges-kr`,icon:`bad`,title:`La cascade individuelle depuis l'objectif de la direction`,heroPhrase:`Un objectif individuel qui recopie celui de la direction n'engage personne de plus qu'une liste de tĂ˘ches â c'est le niveau ĂŠquipe qu'on a sautĂŠ.`,intro:``,practiceCtaLabel:`Va construire un OKR ĂŠquipe co-construit`,sections:[{heading:`Le scĂŠnario`,icon:`bad`,kind:`signals`,body:`La direction (DP, direction produit, ou tout n+1 porteur d'un objectif de haut niveau) annonce son objectif. Au lieu de le faire descendre au niveau de l'ĂŠquipe, le manager le dĂŠcoupe directement en ÂŤ objectifs individuels Âť : chaque personne reĂ§oit une reformulation rĂŠduite du mĂŞme objectif, avec son nom dessus.`,bullets:[`SymptĂ´me : l'objectif individuel est la mĂŞme phrase que celui de la direction, en plus petit.`,`SymptĂ´me : personne ne sait dire en une phrase pourquoi ce rĂŠsultat est sa responsabilitĂŠ propre et pas celle du collectif.`,`SymptĂ´me : le ÂŤ RĂŠsultat clĂŠ Âť individuel est en rĂŠalitĂŠ une tĂ˘che assignĂŠe (ÂŤ livrer X Âť, ÂŤ finir Y Âť), pas un rĂŠsultat mesurable dont la personne est seule maĂŽtresse.`]},{heading:`Pourquoi c'est un problĂ¨me`,icon:`warn`,body:`Ce n'est pas une variante acceptable du bon flux, c'est un saut de niveau. L'OKR ĂŠquipe (co-construit, calibrĂŠ collectivement) est remplacĂŠ par une distribution individuelle qui viole le critĂ¨re ÂŤ sous influence Âť du tronc commun : le rĂŠsultat final dĂŠpend du travail de plusieurs personnes, pas d'une seule. Mesurer un individu dessus est Ă  la fois injuste et peu falsifiable. C'est la mĂŞme famille que ÂŤ L'OKR ĂŠquipe dictĂŠ top-down Âť (voir fiche liĂŠe), un niveau plus bas : au lieu d'imposer l'OKR Ă  l'ĂŠquipe, on saute directement l'ĂŠquipe.`},{heading:`Le bon niveau`,icon:`good`,body:`L'ĂŠquipe co-construit un seul OKR ĂŠquipe qui contribue Ă  l'objectif de la direction â et c'est cet OKR ĂŠquipe partagĂŠ, pas des fragments individuels, qui relie le travail de chacun. Le lien avec le travail quotidien de chaque personne se fait par les rituels d'ĂŠquipe (planification, priorisation du backlog), pas par un objectif personnel dupliquĂŠ.`,examples:[{bad:`Dev A : AmĂŠliorer la fiabilitĂŠ de l'API de paiement. Dev B : RĂŠduire les frictions du parcours de paiement. Dev C : Contribuer Ă  l'amĂŠlioration du taux de conversion sur le paiement.`,good:`OKR ĂŠquipe : Faire de notre parcours de paiement la rĂŠfĂŠrence de fluiditĂŠ pour nos clients entreprise, avec des RĂŠsultats clĂŠs partagĂŠs (taux d'abandon, satisfaction post-paiement, incidents de production).`,note:`Le travail de Dev A, B et C contribue Ă  un seul OKR ĂŠquipe via le backlog partagĂŠ â aucun n'a besoin d'un objectif personnel dupliquĂŠ.`}]},{heading:`Source`,kind:`source`,body:`Morisseau, La boĂŽte Ă  outils de la mĂŠthode OKR (bi-niveau annuel/trimestriel, pas d'OKR individuel). Lamorte, The OKRs Field Book (distinction Top-Level vs Team-Level Workshops). Niven, OKRs For Dummies (structure 1 O + 3-5 KR portĂŠe par l'ĂŠquipe, pas par l'individu). Voir aussi la fiche ÂŤ L'OKR ĂŠquipe dictĂŠ top-down Âť : mĂŞme famille de piĂ¨ge, un niveau plus haut.`}]},{id:`okr-equipe.sheet.set-and-forget`,isNamedPitfall:!0,themeId:`okr.pieges-kr`,icon:`warn`,title:`Le set-it-and-forget-it`,heroPhrase:`L'OKR est fixĂŠ en dĂŠbut de trimestre, puis plus jamais rouvert. Il redevient rĂŠel seulement le jour du bilan.`,intro:``,practiceCtaLabel:`Va remettre un OKR au centre d'un suivi rĂŠgulier`,sections:[{heading:`Pourquoi c'est piĂŠgeux`,icon:`target`,body:`Un OKR fixĂŠ sans suivi rĂŠgulier ne guide aucune dĂŠcision entre le jour oĂš il est ĂŠcrit et le jour oĂš il est jugĂŠ. Sans check-in, une dĂŠrive de trois semaines n'est dĂŠcouverte qu'Ă  la fin du trimestre, l'ĂŠquipe dĂŠcouvre l'ĂŠchec au bilan, jamais assez tĂ´t pour corriger le tir.`,bullets:[`Un OKR fixĂŠ sans suivi rĂŠgulier ne guide aucune dĂŠcision entre sa rĂŠdaction et son bilan.`,`Sans check-in, une dĂŠrive de plusieurs semaines n'est dĂŠcouverte qu'Ă  la fin du trimestre.`,`L'ĂŠquipe dĂŠcouvre l'ĂŠchec au bilan, jamais assez tĂ´t pour corriger le tir.`]},{heading:`Comment Ă§a se voit`,icon:`warn`,kind:`signals`,body:``,bullets:[`Aucun rituel ne mentionne l'OKR entre sa rĂŠdaction et la revue de fin de trimestre.`,`Personne ne sait dire, Ă  mi-trimestre, si l'OKR est en bonne voie ou pas.`,`Le premier vrai bilan de la progression a lieu le jour mĂŞme du bilan final.`]},{heading:`RĂŠintroduire le check-in`,icon:`wrench`,body:`Mettre en place un point dĂŠdiĂŠ toutes les deux semaines qui vĂŠrifie la progression du RĂŠsultat clĂŠ, pas seulement l'ĂŠtat des tĂ˘ches.`,examples:[{bad:`OKR rĂŠdigĂŠ en semaine 1 du trimestre, jamais revu jusqu'au bilan en semaine 12.`,good:`Point dĂŠdiĂŠ toutes les deux semaines : ÂŤ oĂš en est le RĂŠsultat clĂŠ, qu'est-ce qui bloque, faut-il ajuster l'effort ? Âť`,note:`Le suivi rĂŠgulier transforme l'OKR d'un vĹu figĂŠ en un outil de pilotage vivant.`}]},{heading:`Source`,kind:`source`,body:`Ben Lamorte, sur la nĂŠcessitĂŠ de check-ins bi-hebdomadaires plutĂ´t qu'une seule revue en fin de trimestre pour ĂŠviter le ÂŤ set it and forget it Âť.`}]},{id:`okr-equipe.sheet.reverse-engineered-kr`,isNamedPitfall:!0,themeId:`okr.pieges-kr`,icon:`warn`,title:`Le KR reverse-engineered`,heroPhrase:`L'ĂŠquipe part de son backlog dĂŠjĂ  dĂŠcidĂŠ, puis invente un RĂŠsultat clĂŠ qui colle dessus. Rien ne change dans le travail rĂŠel.`,intro:``,practiceCtaLabel:`Va vĂŠrifier si un KR a vraiment changĂŠ un plan`,sections:[{heading:`Pourquoi c'est piĂŠgeux`,icon:`target`,body:`Le backlog ne change pas d'un mot aprĂ¨s la rĂŠdaction des OKR : ils ne font que l'habiller. Le RĂŠsultat clĂŠ est choisi parce qu'il est facile Ă  atteindre avec le travail dĂŠjĂ  prĂŠvu, pas l'inverse, et les OKR ne font jamais reconsidĂŠrer ou reprioriser le plan existant.`,bullets:[`Le backlog ne change pas d'un mot aprĂ¨s la rĂŠdaction des OKR : ils ne font que l'habiller.`,`Le RĂŠsultat clĂŠ est choisi parce qu'il colle au travail dĂŠjĂ  prĂŠvu, pas l'inverse.`,`Les OKR ne font jamais reconsidĂŠrer ou reprioriser le plan existant.`]},{heading:`Comment Ă§a se voit`,icon:`warn`,kind:`signals`,body:``,bullets:[`Le RĂŠsultat clĂŠ est rĂŠdigĂŠ aprĂ¨s que la roadmap du trimestre est dĂŠjĂ  figĂŠe.`,`Aucun ĂŠlĂŠment du backlog n'a ĂŠtĂŠ retirĂŠ ou ajoutĂŠ Ă  cause des OKR.`,`Le RĂŠsultat clĂŠ se mesure exactement par ce que l'ĂŠquipe avait dĂŠjĂ  prĂŠvu de livrer.`]},{heading:`Laisser le KR reprioriser`,icon:`wrench`,body:`RĂŠdiger le RĂŠsultat clĂŠ Ă  partir de l'effet recherchĂŠ, puis le laisser challenger le backlog existant. Si rien dans le plan ne change, le RĂŠsultat clĂŠ n'ĂŠtait pas rĂŠel.`,examples:[{bad:`Le backlog du trimestre est dĂŠjĂ  arbitrĂŠ ; le RĂŠsultat clĂŠ rĂŠdigĂŠ ensuite reprend exactement les livrables dĂŠjĂ  prĂŠvus.`,good:`Le RĂŠsultat clĂŠ est fixĂŠ sur l'effet recherchĂŠ ; deux ĂŠlĂŠments du backlog jugĂŠs non alignĂŠs sont retirĂŠs, un nouveau est ajoutĂŠ pour l'atteindre.`,note:`Un vrai OKR change ce que l'ĂŠquipe fait, pas seulement comment elle le raconte.`}]},{heading:`Source`,kind:`source`,body:`Jeff Gothelf, OKR Anti-pattern: reverse engineering key results to match your backlog.`}]},{id:`okr-equipe.sheet.no-stretch`,isNamedPitfall:!0,themeId:`okr.pieges-kr`,icon:`warn`,title:`L'objectif sans stretch`,heroPhrase:`La cible est fixĂŠe sans ambition. La confiance de rĂŠussite frĂ´le 100 % dĂ¨s le premier jour.`,intro:``,practiceCtaLabel:`Va recalibrer l'ambition d'un KR trop facile`,sections:[{heading:`Pourquoi c'est piĂŠgeux`,icon:`target`,body:`Un RĂŠsultat clĂŠ fixĂŠ Ă  95-100 % de confiance de rĂŠussite n'est plus un OKR, c'est une tĂ˘che planifiĂŠe. Sans tension crĂŠative, l'ĂŠquipe ne cherche pas de nouvelle faĂ§on de faire, elle exĂŠcute du connu. L'ambition calibrĂŠe, autour de 50 Ă  70 % de confiance, est ce qui distingue un OKR d'un engagement classique.`,bullets:[`Un RĂŠsultat clĂŠ fixĂŠ Ă  95-100 % de confiance n'est plus un OKR, c'est une tĂ˘che planifiĂŠe.`,`Sans tension crĂŠative, l'ĂŠquipe exĂŠcute du connu au lieu de chercher une nouvelle faĂ§on de faire.`,`L'ambition calibrĂŠe (50 Ă  70 % de confiance) distingue un OKR d'un engagement classique.`]},{heading:`Comment Ă§a se voit`,icon:`warn`,kind:`signals`,body:``,bullets:[`L'ĂŠquipe est certaine, dĂ¨s la rĂŠdaction, d'atteindre la cible.`,`Le RĂŠsultat clĂŠ est atteint dans les toutes premiĂ¨res semaines du trimestre, sans effort notable.`,`Personne ne peut citer une nouvelle faĂ§on de travailler que cet OKR a demandĂŠe.`]},{heading:`Recalibrer l'ambition`,icon:`wrench`,body:`Demander Ă  l'ĂŠquipe son niveau de confiance honnĂŞte sur la cible. Viser 50 Ă  70 % : en dessous, la cible est dĂŠraisonnable ; au-dessus, elle n'est pas un OKR.`,examples:[{bad:`Faire passer la couverture de tests automatisĂŠs de 78 % Ă  80 % d'ici fin du trimestre.`,good:`Faire passer la couverture de tests automatisĂŠs de 78 % Ă  92 % d'ici fin du trimestre, Ă  environ 60 % de confiance pour l'ĂŠquipe.`,note:`L'ĂŠcart demande un vrai effort, dans la fourchette OKR.`}]},{heading:`Source`,kind:`source`,body:`Christina Wodtke (Radical Focus), sur les objectifs ÂŤ trop faciles Âť comme l'un des trois modes d'ĂŠchec courants des OKR, avec le trop nombreux et le trop vague.`}]},{id:`okr-equipe.sheet.vague-objective`,isNamedPitfall:!0,themeId:`okr.pieges-kr`,icon:`warn`,title:`L'objectif trop vague`,heroPhrase:`Personne ne sait dire la mĂŞme chose de ce Ă  quoi ressemble la rĂŠussite. Chacun se fait sa propre idĂŠe.`,intro:``,practiceCtaLabel:`Va tester la clartĂŠ d'un objectif qualitatif`,sections:[{heading:`Pourquoi c'est piĂŠgeux`,icon:`target`,body:`Un objectif qualitatif doit ĂŞtre inspirant mais interprĂŠtable de faĂ§on univoque, pas ouvert Ă  toutes les lectures. Deux membres de l'ĂŠquipe qui dĂŠcrivent sĂŠparĂŠment ÂŤ Ă  quoi ressemble la rĂŠussite Âť racontent alors deux histoires diffĂŠrentes, et le flou de l'objectif se rĂŠpercute sur le choix des RĂŠsultats clĂŠs, qui partent dans des directions disjointes.`,bullets:[`Un objectif qualitatif doit ĂŞtre inspirant mais interprĂŠtable de faĂ§on univoque.`,`Deux membres de l'ĂŠquipe qui le dĂŠcrivent sĂŠparĂŠment racontent deux histoires diffĂŠrentes.`,`Le flou de l'objectif se rĂŠpercute sur des RĂŠsultats clĂŠs qui partent dans des directions disjointes.`]},{heading:`Comment Ă§a se voit`,icon:`warn`,kind:`signals`,body:``,bullets:[`Demander Ă  deux personnes de dĂŠcrire l'objectif dans leurs mots produit deux rĂŠponses trĂ¨s diffĂŠrentes.`,`L'objectif pourrait s'appliquer Ă  n'importe quelle ĂŠquipe de l'entreprise sans rien changer au libellĂŠ.`,`Les RĂŠsultats clĂŠs rattachĂŠs semblent parfois sans lien ĂŠvident entre eux.`]},{heading:`Le test des deux voix`,icon:`wrench`,body:`Faire reformuler l'objectif indĂŠpendamment par deux membres de l'ĂŠquipe. Si leurs versions divergent nettement, l'objectif est trop vague et doit ĂŞtre rĂŠĂŠcrit.`,examples:[{bad:`Objectif : ÂŤ Ătre excellents pour nos utilisateurs. Âť`,good:`Objectif : ÂŤ Faire de notre plateforme de paiement la plus fiable de notre marchĂŠ. Âť`,note:`Le second objectif reste qualitatif et inspirant, mais dĂŠsigne un terrain prĂŠcis (fiabilitĂŠ, paiement, marchĂŠ) que tout le monde peut se reprĂŠsenter pareil.`}]},{heading:`Source`,kind:`source`,body:`Christina Wodtke (Radical Focus), sur les objectifs ÂŤ trop vagues Âť comme mode d'ĂŠchec courant des OKR.`}]},{id:`okr-equipe.sheet.kr-without-guardrail`,isNamedPitfall:!0,themeId:`okr.pieges-kr`,icon:`warn`,title:`Le KR sans garde-fou`,heroPhrase:`Un RĂŠsultat clĂŠ de croissance poussĂŠ seul, sans contre-mesure. L'effet secondaire se dĂŠgrade en coulisse, hors du radar.`,intro:``,practiceCtaLabel:`Va ajouter un garde-fou Ă  un KR de croissance`,sections:[{heading:`Pourquoi c'est piĂŠgeux`,icon:`target`,body:`Un RĂŠsultat clĂŠ de croissance poussĂŠ seul crĂŠe une incitation Ă  optimiser ce chiffre au dĂŠtriment du reste. L'effet secondaire indĂŠsirable se dĂŠgrade en coulisse, sans qu'aucun indicateur ne l'alerte, et le succĂ¨s affichĂŠ du KR peut cacher une dĂŠgradation rĂŠelle ailleurs dans le produit.`,bullets:[`Un RĂŠsultat clĂŠ de croissance poussĂŠ seul incite Ă  optimiser ce chiffre au dĂŠtriment du reste.`,`L'effet secondaire indĂŠsirable se dĂŠgrade en coulisse, sans qu'aucun indicateur ne l'alerte.`,`Le succĂ¨s affichĂŠ du KR peut cacher une dĂŠgradation rĂŠelle ailleurs dans le produit.`]},{heading:`Comment Ă§a se voit`,icon:`warn`,kind:`signals`,body:``,bullets:[`Un seul KR de volume ou de croissance existe, sans aucun KR de qualitĂŠ en vis-Ă -vis.`,`Une autre ĂŠquipe (support, rĂŠtention, qualitĂŠ) signale une dĂŠgradation qui coĂŻncide avec la poussĂŠe du KR.`,`Personne n'a listĂŠ, Ă  la rĂŠdaction du KR, ce qui pourrait se dĂŠgrader en le poussant fort.`]},{heading:`Ajouter le garde-fou`,icon:`wrench`,body:`Associer Ă  tout RĂŠsultat clĂŠ de croissance ou de volume un indicateur garde-fou explicite, qui ne doit pas se dĂŠgrader au-delĂ  d'un seuil dĂŠfini Ă  l'avance.`,examples:[{bad:`Faire passer le taux d'inscription depuis la landing page de 4 % Ă  12 %.`,good:`Faire passer le taux d'inscription depuis la landing page de 4 % Ă  12 %, garde-fou : le taux de churn Ă  30 jours des nouveaux inscrits ne doit pas dĂŠpasser 8 % (actuellement 6 %).`,note:`Le garde-fou rend visible l'effet secondaire avant qu'il ne devienne un problĂ¨me cachĂŠ.`}]},{heading:`Source`,kind:`source`,body:`Pratique OKR courante (Doerr, Lamorte) recommandant d'associer un indicateur garde-fou Ă  tout RĂŠsultat clĂŠ de croissance pour ĂŠviter les effets pervers.`}]}],Cn=[{id:`shared.values.transparence`,themeId:`valeurs.posture`,icon:`good`,title:`Transparence`,heroPhrase:`Nommer ce qu'on ne sait pas. L'incertitude assumĂŠe vaut mieux que le flou qui rassure.`,intro:``,practiceCtaLabel:`Va rĂŠdiger un objectif transparent`,sections:[{heading:`Pourquoi`,icon:`target`,body:`Le flou (ÂŤ optimiser Âť, ÂŤ renforcer Âť, ÂŤ significativement Âť) rassure ceux qui le prononcent et dĂŠsarme ceux qui l'ĂŠcoutent. Personne ne saura Ă  la fin si l'objectif est atteint, donc personne n'aura Ă  rendre compte. La transparence inverse ce contrat : on dit ce qu'on sait, on chiffre ce qu'on peut, on nomme ce qu'on ignore.`,bullets:[`Une mĂŠtrique nommĂŠe vaut mieux qu'une intention partagĂŠe.`,`ÂŤ Je ne sais pas encore Âť est une rĂŠponse transparente, pas une faute.`,`Le flou est rarement modeste : il cache souvent une absence de pensĂŠe.`]},{heading:`Comment Ă§a se voit`,icon:`good`,body:``,bullets:[`PrĂŠsence d'au moins un chiffre ou d'une rĂŠfĂŠrence vĂŠrifiable.`,`Les hypothĂ¨ses sous-jacentes sont nommĂŠes (ÂŤ on suppose queâŚ Âť).`,`Le calibrage de confiance est dĂŠclarĂŠ, pas implicite.`]},{heading:`Comment l'incarner`,icon:`wrench`,body:`Devant chaque mot flou, demander ÂŤ tu veux dire quoi, concrĂ¨tement, mesurable comment ? Âť et ĂŠcrire la rĂŠponse comme nouvel objectif. Si la rĂŠponse est ÂŤ je ne sais pas Âť, c'est un sujet de discovery, pas un objectif d'engagement.`,examples:[{bad:`Enrichir l'expĂŠrience de consultation des factures.`,good:`Faire passer le CSAT de la consultation des factures de 3,2 Ă  4,1 d'ici fin de sprint, ou ouvrir une exploration d'une semaine pour comprendre ce qui la bloque.`,note:`Soit on chiffre, soit on assume qu'on cherche encore. Pas d'entre-deux.`}]},{heading:`Source`,kind:`source`,body:`Doctrine outcome-over-output convergente chez Christina Wodtke, Marty Cagan et la communautĂŠ Lean Startup. Le flou comme stratĂŠgie d'ĂŠvitement est documentĂŠ dans Lencioni (Five Dysfunctions of a Team).`}]},{id:`shared.values.honnetete-calibrage`,themeId:`valeurs.posture`,icon:`good`,title:`HonnĂŞtetĂŠ du calibrage`,heroPhrase:`Dire ce qu'on pense vraiment de ses chances de succĂ¨s. Ni 100 %, ni vague.`,intro:``,practiceCtaLabel:`Va dĂŠclarer ta confiance honnĂŞtement`,sections:[{heading:`Pourquoi`,icon:`target`,body:`Deux dĂŠrives opposĂŠes sabotent le calibrage : la sur-confiance qui sabote la crĂŠdibilitĂŠ (l'objectif passĂŠ en engagĂŠ Ă  50 % dĂŠtruit la confiance au PI suivant), et le sandbagging qui se rĂŠserve une marge facile (le KR Ă  100 % de confiance n'apprend rien). L'honnĂŞtetĂŠ du calibrage est le contrat invisible qui fait fonctionner OKR et SAFe.`,bullets:[`Calibrer trop haut, c'est promettre ce qu'on ne pourra pas tenir.`,`Calibrer trop bas, c'est se voler un apprentissage potentiel.`,`Le bon calibrage demande du courage : il rend la prĂŠvision falsifiable.`]},{heading:`Comment Ă§a se voit`,icon:`good`,body:``,bullets:[`Une fourchette de confiance est dĂŠclarĂŠe explicitement (ÂŤ on est Ă  60-70 % Âť).`,`Le calibrage est rĂŠajustĂŠ Ă  mi-parcours quand de nouveaux signaux arrivent.`,`Personne ne pense ÂŤ je dirai 90 % pour qu'on me laisse tranquille Âť.`]},{heading:`Comment l'incarner`,icon:`wrench`,body:`Avant de figer le calibrage, poser la question : ÂŤ si nous ĂŠtions tous payĂŠs Ă  dire la vĂŠritĂŠ maintenant, qui mettrait quel chiffre ? Âť Utiliser le vote de confiance anonyme quand l'ĂŠquipe a tendance Ă  converger artificiellement.`,examples:[{bad:`EngagĂŠ Ă  100 % sur un taux de disponibilitĂŠ de 99,9 % pour le service interne de facturation, alors qu'il plafonne Ă  98 % depuis un an.`,good:`Stretch Ă  50 % pour viser 99,9 %, avec un plan B chiffrĂŠ si on n'y arrive pas : stabiliser au moins 99 % avant la revue.`,note:`Le wording n'est pas magique : c'est le chiffre de confiance qui matĂŠrialise l'engagement.`}]},{heading:`Source`,kind:`source`,body:`Christina Wodtke sur le sandbagging (eleganthack.com). Ben Lamorte sur le vote de confiance (The OKRs Field Book). SAFe sur le ROAM et le vote de confiance en PI Planning.`}]},{id:`shared.values.co-construction`,themeId:`valeurs.posture`,icon:`good`,title:`Co-construction`,heroPhrase:`L'objectif est nĂŠgociĂŠ, pas dictĂŠ. Ni par le PO seul, ni par le manager seul, ni par les Devs seuls.`,intro:``,practiceCtaLabel:`Va co-construire un objectif`,sections:[{heading:`Pourquoi`,icon:`target`,body:`Un objectif imposĂŠ est inerte. L'ĂŠquipe l'exĂŠcute parce qu'il faut bien faire quelque chose, mais elle n'y croit pas. Ă la moindre difficultĂŠ, elle abandonne sans regret. Un objectif co-construit, Ă  l'inverse, devient un engagement personnel : chacun le dĂŠfend parce que chacun a participĂŠ Ă  le poser.`,bullets:[`Le PO apporte le cap, l'ĂŠquipe apporte la faisabilitĂŠ, le management apporte le contexte stratĂŠgique.`,`Sans la voix des Devs, on s'engage sur ce qu'on ne sait pas livrer.`,`Sans la voix du PO, on livre ce qui ne sert Ă  personne.`]},{heading:`Comment Ă§a se voit`,icon:`good`,body:``,bullets:[`Chacun a parlĂŠ au moins une fois pendant la rĂŠdaction.`,`Les dĂŠsaccords ont ĂŠtĂŠ exprimĂŠs, pas ĂŠtouffĂŠs.`,`La formulation finale est rĂŠdigĂŠe Ă  plusieurs voix, pas par une seule.`]},{heading:`Comment l'incarner`,icon:`wrench`,body:`Faire un tour de table avant de figer. Respecter les silences (quelqu'un qui se tait n'est pas d'accord, il cherche ses mots). Utiliser un vote de confiance final. Inviter explicitement les juniors et les voix discrĂ¨tes Ă  se prononcer.`,examples:[{bad:`Le manager arrive avec l'objectif dĂŠjĂ  rĂŠdigĂŠ et demande ÂŤ Ă§a vous va ? Âť. Tout le monde hoche la tĂŞte.`,good:`Le manager ĂŠnonce le contexte stratĂŠgique (5 min), puis se tait. L'ĂŠquipe propose 2-3 reformulations possibles, vote, ajuste.`,note:`La parole du chef ĂŠteint la discussion. La discussion produit l'engagement.`}]},{heading:`Source`,kind:`source`,body:`Scrum Guide 2020 sur la co-crĂŠation par l'ĂŠquipe Scrum. Christina Wodtke : ÂŤ OKRs are great bottom up, not just top down. Âť [traduction : ÂŤ Les OKR fonctionnent trĂ¨s bien de maniĂ¨re ascendante, pas seulement descendante. Âť] Patrick Lencioni sur la culture de confiance comme prĂŠalable au dĂŠsaccord productif.`}]},{id:`shared.values.service-beneficiaire`,themeId:`valeurs.posture`,icon:`good`,title:`Service du bĂŠnĂŠficiaire`,heroPhrase:`L'utilisateur passe avant le confort de l'ĂŠquipe. Le refactor sans bĂŠnĂŠficiaire nommĂŠ est un caprice.`,intro:``,practiceCtaLabel:`Va nommer le bĂŠnĂŠficiaire de ton objectif`,sections:[{heading:`Pourquoi`,icon:`target`,body:`La vĂŠlocitĂŠ est une ressource finie. La dĂŠpenser sur un objectif qui ne change rien chez personne, c'est la perdre. Cette valeur protĂ¨ge contre les objectifs auto-centrĂŠs (vĂŠlocitĂŠ, propretĂŠ du code, ÂŤ on se sent mieux Âť) qui se dĂŠguisent en travail utile. Elle ne dit pas qu'on ne fait jamais de technique, elle dit qu'on nomme l'effet attendu cĂ´tĂŠ bĂŠnĂŠficiaire.`,bullets:[`Un refactor a un bĂŠnĂŠficiaire : l'ĂŠquipe qui livrera plus vite, les ops qui dormiront mieux, l'utilisateur qui aura moins de bugs.`,`Si on ne peut pas nommer le bĂŠnĂŠficiaire et l'effet, le travail est probablement un caprice.`,`Le bĂŠnĂŠficiaire n'est pas toujours l'utilisateur final : c'est parfois l'ĂŠquipe support, le commercial, l'astreinte.`]},{heading:`Comment Ă§a se voit`,icon:`good`,body:``,bullets:[`Un bĂŠnĂŠficiaire est nommĂŠ dans l'objectif (ÂŤ pour les nouveaux utilisateurs Âť, ÂŤ pour l'ĂŠquipe astreinte Âť).`,`L'effet attendu est formulĂŠ cĂ´tĂŠ bĂŠnĂŠficiaire, pas cĂ´tĂŠ ĂŠquipe.`,`La mesure se fait cĂ´tĂŠ bĂŠnĂŠficiaire (NPS, CSAT, temps gagnĂŠ).`]},{heading:`Comment l'incarner`,icon:`wrench`,body:`Avant de figer un objectif, faire le test ÂŤ qui en profite hors de l'ĂŠquipe ? Âť. Si la liste est vide, reformuler. Si elle est vide pour de bon, accepter que ce travail n'est peut-ĂŞtre pas prioritaire ce cycle.`,examples:[{bad:`Moderniser le pipeline de dĂŠploiement.`,good:`RĂŠduire le temps entre la fusion d'un correctif et sa mise en production de 45 Ă  10 minutes, pour les ĂŠquipes qui livrent chaque jour.`,note:`La modernisation reste possible, mais comme moyen au service du bĂŠnĂŠficiaire, pas comme fin en soi.`}]},{heading:`Source`,kind:`source`,body:`Marty Cagan (Inspired) sur la centralitĂŠ du client dans la discovery produit. Christina Wodtke sur la mesure outcome-based.`}]},{id:`shared.values.apprentissage`,themeId:`valeurs.posture`,icon:`good`,title:`Apprentissage`,heroPhrase:`Un objectif ratĂŠ qui apprend vaut mieux qu'un objectif atteint sans apprendre.`,intro:``,practiceCtaLabel:`Va isoler l'hypothĂ¨se de ton objectif`,sections:[{heading:`Pourquoi`,icon:`target`,body:`La pire issue d'un cycle n'est pas l'ĂŠchec, c'est l'absence d'apprentissage. Un objectif atteint sans surprise confirme ce qu'on savait dĂŠjĂ  ; un objectif ratĂŠ qui modifie le sprint suivant fait progresser l'ĂŠquipe et le produit. Cette valeur protĂ¨ge contre le sandbagging et l'auto-fĂŠlicitation.`,bullets:[`L'objectif porte une hypothĂ¨se vĂŠrifiable, pas une certitude.`,`Le succĂ¨s se mesure aussi Ă  ce qu'on a appris, pas seulement Ă  la cible atteinte.`,`Un objectif qui ne pouvait pas ĂŠchouer n'avait pas grand-chose Ă  apprendre.`]},{heading:`Comment Ă§a se voit`,icon:`good`,body:``,bullets:[`L'hypothĂ¨se sous-jacente est nommĂŠe (ÂŤ on suppose que X bouge Y Âť).`,`Les rĂŠtros parlent de ce qui a ĂŠtĂŠ appris, pas juste de ce qui a ĂŠtĂŠ fait.`,`Un objectif ratĂŠ est analysĂŠ, pas occultĂŠ.`]},{heading:`Comment l'incarner`,icon:`wrench`,body:`Poser la question ÂŤ qu'est-ce qu'on va apprendre avec ce cycle, indĂŠpendamment de l'atteinte ? Âť avant de figer l'objectif. Isoler l'hypothĂ¨se de la mĂŠtrique : qu'est-ce qu'on testera vraiment ?`,examples:[{bad:`Faire passer le NPS de 28 Ă  32 d'ici fin de trimestre (on sait que les amĂŠliorations UX en cours suffiront).`,good:`Faire passer le NPS de 28 Ă  50 d'ici fin de trimestre. HypothĂ¨se testĂŠe : les UX ĂŠcran principal ont plus d'impact que les ĂŠcrans secondaires.`,note:`Le second objectif est plus ambitieux et plus apprenant. S'il rate, l'ĂŠquipe sait quoi creuser au cycle suivant.`}]},{heading:`Source`,kind:`source`,body:`Eric Ries, Lean Startup, sur l'apprentissage validĂŠ comme unitĂŠ de progrĂ¨s. Marty Cagan sur la discovery produit. Christina Wodtke sur la posture d'apprentissage en OKR.`}]},{id:`shared.values.courage-desaccord`,themeId:`valeurs.posture`,icon:`good`,title:`Courage du dĂŠsaccord`,heroPhrase:`Dire non aux objectifs creux, demander des reformulations, porter un dissensus. Hocher la tĂŞte sape l'ĂŠquipe.`,intro:``,practiceCtaLabel:`Va poser une objection constructive`,sections:[{heading:`Pourquoi`,icon:`target`,body:`Un consensus mou produit un objectif mou. Quand personne n'ose dire ÂŤ cet objectif n'est pas clair Âť, ÂŤ ce calibrage est faux Âť, ÂŤ ce KR est un projet dĂŠguisĂŠ Âť, l'ĂŠquipe se condamne Ă  exĂŠcuter un mauvais cap pendant tout un cycle. Le courage du dĂŠsaccord est ce qui transforme un atelier de rĂŠdaction en dĂŠbat productif.`,bullets:[`Hocher la tĂŞte poliment est une trahison de l'ĂŠquipe.`,`Une objection non exprimĂŠe devient un mauvais rĂŠsultat Ă  l'arrivĂŠe.`,`Le dissensus, exprimĂŠ tĂ´t et calmement, ĂŠconomise des semaines de mauvais travail.`]},{heading:`Comment Ă§a se voit`,icon:`good`,body:``,bullets:[`Au moins une objection est posĂŠe pendant la rĂŠdaction.`,`Les juniors et les voix discrĂ¨tes sont sollicitĂŠs explicitement.`,`Le vote de confiance anonyme rĂŠvĂ¨le parfois des ĂŠcarts que la discussion publique cachait.`]},{heading:`Comment l'incarner`,icon:`wrench`,body:`CrĂŠer un espace de dĂŠsaccord sĂťr : interdire les sarcasmes, accueillir chaque objection comme un cadeau (ÂŤ merci de l'avoir dit Âť). Poser la question ÂŤ qui n'est pas convaincu ? Âť en fin de rĂŠdaction. Pour SAFe : utiliser le ROAM honnĂŞtement. Pour OKR : insister sur le vote de confiance.`,examples:[{bad:`Le facilitateur lit l'objectif et demande ÂŤ tout le monde est d'accord ? Âť. Silence interprĂŠtĂŠ comme assentiment.`,good:`Le facilitateur lit l'objectif puis demande ÂŤ qui a une rĂŠserve, mĂŞme petite ? Tour de table obligatoire. Âť. Les objections sont notĂŠes et adressĂŠes une Ă  une.`,note:`Le silence n'est pas un accord. Le silence est un trou dans le contrat.`}]},{heading:`Source`,kind:`source`,body:`Patrick Lencioni, The Five Dysfunctions of a Team, chapitre sur l'absence de dĂŠsaccord productif. SAFe sur le ROAM et le vote de confiance en PI Planning. Ben Lamorte sur le devoir de l'ĂŠquipe coachĂŠe.`}]}];function wn(e,t){return{id:e,themeId:t,icon:`warn`,title:`Les verbes ambigus`,heroPhrase:`ÂŤ Stabiliser Âť, d'accord. Mais qui le verra ?`,intro:`Certains verbes sonnent comme des rĂŠsultats parce qu'ils dĂŠcrivent un avant et un aprĂ¨s : stabiliser, fiabiliser, sĂŠcuriser, accĂŠlĂŠrer, simplifier, moderniser. Le piĂ¨ge n'est pas dans le verbe. Il est dans la question qu'on oublie de poser.`,sections:[{heading:`Le malentendu`,icon:`warn`,body:`ÂŤ Stabiliser, il y a bien une diffĂŠrence entre avant et aprĂ¨s. Pourquoi ce serait un output ? Âť L'objection est lĂŠgitime. La rĂŠponse : parce que sans mesure, cette diffĂŠrence reste un jugement. Ă la fin du sprint, qui dĂŠcide que la plateforme est ÂŤ stable Âť ? Ceux qui ont fait le travail, en regardant leur travail. Un jugement ne se conteste pas, une mesure si.`},{heading:`La question test`,icon:`target`,body:`Devant un verbe qui promet un changement, pose une seule question : comment le constatera-t-on, sans demander Ă  ceux qui ont fait le travail ? Un outcome se lit dans une mesure : des incidents qui passent de 14 Ă  5, un temps de rĂŠtablissement qui fond. Le bĂŠnĂŠficiaire peut ĂŞtre le client, le support, ou l'ĂŠquipe elle-mĂŞme : une astreinte qui dort la nuit est un vrai bĂŠnĂŠfice. Ce qui disqualifie un objectif, ce n'est pas d'ĂŞtre son propre bĂŠnĂŠficiaire, c'est de se juger sans mesure.`,examples:[{bad:`Stabiliser la plateforme.`,good:`Faire passer les incidents de production de 14 Ă  5 par semaine d'ici la fin du sprint.`,note:`MĂŞme intention, mais maintenant n'importe qui peut vĂŠrifier sans demander Ă  l'ĂŠquipe.`}]},{heading:`Trois familles de verbes`,icon:`learn`,body:`Pour classer un verbe rapidement, regarde ce qu'il prend pour objet.`,bullets:[`Les verbes d'activitĂŠ (livrer, coder, installer, dĂŠployer) : ils dĂŠcrivent le travail. Output, presque toujours.`,`Les verbes de variation (rĂŠduire, faire passer, convertir) : ils appellent une mesure et un sens. Bien accompagnĂŠs, ils portent un outcome.`,`Les verbes de promesse (stabiliser, sĂŠcuriser, simplifier, moderniser) : ils annoncent un changement sans dire comment on le verra. Ambigus tant que la mesure et le bĂŠnĂŠficiaire manquent.`]}]}}var Tn=[{id:`okr-entreprise.sheet.fondamentaux`,themeId:`okr-entreprise.fondamentaux`,icon:`okr`,title:`Anatomie d'un bon OKR entreprise`,heroPhrase:`Un bon OKR entreprise tient sur un post-it. Si personne ne peut le rĂŠciter trois mois aprĂ¨s l'avoir entendu, il est trop compliquĂŠ.`,intro:``,practiceCtaLabel:`Va rĂŠdiger un OKR entreprise`,sections:[{heading:`Pourquoi c'est diffĂŠrent d'un OKR ĂŠquipe`,icon:`target`,body:`Un OKR entreprise n'est pas un OKR ĂŠquipe en plus gros. Il fixe le cap de toute l'organisation pour l'annĂŠe, pas le travail d'un trimestre. Il est portĂŠ par le CODIR, qui en rĂŠpond devant le board. Mais il ne se dĂŠcide pas seul dans un bureau fermĂŠ : le CODIR discute avec les ĂŠquipes avant de s'engager, pour vĂŠrifier que le cap est tenable.`,bullets:[`Il dure un an, avec une vraie vĂŠrification chaque trimestre, pas une rĂŠĂŠcriture complĂ¨te.`,`Il parle Ă  toute l'entreprise, du commercial au support, pas seulement Ă  une ĂŠquipe.`,`Le CODIR en rĂŠpond publiquement : si Ă§a ĂŠchoue, c'est lui qui explique pourquoi.`]},{heading:`Comment le reconnaĂŽtre`,icon:`warn`,kind:`signals`,body:``,bullets:[`N'importe qui dans l'entreprise peut le rĂŠpĂŠter de mĂŠmoire, des mois aprĂ¨s.`,`Il a 3 Ă  5 preuves de rĂŠussite (les RĂŠsultats clĂŠs), pas seulement un chiffre financier.`,`La revue trimestrielle change vraiment quelque chose : on ajuste, on reconnaĂŽt un retard, on apprend.`]},{heading:`Le piĂ¨ge le plus frĂŠquent`,icon:`wrench`,body:`Confondre l'Objective avec un chiffre financier. Le chiffre financier a sa place, mais en RĂŠsultat clĂŠ, pas en Objective. Un Objective doit donner une direction que tout le monde comprend, pas juste un montant Ă  atteindre. Ce piĂ¨ge prĂŠcis, l'Objective qui n'est qu'un chiffre financier, a sa fiche : ÂŤ Le bilan financier dĂŠguisĂŠ Âť.`},{heading:`Source`,kind:`source`,body:`John Doerr, Measure What Matters (2018) : un Objective dit ÂŤ quoi Âť atteindre de faĂ§on inspirante, les RĂŠsultats clĂŠs en sont la preuve chiffrĂŠe.`}]},{id:`okr-entreprise.sheet.financial-bilan-deguise`,isNamedPitfall:!0,themeId:`okr-entreprise.pieges`,icon:`warn`,title:`Le bilan financier dĂŠguisĂŠ en OKR`,heroPhrase:`L'Objective n'est qu'un chiffre de chiffre d'affaires habillĂŠ en ambition. Personne hors des ventes ne sait quoi en faire.`,intro:``,practiceCtaLabel:`Va redonner un cap Ă  un Objective financier`,sections:[{heading:`Pourquoi c'est piĂŠgeux`,icon:`target`,body:`Le CODIR a un vrai budget Ă  dĂŠfendre devant le board. La tentation est grande de recopier ce chiffre tel quel comme Objective. Mais un chiffre financier ne dit Ă  personne comment y contribuer, sauf Ă  l'ĂŠquipe commerciale.`,bullets:[`L'Objective se limite Ă  un montant ou un pourcentage financier.`,`Aucune ĂŠquipe hors vente ne sait ce qu'elle doit faire pour y contribuer.`,`Le ÂŤ pourquoi Âť stratĂŠgique derriĂ¨re ce chiffre n'est jamais expliquĂŠ.`]},{heading:`Comment Ă§a se voit`,icon:`warn`,kind:`signals`,body:``,bullets:[`L'Objective ressemble Ă  une ligne de budget, pas Ă  une ambition.`,`Seule l'ĂŠquipe commerciale se sent concernĂŠe.`,`Personne ne sait dire ce que ce chiffre change pour un client.`]},{heading:`Remettre le chiffre Ă  sa place`,icon:`wrench`,body:`Le chiffre financier reste un RĂŠsultat clĂŠ parmi d'autres, jamais l'Objective lui-mĂŞme. L'Objective doit rĂŠpondre Ă  ÂŤ pourquoi ce chiffre compte Âť, pas juste ÂŤ combien Âť.`,examples:[{bad:`Atteindre 15 MâŹ d'ARR d'ici la fin de l'annĂŠe.`,good:`Devenir le partenaire de rĂŠfĂŠrence des PME sur notre segment. RĂŠsultats clĂŠs : ARR Ă  15 MâŹ, churn sous 5 %, 3 ĂŠtudes de cas clients publiques.`,note:`Le chiffre reste lĂ , mais il n'est plus seul et il sert une ambition plus large.`}]},{heading:`Source`,kind:`source`,body:`Felipe Castro, ÂŤ An OKR should measure the outcome, not the work Âť (read.felipecastro.com).`}]},{id:`okr-entreprise.sheet.gouffre-execution`,isNamedPitfall:!0,themeId:`okr-entreprise.pieges`,icon:`warn`,title:`Le gouffre entre l'ambition et la capacitĂŠ`,heroPhrase:`Le CODIR vise haut sans jamais demander aux ĂŠquipes si c'est jouable. Le cap devient un slogan que personne ne peut suivre.`,intro:``,practiceCtaLabel:`Va confronter une ambition Ă  la capacitĂŠ rĂŠelle`,sections:[{heading:`Pourquoi c'est piĂŠgeux`,icon:`target`,body:`Le CODIR fixe une ambition seul, sans vĂŠrifier auprĂ¨s de ceux qui devront la tenir si c'est rĂŠaliste. L'ĂŠcart entre ce qui est annoncĂŠ et ce qui est faisable devient trop grand pour ĂŞtre comblĂŠ.`,bullets:[`L'ambition est fixĂŠe avant toute discussion avec les ĂŠquipes concernĂŠes.`,`Personne n'a demandĂŠ aux ĂŠquipes si l'objectif est atteignable avec les moyens actuels.`,`L'ĂŠcart entre l'annonce et la rĂŠalitĂŠ se dĂŠcouvre aprĂ¨s coup, trop tard.`]},{heading:`Comment Ă§a se voit`,icon:`warn`,kind:`signals`,body:``,bullets:[`Les ĂŠquipes apprennent l'Objective en mĂŞme temps que tout le monde, sans avoir ĂŠtĂŠ consultĂŠes.`,`DĂ¨s l'annonce, plusieurs personnes pensent en privĂŠ que ce n'est pas possible.`,`Aucun chiffre de capacitĂŠ rĂŠelle (effectifs, budget, charge) n'a ĂŠtĂŠ confrontĂŠ Ă  l'ambition.`]},{heading:`Sonder avant d'engager`,icon:`wrench`,body:`Avant d'engager le cap, sonder la faisabilitĂŠ auprĂ¨s des ĂŠquipes ou de leurs reprĂŠsentants. Ajuster si besoin, puis seulement engager.`,examples:[{bad:`Le CODIR annonce en rĂŠunion gĂŠnĂŠrale : ÂŤ Nous doublons notre prĂŠsence internationale cette annĂŠe Âť, sans avoir consultĂŠ les ĂŠquipes qui devront l'exĂŠcuter.`,good:`Le CODIR prĂŠsente un projet de cap, recueille les retours des ĂŠquipes sur la faisabilitĂŠ pendant deux semaines, ajuste le rythme, puis annonce le cap engagĂŠ.`,note:`Le cap ne change pas de nature, mais il devient tenable parce qu'il a ĂŠtĂŠ confrontĂŠ au rĂŠel avant d'ĂŞtre figĂŠ.`}]},{heading:`Source`,kind:`source`,body:`Ben Lamorte, The OKRs Field Book (Wiley, 2022).`}]},{id:`okr-entreprise.sheet.girouette-strategique`,isNamedPitfall:!0,themeId:`okr-entreprise.pieges`,icon:`warn`,title:`Le cap qui change sans prĂŠvenir`,heroPhrase:`L'Objective de l'annĂŠe change au grĂŠ des annonces de couloir. La revue trimestrielle qui devrait trancher n'a jamais lieu.`,intro:``,practiceCtaLabel:`Va cadrer un changement de cap en cours d'annĂŠe`,sections:[{heading:`Pourquoi c'est piĂŠgeux`,icon:`target`,body:`Le marchĂŠ bouge, c'est normal. Le problĂ¨me, c'est quand le cap change sans passer par la revue trimestrielle prĂŠvue pour Ă§a. Chaque ajustement informel abĂŽme un peu plus la confiance dans le cap annoncĂŠ.`,bullets:[`Le cap change plusieurs fois dans le trimestre, hors de toute revue formelle.`,`Les ĂŠquipes apprennent le changement par un message informel, pas par une dĂŠcision expliquĂŠe.`,`Personne ne sait dire si le cap actuel est encore celui de janvier ou dĂŠjĂ  le troisiĂ¨me de l'annĂŠe.`]},{heading:`Comment Ă§a se voit`,icon:`warn`,kind:`signals`,body:``,bullets:[`Un message interne annonce une nouvelle prioritĂŠ sans lien avec la revue prĂŠvue au calendrier.`,`Les ĂŠquipes ne savent plus quel Objective est le bon cette semaine.`,`Aucune trace ĂŠcrite n'explique pourquoi le cap a changĂŠ.`]},{heading:`Ramener le changement dans le cadre prĂŠvu`,icon:`wrench`,body:`Garder les ajustements de cap dans le cadre de la revue trimestrielle prĂŠvue, mĂŞme en retard. Documenter ce qui a changĂŠ et pourquoi, plutĂ´t que d'annoncer un nouveau cap au fil de l'eau.`,examples:[{bad:`Un concurrent bouge en avril ; le CODIR envoie un message interne annonĂ§ant une nouvelle prioritĂŠ, sans revue ni explication.`,good:`La revue trimestrielle est convoquĂŠe dĂ¨s le mouvement du marchĂŠ ; le CODIR documente ce qui change, dĂŠcide si le cap annuel tient encore, communique sa dĂŠcision et son raisonnement.`,note:`Le marchĂŠ peut bouger vite ; la dĂŠcision, elle, reste posĂŠe et tracĂŠe.`}]},{heading:`Source`,kind:`source`,body:`Christina Wodtke, Radical Focus, sur le rituel de revue rythmĂŠe et documentĂŠe.`}]},{id:`okr-entreprise.sheet.mur-invisible`,isNamedPitfall:!0,themeId:`okr-entreprise.pieges`,icon:`warn`,title:`Le mur invisible entre l'entreprise et les ĂŠquipes`,heroPhrase:`Aucune ĂŠquipe ne sait dire comment son travail sert le cap de l'entreprise. Les deux niveaux existent cĂ´te Ă  cĂ´te, sans jamais se parler.`,intro:``,practiceCtaLabel:`Va relier un OKR ĂŠquipe au cap de l'entreprise`,sections:[{heading:`Pourquoi c'est piĂŠgeux`,icon:`target`,body:`L'OKR entreprise donne un cap, mais si personne ne fait le lien avec le travail quotidien des ĂŠquipes, il reste un objet du CODIR, dĂŠconnectĂŠ du reste de l'organisation.`,bullets:[`Aucune ĂŠquipe ne peut expliquer en une phrase comment elle contribue au cap de l'entreprise.`,`L'OKR entreprise n'est jamais mentionnĂŠ pendant les rituels d'ĂŠquipe (revue, planning).`,`Le lien entre les deux niveaux n'existe dans aucune conversation, ni imposĂŠe ni spontanĂŠe.`]},{heading:`Comment Ă§a se voit`,icon:`warn`,kind:`signals`,body:``,bullets:[`Demander Ă  une ĂŠquipe le cap de l'entreprise produit une hĂŠsitation ou une rĂŠponse approximative.`,`L'OKR entreprise n'apparaĂŽt dans aucun support de travail des ĂŠquipes.`,`Les OKR ĂŠquipe et l'OKR entreprise semblent parler de sujets complĂ¨tement diffĂŠrents.`]},{heading:`CrĂŠer le moment qui manque`,icon:`wrench`,body:`CrĂŠer un moment rĂŠgulier oĂš chaque ĂŠquipe explicite, dans ses mots, comment son travail sert le cap de l'entreprise. Pas une case Ă  cocher : une vraie conversation.`,examples:[{bad:`L'OKR entreprise est publiĂŠ sur l'intranet en janvier et jamais revisitĂŠ ailleurs de l'annĂŠe.`,good:`Chaque ĂŠquipe consacre 15 minutes en dĂŠbut de trimestre Ă  formuler, dans ses mots, le lien entre son travail et le cap de l'entreprise.`,note:`Le but n'est pas de forcer un lien artificiel partout, mais de vĂŠrifier que le lien existe et se dit.`}]},{heading:`Source`,kind:`source`,body:`Ben Lamorte, sur la nĂŠcessitĂŠ d'un lien de sens maintenu par la conversation rĂŠguliĂ¨re entre niveaux.`}]},{id:`okr-entreprise.sheet.theatre-revue`,isNamedPitfall:!0,themeId:`okr-entreprise.pieges`,icon:`warn`,title:`Le thĂŠĂ˘tre de la revue trimestrielle`,heroPhrase:`La revue existe au calendrier. Tout y est toujours vert. Rien n'y est jamais remis en question.`,intro:``,practiceCtaLabel:`Va redonner du poids Ă  une revue trimestrielle`,sections:[{heading:`Pourquoi c'est piĂŠgeux`,icon:`target`,body:`La revue trimestrielle du CODIR a un vrai poids : c'est ce qui est racontĂŠ au board. Si elle ne sert qu'Ă  confirmer que tout va bien, elle perd sa fonction, vĂŠrifier honnĂŞtement si le cap tient.`,bullets:[`Aucun RĂŠsultat clĂŠ n'est jamais revu Ă  la baisse, quoi qu'il arrive.`,`La revue dure quelques minutes, sans vraie discussion.`,`Personne ne se souvient d'un apprentissage tirĂŠ d'une revue passĂŠe.`]},{heading:`Comment Ă§a se voit`,icon:`warn`,kind:`signals`,body:``,bullets:[`Le compte rendu de la revue se ressemble d'un trimestre Ă  l'autre, mot pour mot.`,`Aucune dĂŠcision concrĂ¨te ne sort jamais de la revue.`,`La revue sert Ă  prĂŠsenter des chiffres, pas Ă  dĂŠcider de quoi que ce soit.`]},{heading:`Poser la question qui dĂŠrange`,icon:`wrench`,body:`Poser une question simple Ă  chaque revue : qu'est-ce qu'on a appris ce trimestre, et qu'est-ce qu'on change en consĂŠquence ? Si la rĂŠponse est toujours ÂŤ rien Âť, c'est le signal Ă  corriger.`,examples:[{bad:`La revue trimestrielle prĂŠsente les chiffres en 10 minutes ; personne ne pose de question, la rĂŠunion suivante commence.`,good:`La revue commence par : qu'est-ce qui a surpris ce trimestre ? Chaque RĂŠsultat clĂŠ en retard est discutĂŠ ouvertement, avec une dĂŠcision explicite (on ajuste, on accepte le retard, on documente pourquoi).`,note:`Une revue qui ne change jamais rien n'est plus une revue, c'est une prĂŠsentation.`}]},{heading:`Source`,kind:`source`,body:`John Doerr, Measure What Matters, sur les CFR (conversations rĂŠguliĂ¨res et sincĂ¨res autour des objectifs).`}]},{id:`okr-entreprise.sheet.jargon-codir`,isNamedPitfall:!0,themeId:`okr-entreprise.pieges`,icon:`warn`,title:`L'OKR que personne ne comprend hors CODIR`,heroPhrase:`L'Objective est ĂŠcrit dans la langue du CODIR : acronymes, chiffres de plan stratĂŠgique, formulations abstraites. Le reste de l'entreprise ne le comprend pas.`,intro:``,practiceCtaLabel:`Va simplifier un Objective trop savant`,sections:[{heading:`Pourquoi c'est piĂŠgeux`,icon:`target`,body:`Un Objective doit pouvoir se rĂŠpĂŠter et se comprendre par n'importe qui dans l'entreprise. S'il est rĂŠdigĂŠ pour un public de dirigeants uniquement, il ne peut tout simplement pas remplir son rĂ´le de cap partagĂŠ.`,bullets:[`L'Objective contient des acronymes ou des termes que seul le CODIR comprend.`,`Une personne hors CODIR ne peut pas expliquer l'Objective avec ses propres mots.`,`Le langage utilisĂŠ vient d'un document stratĂŠgique interne, pas d'une conversation ordinaire.`]},{heading:`Comment Ă§a se voit`,icon:`warn`,kind:`signals`,body:``,bullets:[`Demander Ă  une personne au hasard de reformuler l'Objective produit un silence ou une paraphrase mot pour mot.`,`L'Objective ressemble Ă  une phrase de rapport annuel, pas Ă  une phrase qu'on dirait Ă  voix haute.`,`Personne ne le cite jamais spontanĂŠment dans une conversation de travail.`]},{heading:`Le test de la reformulation`,icon:`wrench`,body:`Tester l'Objective en le faisant reformuler par quelqu'un qui n'ĂŠtait pas dans la piĂ¨ce lors de sa rĂŠdaction. Si la reformulation trahit une incomprĂŠhension, simplifier.`,examples:[{bad:`Objective : ÂŤ Optimiser notre positionnement omnicanal pour capter la valeur incrĂŠmentale du segment PME dans un contexte de consolidation du marchĂŠ. Âť`,good:`Objective : ÂŤ Devenir le partenaire de rĂŠfĂŠrence des PME sur notre marchĂŠ. Âť`,note:`La mĂŞme ambition, mais dite comme on la dirait Ă  un collĂ¨gue, pas comme on l'ĂŠcrirait dans un rapport.`}]},{heading:`Source`,kind:`source`,body:`Christina Wodtke, Radical Focus, citant Jeff Weiner (LinkedIn) : ÂŤ quand tu es fatiguĂŠ de le rĂŠpĂŠter, les gens commencent tout juste Ă  l'entendre Âť [ÂŤ when you are tired of saying it, people are starting to hear it Âť] â encore faut-il que la phrase soit simple Ă  rĂŠpĂŠter.`}]},{id:`okr-entreprise.sheet.silo-comite`,isNamedPitfall:!0,themeId:`okr-entreprise.pieges`,icon:`warn`,title:`L'OKR ĂŠcrit par un seul service`,heroPhrase:`L'OKR entreprise est en rĂŠalitĂŠ rĂŠdigĂŠ par une seule fonction, souvent la Finance ou les Ventes, puis imposĂŠ aux autres comme s'il venait de tous.`,intro:``,practiceCtaLabel:`Va ouvrir la rĂŠdaction d'un OKR entreprise Ă  plusieurs fonctions`,sections:[{heading:`Pourquoi c'est piĂŠgeux`,icon:`target`,body:`L'OKR entreprise doit parler Ă  toute l'organisation. S'il n'est ĂŠcrit que par une fonction, il porte naturellement sa vision et ses prioritĂŠs, pas celles de l'ensemble.`,bullets:[`Une seule fonction a participĂŠ Ă  la rĂŠdaction, les autres dĂŠcouvrent le rĂŠsultat.`,`Le vocabulaire et les prioritĂŠs du document reflĂ¨tent une seule culture mĂŠtier.`,`Les ĂŠquipes hors de cette fonction ne se reconnaissent pas dans l'Objective.`]},{heading:`Comment Ă§a se voit`,icon:`warn`,kind:`signals`,body:``,bullets:[`Seule une fonction, souvent Finance ou Ventes, ĂŠtait prĂŠsente Ă  la rĂŠdaction.`,`Le RH, le Support ou la R&D dĂŠcouvrent l'Objective en mĂŞme temps que tout le monde.`,`Des personnes de plusieurs services disent sĂŠparĂŠment que Ă§a ne les concerne pas vraiment.`]},{heading:`Ouvrir la rĂŠdaction`,icon:`wrench`,body:`Impliquer des personnes de plusieurs fonctions dĂ¨s la rĂŠdaction, pas seulement au moment de la diffusion.`,examples:[{bad:`L'Objective est rĂŠdigĂŠ en comitĂŠ restreint Finance et direction gĂŠnĂŠrale, puis annoncĂŠ Ă  toute l'entreprise en rĂŠunion gĂŠnĂŠrale.`,good:`Un reprĂŠsentant de chaque grande fonction (Produit, Ventes, Support, RH) participe Ă  un atelier de rĂŠdaction avant que le CODIR ne finalise l'Objective.`,note:`Le CODIR garde la dĂŠcision finale, mais l'ambition reflĂ¨te plusieurs regards, pas un seul.`}]},{heading:`Source`,kind:`source`,body:`Ben Lamorte, sur le besoin de sponsors multi-fonctionnels dĂ¨s la rĂŠdaction d'un OKR entreprise.`}]},{id:`okr-entreprise.sheet.objectif-perpetuel`,isNamedPitfall:!0,themeId:`okr-entreprise.pieges`,icon:`warn`,title:`L'objectif reconduit sans jamais se remettre en question`,heroPhrase:`Le mĂŞme Objective revient chaque annĂŠe, avec juste les chiffres relevĂŠs un peu plus haut. Personne ne se demande si l'ambition est encore la bonne.`,intro:``,practiceCtaLabel:`Va challenger un objectif reconduit par habitude`,sections:[{heading:`Pourquoi c'est piĂŠgeux`,icon:`target`,body:`Sur un cycle annuel, la routine s'installe plus facilement que sur un cycle trimestriel. Reconduire le mĂŞme Objective par habitude, sans se reposer la question, c'est perdre l'occasion de vĂŠrifier si le cap est toujours pertinent.`,bullets:[`Le mĂŞme Objective revient d'annĂŠe en annĂŠe, seuls les chiffres changent.`,`Personne ne se souvient de la derniĂ¨re fois oĂš le cap a ĂŠtĂŠ vraiment discutĂŠ.`,`L'Objective ne reflĂ¨te plus un choix rĂŠcent, juste une habitude.`]},{heading:`Comment Ă§a se voit`,icon:`warn`,kind:`signals`,body:``,bullets:[`Le sĂŠminaire annuel se rĂŠsume Ă  ajuster des chiffres sur l'Objective de l'an dernier.`,`Personne ne peut expliquer pourquoi ce cap prĂŠcis reste le bon cette annĂŠe.`,`Le marchĂŠ ou l'entreprise ont changĂŠ, mais pas l'Objective.`]},{heading:`Reposer la question chaque annĂŠe`,icon:`wrench`,body:`Chaque annĂŠe, poser la question avant de reconduire quoi que ce soit : ce cap est-il encore le bon, ou juste le plus simple Ă  reprendre ?`,examples:[{bad:`Le sĂŠminaire annuel copie l'Objective de l'an dernier et augmente les chiffres de 10 %.`,good:`Le sĂŠminaire annuel commence par une vraie question : qu'est-ce qui a changĂŠ cette annĂŠe qui justifierait un autre cap ? Le cap prĂŠcĂŠdent est reconduit seulement aprĂ¨s cette discussion, pas par dĂŠfaut.`,note:`Reconduire un cap peut ĂŞtre la bonne dĂŠcision, mais seulement si elle a ĂŠtĂŠ reprise consciemment, pas par automatisme.`}]},{heading:`Source`,kind:`source`,body:`Felipe Castro, sur le risque de pilotage automatique propre aux cycles longs.`}]},{id:`okr-entreprise.sheet.revue-sans-equipes`,isNamedPitfall:!0,themeId:`okr-entreprise.pieges`,icon:`warn`,title:`La revue du CODIR sans les ĂŠquipes`,heroPhrase:`Le CODIR fait sa revue trimestrielle entre lui. Les ĂŠquipes, qui savent si le cap est encore tenable, ne sont jamais consultĂŠes.`,intro:``,practiceCtaLabel:`Va prĂŠparer une revue avec l'avis des ĂŠquipes`,sections:[{heading:`Pourquoi c'est piĂŠgeux`,icon:`target`,body:`Ce sont les ĂŠquipes qui exĂŠcutent qui savent le mieux si la suite de l'annĂŠe est rĂŠaliste. Une revue qui se tient sans jamais les entendre prend des dĂŠcisions Ă  l'aveugle sur la faisabilitĂŠ rĂŠelle.`,bullets:[`La revue trimestrielle rĂŠunit uniquement le CODIR, sans aucun retour des ĂŠquipes.`,`Les dĂŠcisions prises en revue ne s'appuient sur aucune information de terrain rĂŠcente.`,`Les ĂŠquipes apprennent les conclusions de la revue aprĂ¨s coup, sans avoir ĂŠtĂŠ consultĂŠes avant.`]},{heading:`Comment Ă§a se voit`,icon:`warn`,kind:`signals`,body:``,bullets:[`Aucun reprĂŠsentant d'ĂŠquipe n'est jamais invitĂŠ ni consultĂŠ avant la revue.`,`Les dĂŠcisions de la revue surprennent les ĂŠquipes qui doivent les exĂŠcuter.`,`Le CODIR dĂŠcouvre aprĂ¨s coup qu'une hypothĂ¨se de la revue ĂŠtait fausse sur le terrain.`]},{heading:`Ăcouter avant de dĂŠcider`,icon:`wrench`,body:`Recueillir un avis des ĂŠquipes juste avant chaque revue trimestrielle : qu'est-ce qui est rĂŠaliste pour la suite, qu'est-ce qui ne l'est plus ?`,examples:[{bad:`Le CODIR se rĂŠunit Ă  huis clos, dĂŠcide d'accĂŠlĂŠrer un chantier, sans avoir demandĂŠ aux ĂŠquipes concernĂŠes si c'ĂŠtait tenable.`,good:`Avant la revue, le CODIR recueille en une page l'avis des ĂŠquipes concernĂŠes sur la faisabilitĂŠ de la suite de l'annĂŠe. La revue dĂŠcide en connaissance de cause.`,note:`Le CODIR garde la dĂŠcision finale, mais elle s'appuie sur une vraie information, pas seulement sur des chiffres de tableau de bord.`}]},{heading:`Source`,kind:`source`,body:`Ben Lamorte, sur l'alignement construit par la conversation entre niveaux plutĂ´t que par une revue en cercle fermĂŠ.`}]},{id:`okr-entreprise.sheet.sans-proprietaire`,isNamedPitfall:!0,themeId:`okr-entreprise.pieges`,icon:`warn`,title:`L'OKR entreprise sans responsable identifiĂŠ`,heroPhrase:`ÂŤ Le CODIR Âť est responsable de l'OKR entreprise. C'est-Ă -dire, en pratique, personne en particulier.`,intro:``,practiceCtaLabel:`Va nommer un responsable pour un RĂŠsultat clĂŠ`,sections:[{heading:`Pourquoi c'est piĂŠgeux`,icon:`target`,body:`Une responsabilitĂŠ collective, sans nom associĂŠ Ă  chaque RĂŠsultat clĂŠ, se dilue facilement. Si un RĂŠsultat clĂŠ dĂŠrape, personne ne se sent directement comptable de le remonter ou de le corriger.`,bullets:[`Aucun nom n'est associĂŠ Ă  chaque RĂŠsultat clĂŠ, seulement ÂŤ le CODIR Âť en gĂŠnĂŠral.`,`En cas de dĂŠrapage, personne ne se sent directement responsable de rĂŠagir.`,`Les questions sur l'avancement d'un RĂŠsultat clĂŠ n'ont pas d'interlocuteur clair.`]},{heading:`Comment Ă§a se voit`,icon:`warn`,kind:`signals`,body:``,bullets:[`Demander qui suit tel RĂŠsultat clĂŠ ne produit pas de rĂŠponse claire.`,`Plusieurs membres du CODIR pensent chacun que c'est plutĂ´t la responsabilitĂŠ d'un autre.`,`Un RĂŠsultat clĂŠ dĂŠrape pendant plusieurs semaines avant que quelqu'un ne s'en saisisse.`]},{heading:`Nommer un responsable par RĂŠsultat clĂŠ`,icon:`wrench`,body:`Nommer un sponsor unique par RĂŠsultat clĂŠ au sein du CODIR, dĂ¨s la rĂŠdaction de l'OKR entreprise.`,examples:[{bad:`Les 4 RĂŠsultats clĂŠs de l'OKR entreprise sont suivis collectivement par le CODIR, sans rĂŠpartition.`,good:`Chacun des 4 RĂŠsultats clĂŠs a un membre du CODIR clairement identifiĂŠ comme responsable de son suivi et de son alerte en cas de dĂŠrapage.`,note:`La dĂŠcision reste collĂŠgiale, mais le suivi, lui, a toujours un nom.`}]},{heading:`Source`,kind:`source`,body:`Pratique du Scaled Agile Framework (SAFe) sur les thĂ¨mes stratĂŠgiques de portefeuille, chacun rattachĂŠ Ă  un sponsor exĂŠcutif identifiĂŠ.`}]}],En=un,Dn={sprint:{dev:xe},pi:{dev:Ke},"okr-equipe":{dev:xn}},On={sprint:{dev:[...Cn,...Se,wn(`sprint.sheet.verbes-ambigus`,`sprint.fondamentaux`)]},pi:{dev:[...Cn,...qe,wn(`pi.sheet.verbes-ambigus`,`pi.fondamentaux`)]},"okr-equipe":{dev:[...Cn,...Sn,wn(`okr-equipe.sheet.verbes-ambigus`,`okr.fondamentaux`)]},"okr-entreprise":{manager:[...Cn,...Tn,wn(`okr-entreprise.sheet.verbes-ambigus`,`okr-entreprise.fondamentaux`)]}},kn={sprint:{dev:Ge},pi:{dev:gt},"okr-equipe":{dev:Rt},"okr-entreprise":{manager:sn}},An={sprint:{dev:cn},pi:{dev:ln}},jn={sprint:{dev:dn},pi:{dev:fn},"okr-equipe":{dev:pn},"okr-entreprise":{manager:En}},Mn={sprint:{dev:mn},pi:{dev:hn},"okr-equipe":{dev:gn},"okr-entreprise":{manager:_n}};function N(){return{getHeuristicsConfig(){return be},getExamples(e,t){return Dn[e]?.[t]??[]},getSheets(e,t){return On[e]?.[t]??[]},getThemes(e,t){let n=On[e]?.[t]??[],r=ye[e]?.[t]??[];if(r.length===0)return n.length>0?[{theme:_e,sheets:n}]:[];let i=r.map(e=>({theme:e,sheets:n.filter(t=>t.themeId===e.id)})),a=new Set(r.map(e=>e.id)),o=n.filter(e=>!e.themeId||!a.has(e.themeId));return o.length>0&&i.push({theme:_e,sheets:o}),i.filter(e=>e.sheets.length>0)},getPuzzleSet(e,t,n){return kn[e]?.[t]?.[n]??null},getScenarioCards(e,t){return An[e]?.[t]??[]},getWarmupCases(e,t){return jn[e]?.[t]??[]},getChallengeQuizCases(e,t){return Mn[e]?.[t]??[]},getPitfallQuizCases(e,t){return vn(On[e]?.[t]??[])}}}function Nn(){let e=N();ret
