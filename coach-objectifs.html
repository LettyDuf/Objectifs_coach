dy:`Rendre chaque dépendance explicite sur le Program Board pendant le Planning, et la référencer directement dans le ROAM de l'objectif de PI concerné.`,examples:[{bad:`Objectif de PI : « Lancer le paiement en un clic », qui suppose une API de tokenisation livrée par l'équipe Paiement Plateforme, jamais tracée sur le Program Board.`,good:`Objectif de PI : « Lancer le paiement en un clic », dépendance vers l'équipe Paiement Plateforme tracée sur le Program Board (API de tokenisation, semaine 3), risque inscrit au ROAM.`,note:`La dépendance devient un objet suivi, pas un pari silencieux.`}]},{heading:`Source`,kind:`source`,body:`Scaled Agile Framework, Program Board et ROAM, artefacts destinés à rendre visibles les dépendances inter-équipes dès le PI Planning.`}]},{id:`pi.sheet.po-bypass`,isNamedPitfall:!0,themeId:`pi.pieges-classiques`,icon:`warn`,title:`Le contournement du Product Owner`,heroPhrase:`Le travail arrive directement à l'équipe, sans passer par le Product Owner. L'objectif de PI perd son garant.`,intro:``,practiceCtaLabel:`Va rediriger une demande qui a contourné le PO`,sections:[{heading:`Pourquoi c'est piégeux`,icon:`target`,body:`Le Product Owner est le garant du lien entre le travail réel et les objectifs de PI engagés. Une demande qui arrive en direct à l'équipe n'est jamais confrontée à cet objectif, et le train perd la capacité de dire non à une demande qui ne sert aucun objectif validé.`,bullets:[`Le Product Owner est le garant du lien entre le travail réel et les objectifs de PI engagés.`,`Une demande qui arrive en direct à l'équipe n'est jamais confrontée à cet objectif.`,`Le train perd la capacité de dire non à une demande qui ne sert aucun objectif validé.`]},{heading:`Comment ça se voit`,icon:`warn`,kind:`signals`,body:``,bullets:[`Un manager ou un client sollicite directement un développeur, sans passer par le Product Owner.`,`Du travail apparaît dans le sprint sans lien tracé vers un objectif de PI engagé.`,`Le Product Owner découvre après coup qu'une demande a été traitée en dehors de son arbitrage.`]},{heading:`Rediriger vers le Product Owner`,icon:`wrench`,body:`Rappeler que toute demande entrante passe par le Product Owner, qui l'évalue face aux objectifs de PI engagés avant qu'elle entre au plan.`,examples:[{bad:`Un directeur commercial demande directement à un développeur d'ajouter un champ au formulaire, en urgence, sans passer par le Product Owner.`,good:`La demande du directeur commercial est redirigée vers le Product Owner, qui l'évalue face aux objectifs de PI engagés avant de décider si et quand elle entre au plan.`,note:`Le Product Owner reste le point de passage qui protège la cohérence des objectifs, même sous pression hiérarchique.`}]},{heading:`Source`,kind:`source`,body:`Top 12 mistakes to avoid during PI Planning (LinkedIn), sur le contournement du Product Owner comme cause de perte d'alignement et de vélocité.`}]}];function k(e,t,n,r){return{kind:`text`,id:e,category:t,quality:n,text:r}}function qe(e,t,n,r){return{kind:`numericField`,id:e,category:`variation`,quality:t,template:n,fieldCount:r}}function Je(e,t,n,r){return{kind:`numericField`,id:e,category:t,quality:`good`,template:n,fieldCount:r,fieldKind:`text`}}function Ye(e,t){return{kind:`numericField`,id:e,category:t,quality:`neutral`,template:`[X]`,fieldCount:1,fieldKind:`text`,handLabel:`Écrire moi-même…`}}var Xe=[k(`pi-a-good-pass`,`action`,`good`,`Faire passer`),k(`pi-a-good-enable`,`action`,`good`,`Permettre à`),k(`pi-a-good-reach`,`action`,`good`,`Atteindre`),k(`pi-a-good-bring-in`,`action`,`good`,`Faire entrer`)],Ze=[k(`pi-a-neu-reduce`,`action`,`neutral`,`Réduire`),k(`pi-a-neu-increase`,`action`,`neutral`,`Augmenter`),k(`pi-a-neu-divide`,`action`,`neutral`,`Diviser`),k(`pi-a-neu-keep`,`action`,`neutral`,`Maintenir`)],Qe=[k(`pi-a-dis-deliver`,`action`,`distractor`,`Livrer`),k(`pi-a-dis-refactor`,`action`,`distractor`,`Refactorer`),k(`pi-a-dis-migrate`,`action`,`distractor`,`Migrer`),k(`pi-a-dis-improve`,`action`,`distr :`sprint`,audience:`dev`,teamLabel:`Équipe Plateforme · 8 devs`,iconName:`puzzle`,situation:`Migration en cours vers une architecture micro-services. Cycle de release manuel, 4 h par hotfix. Les autres équipes attendent que ça aille plus vite.`,proposedObjective:`Mettre en place la nouvelle architecture micro-services.`,rationale:`Verbe d'output, projet de plusieurs sprints réduit à un sprint, aucune mesure observable côté équipes consommatrices.`,expectedBeneficiary:`équipes dev consommatrices / ops`},{id:`scn.sprint.dev.mobile-backlog`,type:`sprint`,audience:`dev`,teamLabel:`Équipe Mobile · app grand public`,iconName:`sprint`,situation:`6 devs. Sprint planning à l'envers : l'équipe a sélectionné 12 récits qui rentrent dans la vélocité, sans cap commun.`,proposedObjective:`Avancer sur les 12 récits prioritaires du backlog.`,rationale:`Objectif rétrospectif déguisé : décrit le travail, pas le résultat. Aucun outcome partagé.`,expectedBeneficiary:`utilisateurs / parties prenantes — à identifier`},{id:`scn.sprint.dev.search-startup`,type:`sprint`,audience:`dev`,teamLabel:`Équipe Search · start-up en adéquation produit-marché`,iconName:`okr`,situation:`3 devs + 1 référent technique. La recherche actuelle convertit mal (taux clic 12 %). On veut tester l'autocomplétion pour voir si ça monte.`,proposedObjective:`Livrer la v2 de la recherche en autocomplétion.`,rationale:`Verbe « livrer », pas de bénéficiaire mesuré. La métrique conversion existe et peut être l'objet de l'outcome.`,expectedBeneficiary:`utilisateurs qui cherchent`},{id:`scn.sprint.dev.data-ops`,type:`sprint`,audience:`dev`,teamLabel:`Équipe Data · 4 devs + 1 SRE`,iconName:`wrench`,situation:`Pipelines ETL nocturnes qui tombent 2-3 nuits par semaine. L'équipe Business commence chaque jour avec des tableaux de bord à demi vides. Astreinte usée.`,proposedObjective:`Stabiliser les pipelines ETL et corriger les bugs ouverts.`,rationale:`Verbe d'output (« stabiliser »), composite (« et »), aucun seuil. Le ressenti business et astreinte pourrait être chiffré.`,expectedBeneficiary:`équipe astreinte / équipe Business`}],cn=[{id:`scn.pi.dev.checkout-train`,type:`pi`,audience:`dev`,teamLabel:`Train Checkout · 4 équipes`,iconName:`wrench`,situation:`Le train regroupe 4 équipes autour du tunnel d'achat. Le Business Owner pousse pour augmenter les conversions sur mobile. PI Planning dans deux semaines, objectif à figer.`,proposedObjective:`Refactorer le tunnel mobile et améliorer l'UX globale.`,rationale:`Output + mot flou « améliorer ». Le Business Owner attend une métrique de conversion, pas une promesse de chantier technique.`,expectedBeneficiary:`clients sur mobile / Business Owner`},{id:`scn.pi.dev.sso-enterprise`,type:`pi`,audience:`dev`,teamLabel:`Train Auth · 3 équipes`,iconName:`target`,situation:`Le commercial bloque sur l'argument SSO chez les grands comptes. Aujourd'hui activation manuelle, 2 semaines par client. Objectif PI : enlever ce verrou commercial.`,proposedObjective:`Migrer l'authentification vers OAuth.`,rationale:`Activité technique pure. Le verrou commercial reste sans mesure : combien de clients vont passer en self-service, en combien de temps ?`,expectedBeneficiary:`clients entreprise / équipe commerciale`},{id:`scn.pi.dev.marketplace-pilot`,type:`pi`,audience:`dev`,teamLabel:`Train Marketplace · 5 équipes`,iconName:`okr`,situation:`Nouvelle offre marketplace en lancement. Stretch — on ne sait pas si les clients vont s'engager. PI Planning impose un objectif ambitieux mais réaliste.`,proposedObjective:`Lancer la marketplace en production avec succès.`,rationale:`« Avec succès » est vide de sens — qu'est-ce qu'un succès pour cette première PI ? 1 client ? 10 ? Un volume de transactions ?`,expectedBeneficiary:`premiers clients pilotes`},{id:`scn.pi.dev.onboarding-scale`,type:`pi`,audience:`dev`,teamLabel:`Train Intégration nouveaux clients · 4 équipes`,iconName:`practice`,situation:`Taux d'activation des nouveaux comptes stagne à 42 % depuis deux trimestres. Le board demande +20 points sur ce PI. Plusieurs équipes (acquisition, produit, support) à coordonner.`,proposedObjective:`Augmenter significativement l'activation utilisateur.`,rationale:`Mot flou « significativement » alors qu'on a une cible claire. L'objectif de PI doit nommer la métrique (62 %) et la fenêtre (sur le dernier mois du PI).`,expectedBeneficiary:`nouveaux utilisateurs / board`},{id:`scn.pi.dev.platform-stability`,type:`pi`,audience:`dev`,teamLabel:`Train Plateforme · 6 équipes`,iconName:`wrench`,situation:`Plateforme victime de son succès : TMR de 45 min, 8 incidents majeurs ce trimestre. Les équipes fonctionnalité passent 30 % de leur temps en astreinte. Stretch ambitieux sur ce PI.`,proposedObjective:`Stabiliser la plateforme et alléger la charge astreinte.`,rationale:`Composite (« et »), verbe d'output (« stabiliser »), pas de seuil. Les deux métriques existent (TMR, % temps astreinte) — il faut les nommer.`,expectedBeneficiary:`équipes fonctionnalité / astreinte`},{id:`scn.pi.dev.churn-premium`,type:`pi`,audience:`dev`,teamLabel:`Train Retention · 3 équipes`,iconName:`target`,situation:`Churn mensuel des comptes premium à 4 %, alors qu'historique <2 %. Le board veut un engagé avec une cible chiffrée pour ce PI. Confiance équipe à 75 %.`,proposedObjective:`Réduire le churn premium de manière notable.`,rationale:`« De manière notable » est non mesurable. La cible chiffrée existe (revenir à <2 %), il faut juste la nommer dans l'objectif.`,expectedBeneficiary:`comptes premium / board`}],ln=[{id:`warmup.tri.migrer`,prompt:`« Migrer la base de données sur le nouveau serveur. »`,expected:`output`,feedbackGood:`Migrer, une fois fait, c'est fait : ça ne peut pas rater. C'est le travail lui-même, donc un output.`,feedbackAsk:`Le test : une fois la migration faite, peut-elle encore rater ? Non. C'est donc le travail, pas le résultat visé.`},{id:`warmup.tri.livrer-page`,prompt:`« Livrer la nouvelle page de connexion. »`,expected:`output`,feedbackGood:`Livrer, c'est fait dès que la page est en ligne : ça ne peut pas rater. Output. Le résultat, ce serait ce que ça change pour les utilisateurs.`,feedbackAsk:`Une fois la page livrée, ça peut-il rater ? Non. C'est un output ; l'outcome serait l'effet sur les utilisateurs.`},{id:`warmup.tri.former`,prompt:`« Former les équipes au nouvel outil. »`,expected:`output`,feedbackGood:`Former, c'est fait dès que la formation a eu lieu. Que les gens sachent ensuite s'en servir, c'est l'outcome. Ici, output.`,feedbackAsk:`La formation donnée est donnée. Garantit-elle que les gens savent faire ? Non. « Former » est le geste : un output.`},{id:`warmup.tri.deployer-secu`,prompt:`« Déployer la mise à jour de sécurité. »`,expected:`output`,feedbackGood:`Déployer, c'est fait dès que c'est en production : ça ne peut pas rater. Output.`,feedbackAsk:`Une fois déployée, la mise à jour est déployée. Le résultat, moins d'incidents, est autre chose. Ici, output.`},{id:`warmup.tri.commandes`,prompt:`« Les utilisateurs retrouvent leurs commandes en moins de 2 secondes. »`,expected:`outcome`,feedbackGood:`Même le travail fait, ils pourraient attendre 5 secondes : ça peut rater. Et « moins de 2 secondes » se mesure. Outcome.`,feedbackAsk:`Après tout le travail, peut-on encore attendre plus de 2 secondes ? Oui. Ça peut rater : c'est un outcome.`},{id:`warmup.tri.abandon-panier`,prompt:`« Faire passer le taux d'abandon du panier de 40 % à 25 %. »`,expected:`outcome`,feedbackGood:`On peut tout faire et le taux ne pas bouger : ça peut rater. Et c'est chiffré, pour le client. Outcome.`,feedbackAsk:`Le travail fait, le taux peut-il rester à 40 % ? Oui. Donc ça peut rater : outcome.`},{id:`warmup.tri.appels-support`,prompt:`« Diviser par deux les appels au support sur le module paiement. »`,expected:`outcome`,feedbackGood:`On peut livrer et les appels ne pas baisser : ça peut rater. Et ça se compte, pour le support. Outcome.`,feedbackAsk:`Après le travail, les appels peuvent-ils rester au même niveau ? Oui. C'est un outcome.`},{id:`warmup.tri.autonomes`,prompt:`« Les nouveaux arrivants sont autonomes sur l'outil dès la première semaine. »`,expected:`outcome`,feedbackGood:`On peut tout mettre en place et qu'ils ne soient pas autonomes : ça peut rater. Et c'est perceptible, pour eux. Outcome.`,feedbackAsk:`Le dispositif en place, sont-ils forcément autonomes ? Pas sûr. Ça peut rater : outcome.`},{id:`warmup.tri.securiser`,prompt:`« Sécuriser les accès. »`,expected:`complete`,feedbackGood:`Seul, « sécuriser » ne dit ni qui le constaterait, ni à quoi. Il manque la mesure.`,feedbackAsk:`« Sécuriser », peux-tu le vérifier maintenant, sans mesure ? Non. Il est à compléter.`,completePrompt:`Qui, à part vous, verrait que c'est sécurisé, et à quoi le verrait-il ?`},{id:`warmup.tri.ameliorer-ux`,prompt:`« Améliorer l'expérience utilisateur. »`,expected:`complete`,feedbackGood:`« Améliorer », c'est « rendre meilleur » : un jugement de valeur, meilleur selon qui ? Sans mesure, on ne peut pas trancher. À compléter.`,feedbackAsk:`« Améliorer l'expérience », qui le constate et comment ? Tant que ce n'est pas dit, il manque la mesure.`,completePrompt:`Qu'est-ce qui aurait changé concrètement pour l'utilisateur, et comment le mesurer ?`},{id:`warmup.tri.fiabiliser`,prompt:`« Fiabiliser le service de paiement. »`,expected:`complete`,feedbackGood:`« Fiabiliser » promet un mieux sans dire à quoi on le verra. Il manque la mesure.`,feedbackAsk:`« Fiable » selon qui, mesuré comment ? Sans ça, à compléter.`,completePrompt:`À quoi verra-t-on que le paiement est plus fiable ? (taux d'échec, incidents...)`}],un=ln,dn=ln,fn=ln,pn=[{id:`quiz.sprint.dev.checkout-maintenance`,type:`sprint`,audience:`dev`,teamLabel:`Équipe Checkout`,iconName:`wrench`,metrics:[{label:`Incidents production / semaine (module commande)`,value:`14`},{label:`Tickets support escaladés vers la dev / semaine`,value:`8`},{label:`Temps moyen de résolution d'un incident`,value:`3 h`}],proposedObjective:`Refactorer le module commande et nettoyer la dette technique.`,options:[{id:`A`,text:`Refactorer le module commande, source de 8 tickets support par semaine.`,verdict:`bad`,explanation:`« Refactorer » reste un output technique. Aucun bénéficiaire nommé, aucune mesure observable du changement.`},{id:`B`,text:`Diminuer le nombre d'incidents production sur le module commande.`,verdict:`partial`,explanation:`Outcome correct mais sans avant/après chiffré ni échéance. Reste un vœu.`},{id:`C`,text:`Ramener le nombre d'incidents production du module commande de 14 à 5 par semaine d'ici la fin du sprint.`,verdict:`good`,explanation:`Outcome mesurable, indicateur précis, avant/après chiffré, échéance dans le sprint. La structure est solide — les chiffres exacts restent à convenir avec le PO.`},{id:`D`,text:`Améliorer la stabilité du module commande et réduire la dette technique.`,verdict:`bad`,explanation:`Composite (« et »), deux formulations floues (« améliorer », « dette technique »), aucun seuil ni échéance.`}]},{id:`quiz.sprint.dev.intégration-scale`,type:`sprint`,audience:`dev`,teamLabel:`Équipe Intégration`,iconName:`practice`,metrics:[{label:`Taux d'activation des nouveaux comptes à J+30`,value:`42 %`},{label:`Temps moyen pour compléter l'inscription`,value:`9 min`},{label:`Comptes créés / semaine`,value:`1 200`}],proposedObjective:`Améliorer significativement l'expérience utilisateur du parcours d'inscription.`,options:[{id:`A`,text:`Améliorer significativement l'expérience utilisateur du parcours d'inscription.`,verdict:`bad`,explanation:`« Améliorer » et « significativement » sont flous. Aucun seuil mesurable, aucune échéance.`},{id:`B`,text:`Porter le taux d'activation des nouveaux comptes à J+30 de 42 % à 60 % d'ici la fin du sprint.`,verdict:`good`,explanation:`Outcome chiffré sur un indicateur métier nommé, avec échéance précise. La structure tient.`},{id:`C`,text:`Livrer un nouveau parcours d'inscription plus fluide pour les 1 200 comptes créés chaque semaine.`,verdict:`bad`,explanation:`« Livrer » est un output. « Plus fluide » est subjectif et non mesurable.`},{id:`D`,text:`Augmenter le taux d'activation des nouveaux comptes à J+30.`,verdict:`partial`,explanation:`Indicateur correct mais ni avant/après ni échéance. La structure est incomplète.`}]},{id:`quiz.sprint.dev.plateforme-archi`,type:`sprint`,audience:`dev`,teamLabel:`Équipe Plateforme`,iconName:`puzzle`,context:`8 devs, 1 référent technique. L'équipe maintient l'infrastructure consommée par 6 autres équipes fonctionnalité. Migration en cours vers une architecture micro-services.`,metrics:[{label:`Temps moyen de déploiement d'un hotfix`,value:`4 h`},{label:`Releases / mois (toutes équipes)`,value:`12`},{label:`Incidents d'infra / mois`,value:`5`}],proposedObjective:`Mettre en place la nouvelle architecture micro-services.`,options:[{id:`A`,text:`Mettre en place la nouvelle architecture micro-services pour les 6 équipes consommatrices.`,verdict:`bad`,explanation:`« Mettre en place » est un output. Aucune mesure du bénéfice côté équipes consommatrices ni côté ops.`},{id:`B`,text:`Réduire le temps moyen de déploiement d'un hotfix de 4 h à 1 h d'ici la fin du sprint.`,verdict:`good`,explanation:`Indicateur ops observable, avant/après chiffré, échéance. Bénéficiaires implicites mais clairs (équipes fonctionnalité, astreinte).`},{id:`C`,text:`Permettre aux 6 équipes fonctionnalité de déployer leurs hotfixs plus rapidement.`,verdict:`partial`,explanation:`Bénéficiaire nommé, outcome correct, mais ni seuil ni échéance. Reste qualitatif.`},{id:`D`,text:`Refactorer le module de déploiement et finaliser l'orchestrateur.`,verdict:`bad`,explanation:`Composite (« et »), deux outputs techniques juxtaposés, aucune mesure côté bénéficiaire.`}]},{id:`quiz.sprint.dev.mobile-backlog`,type:`sprint`,audience:`dev`,teamLabel:`Équipe Mobile`,iconName:`sprint`,context:`6 devs, 1 Product Owner. L'équipe travaille sur l'app mobile d'une plateforme de réservation de salles de sport. 80 000 utilisateurs actifs mensuels.
Le PO a sélectionné en avance 12 récits qui « rentrent dans la vélocité » (28 points sur 30 de capacité). Pendant le sprint planning, l'équipe a essayé de fabriquer un objectif APRÈS la sélection.`,metrics:[{label:`Taux de conversion réservation (mobile)`,value:`11 %`},{label:`Taux d'abandon panier (mobile)`,value:`47 %`},{label:`Note App Store`,value:`3,8 / 5`}],proposedObjective:`Avancer sur les 12 récits prioritaires du backlog.`,options:[{id:`A`,text:`Livrer les 12 récits du sprint (28 points de vélocité) en respectant la qualité attendue.`,verdict:`bad`,explanation:`« Livrer » est un output. La qualité mentionnée n'a pas de mesure.`},{id:`B`,text:`Augmenter la conversion mobile sur les 80 000 utilisateurs actifs.`,verdict:`partial`,explanation:`Outcome correct mais sans seuil ni échéance. Reste un vœu.`},{id:`C`,text:`Faire passer la conversion mobile de 11 % à 18 % d'ici la fin du sprint.`,verdict:`good`,explanation:`Outcome mesuré (conversion), avant/après chiffré, échéance précise. La structure est juste — les chiffres exacts restent à convenir avec le PO.`},{id:`D`,text:`Améliorer le tunnel de réservation et finir les 4 récits prioritaires.`,verdict:`bad`,explanation:`Composite (« et »), « améliorer » est flou, retour à du travail sur les récits.`}]},{id:`quiz.sprint.dev.search-startup`,type:`sprint`,audience:`dev`,teamLabel:`Équipe Search`,iconName:`okr`,context:`3 devs, 1 référent technique. L'équipe travaille sur la recherche d'une plateforme en phase d'adéquation produit-marché. L'équipe veut tester un nouveau modèle d'autocomplétion pour voir s'il améliore l'engagement.`,metrics:[{label:`Taux de clic sur les résultats de recherche`,value:`12 %`},{label:`Recherches sans clic / jour`,value:`3 400`},{label:`Recherches totales / jour`,value:`9 500`}],proposedObjective:`Livrer la v2 de la recherche en autocomplétion.`,options:[{id:`A`,text:`Livrer la v2 de la recherche en autocomplétion avant la démo.`,verdict:`bad`,explanation:`« Livrer » est un output. L'autocomplétion livrée n'a aucune mesure de succès — elle pourrait n'être pas utilisée.`},{id:`B`,text:`Améliorer l'expérience de recherche.`,verdict:`bad`,explanation:`« Améliorer » et « expérience » sont flous. Aucun bénéficiaire mesurable, aucun seuil.`},{id:`C`,text:`Relever le taux de clic sur les résultats de recherche de 12 % à 20 % d'ici la fin du sprint.`,verdict:`good`,explanation:`Outcome utilisateur mesurable, avant/après chiffré, échéance. L'autocomplétion devient un moyen, pas le but.`},{id:`D`,text:`Permettre aux utilisateurs de trouver plus rapidement ce qu'ils cherchent.`,verdict:`partial`,explanation:`Bénéficiaire et direction corrects mais aucune mesure (que veut dire « plus rapidement » ?) ni échéance.`}]},{id:`quiz.sprint.dev.data-ops`,type:`sprint`,audience:`dev`,teamLabel:`Équipe Data`,iconName:`wrench`,metrics:[{label:`Pipelines qui tombent / semaine`,value:`2 à 3`},{label:`Bugs ouverts sur les pipelines`,value:`11`},{label:`Temps passé en astreinte / semaine`,value:`6 h`}],proposedObjective:`Stabiliser les pipelines ETL et corriger les bugs ouverts.`,options:[{id:`A`,text:`Stabiliser les pipelines ETL et corriger les 11 bugs ouverts.`,verdict:`bad`,explanation:`Composite (« et »), « stabiliser » est un output, les bugs corrigés ne mesurent pas le bénéfice côté Business ou astreinte.`},{id:`B`,text:`Réduire le nombre de pipelines qui tombent chaque semaine.`,verdict:`partial`,explanation:`Outcome correct mais sans seuil ni échéance.`},{id:`C`,text:`Ramener le nombre de pipelines qui tombent de 2-3 à 0 par semaine d'ici la fin du sprint.`,verdict:`good`,explanation:`Outcome mesurable, indicateur précis, échéance, bénéficiaires implicites clairs (Business, astreinte).`},{id:`D`,text:`Refactorer les pipelines les plus fragiles.`,verdict:`bad`,explanation:`Output technique pur. Aucun lien explicite avec le bénéfice attendu (moins de chutes, moins d'astreinte).`}]},{id:`quiz.sprint.dev.search-window`,type:`sprint`,audience:`dev`,teamLabel:`Équipe Search`,iconName:`practice`,metrics:[{label:`CTR sur les résultats de recherche`,value:`18 %`},{label:`Sessions avec recherche / jour`,value:`4 500`},{label:`Taux de retour M+1 des utilisateurs ayant cherché`,value:`32 %`}],proposedObjective:`Augmenter le taux de retour mensuel des utilisateurs du module search.`,options:[{id:`A`,text:`Augmenter le taux de retour mensuel des utilisateurs du module search.`,verdict:`bad`,explanation:`Pas de seuil, pas de point de départ, pas d'échéance. Et le « taux de retour mensuel » ne peut pas être observé dans un sprint de 2-4 semaines : la fenêtre de mesure ne tient pas dans la fenêtre de l'objectif.`},{id:`B`,text:`Faire passer le CTR sur les résultats de recherche de 18 % à 28 % d'ici la fin du sprint.`,verdict:`good`,explanation:`Métrique observable dans la fenêtre du sprint, point de départ, cible, échéance. C'est un indicateur leading qu'un meilleur tri peut réellement bouger sur cette période.`},{id:`C`,text:`Faire passer le taux de retour M+1 des utilisateurs search de 32 % à 45 % d'ici la fin du sprint.`,verdict:`partial`,explanation:`Forme exemplaire (métrique nommée, avant, après, échéance) — mais le taux M+1 se mesure à 1 mois minimum après une session. En fin de sprint, on ne pourra pas dire si l'objectif est atteint. Piège : la fenêtre temporelle de la métrique dépasse la fenêtre du sprint.`},{id:`D`,text:`Améliorer la pertinence des résultats de recherche.`,verdict:`bad`,explanation:`« Améliorer » et « pertinence » sont flous. Aucune métrique, aucun seuil, aucune échéance.`}]},{id:`quiz.sprint.dev.mobile-vanity`,type:`sprint`,audience:`dev`,teamLabel:`Équipe Mobile`,iconName:`okr`,context:`6 devs, 1 Product Owner. L'équipe construit l'application mobile. Sprint sur la refonte du parcours d'intégration pour les nouveaux utilisateurs.`,metrics:[{label:`Téléchargements / semaine`,value:`2 200`},{label:`Taux d'activation (1ʳᵉ action clé) des nouveaux utilisateurs`,value:`38 %`},{label:`Utilisateurs actifs mensuels (MAU)`,value:`14 200`}],proposedObjective:`Augmenter le nombre de téléchargements de l'app.`,options:[{id:`A`,text:`Faire passer le nombre de téléchargements de 2 200 à 3 500 par semaine d'ici la fin du sprint.`,verdict:`partial`,explanation:`Forme correcte (métrique, avant, après, échéance) mais c'est une vanity metric : un téléchargement ne dit rien de l'usage réel. L'objectif du sprint étant l'intégration, la métrique pertinente est l'activation.`},{id:`B`,text:`Porter le taux d'activation des nouveaux utilisateurs (1ʳᵉ action clé) de 38 % à 55 % d'ici la fin du sprint.`,verdict:`good`,explanation:`Métrique d'usage qui mesure l'effet réel de l'intégration — pas un téléchargement orphelin. Aligné avec le travail effectif de l'équipe.`},{id:`C`,text:`Livrer la nouvelle page d'intégration mobile.`,verdict:`bad`,explanation:`Output pur. La page peut être livrée sans changer le moindre comportement utilisateur.`},{id:`D`,text:`Optimiser le parcours d'intégration mobile.`,verdict:`bad`,explanation:`« Optimiser » est flou. Aucun chiffre, aucune cible, aucune fenêtre.`}]},{id:`quiz.sprint.dev.api-ambition`,type:`sprint`,audience:`dev`,teamLabel:`Équipe Plateforme API`,iconName:`wrench`,context:`4 devs, 1 SRE, 1 référent technique. L'équipe maintient les APIs internes utilisées par les équipes produit. Sprint perf pour préparer une montée en charge prévue dans deux mois.`,metrics:[{label:`Temps de réponse p95 de l'API (actuel)`,value:`850 ms`},{label:`Charge max supportée sans dégradation`,value:`1 200 req/s`},{label:`Incidents perf signalés par les consommateurs / semaine`,value:`4`}],proposedObjective:`Diviser par 10 le temps de réponse p95 de l'API d'ici la fin du sprint.`,options:[{id:`A`,text:`Diviser par 10 le temps de réponse p95 de l'API d'ici la fin du sprint.`,verdict:`bad`,explanation:`Passer de 850 ms à 85 ms en 2-4 semaines est très peu crédible — c'est un vœu pieux, pas un objectif de Sprint : l'ambition est incohérente avec la fenêtre. Mieux vaut viser ambitieux mais crédible.`},{id:`B`,text:`Réduire le temps de réponse p95 de l'API de 850 ms à 400 ms d'ici la fin du sprint.`,verdict:`good`,explanation:`Ambition crédible (~50 % de réduction), métrique nommée, avant, après, échéance. L'équipe peut s'engager honnêtement et juger à la fin du sprint.`},{id:`C`,text:`Diviser par 2 le temps de réponse p95 de l'API.`,verdict:`partial`,explanation:`Métrique nommée, facteur de variation correct (par 2 = crédible). Mais sans point de départ explicite ni échéance, on perd la lecture immédiate de l'effort. Préférer la forme « de A à B d'ici X ».`},{id:`D`,text:`Optimiser les performances de l'API.`,verdict:`bad`,explanation:`Pas de métrique, pas de cible, pas d'échéance. « Optimiser » seul ne crée aucun engagement vérifiable.`}]},{id:`quiz.sprint.dev.upgrade-leading`,type:`sprint`,audience:`dev`,teamLabel:`Équipe Upgrade`,iconName:`target`,context:`4 devs, 1 Product Owner. L'équipe travaille sur le tunnel de passage essai → payant. Sprint de redesign de l'écran de fin d'essai. Le pricing et le commercial sont gérés ailleurs.`,metrics:[{label:`Taux de conversion essai → payant (PI précédent)`,value:`12 %`},{label:`Sessions essai arrivant en fin de période / semaine`,value:`1 800`},{label:`Taux de clic sur le bouton « souscrire » depuis l'écran de fin`,value:`22 %`}],proposedObjective:`Faire passer le taux de conversion essai → payant de 12 % à 18 % d'ici la fin du sprint.`,options:[{id:`A`,text:`Faire passer le taux de conversion essai → payant de 12 % à 18 % d'ici la fin du sprint.`,verdict:`partial`,explanation:`Forme exemplaire — mais la conversion finale dépend aussi du pricing, du commercial, du temps de réflexion utilisateur. L'équipe n'a pas la main directe sur tous ces leviers. Pour un sprint, mieux vaut viser un indicateur leading sous influence directe.`},{id:`B`,text:`Relever le taux de clic sur « souscrire » depuis l'écran de fin d'essai de 22 % à 35 % d'ici la fin du sprint.`,verdict:`good`,explanation:`Métrique directement sous l'influence du redesign que l'équipe livre. Observable immédiatement en fin de sprint. Indicateur leading qui contribue à la conversion (suivie en aval, par l'équipe Upgrade au PI).`},{id:`C`,text:`Améliorer le tunnel premium.`,verdict:`bad`,explanation:`Pas de métrique, pas de cible. Reformulation vide pour un sprint qui demande un cap clair.`},{id:`D`,text:`Livrer la nouvelle landing page premium d'ici la fin du sprint.`,verdict:`bad`,explanation:`Output. La page peut être livrée sans effet sur la conversion.`}]},{id:`quiz.sprint.dev.oauth-implicit-composite`,type:`sprint`,audience:`dev`,teamLabel:`Équipe Auth`,iconName:`target`,metrics:[{label:`Tentatives OAuth / jour`,value:`480`},{label:`Sessions OAuth réussies / jour`,value:`12`},{label:`Taux d'abandon sur la page de login`,value:`28 %`}],proposedObjective:`Permettre aux utilisateurs invités de se connecter via OAuth pour réduire les abandons de paiement.`,options:[{id:`A`,text:`Permettre aux utilisateurs invités de se connecter via OAuth pour réduire les abandons de paiement.`,verdict:`bad`,explanation:`Composite caché par le « pour » causal. Deux objectifs liés : ouvrir OAuth ET faire baisser l'abandon. Si OAuth marche mais l'abandon ne baisse pas, l'objectif est-il atteint ? Le « pour » fait passer un implicite pour une certitude.`},{id:`B`,text:`Faire passer le taux d'abandon sur la page de login de 28 % à 12 % d'ici la fin du sprint.`,verdict:`good`,explanation:`Un seul outcome mesurable. OAuth devient un moyen, l'objectif est ce qu'on cherche à constater chez l'utilisateur.`},{id:`C`,text:`Mettre en place OAuth pour les utilisateurs invités d'ici la fin du sprint.`,verdict:`bad`,explanation:`Output. La fonctionnalité peut être en place sans effet observable côté abandon. Mauvais objectif de Sprint.`},{id:`D`,text:`Améliorer l'expérience de connexion sur la page de login.`,verdict:`bad`,explanation:`« Améliorer » + « expérience » : flou pur. Pas de métrique, pas de seuil.`}]},{id:`quiz.sprint.dev.search-front-nps`,type:`sprint`,audience:`dev`,teamLabel:`Équipe Frontend Search`,iconName:`practice`,metrics:[{label:`Temps de rendu front p95 des résultats`,value:`320 ms`},{label:`NPS de la fonctionnalité recherche (enquête trimestrielle)`,value:`42`},{label:`Taux de clic sur les résultats`,value:`18 %`}],proposedObjective:`Faire passer le NPS de la fonctionnalité recherche de 42 à 60 d'ici la fin du sprint.`,options:[{id:`A`,text:`Faire passer le NPS de la fonctionnalité recherche de 42 à 60 d'ici la fin du sprint.`,verdict:`partial`,explanation:`Forme exemplaire — mais le NPS se mesure via une enquête trimestrielle. En fin de sprint, aucune mesure ne sera disponible. Piège classique : bonne grammaire, mauvaise cadence de mesure.`},{id:`B`,text:`Diviser par 2 le temps de rendu front des résultats de recherche (de 320 ms à 160 ms) d'ici la fin du sprint.`,verdict:`good`,explanation:`Métrique technique observable en continu, sous influence directe de l'équipe, mesurable en fin de sprint. Cadence cohérente.`},{id:`C`,text:`Optimiser le rendu des résultats de recherche.`,verdict:`bad`,explanation:`« Optimiser » est flou. Pas de seuil ni d'échéance.`},{id:`D`,text:`Refactorer le composant ResultsList.`,verdict:`bad`,explanation:`Output technique. Aucun effet nommé côté rendu, utilisateur ou métrique observable.`}]}],mn=[{id:`quiz.pi.dev.checkout-train`,type:`pi`,audience:`dev`,teamLabel:`Train Checkout · 4 équipes`,iconName:`wrench`,context:`Le train regroupe 4 équipes autour du tunnel d'achat. Le Business Owner pousse pour augmenter les conversions mobile. PI Planning dans deux semaines, objectif à figer en engagé.`,metrics:[{label:`Taux de conversion tunnel mobile (PI précédent)`,value:`2,3 %`},{label:`Trafic mobile / mois`,value:`1,4 M visites`},{label:`Sessions abandonnées au paiement / mois`,value:`32 %`}],proposedObjective:`Refactorer le tunnel d'achat mobile et améliorer l'UX globale.`,options:[{id:`A`,text:`Refactorer le tunnel d'achat mobile et améliorer l'UX globale.`,verdict:`bad`,explanation:`« Refactorer » est un output technique. « Améliorer l'UX » est flou. Le Business Owner ne saura pas à la revue de PI si l'objectif est atteint ou pas.`},{id:`B`,text:`Porter le taux de conversion du tunnel mobile de 2,3 % à 3,5 % d'ici la revue de PI.`,verdict:`good`,explanation:`Outcome de valeur métier, métrique nommée, point de départ, cible, fenêtre de mesure (revue de PI). Le Business Owner peut juger sans ambiguïté.`},{id:`C`,text:`Augmenter les conversions sur le tunnel mobile.`,verdict:`partial`,explanation:`Outcome correct, métrique implicite. Mais aucun seuil chiffré, aucune fenêtre. À renforcer avec « de X à Y » et l'échéance de PI.`},{id:`D`,text:`Livrer la v2 du tunnel d'achat mobile sur le PI.`,verdict:`bad`,explanation:`« Livrer la v2 » est une livraison, pas un résultat de valeur. Et si la v2 est livrée mais que la conversion baisse ? La revue de PI devra trancher sans critère.`}]},{id:`quiz.pi.dev.sso-enterprise`,type:`pi`,audience:`dev`,teamLabel:`Train Auth · 3 équipes`,iconName:`target`,context:`Le commercial bloque depuis 6 mois sur l'argument SSO chez les grands comptes. Activation SSO aujourd'hui manuelle, 2 semaines par client. PI Planning impose un engagé avec une cible chiffrée.`,metrics:[{label:`Clients entreprise avec SSO activé`,value:`8 sur 47`},{label:`Temps moyen d'activation SSO par client`,value:`12 jours`},{label:`Deals bloqués par l'argument SSO (sales)`,value:`11`}],proposedObjective:`Migrer l'authentification vers OAuth 2.0.`,options:[{id:`A`,text:`Migrer l'authentification vers OAuth 2.0.`,verdict:`bad`,explanation:`Activité technique pure. Le verrou commercial reste sans réponse mesurable : combien de clients passeront en self-service, en combien de temps ?`},{id:`B`,text:`Permettre à 80 % des clients entreprise d'activer le SSO en self-service avant la fin du PI (de 8 / 47 à 38 / 47).`,verdict:`good`,explanation:`Outcome côté client, métrique nommée, point de départ, cible, fenêtre de mesure. La migration OAuth devient un moyen, pas une fin.`},{id:`C`,text:`Réduire le temps d'activation SSO d'un client entreprise.`,verdict:`partial`,explanation:`Bonne métrique, mais sans seuil ni point de départ. Préciser : passer de 12 jours à 1 jour, par exemple.`},{id:`D`,text:`Mettre en place le self-service SSO d'ici la revue de PI.`,verdict:`bad`,explanation:`« Mettre en place » nomme un projet, pas un changement constaté. Si le self-service est en place mais utilisé par 2 clients, est-ce un succès ?`}]},{id:`quiz.pi.dev.marketplace-pilot`,type:`pi`,audience:`dev`,teamLabel:`Train Marketplace · 5 équipes`,iconName:`okr`,context:`Nouvelle offre marketplace en lancement, le train explore. Le PI Planning impose un objectif **stretch** : ambitieux, confiance 30-60 %. Tout le monde sait que ça peut tomber à 0, mais on vise haut.`,metrics:[{label:`Clients pilotes signés à ce jour`,value:`0`},{label:`Prospects en discussion`,value:`23`},{label:`Hypothèse de volume de transactions cible (offre)`,value:`non figée`}],proposedObjective:`Lancer la marketplace en production avec succès sur ce PI.`,options:[{id:`A`,text:`Lancer la marketplace en production avec succès sur ce PI.`,verdict:`bad`,explanation:`« Avec succès » est vide. À la revue de PI, deux personnes peuvent défendre des verdicts opposés. Sur un stretch, c'est précisément là où la rigueur de mesure compte.`},{id:`B`,text:`Faire entrer 3 clients pilotes sur la nouvelle offre marketplace avant la revue de PI.`,verdict:`good`,explanation:`Seuil chiffré (3), bénéficiaire (clients pilotes), fenêtre (revue de PI). Ambitieux pour un stretch (on est à 0 aujourd'hui), mais falsifiable d'un coup d'œil.`},{id:`C`,text:`Atteindre 100 transactions sur la marketplace d'ici la fin du PI.`,verdict:`partial`,explanation:`Métrique observable, cible chiffrée — bonne structure. Mais 100 transactions sans qualifier qui les fait : 100 transactions chez 1 seul gros client ne valide pas l'hypothèse marketplace.`},{id:`D`,text:`Déployer toutes les fonctionnalités prévues pour la v1 de la marketplace.`,verdict:`bad`,explanation:`Mesure le travail interne, pas l'adoption. Sur un stretch, l'enjeu est l'apprentissage marché — pas la complétion d'une feuille de route.`}]},{id:`quiz.pi.dev.intégration-scale`,type:`pi`,audience:`dev`,teamLabel:`Train Intégration nouveaux clients · 4 équipes`,iconName:`practice`,context:`Le taux d'activation des nouveaux comptes stagne à 42 % depuis deux trimestres. Le board demande +20 points sur ce PI. Train coordonné acquisition / produit / support. Cible engagé, confiance équipe estimée à 85 %.`,metrics:[{label:`Taux d'activation à J+30 (PI précédent)`,value:`42 %`},{label:`Nouveaux comptes créés / mois`,value:`1 200`},{label:`Cible board exprimée`,value:`62 %`}],proposedObjective:`Augmenter significativement l'activation utilisateur.`,options:[{id:`A`,text:`Augmenter significativement l'activation utilisateur.`,verdict:`bad`,explanation:`« Significativement » est flou alors que la cible est connue (+20 pts, 62 %). Sur un engagé, l'absence de seuil chiffré est une faute.`},{id:`B`,text:`Relever le taux d'activation à J+30 de 42 % à 62 % d'ici la revue de PI.`,verdict:`good`,explanation:`Métrique nommée, point de départ (42 %), cible (62 %), fenêtre (revue de PI). Aligné avec la demande du board, mesurable sans débat.`},{id:`C`,text:`Améliorer le parcours d'inscription et réduire le taux d'abandon.`,verdict:`bad`,explanation:`« Améliorer » est flou, et c'est composite (deux objectifs). Sur un engagé, on attend un cap unique chiffré.`},{id:`D`,text:`Atteindre 62 % d'activation à J+30 d'ici la fin du PI.`,verdict:`partial`,explanation:`Cible chiffrée et fenêtre — bonne base. Mais sans point de départ (42 %), on perd la lecture de l'effort fourni par le train.`}]},{id:`quiz.pi.dev.platform-stability`,type:`pi`,audience:`dev`,teamLabel:`Train Plateforme · 6 équipes`,iconName:`wrench`,context:`La plateforme est victime de son succès. TMR de 45 min, 8 incidents majeurs ce trimestre. Les équipes fonctionnalité passent 30 % de leur temps en astreinte. Objectif stretch ambitieux pour ce PI.`,metrics:[{label:`TMR moyen (PI précédent)`,value:`45 min`},{label:`Incidents majeurs / trimestre`,value:`8`},{label:`Temps astreinte des équipes fonctionnalité`,value:`30 %`}],proposedObjective:`Stabiliser la plateforme et alléger la charge astreinte des équipes fonctionnalité.`,options:[{id:`A`,text:`Stabiliser la plateforme et alléger la charge astreinte des équipes fonctionnalité.`,verdict:`bad`,explanation:`Composite (« et » coordonne deux objectifs distincts) + verbe d'output (« stabiliser ») + flou. Sépare en deux objectifs de PI, chacun mesurable.`},{id:`B`,text:`Diviser par 3 le TMR moyen de la plateforme (de 45 min à 15 min) d'ici la revue de PI.`,verdict:`good`,explanation:`Un seul résultat, métrique nommée, point de départ, cible, fenêtre. Le sujet « charge astreinte » devient un autre objectif de PI du même train, séparé.`},{id:`C`,text:`Réduire la dette technique de la plateforme, à l'origine de 8 incidents majeurs ce trimestre.`,verdict:`bad`,explanation:`« Dette technique » est flou. Le Business Owner ne pourra pas juger à la revue de PI. Aucun bénéficiaire externe ne ressent directement la dette technique.`},{id:`D`,text:`Ramener le temps astreinte des équipes fonctionnalité de 30 % à 10 % d'ici la revue de PI.`,verdict:`partial`,explanation:`Bon outcome, bonne mesure, bonne fenêtre — c'est un objectif de PI valide. Mais c'est la **deuxième moitié** de l'objectif initial. À porter dans un autre objectif de PI du même train, pas en remplacement.`}]},{id:`quiz.pi.dev.churn-premium`,type:`pi`,audience:`dev`,teamLabel:`Train Retention · 3 équipes`,iconName:`target`,context:`Le churn mensuel des comptes premium est passé de 1,8 % à 4 % sur les derniers trimestres. Le board veut un engagé avec cible chiffrée pour ce PI. Confiance équipe estimée à 80 %.`,metrics:[{label:`Churn mensuel comptes premium (actuel)`,value:`4 %`},{label:`Churn mensuel historique (référence)`,value:`1,8 %`},{label:`Nombre de comptes premium actifs`,value:`2 400`}],proposedObjective:`Réduire le churn premium de manière notable d'ici la fin du PI.`,options:[{id:`A`,text:`Réduire le churn premium de manière notable d'ici la fin du PI.`,verdict:`bad`,explanation:`« De manière notable » est non mesurable. Sur un engagé à 80 % de confiance, on attend une cible chiffrée nette — la métrique et la référence historique existent.`},{id:`B`,text:`Ramener le churn mensuel des comptes premium de 4 % à 2 % d'ici la revue de PI.`,verdict:`good`,explanation:`Métrique nommée, point de départ (4 %), cible (2 %, proche de l'historique 1,8 %), fenêtre. Falsifiable, calibré sur la confiance équipe.`},{id:`C`,text:`Diviser par deux le churn premium d'ici la fin du PI.`,verdict:`partial`,explanation:`Variation chiffrée, fenêtre — bonne base. Mais formulation relative (« par deux ») qui demande un calcul mental. La forme « de 4 % à 2 % » se vérifie d'un coup d'œil.`},{id:`D`,text:`Améliorer la rétention des comptes premium.`,verdict:`bad`,explanation:`Pas de chiffre, pas de seuil, mot flou (« améliorer »). À la revue de PI, deux personnes peuvent défendre que c'est atteint sans s'accorder.`}]},{id:`quiz.pi.dev.mobile-ltv-window`,type:`pi`,audience:`dev`,teamLabel:`Train Mobile · 5 équipes`,iconName:`okr`,context:`Le train mobile prépare une refonte UX importante. Le Business Owner pousse sur la valeur long terme par utilisateur. PI Planning impose un engagé avec cible mesurable à la revue de PI (8 semaines).`,metrics:[{label:`LTV utilisateurs mobile (cohorte 12 mois)`,value:`80 €`},{label:`Taux d'engagement à 30 jours (proxy retention)`,value:`28 %`},{label:`MAU mobile`,value:`62 000`}],proposedObjective:`Faire passer le LTV des utilisateurs mobile de 80 € à 120 € sur le PI.`,options:[{id:`A`,text:`Faire passer le LTV des utilisateurs mobile de 80 € à 120 € sur le PI.`,verdict:`partial`,explanation:`Forme exemplaire (métrique, avant, après) — mais le LTV se calcule sur 12 mois de comportement. À la revue de PI (8 semaines), aucune mesure de LTV ne sera disponible. La cadence de mesure ne tient pas dans la cadence PI.`},{id:`B`,text:`Faire passer le taux d'engagement à 30 jours des nouveaux utilisateurs mobile de 28 % à 50 % d'ici la revue de PI.`,verdict:`good`,explanation:`Proxy leading du LTV, observable dans la fenêtre PI. Sous influence directe du train (refonte UX). Mesurable et attribuable à la revue de PI.`},{id:`C`,text:`Améliorer significativement la valeur des utilisateurs mobile.`,verdict:`bad`,explanation:`« Améliorer » + « significativement » : double flou. Pas de métrique nommée, pas de seuil, pas de fenêtre.`},{id:`D`,text:`Livrer la refonte UX mobile sur ce PI.`,verdict:`bad`,explanation:`Output. La refonte peut être livrée sans effet sur la valeur produit. Mauvais objectif de PI.`}]},{id:`quiz.pi.dev.analytics-cross-team`,type:`pi`,audience:`dev`,teamLabel:`Train Données · 4 équipes`,iconName:`wrench`,context:`Train Données qui maintient la plateforme analytics interne. Les équipes business sont les clientes. Sur ce PI, le train veut formaliser sa contribution à la prise de décision business.`,metrics:[{label:`Équipes business utilisant la plateforme / mois`,value:`9 / 14`},{label:`Temps moyen entre question business et réponse via plateforme`,value:`3 jours`},{label:`Tickets « besoin d'aide analyse » / mois`,value:`42`}],proposedObjective:`Permettre aux équipes business de prendre 80 % de leurs décisions via la plateforme analytics d'ici la revue de PI.`,options:[{id:`A`,text:`Permettre aux équipes business de prendre 80 % de leurs décisions via la plateforme analytics d'ici la revue de PI.`,verdict:`partial`,explanation:`Bonne intention, métrique attractive — mais qu'une équipe business « prenne une décision via la plateforme » dépend autant de leur maturité analytique que de la plateforme. Le train n'a pas la main directe : sous-influence partielle. Et la métrique est difficile à instrumenter objectivement.`},{id:`B`,text:`Réduire le temps moyen pour répondre à une question business via la plateforme de 3 jours à 2 h d'ici la revue de PI.`,verdict:`good`,explanation:`Métrique directement sous l'influence du train (vitesse de réponse de la plateforme). Mesurable, observable à la revue de PI. Crée un appel à utiliser la plateforme — sans dépendre de la maturité des équipes clientes.`},{id:`C`,text:`Améliorer la plateforme analytics pour les équipes business.`,verdict:`bad`,explanation:`Flou pur. Aucune métrique, aucun seuil. À la revue de PI, personne ne saura trancher.`},{id:`D`,text:`Mettre en place les 12 nouveaux tableaux de bord demandés sur ce PI.`,verdict:`bad`,explanation:`Output. Les 12 tableaux peuvent être livrés sans changer le temps de réponse ni l'usage réel. Mesure le travail, pas la valeur.`}]},{id:`quiz.pi.dev.compliance-miscalibration`,type:`pi`,audience:`dev`,teamLabel:`Train Conformité · 3 équipes`,iconName:`target`,context:`Échéance réglementaire RGPD dans 18 mois. Le train fait une première vague d'audit. Le DPO veut une cible engageante. Confiance équipe à 45 % de tenir la cible 100 % en un PI.`,metrics:[{label:`Traitements de données client identifiés`,value:`184`},{label:`Traitements actuellement conformes RGPD`,value:`62 / 184`},{label:`Confiance équipe d'atteindre 100 % en un PI`,value:`45 %`}],proposedObjective:`Atteindre 100 % de conformité RGPD sur les traitements de données client d'ici la revue de PI — classé engagé.`,options:[{id:`A`,text:`Atteindre 100 % de conformité RGPD sur les traitements de données client d'ici la revue de PI — classé engagé.`,verdict:`bad`,explanation:`Calibrage incohérent. Un engagé se vise à 80-100 % de confiance ; ici l'équipe est à 45 %. À la revue de PI, l'objectif ratera l'engagement engagé — perte de crédibilité pour le train.`},{id:`B`,text:`Atteindre 100 % de conformité RGPD sur les traitements de données client d'ici la revue de PI — classé stretch.`,verdict:`good`,explanation:`Même cible, classement honnête. Un stretch se vise à 30-60 % de confiance — exactement la situation. À la revue de PI, atteindre 80 % sur un stretch est un vrai succès.`},{id:`C`,text:`Faire passer le nombre de traitements conformes RGPD de 62 à 122 d'ici la revue de PI — classé engagé.`,verdict:`partial`,explanation:`Cible chiffrée crédible (≈ doubler), classement engagé cohérent avec une confiance probable >80 %. C'est défendable, mais moins ambitieux que ce que veut le DPO. Selon le contexte stratégique, B (stretch à 100 %) ou C (engagé à 122) peuvent se défendre — le piège est uniquement A (engagé à 100 % avec 45 % de confiance).`},{id:`D`,text:`Améliorer notre conformité RGPD.`,verdict:`bad`,explanation:`Pas de chiffre, pas de seuil, pas de fenêtre. Hors-jeu pour un objectif de PI.`}]},{id:`quiz.pi.dev.marketplace-vanity`,type:`pi`,audience:`dev`,teamLabel:`Train Marketplace · 5 équipes`,iconName:`okr`,context:`La marketplace a 8 mois. Phase scale-up. Le Business Owner pousse pour démontrer la traction commerciale au board, qui décidera de l'investissement sur l'année suivante.`,metrics:[{label:`Visiteurs uniques mensuels marketplace`,value:`12 000`},{label:`GMV mensuel (Gross Merchandise Value)`,value:`50 k€`},{label:`Acheteurs uniques mensuels`,value:`180`}],proposedObjective:`Atteindre 50 000 visiteurs uniques mensuels sur la marketplace d'ici la revue de PI.`,options:[{id:`A`,text:`Atteindre 50 000 visiteurs uniques mensuels sur la marketplace d'ici la revue de PI.`,verdict:`partial`,explanation:`Métrique nommée, cible, fenêtre. Mais c'est une vanity metric : un visiteur ne dit rien de la traction commerciale. Le board attend du GMV ou des acheteurs, pas du trafic.`},{id:`B`,text:`Faire passer le GMV mensuel de la marketplace de 50 k€ à 200 k€ d'ici la revue de PI.`,verdict:`good`,explanation:`Métrique de fin (valeur économique), point de départ, cible, fenêtre. Aligné avec ce que le board veut voir, mesurable à la revue de PI.`},{id:`C`,text:`Faire de notre marketplace la plus dynamique de notre secteur.`,verdict:`bad`,explanation:`C'est un Objectif qualitatif inspirant, pas un objectif de PI mesurable. Pas de métrique, pas de seuil.`},{id:`D`,text:`Lancer 5 nouvelles catégories produit sur la marketplace ce PI.`,verdict:`bad`,explanation:`Output. 5 catégories peuvent être lancées sans traction commerciale. L'objectif de PI ne doit pas mesurer le travail interne.`}]},{id:`quiz.pi.dev.signup-guardrail`,type:`pi`,audience:`dev`,teamLabel:`Train Acquisition · 4 équipes`,iconName:`challenge`,context:`Le train Acquisition pousse la croissance via la landing page principale. Le board veut +3x sur les inscriptions. L'équipe Rétention rappelle qu'augmenter le volume sans qualifier dégrade le churn.`,metrics:[{label:`Taux d'inscription depuis la landing page`,value:`4 %`},{label:`Taux d'activation J+7 des nouveaux inscrits`,value:`45 %`},{label:`Inscriptions qualifiées (activées J+7) / mois`,value:`320`}],proposedObjective:`Faire passer le taux d'inscription depuis la landing page de 4 % à 12 % d'ici la revue de PI.`,options:[{id:`A`,text:`Faire passer le taux d'inscription depuis la landing page de 4 % à 12 % d'ici la revue de PI.`,verdict:`partial`,explanation:`Forme correcte. Mais isolément, on peut tripler le taux d'inscription en attirant n'importe qui — au prix d'un churn massif derrière. Sans métrique guardrail (qualité), l'objectif de PI peut être atteint en détruisant de la valeur en aval.`},{id:`B`,text:`Relever le taux d'inscription qualifiée (activée J+7) depuis la landing page de 1,8 % à 5 % d'ici la revue de PI.`,verdict:`good`,explanation:`Métrique composée qui intègre la qualité : on ne compte que les inscrits qui ont fait quelque chose. Impossible de l'atteindre en attirant n'importe qui. Outcome aligné avec la valeur, pas avec le volume.`},{id:`C`,text:`Augmenter le volume d'inscriptions sur la landing page sans dégrader la rétention.`,verdict:`partial`,explanation:`Intention juste (le guardrail est nommé) mais pas de chiffre, pas de seuil, pas de fenêtre. Pour un objectif de PI, il faut quantifier.`},{id:`D`,text:`Refondre la landing page et améliorer le tunnel d'acquisition.`,verdict:`bad`,explanation:`Composite (« et »), deux outputs. Aucune métrique. Vœu pieux côté valeur.`}]},{id:`quiz.pi.dev.platform-means-vs-ends`,type:`pi`,audience:`dev`,teamLabel:`Train Plateforme · 6 équipes`,iconName:`wrench`,context:`Train Plateforme. objectif de PI autour de la fiabilité. Le SRE pousse pour des indicateurs de mécanique interne (couverture, alerting). Le Business Owner veut des indicateurs perçus par les équipes fonctionnalité consommatrices.`,metrics:[{label:`TMR moyen des incidents plateforme`,value:`45 min`},{label:`Couverture de tests d'intégration`,value:`62 %`},{label:`Temps astreinte des équipes fonctionnalité`,value:`30 %`}],proposedObjective:`Atteindre 90 % de couverture de tests d'intégration sur la plateforme d'ici la revue de PI.`,options:[{id:`A`,text:`Atteindre 90 % de couverture de tests d'intégration sur la plateforme d'ici la revue de PI.`,verdict:`partial`,explanation:`Métrique nommée, cible, fenêtre — forme correcte. Mais la couverture est une métrique de moyen, pas de fin. Atteindre 90 % de couverture ne garantit pas que la plateforme est plus fiable côté équipes fonctionnalité. Le Business Owner attend une métrique de fin.`},{id:`B`,text:`Ramener le TMR moyen des incidents plateforme de 45 min à 15 min d'ici la revue de PI.`,verdict:`good`,explanation:`Métrique de fin (la fiabilité perçue par les équipes fonctionnalité : moins de temps en panne). La couverture devient un des leviers possibles pour y arriver, parmi d'autres. Aligné avec ce que mesure le Business Owner.`},{id:`C`,text:`Stabiliser la plateforme et alléger la charge d'astreinte des équipes fonctionnalité.`,verdict:`bad`,explanation:`Composite + flou. Deux objectifs (stabilisation + astreinte) sans seuils chiffrés.`},{id:`D`,text:`Mettre en place le nouveau système d'alerting sur la plateforme.`,verdict:`bad`,explanation:`Output. Le système peut être en place sans effet sur la fiabilité ressentie.`}]}],hn=[{id:`quiz.okr-equipe.dev.kr-project-tableau de bord`,type:`okr-equipe`,audience:`dev`,teamLabel:`Équipe Observabilité`,iconName:`okr`,metrics:[{label:`Équipes data actives sur le module pipeline / mois`,value:`8`},{label:`NPS dev du module pipeline (dernier sondage)`,value:`28`},{label:`Temps moyen de détection d'un pipeline cassé`,value:`45 min`}],objectiveContext:`Devenir l'outil de référence des équipes data pour l'observabilité des pipelines.`,proposedObjective:`Livrer le nouveau tableau de bord métriques v2 d'ici fin du trimestre.`,options:[{id:`A`,text:`Livrer le nouveau tableau de bord métriques v2 d'ici fin du trimestre.`,verdict:`bad`,explanation:`« Livrer » nomme un projet. Un KR vise un **changement à atteindre**, pas une livraison. Demande-toi : qu'est-ce que le tableau de bord va faire bouger une fois en place ?`},{id:`B`,text:`Relever le NPS dev du module pipeline de 28 à 50 d'ici fin du trimestre.`,verdict:`good`,explanation:`Métrique nommée (NPS dev), point de départ (28), cible (50), échéance. Outcome qu'un tableau de bord v2 peut effectivement faire bouger.`},{id:`C`,text:`Améliorer l'adoption du nouveau tableau de bord.`,verdict:`bad`,explanation:`« Améliorer » est flou. Pas de métrique, pas de chiffre, pas d'échéance. Non falsifiable.`},{id:`D`,text:`Faire adopter le tableau de bord métriques v2 par les 8 équipes data actives.`,verdict:`partial`,explanation:`Outcome correct (adoption), bénéficiaire clair, mais aucun avant/après ni cible chiffrée. Précise : passer de combien d'équipes à combien.`}]},{id:`quiz.okr-equipe.dev.kr-fuzzy-satisfaction`,type:`okr-equipe`,audience:`dev`,teamLabel:`Équipe Plateforme API`,iconName:`wrench`,metrics:[{label:`Équipes consommatrices internes`,value:`12`},{label:`CSAT moyen des équipes consommatrices`,value:`3,2 / 5`},{label:`Tickets « comment faire » / semaine`,value:`40`}],objectiveContext:`Devenir le partenaire technique préféré des équipes produit.`,proposedObjective:`Améliorer la satisfaction des équipes consommatrices.`,options:[{id:`A`,text:`Améliorer la satisfaction des 12 équipes consommatrices de l'API.`,verdict:`bad`,explanation:`« Améliorer » sans chiffre. Pas de métrique nommée, pas de seuil, pas d'échéance. Vœu pieux.`},{id:`B`,text:`Porter le CSAT moyen des équipes consommatrices de 3,2 / 5 à 4,3 / 5 d'ici fin du trimestre.`,verdict:`good`,explanation:`Métrique nommée, point de départ, cible, échéance. Falsifiable sans ambiguïté.`},{id:`C`,text:`Avoir des équipes consommatrices contentes de notre API.`,verdict:`bad`,explanation:`« Contentes » n'est pas mesurable. Pas de métrique, pas de seuil. Reformulation à éviter complètement.`},{id:`D`,text:`Atteindre un CSAT moyen de 4 / 5 sur l'enquête trimestrielle.`,verdict:`partial`,explanation:`Métrique nommée et cible chiffrée — bien. Mais sans le point de départ (3,2), on perd la notion d'effort. Un KR montre l'avant ET l'après.`}]},{id:`quiz.okr-equipe.dev.kr-health-uptime`,type:`okr-equipe`,audience:`dev`,teamLabel:`Équipe Paiement`,iconName:`target`,metrics:[{label:`Taux de réussite des paiements`,value:`96,2 %`},{label:`Temps moyen de détection d'un incident`,value:`15 min`},{label:`Escalades support / semaine`,value:`12`}],objectiveContext:`Faire de notre plateforme de paiement la plus fiable de notre marché.`,proposedObjective:`Maintenir l'uptime du service paiement au-dessus de 99,9 %.`,options:[{id:`A`,text:`Maintenir l'uptime du service paiement au-dessus de 99,9 %.`,verdict:`bad`,explanation:`« Maintenir » décrit un garde-fou, pas un changement à atteindre. Un KR vise une progression — sinon, c'est une norme de service à surveiller ailleurs, pas un Résultat clé.`},{id:`B`,text:`Faire passer le taux de réussite des paiements de 96,2 % à 99,5 % d'ici fin du trimestre.`,verdict:`good`,explanation:`Métrique nommée, point de départ, cible, échéance. Un vrai changement mesurable — c'est ça un KR.`},{id:`C`,text:`Garantir 99,9 % d'uptime sur la plateforme paiement.`,verdict:`bad`,explanation:`Même piège que A reformulé. « Garantir » est aussi un état à maintenir, pas un outcome à atteindre. C'est une SLO (service level objective), pas un KR.`},{id:`D`,text:`Diviser par 3 le temps moyen de détection d'un incident paiement (de 15 min à 5 min).`,verdict:`partial`,explanation:`Bon format de KR (point de départ, cible chiffrée, échéance implicite du cycle). Mais lié à l'observabilité, pas directement à la fiabilité perçue par les clients — l'option B correspond mieux à l'Objectif de fiabilité.`}]},{id:`quiz.okr-equipe.dev.kr-overconfident-coverage`,type:`okr-equipe`,audience:`dev`,teamLabel:`Équipe Qualité Logicielle`,iconName:`challenge`,metrics:[{label:`Couverture de tests automatisés (moyenne entreprise)`,value:`78 %`},{label:`Bugs critiques en prod / trimestre précédent`,value:`23`},{label:`Délai moyen de revue d'une PR`,value:`2,3 jours`}],objectiveContext:`Donner aux équipes produit la confiance de déployer plusieurs fois par jour.`,proposedObjective:`Faire passer la couverture de tests automatisés de 78 % à 80 % d'ici fin du trimestre.`,options:[{id:`A`,text:`Faire passer la couverture de tests automatisés de 78 % à 80 % d'ici fin du trimestre.`,verdict:`bad`,explanation:`L'écart est trivial (2 points). Si l'équipe estime ses chances de succès à 95-100 %, ce n'est plus un KR mais une tâche planifiée. L'OKR pousse à l'ambition calibrée (50 à 70 % de confiance).`},{id:`B`,text:`Porter la couverture de tests automatisés de 78 % à 92 % d'ici fin du trimestre.`,verdict:`good`,explanation:`Écart ambitieux (+14 pts) qui demande un vrai effort. Probablement autour de 60 % de confiance pour l'équipe — dans la fourchette OKR.`},{id:`C`,text:`Maximiser la couverture de tests automatisés.`,verdict:`bad`,explanation:`« Maximiser » sans cible chiffrée n'est pas falsifiable. Combien suffit pour dire « c'est fait » ?`},{id:`D`,text:`Diviser par 3 le nombre de bugs critiques en prod (de 23 à 8 sur le trimestre).`,verdict:`partial`,explanation:`KR exemplaire dans la forme. Mais il ne parle pas de la couverture de tests — c'est un autre outcome (effet du Tdd vs cause). Peut être un autre KR du même Objectif, plutôt qu'une reformulation de celui-ci.`}]},{id:`quiz.okr-equipe.dev.kr-composite-perf`,type:`okr-equipe`,audience:`dev`,teamLabel:`Équipe Performance`,iconName:`practice`,metrics:[{label:`LCP médian (Largest Contentful Paint)`,value:`3,8 s`},{label:`INP médian (Interaction to Next Paint)`,value:`320 ms`},{label:`Taux de bounce sur la home`,value:`42 %`}],objectiveContext:`Rendre l'application aussi rapide que les meilleurs du marché.`,proposedObjective:`Améliorer le temps de chargement et réduire le taux de bounce sur la home.`,options:[{id:`A`,text:`Améliorer le temps de chargement et réduire le taux de bounce sur la home.`,verdict:`bad`,explanation:`Composite (« et » coordonne deux résultats distincts) + flou (« améliorer »). Sépare en deux KR distincts, chacun mesurable.`},{id:`B`,text:`Ramener le LCP médian de 3,8 s à 1,8 s d'ici fin du trimestre.`,verdict:`good`,explanation:`Un seul résultat, métrique nommée, point de départ, cible, échéance. Le KR sur le bounce est une autre histoire — ce sera un autre KR du même Objectif.`},{id:`C`,text:`Optimiser la performance perçue de la home.`,verdict:`bad`,explanation:`« Optimiser » et « performance perçue » sont flous. Aucune métrique nommée, aucun seuil.`},{id:`D`,text:`Faire passer le LCP médian de 3,8 s à 1,8 s, puis le taux de bounce de 42 % à 30 %, d'ici fin du trimestre.`,verdict:`partial`,explanation:`Bien chiffré, bien mesuré — mais c'est encore deux KR cachés en un. Sépare-les : un OKR a 3 à 5 KR justement pour porter plusieurs dimensions.`}]},{id:`quiz.okr-equipe.dev.kr-no-baseline-intégration`,type:`okr-equipe`,audience:`dev`,teamLabel:`Équipe Intégration Dev`,iconName:`learn`,metrics:[{label:`Temps moyen avant 1er appel API réussi (« time to hello world »)`,value:`4 h`},{label:`Nouveaux développeurs intégrés / trimestre`,value:`65`},{label:`Taux d'abandon avant 1er appel API`,value:`38 %`}],objectiveContext:`Faire de notre API publique la plus accueillante pour un développeur qui débute.`,proposedObjective:`Atteindre un « time to hello world » de 30 minutes d'ici fin du trimestre.`,options:[{id:`A`,text:`Atteindre un « time to hello world » de 30 minutes d'ici fin du trimestre.`,verdict:`partial`,explanation:`Métrique nommée, cible chiffrée, échéance. Mais sans le point de départ (4 h aujourd'hui), on perd la mesure de l'effort. Un KR montre l'avant ET l'après.`},{id:`B`,text:`Réduire le temps moyen avant 1er appel API réussi de 4 h à 30 min d'ici fin du trimestre.`,verdict:`good`,explanation:`Point de départ explicite (4 h), cible (30 min), échéance, métrique nommée. La structure idéale d'un KR.`},{id:`C`,text:`Rendre l'intégration des nouveaux développeurs fluide et rapide.`,verdict:`bad`,explanation:`« Fluide » et « rapide » sont flous. Aucune métrique, aucun seuil. Vœu, pas un KR.`},{id:`D`,text:`Réduire le « time to hello world » d'au moins 80 % d'ici fin du trimestre.`,verdict:`partial`,explanation:`Variation chiffrée, échéance, métrique nommée — bonne base. Mais formulation relative (« d'au moins 80 % ») qui demande un calcul mental. La forme « de 4 h à 30 min » se vérifie d'un coup d'œil.`}]},{id:`quiz.okr-equipe.dev.mobile-nps-baseline`,type:`okr-equipe`,audience:`dev`,teamLabel:`Équipe App Mobile`,iconName:`target`,context:`5 devs mobile, 1 Product Manager. L'équipe construit l'application mobile principale. Cycle OKR trimestriel. L'enquête NPS tourne tous les 3 mois — un cycle complet par trimestre.`,metrics:[{label:`NPS mobile (dernière enquête trimestrielle)`,value:`32`},{label:`Score moyen App Store / Play Store`,value:`4,1 / 5`},{label:`Sessions / utilisateur actif / semaine`,value:`5,3`}],objectiveContext:`Faire de notre appli mobile l'une des préférées de nos utilisateurs.`,proposedObjective:`Atteindre un NPS de 60 sur l'appli mobile d'ici la fin du trimestre.`,options:[{id:`A`,text:`Atteindre un NPS de 60 sur l'appli mobile d'ici la fin du trimestre.`,verdict:`partial`,explanation:`Cible chiffrée, fenêtre. Mais sans le point de départ (32 aujourd'hui), on perd la lecture de l'effort (+28 pts = ambition forte). Un KR montre l'avant ET l'après.`},{id:`B`,text:`Relever le NPS de l'appli mobile (enquête trimestrielle) de 32 à 60 d'ici la fin du trimestre.`,verdict:`good`,explanation:`Point de départ explicite, cible, fenêtre cohérente avec la cadence de la métrique. La structure idéale d'un KR.`},{id:`C`,text:`Améliorer la satisfaction des utilisateurs de l'appli mobile.`,verdict:`bad`,explanation:`Pas de métrique nommée, pas de chiffre. Non falsifiable.`},{id:`D`,text:`Livrer les 8 améliorations UX prévues sur le backlog mobile ce trimestre.`,verdict:`bad`,explanation:`Output / Résultat clé projet. Les 8 améliorations peuvent être livrées sans bouger le NPS.`}]},{id:`quiz.okr-equipe.dev.payment-cadence`,type:`okr-equipe`,audience:`dev`,teamLabel:`Équipe Paiement`,iconName:`challenge`,context:`6 devs, 1 Product Manager. L'équipe maintient le service paiement. Cycle OKR trimestriel. L'équipe court en sprints de 2 semaines.`,metrics:[{label:`Bugs critiques production sur paiement (mois en cours)`,value:`12`},{label:`Temps moyen de résolution d'un bug critique`,value:`4 h`},{label:`Réclamations clients / mois liées au paiement`,value:`28`}],objectiveContext:`Faire de notre plateforme de paiement la plus fiable de notre marché.`,proposedObjective:`Réduire le nombre de bugs critiques production sur le paiement de 12 à 3 d'ici la fin du sprint 24.`,options:[{id:`A`,text:`Réduire le nombre de bugs critiques production sur le paiement de 12 à 3 d'ici la fin du sprint 24.`,verdict:`bad`,explanation:`Fenêtre mal calibrée : un KR trimestriel ne se borne pas par un numéro de sprint (~2 semaines). Confusion avec un objectif de Sprint. L'horizon OKR équipe = 90 jours, pas une itération.`},{id:`B`,text:`Réduire le nombre de bugs critiques production sur le paiement de 12 à 3 par mois d'ici la fin du trimestre.`,verdict:`good`,explanation:`Métrique nommée, point de départ, cible (par mois pour rester comparable), fenêtre trimestrielle cohérente avec le cycle OKR.`},{id:`C`,text:`Maintenir le nombre de bugs critiques production paiement au-dessus de 5 par mois ce trimestre.`,verdict:`bad`,explanation:`Health metric (« maintenir au-dessus de ») et formulation à l'envers (un seuil supérieur n'a pas de sens pour un nombre de bugs). Double piège.`},{id:`D`,text:`Améliorer la fiabilité du paiement d'ici la fin du trimestre.`,verdict:`bad`,explanation:`Pas de métrique, pas de seuil. Non falsifiable.`}]},{id:`quiz.okr-equipe.dev.platform-kr-as-objective`,type:`okr-equipe`,audience:`dev`,teamLabel:`Équipe Plateforme API`,iconName:`wrench`,metrics:[{label:`Taux de réussite des appels API (actuel)`,value:`99,2 %`},{label:`p95 latence API`,value:`180 ms`},{label:`Tickets « API instable » des équipes consommatrices / sem`,value:`6`}],objectiveContext:`Devenir la référence interne pour la fiabilité des services techniques.`,proposedObjective:`Devenir la plateforme de référence pour la fiabilité des appels API ce trimestre.`,options:[{id:`A`,text:`Devenir la plateforme de référence pour la fiabilité des appels API ce trimestre.`,verdict:`bad`,explanation:`C'est un Objectif (qualitatif, inspirant) reformulé en KR — sans chiffre, sans cible. Un KR doit être mesurable. Ici on a reformulé l'Objectif au lieu de produire un KR distinct.`},{id:`B`,text:`Faire passer le taux de réussite des appels API plateforme de 99,2 % à 99,9 % d'ici la fin du trimestre.`,verdict:`good`,explanation:`Métrique nommée, point de départ, cible (qui demande un vrai effort), fenêtre. Un KR mesurable qui sert l'Objectif sans s'y substituer.`},{id:`C`,text:`Maintenir le taux de réussite des appels API au-dessus de 99,5 %.`,verdict:`bad`,explanation:`Health metric. Décrit un état à préserver, pas un changement à atteindre. Si on est déjà à 99,5 %, c'est une norme de service, pas un KR.`},{id:`D`,text:`Réduire le nombre de tickets « API instable » de 6 à 1 par semaine et faire passer le p95 latence à 100 ms d'ici la fin du trimestre.`,verdict:`bad`,explanation:`Composite (deux résultats coordonnés par « et »). Sépare en deux KR distincts du même Objectif.`}]},{id:`quiz.okr-equipe.dev.adoption-vanity-proxy`,type:`okr-equipe`,audience:`dev`,teamLabel:`Équipe Adoption Fonctionnalité`,iconName:`okr`,context:`3 devs, 1 Product Manager. L'équipe a livré au PI précédent une nouvelle fonctionnalité « collaboration en temps réel ». Cycle OKR trimestriel pour faire monter l'adoption.`,metrics:[{label:`Utilisateurs ayant cliqué sur le bouton « Collaborer »`,value:`42 %`},{label:`Utilisateurs ayant complété ≥ 3 sessions collaboratives`,value:`8 %`},{label:`Utilisateurs actifs (≥ 1 action / sem)`,value:`12 400`}],objectiveContext:`Faire de la collaboration en temps réel un usage quotidien dans nos équipes clientes.`,proposedObjective:`Atteindre 80 % de clic sur le bouton « Collaborer » depuis l'écran d'accueil d'ici la fin du trimestre.`,options:[{id:`A`,text:`Atteindre 80 % de clic sur le bouton « Collaborer » depuis l'écran d'accueil d'ici la fin du trimestre.`,verdict:`partial`,explanation:`Métrique observable, cible, fenêtre. Mais le clic en surface ne dit rien de l'usage profond — c'est un proxy vanity. L'Objectif parle d'usage quotidien, le KR ne mesure que la curiosité.`},{id:`B`,text:`Porter le pourcentage d'utilisateurs ayant complété au moins 3 sessions collaboratives de 8 % à 35 % d'ici la fin du trimestre.`,verdict:`good`,explanation:`Métrique d'usage réel (3 sessions = signal d'adoption), aligné avec l'Objectif. Le clic devient un proxy intermédiaire, le KR mesure l'effet de fin.`},{id:`C`,text:`Livrer 5 améliorations majeures sur la fonctionnalité de collaboration ce trimestre.`,verdict:`bad`,explanation:`Résultat clé projet. 5 améliorations livrées peuvent ne rien changer à l'adoption.`},{id:`D`,text:`Améliorer l'adoption de la collaboration en temps réel.`,verdict:`bad`,explanation:`Pas de métrique, pas de chiffre. Vœu pieux.`}]},{id:`quiz.okr-equipe.dev.dx-overconfidence`,type:`okr-equipe`,audience:`dev`,teamLabel:`Équipe Developer Experience`,iconName:`challenge`,context:`4 devs, 1 Developer Advocate. L'équipe maintient le SDK consommé par les devs externes. Le dernier NPS est à 48. L'équipe estime ses chances à 100 % de gagner 2 points si elle corrige les bugs en attente.`,metrics:[{label:`NPS dev du SDK (actuel)`,value:`48`},{label:`Bugs en attente sur SDK`,value:`23`},{label:`Confiance équipe d'atteindre la cible proposée`,value:`100 %`}],objectiveContext:`Faire du SDK une référence dans la communauté dev.`,proposedObjective:`Faire passer le NPS dev du SDK de 48 à 50 d'ici la fin du trimestre.`,options:[{id:`A`,text:`Faire passer le NPS dev du SDK de 48 à 50 d'ici la fin du trimestre.`,verdict:`bad`,explanation:`L'écart est trivial (+2 pts) et l'équipe estime ses chances à 100 %. À ce niveau, ce n'est plus un KR mais une tâche du backlog. Un KR vise 50-70 % de confiance — l'ambition doit demander un vrai effort.`},{id:`B`,text:`Relever le NPS dev du SDK de 48 à 65 d'ici la fin du trimestre.`,verdict:`good`,explanation:`Écart ambitieux (+17 pts) qui demande un vrai changement (pas juste corriger les bugs en attente). Probablement autour de 50-60 % de confiance — calibrage OKR correct.`},{id:`C`,text:`Corriger les 23 bugs en attente sur le SDK ce trimestre.`,verdict:`bad`,explanation:`Résultat clé projet. Corriger 23 bugs peut être achevé sans bouger le NPS — surtout si les bugs ne sont pas ceux qui frustrent les devs.`},{id:`D`,text:`Faire de notre SDK le SDK le mieux noté de notre marché.`,verdict:`bad`,explanation:`C'est un Objectif qualitatif inspirant, pas un KR. Pas de métrique chiffrée.`}]},{id:`quiz.okr-equipe.dev.insights-hidden-composite`,type:`okr-equipe`,audience:`dev`,teamLabel:`Équipe Insights & Tableaux de bord`,iconName:`practice`,context:`5 devs, 1 Product Manager. L'équipe construit les tableaux de bord utilisés par les équipes business. Cycle OKR trimestriel. Le PM veut un KR qui couvre à la fois l'usage et la satisfaction.`,metrics:[{label:`Utilisation hebdomadaire du tableau de bord principal`,value:`22 %`},{label:`Score de satisfaction des utilisateurs du tableau de bord`,value:`3,1 / 5`},{label:`Tickets « besoin d'aide tableau de bord » / sem`,value:`14`}],objectiveContext:`Faire des tableaux de bord le réflexe quotidien des équipes business pour piloter.`,proposedObjective:`Faire passer l'utilisation hebdomadaire du tableau de bord de 22 % à 45 % et le score de satisfaction de 3,1 à 4,2 d'ici la fin du trimestre.`,options:[{id:`A`,text:`Faire passer l'utilisation hebdomadaire du tableau de bord de 22 % à 45 % et le score de satisfaction de 3,1 à 4,2 d'ici la fin du trimestre.`,verdict:`bad`,explanation:`Composite caché : deux métriques dans le même KR. Si l'usage monte mais la satisfaction baisse, le KR est-il atteint ? Un OKR a 3 à 5 KR distincts pour porter plusieurs dimensions — c'est exactement pour ça.`},{id:`B`,text:`Amener l'utilisation hebdomadaire du tableau de bord de 22 % à 45 % d'ici la fin du trimestre.`,verdict:`good`,explanation:`Un seul outcome mesurable. La satisfaction devient un autre KR du même Objectif, ou une métrique guardrail surveillée à côté. Clarté + falsifiabilité.`},{id:`C`,text:`Améliorer significativement l'usage et la satisfaction du tableau de bord.`,verdict:`bad`,explanation:`Composite ET flou (« améliorer », « significativement »). Triple piège.`},{id:`D`,text:`Livrer la v3 du tableau de bord ce trimestre.`,verdict:`bad`,explanation:`Résultat clé projet. La v3 livrée ≠ adoption ou satisfaction qui bouge.`}]}],gn=[{id:`quiz.okr-entreprise.manager.kr-project-marketplace`,type:`okr-entreprise`,audience:`manager`,teamLabel:`Entreprise Néria`,iconName:`okr`,metrics:[{label:`Clients actifs sur la marketplace actuelle / mois`,value:`3 400`},{label:`NPS clients grands comptes (dernier baromètre)`,value:`24`},{label:`Part du chiffre d'affaires issue du digital`,value:`18 %`}],objectiveContext:`Devenir le partenaire numérique de référence de nos clients grands comptes.`,proposedObjective:`Ouvrir la nouvelle marketplace B2B d'ici la fin de l'année.`,options:[{id:`A`,text:`Ouvrir la nouvelle marketplace B2B d'ici la fin de l'année.`,verdict:`bad`,explanation:`« Ouvrir » nomme un projet. Un Résultat clé vise un **changement à atteindre**, pas une mise en ligne. Demande-toi : qu'est-ce que la marketplace va faire bouger, une fois ouverte ?`},{id:`B`,text:`Relever le NPS des clients grands comptes de 24 à 45 d'ici la fin de l'année.`,verdict:`good`,explanation:`Métrique nommée (NPS grands comptes), point de départ (24), cible (45), échéance. Un outcome qu'une marketplace peut effectivement faire bouger.`},{id:`C`,text:`Améliorer la relation avec nos clients grands comptes.`,verdict:`bad`,explanation:`« Améliorer » est flou. Pas de métrique, pas de chiffre cible, pas d'échéance. Non falsifiable.`},{id:`D`,text:`Faire adopter la marketplace B2B par nos clients grands comptes.`,verdict:`partial`,explanation:`Outcome correct (adoption), bénéficiaire clair, mais aucun avant/après ni cible chiffrée. Précise : passer de combien de clients actifs à combien.`}]},{id:`quiz.okr-entreprise.manager.kr-project-siege-social`,type:`okr-entreprise`,audience:`manager`,teamLabel:`Division Retail`,iconName:`wrench`,context:`180 magasins en France. Le CODIR veut renforcer l'attractivité employeur de la division, dans un marché du recrutement retail tendu.`,metrics:[{label:`Taux de turnover annuel des équipes en magasin`,value:`34 %`},{label:`Postes vacants en magasin (moyenne sur l'année)`,value:`210`},{label:`Score marque employeur (baromètre externe)`,value:`3,1 / 5`}],objectiveContext:`Faire de la division Retail l'employeur préféré du secteur.`,proposedObjective:`Déployer le nouveau programme de formation managers d'ici la fin de l'année.`,options:[{id:`A`,text:`Déployer, dans nos 180 magasins, le nouveau programme de formation managers d'ici la fin de l'année.`,verdict:`bad`,explanation:`« Déployer » nomme un projet. Le programme peut être déployé partout sans que le turnover ou la marque employeur ne bougent d'un point.`},{id:`B`,text:`Ramener le taux de turnover annuel des équipes en magasin de 34 % à 22 % d'ici la fin de l'année.`,verdict:`good`,explanation:`Métrique nommée, point de départ (34 %), cible (22 %), échéance. Un vrai changement mesurable que la formation managers peut contribuer à produire.`},{id:`C`,text:`Renforcer l'attractivité employeur, alors que 210 postes restent vacants en moyenne dans nos 180 magasins.`,verdict:`bad`,explanation:`« Renforcer » sans chiffre cible n'est pas falsifiable. Combien de postes vacants en moins pour dire « c'est fait » ?`},{id:`D`,text:`Améliorer le score marque employeur de la division d'ici la fin de l'année.`,verdict:`partial`,explanation:`Métrique nommée (bonne piste), mais « améliorer » reste sans cible ni point de départ chiffré dans l'option elle-même. Précise le score de départ et la cible visée.`}]},{id:`quiz.okr-entreprise.manager.kr-fuzzy-satisfaction-client`,type:`okr-entreprise`,audience:`manager`,teamLabel:`Entreprise Néria`,iconName:`target`,metrics:[{label:`Clients actifs sur nos 4 marchés`,value:`62 000`},{label:`CSAT moyen (dernier trimestre)`,value:`3,4 / 5`},{label:`Réclamations clients / mois`,value:`520`}],objectiveContext:`Devenir la référence de la satisfaction client dans notre secteur.`,proposedObjective:`Améliorer la satisfaction de nos clients.`,options:[{id:`A`,text:`Améliorer la satisfaction de nos 62 000 clients actifs.`,verdict:`bad`,explanation:`« Améliorer » sans chiffre cible. Pas de métrique nommée, pas de seuil, pas d'échéance. Vœu pieux.`},{id:`B`,text:`Porter le CSAT moyen de 3,4 / 5 à 4,3 / 5 d'ici la fin de l'année.`,verdict:`good`,explanation:`Métrique nommée, point de départ, cible, échéance. Falsifiable sans ambiguïté.`},{id:`C`,text:`Avoir des clients satisfaits sur nos 4 marchés.`,verdict:`bad`,explanation:`« Satisfaits » n'est pas mesurable. Pas de métrique, pas de seuil. Reformulation à éviter complètement.`},{id:`D`,text:`Atteindre un CSAT moyen de 4 / 5 sur l'enquête annuelle.`,verdict:`partial`,explanation:`Métrique nommée et cible chiffrée, bien. Mais sans le point de départ (3,4), on perd la notion d'effort. Un Résultat clé montre l'avant ET l'après.`}]},{id:`quiz.okr-entreprise.manager.kr-fuzzy-notoriete`,type:`okr-entreprise`,audience:`manager`,teamLabel:`Division Retail`,iconName:`wrench`,context:`Le CODIR lance une campagne de marque nationale pour repositionner l'enseigne face à 3 concurrents directs.`,metrics:[{label:`Notoriété assistée (baromètre national)`,value:`41 %`},{label:`Part de marché sur le segment principal`,value:`12 %`},{label:`Budget marque alloué à l'année`,value:`4,2 M€`}],objectiveContext:`Redevenir la marque retail préférée des Français dans notre segment.`,proposedObjective:`Renforcer la notoriété de notre marque.`,options:[{id:`A`,text:`Renforcer la notoriété de notre marque, avec un budget de 4,2 M€ engagé.`,verdict:`bad`,explanation:`« Renforcer » sans chiffre. Pas de métrique nommée, pas de seuil, pas d'échéance. Le budget engagé n'est pas un résultat.`},{id:`B`,text:`Faire passer la notoriété assistée de 41 % à 55 % d'ici la fin de l'année.`,verdict:`good`,explanation:`Métrique nommée (baromètre national), point de départ, cible, échéance. Falsifiable sans ambiguïté.`},{id:`C`,text:`Être davantage reconnus par le grand public.`,verdict:`bad`,explanation:`« Davantage reconnus » n'est pas mesurable. Pas de métrique, pas de seuil. À éviter complètement.`},{id:`D`,text:`Progresser sur la part de marché du segment principal (12 % actuellement).`,verdict:`partial`,explanation:`Métrique nommée et point de départ présents, bonne piste. Mais aucune cible chiffrée : progresser jusqu'à combien ?`}]},{id:`quiz.okr-entre
