min aujourd'hui).",note:"Le refactor reste possible, mais comme moyen au service du bénéficiaire, pas comme fin en soi."}]},{heading:"Source",kind:"source",body:"Marty Cagan (Inspired) sur la centralité du client dans la discovery produit. Christina Wodtke sur la mesure outcome-based."}]},{id:"shared.values.apprentissage",themeId:"valeurs.posture",icon:"good",title:"Apprentissage",heroPhrase:"Un objectif raté qui apprend vaut mieux qu'un objectif atteint sans apprendre.",intro:"",practiceCtaLabel:"Va isoler l'hypothèse de ton objectif",sections:[{heading:"Pourquoi",icon:"target",body:"La pire issue d'un cycle n'est pas l'échec, c'est l'absence d'apprentissage. Un objectif atteint sans surprise confirme ce qu'on savait déjà ; un objectif raté qui modifie le sprint suivant fait progresser l'équipe et le produit. Cette valeur protège contre le sandbagging et l'auto-félicitation.",bullets:["L'objectif porte une hypothèse vérifiable, pas une certitude.","Le succès se mesure aussi à ce qu'on a appris, pas seulement à la cible atteinte.","Un objectif qui ne pouvait pas échouer n'avait pas grand-chose à apprendre."]},{heading:"Comment ça se voit",icon:"good",body:"",bullets:["L'hypothèse sous-jacente est nommée (« on suppose que X bouge Y »).","Les rétros parlent de ce qui a été appris, pas juste de ce qui a été fait.","Un objectif raté est analysé, pas occulté."]},{heading:"Comment l'incarner",icon:"wrench",body:"Poser la question « qu'est-ce qu'on va apprendre avec ce cycle, indépendamment de l'atteinte ? » avant de figer l'objectif. Isoler l'hypothèse de la métrique : qu'est-ce qu'on testera vraiment ?",examples:[{bad:"Faire passer le NPS de 28 à 32 d'ici fin de trimestre (on sait que les améliorations UX en cours suffiront).",good:"Faire passer le NPS de 28 à 50 d'ici fin de trimestre. Hypothèse testée : les UX écran principal ont plus d'impact que les écrans secondaires.",note:"Le second objectif est plus ambitieux et plus apprenant. S'il rate, l'équipe sait quoi creuser au cycle suivant."}]},{heading:"Source",kind:"source",body:"Eric Ries, Lean Startup, sur l'apprentissage validé comme unité de progrès. Marty Cagan sur la discovery produit. Christina Wodtke sur la posture d'apprentissage en OKR."}]},{id:"shared.values.courage-desaccord",themeId:"valeurs.posture",icon:"good",title:"Courage du désaccord",heroPhrase:"Dire non aux objectifs creux, demander des reformulations, porter un dissensus. Hocher la tête sape l'équipe.",intro:"",practiceCtaLabel:"Va poser une objection constructive",sections:[{heading:"Pourquoi",icon:"target",body:"Un consensus mou produit un objectif mou. Quand personne n'ose dire « cet objectif n'est pas clair », « ce calibrage est faux », « ce KR est un projet déguisé », l'équipe se condamne à exécuter un mauvais cap pendant tout un cycle. Le courage du désaccord est ce qui transforme un atelier de rédaction en débat productif.",bullets:["Hocher la tête poliment est une trahison de l'équipe.","Une objection non exprimée devient un mauvais résultat à l'arrivée.","Le dissensus, exprimé tôt et calmement, économise des semaines de mauvais travail."]},{heading:"Comment ça se voit",icon:"good",body:"",bullets:["Au moins une objection est posée pendant la rédaction.","Les juniors et les voix discrètes sont sollicités explicitement.","Le confidence vote anonyme révèle parfois des écarts que la discussion publique cachait."]},{heading:"Comment l'incarner",icon:"wrench",body:"Créer un espace de désaccord sûr : interdire les sarcasmes, accueillir chaque objection comme un cadeau (« merci de l'avoir dit »). Poser la question « qui n'est pas convaincu ? » en fin de rédaction. Pour SAFe : utiliser le ROAM honnêtement. Pour OKR : insister sur le confidence vote.",examples:[{bad:"Le facilitateur lit l'objectif et demande « tout le monde est d'accord ? ». Silence interprété comme assentiment.",good:"Le facilitateur lit l'objectif puis demande « qui a une réserve, même petite ? Tour de table obligatoire. ». Les objections sont notées et adressées une à une.",note:"Le silence n'est pas un accord. Le silence est un trou dans le contrat."}]},{heading:"Source",kind:"source",body:"Patrick Lencioni, The Five Dysfunctions of a Team, chapitre sur l'absence de désaccord productif. SAFe sur le ROAM et le confidence vote en PI Planning. Ben Lamorte sur le devoir de l'équipe coachée."}]}],ib={sprint:{dev:Kh},pi:{dev:lg},"okr-equipe":{dev:nb}},dc={sprint:{dev:[...Os,...Uh]},pi:{dev:[...Os,...ug]},"okr-equipe":{dev:[...Os,...rb]}},ab={sprint:{dev:og},pi:{dev:_g},"okr-equipe":{dev:Hg}},sb={sprint:{dev:Gg},pi:{dev:Qg}},ob={sprint:{dev:Xg},pi:{dev:Yg},"okr-equipe":{dev:Zg}},lb={sprint:{dev:Jg},pi:{dev:eb},"okr-equipe":{dev:tb}};function yt(){return{getHeuristicsConfig(){return Fh},getExamples(e,t){var n;return((n=ib[e])==null?void 0:n[t])??[]},getSheets(e,t){var n;return((n=dc[e])==null?void 0:n[t])??[]},getThemes(e,t){var l,u;const n=((l=dc[e])==null?void 0:l[t])??[],r=((u=Mh[e])==null?void 0:u[t])??[];if(r.length===0)return n.length>0?[{theme:cc,sheets:n}]:[];const i=r.map(c=>({theme:c,sheets:n.filter(p=>p.themeId===c.id)})),a=new Set(r.map(c=>c.id)),o=n.filter(c=>!c.themeId||!a.has(c.themeId));return o.length>0&&i.push({theme:cc,sheets:o}),i.filter(c=>c.sheets.length>0)},getPuzzleSet(e,t,n){var r,i;return((i=(r=ab[e])==null?void 0:r[t])==null?void 0:i[n])??null},getScenarioCards(e,t){var n;return((n=sb[e])==null?void 0:n[t])??[]},getWarmupCases(e,t){var n;return((n=ob[e])==null?void 0:n[t])??[]},getChallengeQuizCases(e,t){var n;return((n=lb[e])==null?void 0:n[t])??[]}}}function ub(){const e=yt();return Th(()=>e.getHeuristicsConfig())}function me({name:e,size:t=32,className:n,style:r}){return s.jsx("span",{"aria-hidden":"true",className:n,style:{display:"inline-flex",color:"inherit",...r},children:s.jsx("svg",{width:t,height:t,viewBox:"0 0 24 24",fill:"none",stroke:"currentColor",strokeWidth:1.5,strokeLinecap:"round",strokeLinejoin:"round",children:cb[e]})})}const cb={sprint:s.jsxs(s.Fragment,{child
