.",audience:"dev",confidence:75,hasExplicitDeadline:!0,isUnderTeamInfluence:!0},rationale:"Résultat mesurable, seuil chiffré, échéance précise, équipe en capacité d'agir, ambition crédible."},{id:"sprint.good.guest-checkout",verdict:"good",draft:{type:"sprint",text:"Permettre à un utilisateur invité de finaliser une commande sans créer de compte, mesuré sur 100 sessions, fin de sprint.",audience:"dev",confidence:80,hasExplicitDeadline:!0,isUnderTeamInfluence:!0},rationale:"Centré utilisateur, mesure définie (100 sessions), échéance, sous influence équipe."},{id:"sprint.good.api-latency",verdict:"good",draft:{type:"sprint",text:"Diviser par deux le temps moyen de réponse de l'API au 95e percentile avant la fin de l'itération.",audience:"dev",confidence:75,hasExplicitDeadline:!0,isUnderTeamInfluence:!0},rationale:"Métrique technique précise, seuil clair (diviser par deux), échéance, ambition crédible."},{id:"sprint.bad.output-develop",verdict:"bad",draft:{type:"sprint",text:"Développer la nouvelle page de paiement.",audience:"dev",confidence:90,hasExplicitDeadline:!1,isUnderTeamInfluence:!0},rationale:"Commence par 'développer' (output), aucune mesure, pas d'échéance.",expectedFailingCriteria:["outcome","falsifiable","timeBounded"],trapWords:["développer"]},{id:"sprint.bad.composite-fuzzy",verdict:"bad",draft:{type:"sprint",text:"Améliorer la performance et finir la migration auth.",audience:"dev",confidence:70,hasExplicitDeadline:!1,isUnderTeamInfluence:!0},rationale:"Composite (« et »), mot flou « améliorer », aucun seuil, pas d'échéance.",expectedFailingCriteria:["falsifiable","timeBounded","general.composite"],trapWords:["améliorer","performance","et","finir"]},{id:"sprint.bad.refactor",verdict:"bad",draft:{type:"sprint",text:"Refactorer le module commande.",audience:"dev",confidence:85,hasExplicitDeadline:!1,isUnderTeamInfluence:!0},rationale:"Output pur (« refactorer »), aucun résultat externe, pas d'échéance.",expectedFailingCriteria:["outcome","falsifiable","timeBounded"],trapWords:["refactorer"]},{id:"sprint.bad.ci-pipeline",verdict:"bad",draft:{type:"sprint",text:"Mettre en place le nouveau pipeline CI.",audience:"dev",confidence:85,hasExplicitDeadline:!1,isUnderTeamInfluence:!0},rationale:"Commence par 'mettre en place' (output), aucune mesure de succès, pas d'échéance.",expectedFailingCriteria:["outcome","falsifiable","timeBounded"],trapWords:["mettre"]},{id:"sprint.bad.retro.three-deliverables",verdict:"bad",draft:{type:"sprint",text:"Livrer la fonctionnalité de notification, terminer l'API export et corriger les bugs ouverts du module commande.",audience:"dev",confidence:80,hasExplicitDeadline:!1,isUnderTeamInfluence:!0},rationale:"Objectif rétrospectif : énumération de 3 livrables coordonnés par « et ». Tout est output, aucun changement constatable.",expectedFailingCriteria:["outcome","general.composite","timeBounded"],trapWords:["livrer","terminer","et","corriger"]},{id:"sprint.bad.retro.advance-stories",verdict:"bad",draft:{type:"sprint",text:"Avancer sur les 8 stories prioritaires du backlog.",audience:"dev",confidence:80,hasExplicitDeadline:!1,isUnderTeamInfluence:!0},rationale:"Objectif rétrospectif déguisé : 'avancer sur N stories' décrit le travail, pas le résultat. Aucun outcome.",expectedFailingCriteria:["outcome","timeBounded"],trapWords:["avancer"]},{id:"sprint.bad.retro.finish-everything",verdict:"bad",draft:{type:"sprint",text:"Finir tout ce qui était prévu pour ce sprint.",audience:"dev",confidence:80,hasExplicitDeadline:!1,isUnderTeamInfluence:!0},rationale:"Objectif fourre-tout : équivalent à « faire le sprint ». Aucun cap, aucune mesure.",expectedFailingCriteria:["outcome","falsifiable","timeBounded"],trapWords:["finir","tout"]},{id:"sprint.good.maintenance.incidents",verdict:"good",draft:{type:"sprint",text:"Réduire le nombre d'incidents de production sur le module commande de 14 à 5 par semaine d'ici fin de sprint.",audience:"dev",confidence:80,hasExplicitDeadline:!0,isUnderTeamInfluence:!0},rationale:"Sprint maintenance avec bénéficiaire (utilisateurs / ops), seuil chiffré, échéance — pas un output."},{id:"sprint.good.maintenance.support",verdict:"good",draft:{type:"sprint",text:"Permettre à l'équipe support de résoudre 70 % des tickets module commande sans escalade vers la dev d'ici fin du sprint.",audience:"dev",confidence:80,hasExplicitDeadline:!0,isUnderTeamInfluence:!0},rationale:"Bénéficiaire explicite (support), métrique vérifiable, échéance."},{id:"sprint.good.maintenance.hotfix",verdict:"good",draft:{type:"sprint",text:"Diviser par 2 le temps moyen de déploiement d'un hotfix (de 4 h à 2 h) avant la fin du sprint.",audience:"dev",confidence:80,hasExplicitDeadline:!0,isUnderTeamInfluence:!0},rationale:"Outcome interne mesurable, échéance, sous influence directe de l'équipe."},{id:"sprint.good.maintenance.oncall",verdict:"good",draft:{type:"sprint",text:"Atteindre 0 alerte critique non triée durant l'astreinte week-end qui suit ce sprint.",audience:"dev",confidence:80,hasExplicitDeadline:!0,isUnderTeamInfluence:!0},rationale:"Bénéficiaire = équipe oncall, seuil net (zéro), borne temporelle."},{id:"sprint.bad.maintenance.refactor",verdict:"bad",draft:{type:"sprint",text:"Refactorer le module commande.",audience:"dev",confidence:80,hasExplicitDeadline:!1,isUnderTeamInfluence:!0},rationale:"Output pur, aucun bénéficiaire nommé, aucune mesure, pas d'échéance.",expectedFailingCriteria:["outcome","timeBounded"],trapWords:["refactorer"]},{id:"sprint.bad.maintenance.tech-debt",verdict:"bad",draft:{type:"sprint",text:"Réduire la dette technique du back-end.",audience:"dev",confidence:80,hasExplicitDeadline:!1,isUnderTeamInfluence:!0},rationale:"« Dette technique » est flou : aucun bénéficiaire, aucune mesure objective, pas d'échéance.",expectedFailingCriteria:["falsifiable","timeBounded"],trapWords:["dette"]},{id:"sprint.bad.maintenance.stabilize",verdict:"bad",draft:{type:"sprint",text:"Stabiliser la plateforme.",audience:"dev",confidence:80,hasExplicitDeadline:!1,isUnderTeamInfluence:!0},rationale:"Verbe d'output (« stabiliser »), aucune mesure, pas d'échéance.",expectedFailingCriteria:["outcome","timeBounded"],trapWords:["stabiliser"]}],Uh=[{id:"sprint.sheet.single-goal",themeId:"sprint.fondamentaux",icon:"target",title:"Un seul Sprint Goal",heroPhrase:"Un seul objectif par sprint. Pas deux. Pas une liste.",intro:"",practiceCtaLabel:"Va corriger un objectif mal posé",sections:[{heading:"Pourquoi",icon:"target",body:"",bullets:["Focus : un seul objectif force l'arbitrage des stories.","Mémorisable : récitable sans lire l'écran.","Trie le backlog : « cette story contribue-t-elle à l'objectif ? »","Bilan clair en fin de sprint : atteint / pas atteint."]},{heading:"Signaux d'alerte",icon:"warn",body:"",bullets:["Le tableau affiche « Objectif 1 / Objectif 2 / Objectif 3 ».","L'objectif est rédigé après la sélection des stories.","Il contient un « et » coordonnant deux résultats.","Personne ne le récite à la rétro sans le relire."]},{heading:"Comment consolider",icon:"wrench",body:"Identifier l'enjeu transverse qui relie les N objectifs proposés, puis le reformuler en un seul outcome. Si aucun enjeu transverse n'existe vraiment, c'est que le sprint mélange deux travaux qui auraient dû être deux sprints.",examples:[{bad:"Objectif 1 : Migrer l'authentification vers OAuth. Objectif 2 : Réduire les bugs sur le panier de 8 à 2.",good:"Augmenter le taux de connexions sans incident (auth + panier) de 92 % à 99 % d'ici fin de sprint.",note:"Enjeu transverse : la confiance utilisateur dans le tunnel d'achat. Les deux travaux y contribuent."}]},{heading:"Qui le rédige, sur quelle base",icon:"learn",body:"Co-construit en Sprint Planning par l'équipe Scrum entière : le PO propose un cap dérivé du Product Goal, les Devs challengent au regard de leur capacité et de leur connaissance technique, le Scrum Master facilite la convergence. Pas un acte solo du PO. Le Sprint Goal défini, les stories du backlog deviennent des hypothèses de ce qui aidera à l'atteindre.",bullets:["Product Goal (le cap moyen terme du produit, l'amont)","État du Product Backlog (ce qui est prioritaire et prêt)","Vélocité historique de l'équipe (capacité réaliste sur l'itération)","Retour de la dernière rétrospective (ce qu'on change ou garde)","Retour de la dernière Sprint Review (ce qui a bougé côté utilisateur)"]},{heading:"Source",kind:"source",body:"Scrum Guide 2020 : « The Sprint Goal is the single objective for the Sprint » et « The Developers… define a Sprint Goal that communicates why the Sprint is valuable to stakeholders. » Convergent avec Kniberg, Cohn. SAFe : pluralité au niveau PI uniquement."}]},{id:"sprint.sheet.anatomy",themeId:"sprint.fondamentaux",icon:"target",title:"L'anatomie d'un Sprint Goal",heroPhrase:"Verbe d'outcome, indicateur, variation chiffrée, contexte, échéance. Cinq briques. Une phrase.",intro:"",practiceCtaLabel:"Va assembler ton premier Sprint Goal",sections:[{heading:"Les cinq briques",icon:"target",kind:"bricks",body:"Un Sprint Goal solide tient en une phrase et porte cinq briques. Chacune répond à une question. Si l'une manque, le goal est ambigu : quelqu'un finira par défendre un verdict qu'un autre contestera.",bricksSentence:"Réduire le taux d'abandon au paiement de 50 % sur mobile d'ici la fin du sprint 24.",bricks:[{num:1,label:"Verbe outcome",hint:"L'action qui amorce le résultat",examples:"Réduire, Faire passer, Atteindre, Permettre à",snippet:"Réduire",color:"purple"},{num:2,label:"Indicateur",hint:"La métrique nommée",examples:"taux d'abandon, p95 de l'API, NPS dev",snippet:"le taux d'abandon au paiement",color:"teal"},{num:3,label:"Variation chiffrée",hint:"L'avant et l'après",examples:"de X à Y, par N, à N %",snippet:"de 50 %",color:"pink"},{num:4,label:"Contexte",hint:"Sur quoi, pour qui",examples:"sur mobile, pour les invités, en production",snippet:"sur mobile",color:"amber"},{num:5,label:"Échéance",hint:"D'ici quand",examples:"fin du sprint, sprint 24, prochaine démo",snippet:"d'ici la fin du sprint 24",color:"blue"}]},{heading:"Le test des cinq briques",icon:"good",body:"Lire son goal à voix haute et compter. Si une brique manque, l'identifier explicitement avant de figer.",examples:[{bad:"Améliorer le tunnel de paiement.",good:"Faire passer le taux de conversion du tunnel mobile de 2,3 % à 3,5 % d'ici la fin du sprint 24.",note:"Verbe (Faire passer) · Indicateur (taux de conversion) · Variation (de 2,3 à 3,5 %) · Contexte (tunnel mobile) · Échéance (sprint 24). Cinq briques, une phrase."}]},{heading:"Le piège du contexte implicite",icon:"warn",body:"Le contexte est souvent omis (« on sait de quoi on parle »). C'est un risque : en revue de sprint, la mémoire collective diverge. Mieux vaut nommer le contexte même s'il semble évident."},{heading:"Source",kind:"source",body:"Cette grammaire à cinq briques recoupe la doctrine du puzzle (voir mode Puzzle dans la pratique). Elle s'inspire des SMART goals (Doran, 1981) débarrassés de leur ambiguïté Mesurable/Atteignable, et de Kniberg pour le rôle du contexte."}]},{id:"sprint.sheet.product-goal-link",themeId:"sprint.fondamentaux",icon:"learn",title:"Le Sprint Goal et le Product Goal",heroPhrase:"Le Product Goal donne le cap. Le Sprint Goal est l'étape qui sert ce cap, dans la fenêtre du sprint.",intro:"",practiceCtaLabel:"Va écrire un Sprint Goal aligné",sections:[{heading:"Pourquoi cette relation compte",icon:"target",body:"Le Scrum Guide 2020 introduit explicitement le **Product Goal** : un cap moyen terme du produit, formulé en outcome. Chaque Sprint Goal est une étape vers ce cap. Cette chaîne d'alignement rend chaque sprint signifiant. L'équipe sait pourquoi elle fait ce qu'elle fait.",bullets:["Le Product Goal vit à l'année / au trimestre, le Sprint Goal à l'itération.","Sans Product Goal, le Sprint Goal flotte (le PO décide chaque fois sans cap stable).","Sans Sprint Goal, le Product Goal devient une plaque décorative sans traduction opérationnelle."]},{heading:"Comment dériver l'un de l'autre",icon:"wrench",body:"Le Sprint Goal n'est pas un Product Goal en miniature. Il en est une étape concrète, formulée avec les cinq briques d'un Sprint Goal, dans la fenêtre du sprint.",examples:[{bad:"Product Goal : « Devenir l'outil de paiement le plus simple du marché ». Sprint Goal : « Devenir l'outil de paiement le plus simple du marché ».",good:"Product Goal : « Devenir l'outil de paiement le plus simple du marché ». Sprint Goal : « Faire passer le temps moyen pour finaliser un paiement de 45 s à 30 s d'ici la fin du sprint 24 ».",note:"Le Sprint Goal traduit le cap en mesure observable sur l'itération."}]},{heading:"Le test d'alignement",icon:"good",body:"À chaque Sprint Planning, poser la question : « notre Sprint Goal contribue-t-il directement à notre Product Goal en cours ? » Si l'équipe ne sait pas répondre clairement, soit le Product Goal n'est pas vraiment partagé, soit le Sprint Goal s'éparpille."},{heading:"Source",kind:"source",body:"Scrum Guide 2020 (révision Schwaber/Sutherland) : ajout du Product Goal aux Scrum artifacts. Voir aussi Roman Pichler sur la cascade vision → Product Goal → Sprint Goal."}]},{id:"sprint.sheet.goal-is-met",themeId:"sprint.fondamentaux",icon:"good",title:"Comment savoir que le Sprint Goal est atteint",heroPhrase:"La définition de succès se pose en Sprint Planning, pas à la Sprint Review. Tu écris le goal et son critère d'atteinte ensemble.",intro:"",practiceCtaLabel:"Va définir le critère d'atteinte",sections:[{heading:"Pourquoi définir le succès en amont",icon:"target",body:"Si le critère d'atteinte se discute à la Sprint Review, tout le monde devient juge et partie. Le facilitateur défend que c'est atteint, le PO ergote, les Devs s'épuisent à argumenter. À l'inverse, un critère écrit en amont est un contrat : la Review n'est plus qu'une lecture.",bullets:["Le critère est observable (chiffre, état, mesure).","Il est posé avant le sprint, pas pendant.","Il dit « atteint / pas atteint », pas « plutôt bien / plutôt mal »."]},{heading:"Trois niveaux d'atteinte (à connaître, sans les multiplier)",icon:"learn",body:"Tu peux formaliser trois verdicts en fin de sprint, mais le goal doit fonctionner même avec un binaire atteint/raté. Les nuances servent en rétro, pas à l'affichage du résultat.",bullets:["**Atteint** : le critère mesurable est rempli ou dépassé.","**Partiel** : on n'a pas atteint la cible mais on a appris quelque chose qui change le sprint suivant.","**Raté** : ni la cible ni l'apprentissage. À examiner sérieusement en rétro."]},{heading:"Le test de la phrase « Comment saurons-nous »",icon:"wrench",body:"À la fin du Sprint Planning, demander : « comment saurons-nous, en fin de sprint, si nous l'avons atteint ? » Si l'équipe ne sait pas répondre en moins de 30 secondes, le goal est mal posé. Reformuler avant de démarrer.",examples:[{bad:"Sprint Goal : « Rendre le module commande plus fiable. » Critère d'atteinte : non posé.",good:"Sprint Goal : « Réduire le nombre d'incidents production du module commande de 14 à 5 par semaine d'ici la fin du sprint. » Critère : nombre d'incidents mesuré la dernière semaine du sprint, comparé à la moyenne hebdomadaire précédente.",note:"Le critère d'atteinte est implicite dans le goal bien rédigé, mais le formuler explicitement protège contre les divergences d'interprétation."}]},{heading:"Source",kind:"source",body:"Mike Cohn, Succeeding with Agile, chapitre sur les Sprint Reviews. Convergent avec Henrik Kniberg, Lean from the Trenches, sur l'importance de poser le critère d'atteinte avant l'observation."}]},{id:"sprint.sheet.maintenance-value",themeId:"sprint.cas-particuliers",icon:"wrench",title:"Sprint de maintenance : trouver la valeur",heroPhrase:"Un sprint de maintenance a toujours un bénéficiaire. À toi de le nommer.",intro:"",practiceCtaLabel:"Reformuler un objectif de maintenance",sections:[{heading:"Trois questions à se poser",icon:"target",body:"",bullets:["Pour qui ce travail produit-il un changement ?","Quel changement constatable du point de vue du bénéficiaire ?","Quelle mesure rendra ce changement visible à la revue de sprint ?"]},{heading:"Quatre bénéficiaires fréquents",icon:"learn",body:"",bullets:["Utilisateur final : moins de bugs visibles, moins d'incidents en production.","Équipe support : moins d'escalades, temps de résolution plus court.","Équipe ops / oncall : déploiements plus rapides, astreintes plus calmes.","Équipe dev : vélocité retrouvée, moins de temps sur les bugs hérités."]}]},{id:"sprint.sheet.not-a-story-list",themeId:"sprint.pieges-classiques",icon:"warn",title:"Le Sprint Goal n'est pas la liste des stories",heroPhrase:"L'équipe s'engage sur un résultat. Les stories sont une hypothèse de ce qui aidera à l'atteindre.",intro:"",practiceCtaLabel:"Va corriger un objectif mal posé",sections:[{heading:"Pourquoi",icon:"target",body:"Le Scrum Guide est clair : la sélection de Product Backlog Items est une **hypothèse** de ce qui aidera à atteindre le Sprint Goal, pas l'engagement en soi. Si l'équipe s'engage sur les stories au lieu du goal, le sprint devient une course à la complétion, pas une recherche de valeur.",bullets:["L'engagement porte sur le résultat, pas sur la livraison.","Si la moitié des stories suffisent à atteindre le goal, on s'arrête.","Si les stories ne suffisent pas, on ajuste les stories, pas le goal."]},{heading:"Signaux d'alerte",icon:"warn",body:"",bullets:["« On a fini toutes les stories » devient la fierté de fin de sprint, indépendamment du résultat constaté.","Le Sprint Goal est rédigé après la sélection des stories pour les résumer.","À la rétro, l'équipe parle de stories livrées, pas de bénéficiaires touchés."]},{heading:"Comment recadrer",icon:"wrench",body:"Reformuler le goal en outcome avant de finaliser la sélection. Demander : « quelles stories nous permettent vraiment d'atteindre ce goal ? » et laisser tomber le reste.",examples:[{bad:"Livrer les 12 stories de l'epic onboarding.",good:"Permettre à 80 % des nouveaux utilisateurs de compléter l'inscription en moins de 90 secondes, fin de sprint.",note:"Les stories deviennent un moyen mesuré contre l'outcome, pas une fin en soi."}]},{heading:"Source",kind:"source",body:"Scrum Guide 2020 : « The selected Product Backlog items are a hypothesis of what is needed to achieve the Sprint Goal. » Voir aussi Scrum.org, Sprint Backlog Antipatterns."}]},{id:"sprint.sheet.vanity-goal",themeId:"sprint.pieges-classiques",icon:"warn",title:"Le vanity goal",heroPhrase:"Un goal qui sonne bien mais n'engage personne. Il rassure les parties prenantes sans rien promettre.",intro:"",practiceCtaLabel:"Va corriger un vanity goal",sections:[{heading:"Pourquoi c'est piégeux",icon:"target",body:"Le vanity goal coche la case « on a un Sprint Goal » sans accepter le coût d'un engagement vérifiable. Personne ne saura à la fin du sprint si l'objectif est atteint ou pas, donc tout le monde déclare la victoire.",bullets:["Aucune mesure ne tranche en fin de sprint.","Le goal est compatible avec n'importe quel résultat.","Il rassure les parties prenantes mais ne change pas le comportement de l'équipe."]},{heading:"Signaux d'alerte",icon:"warn",body:"",bullets:["Présence de mots flous (« renforcer », « valoriser », « consolider », « explorer »).","Aucun chiffre, aucune métrique, aucun bénéficiaire nommé.","Le test « est-ce qu'on peut être en désaccord sur l'atteinte ? » donne oui."]},{heading:"Comment reformuler",icon:"wrench",body:"Repérer le mot flou, demander « tu veux dire quoi, concrètement, mesurable comment ? » et écrire la réponse comme nouveau goal.",examples:[{bad:"Renforcer l'expérience utilisateur sur le module commande.",good:"Faire passer le taux de complétion du tunnel de paiement de 68 % à 80 % d'ici fin de sprint.",note:"Le renforcement disparaît au profit de ce qu'il était censé produire."}]},{heading:"Source",kind:"source",body:"Scrum.org, Sprint Anti-Patterns. Convergent avec le test pédagogique de Mike Cohn : « can two people defending opposite verdicts both be right ? » Si oui, le goal est creux."}]},{id:"sprint.sheet.pet-project-goal",themeId:"sprint.pieges-classiques",icon:"warn",title:"Le goal de confort",heroPhrase:"Un goal qui sert un seul interlocuteur ou une obsession interne. Aucun bénéficiaire externe ne ressent l'effet.",intro:"",practiceCtaLabel:"Va recentrer un goal mal aligné",sections:[{heading:"Pourquoi",icon:"target",body:"Le goal de confort est techniquement bien rédigé mais sert un public minoritaire ou interne : demande d'un manager isolé, refactor que seule l'équipe verra, fonctionnalité réclamée par un seul client. La vélocité est dépensée sans contrepartie utilisateur.",bullets:["Aucun bénéficiaire externe n'est nommé, ou un seul.","L'effet attendu reste dans l'équipe (vélocité, propreté du code).","Le retour sur effort est défendable mais sur un public marginal."]},{heading:"Signaux d'alerte",icon:"warn",body:"",bullets:["Le bénéficiaire nommé est un membre de l'équipe ou un manager.","L'effet attendu n'est observable qu'en interne.","Le sprint d'avant avait déjà un goal sur le même sous-sujet."]},{heading:"Le test « qui en profite hors de l'équipe ? »",icon:"wrench",body:"Avant de figer le goal, nommer 3 bénéficiaires hors équipe et l'effet observable sur chacun. Si la liste est vide, le goal est un goal de confort.",examples:[{bad:"Refactorer le module de gestion des permissions pour qu'il soit plus clair.",good:"Permettre aux administrateurs clients de modifier les rôles utilisateurs en moins de 30 secondes (vs 4 min aujourd'hui), fin de sprint.",note:"Le bénéficiaire passe de l'équipe à un utilisateur externe avec une mesure observable."}]},{heading:"Source",kind:"source",body:"Christina Wodtke (Radical Focus) et Mike Cohn convergent : l'objectif d'un sprint doit servir un changement constatable par un public extérieur à l'équipe pour mériter la vélocité dépensée."}]},{id:"sprint.sheet.renew-the-goal",themeId:"sprint.pieges-classiques",icon:"warn",title:"Renouveler le goal, pas le copier-coller",heroPhrase:"Le même goal sprint après sprint signale soit qu'on n'apprend rien, soit qu'on ne mesure jamais.",intro:"",practiceCtaLabel:"Va écrire un nouveau goal",sections:[{heading:"Pourquoi le renouveler",icon:"target",body:"Si le goal du sprint N est identique à celui du sprint N-1 (et N-2), trois lectures possibles : (1) le goal n'est pas atteint, donc il faut le revoir ou changer d'approche ; (2) il est atteint mais on ne le mesure pas ; (3) c'est un faux goal qui ne sert que d'étiquette. Aucune n'est saine.",bullets:["Un goal porte une intention bornée : quand l'intention est servie, le goal passe à autre chose.","Répéter sans mesurer transforme le goal en formule magique.","L'apprentissage d'un sprint doit modifier le suivant : nouveau goal ou approche modifiée."]},{heading:"Signaux d'alerte",icon:"warn",body:"",bullets:["Trois sprints consécutifs avec le même goal (ou variantes mineures).","Personne ne sait dire si le goal précédent a été atteint.","La rétro ne parle pas du goal, seulement des stories."]},{heading:"Comment renouveler",icon:"wrench",body:"À la fin de chaque sprint, statuer sur le goal : atteint, partiel, raté. Si atteint, passer à l'enjeu suivant. Si partiel ou raté, soit relever le seuil de la prochaine étape, soit changer d'approche (le goal ne se reproduit pas à l'identique).",examples:[{bad:"Améliorer la conversion du tunnel de paiement (sprint après sprint).",good:"Sprint 24 : faire passer la conversion de 12 % à 18 %. Sprint 25 (si atteint) : faire passer le taux d'abandon mobile de 35 % à 22 %. Sprint 25 (si raté) : reformuler l'hypothèse, peut-être que le problème n'est pas la conversion mais le ré-engagement.",note:"Le sprint suivant porte un goal **différent**, soit qu'on monte d'un cran, soit qu'on change d'angle."}]},{heading:"Source",kind:"source",body:"Henrik Kniberg sur l'apprentissage d'un sprint à l'autre. Et Scrum.org : « The Sprint Goal is a single objective for the Sprint, not a recurring theme. »"}]},{id:"sprint.sheet.discovery-spike",themeId:"sprint.cas-particuliers",icon:"learn",title:"Sprint d'exploration (ou spike)",heroPhrase:"Tu n'as pas une livraison à faire, tu as une question à trancher. Le Sprint Goal vise une preuve, pas un livrable.",intro:"",practiceCtaLabel:"Va écrire un Sprint Goal d'exploration",sections:[{heading:"La logique de l'exploration",icon:"target",body:"Un sprint d'exploration sert à trancher une incertitude (technique, produit, marché) avant de s'engager sur du développement. Le Sprint Goal n'est donc pas « livrer X » mais « répondre à la question Y avec une preuve observable ». Le piège : confondre le sprint d'exploration avec un sprint sans goal.",bullets:["L'incertitude à lever est nommée explicitement (la question).","Le critère de réponse est observable : un prototype, un test utilisateur, une mesure de performance, une preuve de concept chiffrée.","L'équipe accepte un verdict : « la réponse est non, on n'y va pas » est un succès de l'exploration."]},{heading:"Reformuler en outcome",icon:"wrench",body:"Le Sprint Goal d'exploration prend la forme « répondre à [question] avec [preuve] d'ici fin de sprint ». La preuve est ce qui rend le goal mesurable.",examples:[{bad:"Explorer la faisabilité du paiement en crypto.",good:"Répondre à : « peut-on intégrer le paiement crypto en moins de 6 semaines sans dépendre d'un prestataire tiers ? » avec une preuve de concept fonctionnelle couvrant 3 cryptos majeures et une estimation chiffrée du coût d'intégration, d'ici fin de sprint.",note:"La question est posée, la preuve est définie. À la Review, on peut dire oui ou non sans débat."}]},{heading:"Le piège de l'exploration sans verdict",icon:"warn",body:"Un sprint d'exploration qui ne tranche pas est un sprint perdu. La pire formulation : « explorer », « étudier », « regarder ». Ces verbes ne s'engagent à rien. Le verdict doit être annoncé en début de sprint comme une question fermée (oui ou non, et ce qui change)."},{heading:"Source",kind:"source",body:"Marty Cagan (Inspired) sur la discovery produit. Mike Cohn pour les spikes techniques en Scrum. Convergent : un spike a une question, un budget temps et un verdict."}]},{id:"sprint.sheet.event-prep",themeId:"sprint.cas-particuliers",icon:"challenge",title:"Sprint préparatoire à un événement",heroPhrase:"Une release, une démo, une conférence. Le goal ne dit pas « tout préparer » mais ce qui changera chez le public visé.",intro:"",practiceCtaLabel:"Va écrire le goal d'un sprint d'événement",sections:[{heading:"Pourquoi c'est piégeux",icon:"warn",body:"Un sprint préparatoire (release, conférence, démo client important) attire les goals creux du type « préparer la conférence ». Tout le monde est mobilisé, personne ne sait précisément ce qu'on cherche à produire chez les participants. Résultat : on s'agite, on accumule des tâches, et la satisfaction post-événement reste subjective.",bullets:["Le bénéficiaire est le **public** de l'événement, pas l'équipe.","L'effet attendu est nommé : ce que le public doit ressentir / faire / décider.","La mesure existe : retours après l'événement, conversions, demandes de suite."]},{heading:"Reformuler en outcome côté public",icon:"wrench",body:"Le Sprint Goal vise le changement chez le public, pas la complétion du contenu.",examples:[{bad:"Préparer la conférence client annuelle prévue fin de sprint.",good:"Obtenir au moins 10 demandes de RDV commercial qualifiées de la part des participants de la conférence client annuelle, d'ici 48 h après l'événement.",note:"Le contenu de la conférence devient un moyen pour atteindre ce résultat, pas une fin en soi. L'équipe arbitre ce qu'elle prépare en fonction de ça."}]},{heading:"Le piège de la deadline floue",icon:"warn",body:"L'événement crée une échéance forte (la date), ce qui peut faire croire que l'échéance suffit comme borne. Mais une échéance n'est pas un goal : le goal dit ce qu'on cherche à obtenir avant ou après cette échéance. Sans cet ajout, la date devient le seul critère et tout le travail s'aligne dessus, même s'il rate l'effet."},{heading:"Source",kind:"source",body:"Convergent avec la doctrine outcome-over-output (Marty Cagan, Christina Wodtke). Adapté au contexte sprint par Henrik Kniberg dans ses retours sur les release sprints."}]},{id:"sprint.sheet.external-blockers",themeId:"sprint.cas-particuliers",icon:"wrench",title:"Sprint avec dépendances bloquantes externes",heroPhrase:"Tu ne contrôles pas tout. Le goal dit ce que tu peux honnêtement engager, avec un plan B explicite.",intro:"",practiceCtaLabel:"Va écrire un goal honnête face aux blocages",sections:[{heading:"La situation",icon:"target",body:"L'équipe attend une API externe, une validation légale, un accès production, une décision d'un autre département. Sans cette entrée, une partie du goal est inatteignable. Deux mauvais réflexes : (1) prétendre que le blocage va se lever et s'engager comme si de rien n'était ; (2) renoncer au goal et faire un sprint « au mieux » sans cap.",bullets:["Le blocage est nommé en début de sprint, pas découvert à mi-parcours.","Le goal porte sur ce que l'équipe peut vraiment engager (donc parfois sur une étape antérieure au blocage).","Un plan B explicite est posé pour les ressources non bloquées."]},{heading:"Trois formulations honnêtes",icon:"wrench",body:"Selon la nature du blocage, le Sprint Goal s'adapte.",bullets:["**Si le blocage est probable à se lever** : « Faire passer X de A à B **conditionnellement à la réception de Y avant le jour J du sprint**. À défaut, livrer la version isolée prête à intégrer dès réception. »","**Si le blocage est durable** : « Réduire de 30 % le temps de traitement des cas sans dépendance Y, en isolant l'intégration Y pour livraison dès qu'elle est disponible. »","**Si le blocage est inconnu** : « Lever en première semaine la dépendance Y (sous responsabilité du Product Owner) puis exécuter sur le reste du sprint ». Le goal devient en partie l'engagement à débloquer."]},{heading:"Le piège du « on fera au mieux »",icon:"warn",body:"« On fera de notre mieux » n'est pas un Sprint Goal. C'est une posture, pas un cap. Si tu ne peux pas chiffrer ce que tu engages, demande-toi si ce sprint a vraiment un sens, ou s'il faut le repousser et utiliser la fenêtre pour autre chose (exploration, technique, refonte)."},{heading:"Source",kind:"source",body:"Henrik Kniberg sur la gestion des dépendances en Scrum at Scale. SAFe propose le ROAM (Risks Owned, Accepted, Mitigated) au PI Planning ; appliqué à l'échelle sprint, la même logique s'applique."}]}];function O(e,t,n,r){return{kind:"text",id:e,category:t,quality:n,text:r}}function Zi(e,t,n,r){return{kind:"numericField",id:e,category:"variation",quality:t,template:n,fieldCount:r}}const Bh=[O("a-good-reduce","action","good","Réduire"),O("a-good-divide","action","good","Diviser"),O("a-good-pass","action","good","Faire passer"),O("a-good-enable","action","good","Permettre à")],$h=[O("a-neu-increase","action","neutral","Augmenter"),O("a-neu-reach","action","neutral","Atteindre"),O("a-neu-bring","action","neutral","Ramener"),O("a-neu-keep","action","neutral","Maintenir")],Vh=[O("a-dis-deliver","action","distractor","Livrer"),O("a-dis-refactor","action","distractor","Refactorer"),O("a-dis-setup","action","distractor","Mettre en place"),O("a-dis-improve","action","distractor","Améliorer")],Wh=[O("i-good-cart","indicator","good","le taux d'abandon au paiement"),O("i-good-latency","indicator","good","le temps moyen de réponse de l'API"),O("i-good-incidents","indicator","good","le nombre d'incidents de production"),O("i-good-hotfix","indicator","good","le délai de déploiement d'un hotfix")],Hh=[O("i-neu-ticket","indicator","neutral","le temps de résolution d'un ticket support"),O("i-neu-nps","indicator","neutral","le score NPS"),O("i-neu-5xx","indicator","neutral","le taux d'erreur 5xx"),O("i-neu-coverage","indicator","neutral","la couverture des tests automatisés")],Gh=[O("i-dis-page","indicator","distractor","la nouvelle page de paiement"),O("i-dis-perf","indicator","distractor","la performance"),O("i-dis-debt","indicator","distractor","la dette technique"),O("i-dis-all","indicator","distractor","tout ce qui était prévu pour ce sprint")],Qh=[Zi("v-good-range","good","de [X] à [Y]",2),Zi("v-good-factor","good","par [X]",1),Zi("v-good-target","good","à [X]",1)],Xh=[Zi("v-neu-percent","neutral","de [X] %",1)],Yh=[O("v-dis-signif","variation","distractor","significativement"),O("v-dis-drastic","variation","distractor","drastiquement"),O("v-dis-notable","variation","distractor","de manière notable"),O("v-dis-up","variation","distractor","vers le haut")],Zh=[O("c-good-mobile","context","good","sur mobile"),O("c-good-guest","context","good","pour les utilisateurs invités"),O("c-good-support","context","good","pour l'équipe support"),O("c-good-prod","context","good","en production")],Jh=[O("c-neu-oncall","context","neutral","pour l'équipe oncall"),O("c-neu-order","context","neutral","sur le module commande"),O("c-neu-new","context","neutral","pour les nouveaux comptes"),O("c-neu-none","context","neutral","")],eg=[O("c-dis-all","context","distractor","pour tout le monde"),O("c-dis-internal","context","distractor","en interne"),O("c-dis-global","context","distractor","globalement"),O("c-dis-everywhere","context","distractor","partout")],tg=[O("p-good-by","preposition","good","d'ici"),O("p-good-before","preposition","good","avant")],ng=[O("p-neu-for","preposition","neutral","pour"),O("p-neu-at","preposition","neutral","à")],rg=[O("p-dis-fast","preposition","distractor","rapidement"),O("p-dis-asap","preposition","distractor","dès que possible")],ig=[O("t-good-sprint","timeReference","good","la fin du sprint"),O("t-good-pi","timeReference","good","la prochaine PI Review"),O("t-good-s24","timeReference","good","le sprint 24"),O("t-good-month","timeReference","good","la fin du mois")],ag=[O("t-neu-retro","timeReference","neutral","la prochaine rétrospective"),O("t-neu-demo","timeReference","neutral","la démo"),O("t-neu-next","timeReference","neutral","le mois suivant"),O("t-neu-plan","timeReference","neutral","la prochaine PI Planning")],sg=[O("t-dis-soon","timeReference","distractor","bientôt"),O("t-dis-someday","timeReference","distractor","un jour"),O("t-dis-later","timeReference","distractor","plus tard"),O("t-dis-none","timeReference","distractor","(sans repère)")];function Ps(e,t,n){return{level:e,blocksByCategory:{action:[...Bh.slice(0,2),...$h.slice(0,2),...Vh.slice(0,t)],indicator:[...Wh.slice(0,2),...Hh.slice(0,2),...Gh.slice(0,t)],variation:[...Qh.slice(0,2),...Xh.slice(0,1),...Yh.slice(0,n)],context:[...Zh.slice(0,2),...Jh.slice(0,2),...eg.slice(0,t)],preposition:[...tg.slice(0,2),...ng.slice(0,1),...rg.slice(0,n)],timeReference:[...ig.slice(0,2),...ag.slice(0,2),...sg.slice(0,t)]}}}const og={easy:Ps("easy",0,0),medium:Ps("medium",2,1),hard:Ps("hard",4,2)},lg=[{id:"pi.good.sso-committed",verdict:"good",draft:{type:"pi",text:"Permettre à 80 % de nos clients entreprise d'activer le SSO en self-service, mesuré sur le dernier mois du PI.",audience:"dev",confidence:85,hasExplicitDeadline:!0,isUnderTeamInfluence:!0,piClass:"committed",businessValue:8},rationale:"Committed bien calibré : valeur métier explicite, seuil chiffré, échéance PI, confiance >80 % cohérente avec un engagement."},{id:"pi.good.marketplace-stretch",verdict:"good",draft:{type:"pi",text:"Faire entrer 3 clients pilotes sur la nouvelle offre marketplace avant la PI Review.",audience:"dev",confidence:50,hasExplicitDeadline:!0,isUnderTeamInfluence:!0,piClass:"stretch",businessValue:7},rationale:"Stretch bien calibré : ambition élevée (3 pilotes en un PI), confiance 50 % cohérente avec la classe stretch."},{id:"pi.bad.deliver-billing",verdict:"bad",draft:{type:"pi",text:"Livrer le module facturation v2.",audience:"dev",confidence:90,hasExplicitDeadline:!1,isUnderTeamInfluence:!0,piClass:"committed",businessValue:6},rationale:"Output pur (« livrer ») : aucune valeur métier mesurée, pas de bénéficiaire, pas de seuil.",expectedFailingCriteria:["outcome","falsifiable","timeBounded"],trapWords:["livrer"]},{id:"pi.bad.stability-debt",verdict:"bad",draft:{type:"pi",text:"Améliorer la stabilité de la plateforme et réduire la dette technique.",audience:"dev",confidence:80,hasExplicitDeadline:!1,isUnderTeamInfluence:!0,piClass:"committed",businessValue:5},rationale:"Composite (« et »), deux mots flous (« améliorer », « dette »), aucun seuil, pas d'échéance.",expectedFailingCriteria:["outcome","falsifiable","timeBounded","general.composite"],trapWords:["améliorer","stabilité","et","dette"]},{id:"pi.bad.committed-low-confidence",verdict:"bad",draft:{type:"pi",text:"Permettre à 80 % de nos clients entreprise d'activer le SSO en self-service, mesuré sur le dernier mois du PI.",audience:"dev",confidence:40,hasExplicitDeadline:!0,isUnderTeamInfluence:!0,piClass:"committed",businessValue:8},rationale:"Mauvais calibrage : un committed estimé à 40 % de confiance est en réalité un stretch mal nommé. Soit reclasser, soit revoir l'ambition.",expectedFailingCriteria:["crediblyAmbitious"]}],ug=[{id:"pi.sheet.committed-stretch",themeId:"pi.engagement",icon:"target",title:"Committed vs Stretch",heroPhrase:"Committed : 80 à 100 % de confiance. Stretch : 30 à 60 %. Pas l'inverse.",intro:"",practiceCtaLabel:"Rédiger un objectif de PI",sections:[{heading:"Committed",icon:"good",body:"Un objectif que l'équipe s'engage à atteindre. Confiance attendue : 80 à 100 %. En dessous, ce n'est plus un engagement, c'est un pari."},{heading:"Stretch",icon:"okr",body:"Un objectif qu'on vise sans le garantir. Confiance attendue : 30 à 60 %. Ambitieux par construction : ne pas l'atteindre n'est pas un échec."},{heading:"Le piège classique",icon:"warn",body:"Un committed estimé à 40 % de confiance est un stretch mal nommé. Soit on requalifie, soit on revoit l'ambition.",examples:[{bad:"Committed : « Faire passer 100 % de nos clients entreprise sur la marketplace » (confiance 30 %).",good:"Stretch : « Faire entrer 3 clients pilotes sur la marketplace » (confiance 50 %).",note:"L'engagement crédible dépend du calibrage, pas du wording."}]},{heading:"Qui le rédige, sur quelle base",icon:"learn",body:"Co-construit en PI Planning (event de 2 jours) par chaque équipe du train avec son Product Owner. Le Release Train Engineer facilite. Les features descendent de Product Management ; les PI Objectives sont rédigés côté équipes, et traduisent les features en outcomes attendus à la PI Review. Une équipe peut transformer 3 features en 2 PI Objectives, ou un PI Objective peut être servi par 4 features.",bullets:["Vision produit (~10 min en ouverture du PI Planning)","Features du PI (descendues de Product Management, déjà priorisées)","Dépendances cross-équipes matérialisées sur le Program Board","Objectifs stratégiques énoncés par les Business Owners en ouverture","Capacité historique du train et de chaque équipe"],examples:[{bad:"Recopier une feature comme PI Objective : « Livrer la feature SSO Enterprise ».",good:"« Permettre à 80 % des clients entreprise d'activer le SSO en self-service avant la fin du PI. »",note:"Le PI Objective traduit la feature en outcome attendu côté Business Owner."}]},{heading:"Source",kind:"source",body:"Scaled Agile Framework, sections PI Planning et Team PI Objectives. Voir aussi : Business Value attribuée par les Business Owners dans un dialogue avec l'équipe, pas unilatéralement."}]},{id:"pi.sheet.business-value",themeId:"pi.valeur-business",icon:"wrench",title:"Valeur business",heroPhrase:"La valeur business est stockée, pas jugée. Le moteur n'a pas d'avis sur ta stratégie.",intro:"",practiceCtaLabel:"Rédiger un objectif avec valeur business",sections:[{heading:"Pourquoi c'est demandé",icon:"target",body:"Sans valeur business, pas de suivi committed/réalisé en rétrospective. C'est un préalable au bilan de PI."},{heading:"Quel chiffre",icon:"wrench",body:"À discuter avec le Business Owner. 1 = peu de valeur, 10 = valeur maximale. Un PI où tout est à 10 perd le sens du tri."}]},{id:"pi.sheet.anatomy",themeId:"pi.fondamentaux",icon:"target",title:"L'anatomie d'un PI Objective",heroPhrase:"Cinq briques pour la grammaire. Deux métadonnées pour la classe et la valeur. Une phrase, un engagement.",intro:"",practiceCtaLabel:"Va assembler ton premier PI Objective",sections:[{heading:"Les cinq briques de grammaire",icon:"target",kind:"bricks",body:"Un PI Objective bien rédigé porte les mêmes cinq briques qu'un Sprint Goal, mais à l'échelle du train et à l'horizon PI Review. La grammaire est universelle ; seul le vocabulaire change (business plutôt que technique, train plutôt qu'équipe seule).",bricksSentence:"Permettre à 80 % des clients entreprise d'activer le SSO en self-service avant la fin du PI.",bricks:[{num:1,label:"Verbe outcome",hint:"L'action qui amorce le résultat",examples:"Permettre à, Faire passer, Réduire, Atteindre",snippet:"Permettre à",color:"purple"},{num:2,label:"Indicateur business",hint:"La métrique observable à la PI Review",examples:"% clients activés, NPS, GMV, churn",snippet:"80 %",color:"pink"},{num:3,label:"Segment / bénéficiaire",hint:"Pour qui ça compte",examples:"clients entreprise, segment premium, équipes consommatrices",snippet:"des clients entreprise",color:"teal"},{num:4,label:"Action observable",hint:"Ce que le bénéficiaire fera",examples:"activer en self-service, prendre une décision, déployer",snippet:"d'activer le SSO en self-service",color:"amber"},{num:5,label:"Échéance PI",hint:"Quand on mesure",examples:"fin du PI, PI Review, dernier mois du PI",snippet:"avant la fin du PI",color:"blue"}]},{heading:"Les deux métadonnées PI",icon:"wrench",body:"Le PI Objective ne se réduit pas à sa phrase. Il porte aussi deux métadonnées non visibles dans la phrase mais essentielles à l'engagement du train.",bullets:["**Classe** : committed (engagement, confiance 80 à 100 %) ou stretch (ambition, confiance 30 à 60 %). Voir la fiche dédiée.","**Valeur business** : 1 à 10, attribuée par le Business Owner en dialogue avec l'équipe. Permet le suivi committed vs réalisé en rétrospective de PI."]},{heading:"Source",kind:"source",body:"Scaled Agile Framework, sections PI Planning et Team PI Objectives. La grammaire à cinq briques recoupe celle du Sprint Goal (cf. fiche correspondante)."}]},{id:"pi.sheet.planning-to-objective",themeId:"pi.fondamentaux",icon:"learn",title:"Du PI Planning au PI Objective",heroPhrase:"La vision descend, les features descendent, les PI Objectives remontent. Trois mouvements en deux jours.",intro:"",practiceCtaLabel:"Va co-construire un PI Objective",sections:[{heading:"L'événement PI Planning",icon:"target",body:"Un PI Planning est un événement de deux jours qui réunit toutes les équipes d'un train (5 à 12 équipes en général). C'est la pièce centrale de SAFe : un train n'a pas de PI Objectives valables sans cet événement, parce que la co-construction et l'alignement transverse n'arrivent pas par mail.",bullets:["Jour 1 matin : vision produit, contexte stratégique, présentation des features priorisées.","Jour 1 après-midi : chaque équipe planifie son PI et propose ses PI Objectives.","Jour 2 matin : draft plans review, ajustements croisés entre équipes.","Jour 2 après-midi : finalisation des PI Objectives, attribution Business Value, confidence vote."]},{heading:"Trois mouvements d'élaboration",icon:"wrench",body:"Le PI Objective n'apparaît pas de nulle part. Il naît du croisement de trois mouvements clairs, chacun porté par un acteur différent.",bullets:["**Descente du contexte** : Product Management donne la vision, les Business Owners donnent les enjeux stratégiques. Sans cette descente, l'équipe planifie dans le vide.","**Descente des features** : Product Management priorise et descend les features candidates au PI. L'équipe ne choisit pas tout, mais elle choisit comment les traduire.","**Remontée des PI Objectives** : chaque équipe traduit les features en outcomes attendus, en intégrant ses contraintes de capacité et ses dépendances. La traduction remonte au train."],examples:[{bad:"Product Management arrive avec les features ET les PI Objectives déjà rédigés. Les équipes ne font qu'estimer.",good:"Product Management apporte la vision + les features. Les équipes proposent les PI Objectives qui traduisent les features dans leur réalité. Le train ajuste collectivement.",note:"La co-construction n'est pas un détail formel : c'est ce qui rend le PI Objective porteur d'engagement réel."}]},{heading:"Le rôle des acteurs clés",icon:"good",body:"",bullets:["**Product Management** : descend les features priorisées, défend les arbitrages, écoute les retours du train.","**Business Owners** : posent le contexte stratégique, attribuent la Business Value 1 à 10 en dialogue avec les équipes.","**Release Train Engineer** : facilite l'événement, protège la qualité du processus (ROAM, confidence vote, time-box).","**Product Owners (équipe)** : portent la voix produit dans la rédaction des PI Objectives.","**Équipes (Devs + PO)** : rédigent les PI Objectives, estiment la capacité, soulèvent les dépendances."]},{heading:"Source",kind:"source",body:"Scaled Agile Framework, section PI Planning (le seul événement non négociable de SAFe). Voir aussi Dean Leffingwell sur l'importance de la co-localisation (physique ou bien orchestrée à distance) pour la qualité de la co-construction."}]},{id:"pi.sheet.objective-met",themeId:"pi.fondamentaux",icon:"good",title:"Comment savoir qu'un PI Objective est atteint",heroPhrase:"La PI Review n'est pas un débat. C'est une mesure contre ce qui a été dit en PI Planning.",intro:"",practiceCtaLabel:"Va définir un critère mesurable",sections:[{heading:"Pourquoi définir le critère en amont",icon:"target",body:"Si le critère d'atteinte se discute à la PI Review, on retombe dans le piège classique : chacun défend sa lecture, le Business Owner négocie sa note de Business Value, et la conversation devient politique. À l'inverse, un critère écrit en PI Planning est un contrat tacite. La PI Review devient une lecture, pas un débat.",bullets:["Le critère est observable : un chiffre, un pourcentage, une étape franchie.","Il est posé au moment de l'écriture du PI Objective, pas découvert après coup.","Il dit « atteint / partiel / raté », pas « plutôt bien / plutôt mal »."]},{heading:"Le score réalisé à la PI Review",icon:"wrench",body:"À la PI Review, le Business Owner réévalue la Business Value 1 à 10 selon ce qui a été réellement livré. Le rapport entre la BV planifiée et la BV réalisée donne le score de prévisibilité du train (objectif SAFe : 80 à 100 % sur la durée).",bullets:["**Committed atteint** : BV réalisée = BV planifiée.","**Committed partiel** : BV réalisée < BV planifiée (généralement 50 à 80 %).","**Stretch atteint** : BV réalisée = BV planifiée (bonus pour le train).","**Stretch raté** : BV réalisée = 0 (sans pénalité, c'était un stretch)."]},{heading:"Le test « comment le saura-t-on »",icon:"good",body:"À la fin du PI Planning, pour chaque PI Objective, demander : « comment saurons-nous, à la PI Review, si l'objectif est atteint ? » Si l'équipe ne sait pas répondre en 30 secondes, le PI Objective est mal posé. Reformuler avant de figer.",examples:[{bad:"PI Objective : « Renforcer la fiabilité du paiement. » Critère d'atteinte : non posé. À la PI Review, débat sur ce qu'on entend par « renforcer ».",good:"PI Objective : « Faire passer le taux de réussite des paiements de 96,2 % à 99,5 % d'ici la PI Review. » Critère : taux de réussite mesuré sur les 4 dernières semaines du PI, comparé à la baseline. Lecture immédiate.",note:"Le critère est implicite dans le PI Objective bien rédigé, mais le formuler explicitement évite les divergences d'interprétation à la Review."}]},{heading:"Source",kind:"source",body:"Scaled Agile Framework, section PI System Demo et PI Predictability Measure. Convergent avec Mike Cohn sur l'importance du critère d'acceptation posé en amont, transposé à l'échelle PI."}]},{id:"pi.sheet.objective-impose",themeId:"pi.engagement",icon:"warn",title:"Le PI Objective imposé",heroPhrase:"Un objectif descendu sans dialogue. L'équipe hoche la tête. La PI Review révèle le malentendu.",intro:"",practiceCtaLabel:"Va porter une objection constructive",sections:[{heading:"Pourquoi c'est piégeux",icon:"target",body:"Quand le management ou les Business Owners arrivent en PI Planning avec un objectif déjà rédigé et le présentent comme non négociable, l'équipe a deux choix : hocher la tête (et perdre l'engagement réel) ou s'opposer (et passer pour difficile). Les deux mènent au même résultat : un objectif inerte qu'on porte sans y croire.",bullets:["Un objectif imposé n'engage personne en pratique.","Le confidence vote est faussé : l'équipe vote ce qu'on attend d'elle.","À la PI Review, l'écart entre la promesse et la réalité érode la confiance des deux côtés."]},{heading:"Comment ça se voit",icon:"warn",body:"",bullets:["L'objectif est annoncé, pas débattu : « voici ce qu'on attend de vous ce PI ».","Les questions de capacité sont éludées (« on verra à mi-PI »).","Le ROAM ne contient que des risques mineurs.","Confidence vote convergent à 5/5 sans hésitation, signe d'un assentiment factice."]},{heading:"Comment recadrer",icon:"wrench",body:"Le Release Train Engineer protège l'espace de négociation. Les Business Owners apportent le contexte stratégique ; les équipes apportent la traduction réaliste en PI Objective. Le ROAM est utilisé honnêtement, le confidence vote est anonyme si nécessaire.",examples:[{bad:"Business Owner : « Le PI Objective de votre équipe est : atteindre 100 contrats Enterprise. C'est ce que le board attend. »",good:"Business Owner : « Le board pousse pour scaler l'offre Enterprise ce PI. Comment vous voyez votre contribution réaliste ? » Équipe : « On peut viser 60 contrats committed, et un stretch à 100 si la nouvelle vague de leads se confirme. »",note:"Le contexte stratégique reste descendu. La traduction en PI Objective remonte de l'équipe."}]},{heading:"Source",kind:"source",body:"Scaled Agile Framework, ROAM et confidence vote en PI Planning. Patrick Lencioni, The Five Dysfunctions of a Team, sur la culture de désaccord productif."}]},{id:"pi.sheet.bv-uniforme",themeId:"pi.valeur-business",icon:"warn",title:"La Business Value uniforme",heroPhrase:"Tout à 10. Tout à 5. Aucune valeur ne se distingue. Le Business Owner abdique son rôle.",intro:"",practiceCtaLabel:"Va aider le Business Owner à différencier",sections:[{heading:"Pourquoi c'est piégeux",icon:"target",body:"La valeur business 1 à 10 existe pour permettre la priorisation : à la PI Review, le score réalisé pondère selon la valeur. Si tout est noté pareil, plus de priorité possible. C'est généralement le signe d'un Business Owner qui n'a pas pris le temps de discriminer, ou qui ne veut pas faire de choix qu'il devrait défendre.",bullets:["Tout à 10 : « tout est important », donc rien n'est prioritaire.","Tout à 5 : neutralité par défaut, équivalent à l'absence de note.","Hans Samios (Lean-Agile Knowledge Base) note ce piège comme l'anti-pattern le plus fréquent en PI Planning."]},{heading:"Comment ça se voit",icon:"warn",body:"",bullets:["Les valeurs business sont remplies en quelques secondes, sans discussion.","Aucune note inférieure à 5 (« si je note bas, l'équipe va le mal prendre »).","Pas de dialogue avec l'équipe au moment de l'attribution."]},{heading:"Comment recadrer",icon:"wrench",body:"L'attribution se fait dans un dialogue, pas en silence. Forcer une distribution : au moins une note basse, au moins une haute. Le Business Owner doit pouvoir justifier chaque écart.",examples:[{bad:"PI Objectives notés : 10, 10, 10, 10, 10. Aucune priorité émerge à la PI Review.",good:"PI Objectives notés : 10 (compliance bloquante), 8 (croissance), 5 (dette technique), 3 (refonte UI). Le Business Owner défend chaque écart en moins de 30 secondes.",note:"Une distribution variée révèle qu'un choix stratégique a été fait. C'est ce qu'on attend du Business Owner."}]},{heading:"Source",kind:"source",body:"Hans Samios (Personal Lean-Agile Knowledge Base), section how_do_we_assign_business_value_to_pi_objectives. Scaled Agile Framework, recommandation explicite contre la business value uniforme."}]},{id:"pi.sheet.feature-vs-objective",themeId:"pi.pieges-classiques",icon:"warn",title:"Une feature n'est pas un PI Objective",heroPhrase:"Une feature dit ce qu'on livre. Un PI Objective dit ce qui aura changé pour le bénéficiaire.",intro:"",practiceCtaLabel:"Va traduire une feature en PI Objective",sections:[{heading:"Pourquoi c'est l'erreur la plus fréquente",icon:"target",body:"Product Management descend des features (« SSO Enterprise », « refonte panier mobile »). Les équipes, sous pression de temps en PI Planning, recopient ces features dans leurs PI Objectives. Résultat : le Business Owner ne sait pas quoi noter en valeur business, la PI Review ne sait pas quoi mesurer, et la confusion grandit entre ce qu'on livre et ce qui doit changer.",bullets:["Une feature est un livrable. Un PI Objective est un outcome attendu.","Une feature peut être livrée sans atteindre l'outcome (et inversement).","Le PI Objective rend la feature falsifiable : on saura si elle a fait son effet."]},{heading:"Comment ça se voit",icon:"warn",body:"",bullets:["Le PI Objective porte un nom de feature ou de projet (« Livrer X », « Refondre Y »).","Aucune métrique n'est nommée.","Le Business Owner peine à attribuer une valeur business (« je note l'effort, pas la valeur »)."]},{heading:"Comment recadrer",icon:"wrench",body:"Devant chaque feature, poser la question : « qu'est-ce que cette feature, une fois livrée, va faire bouger chez le bénéficiaire ? » La réponse est le PI Objective. La feature reste, comme moyen pour y arriver.",examples:[{bad:"Feature recopiée : « Livrer la feature SSO Enterprise ce PI. »",good:"PI Objective dérivé : « Permettre à 80 % des clients entreprise d'activer le SSO en self-service avant la fin du PI. » La feature SSO Enterprise reste, mais comme moyen.",note:"Le test : si la feature est livrée mais que l'outcome ne bouge pas, le PI Objective n'est pas atteint. Cette tension est exactement ce qu'on veut révéler."}]},{heading:"Source",kind:"source",body:"Scaled Agile Framework, recommandations explicites contre le « feature = PI Objective ». Agile Seekers (article 2024) liste cet anti-pattern comme le plus fréquent à l'introduction de SAFe."}]},{id:"pi.sheet.tous-committed",themeId:"pi.pieges-classiques",icon:"warn",title:"Tous les PI Objectives en committed",heroPhrase:"Un train sans stretch est un train sans ambition. Ou un train qui se ment sur sa capacité.",intro:"",practiceCtaLabel:"Va calibrer un mix committed / stretch",sections:[{heading:"Pourquoi c'est piégeux",icon:"target",body:"Quand un train classe tous ses PI Objectives en committed, deux interprétations possibles : (1) il sous-promet pour être sûr d'atteindre 100 % à la PI Review (sandbagging à l'échelle train), ou (2) il sur-promet en s'engageant sur des objectifs qu'il ratera. Les deux abîment la confiance des Business Owners et coupent l'équipe de tout apprentissage stretch.",bullets:["Le stretch est l'espace où on tente quelque chose dont l'issue est incertaine, où on apprend.","Un train à 100 % committed se prive de cet espace.","Le Business Owner ne sait plus quel objectif compte vraiment."]},{heading:"Comment ça se voit",icon:"warn",body:"",bullets:["Aucun objectif classé stretch sur la page de PI Planning.","Les objectifs réalisés à 100 % à la PI Review trois PI consécutifs (signe de sandbagging).","Ou inversement : taux de réalisation moyen sous 70 % (signe de sur-promesse)."]},{heading:"Comment recadrer",icon:"wrench",body:"Le RTE peut suggérer un mix de référence : autour de 60 à 70 % de committed, 30 à 40 % de stretch. Le Business Owner peut demander explicitement « quel objectif vous engagez à coup sûr, et quel objectif vous tentez sans garantir ? ». La discrimination crée la lisibilité.",examples:[{bad:"5 PI Objectives, tous committed, tous notés à valeur business 10.",good:"3 PI Objectives committed (cap commercial, fiabilité, conformité), 2 stretch (marketplace pilote, intégration nouveau partenaire).",note:"Le mix raconte une histoire stratégique : voici ce qu'on tient, voici ce qu'on tente."}]},{heading:"Source",kind:"source",body:"Scaled Agile Framework, recommandations sur le mix committed / stretch. Ben Lamorte (The OKRs Field Book) sur la valeur d'apprentissage du stretch, transposable à PI."}]}];function I(e,t,n,r){return{kind:"text",id:e,category:t,quality:n,text:r}}function Ji(e,t,n,r){return{kind:"numericField",id:e,category:"variation",quality:t,template:n,fieldCount:r}}const cg=[I("pi-a-good-pass","action","good","Faire passer"),I("pi-a-good-enable","action","good","Permettre à"),I("pi-a-good-reach","action","good","Atteindre"),I("pi-a-good-bring-in","action","good","Faire entrer")],dg=[I("pi-a-neu-reduce","action","neutral","Réduire"),I("pi-a-neu-increase","action","neutral","Augmenter"),I("pi-a-neu-divide","action","neutral","Diviser"),I("pi-a-neu-keep","action","neutral","Maintenir")],pg=[I("pi-a-dis-deliver","action","distractor","Livrer"),I("pi-a-dis-refactor","action","distractor","Refactorer"),I("pi-a-dis-migrate","action","distractor","Migrer"),I("pi-a-dis-improve","action","distractor","Améliorer")],mg=[I("pi-i-good-sso","indicator","good","le taux d'activation du SSO chez nos clients entreprise"),I("pi-i-good-pilots","indicator","good","le nombre de clients pilotes sur la marketplace"),I("pi-i-good-churn","indicator","good","le taux de churn mensuel des comptes premium"),I("pi-i-good-nps-train","indicator","good","le score NPS du parcours d'onboarding")],fg=[I("pi-i-neu-mrr","indicator","neutral","le MRR généré par l'offre marketplace"),I("pi-i-neu-time-to-value","indicator","neutral","le délai moyen avant première valeur (time-to-value)"),I("pi-i-neu-conversion","indicator","neutral","le taux de conversion essai → payant"),I("pi-i-neu-self-serve","indicator","neutral","la part de tickets r duire le churn premium de manière notable.",rationale:"« De manière notable » est non mesurable. La cible chiffrée existe (revenir à <2 %), il faut juste la nommer dans l'objectif.",expectedBeneficiary:"comptes premium / board"}],Xg=[{id:"warmup.l1.livrer",level:1,kind:"verb",prompt:"Livrer",expected:"output",explanation:"« Livrer » décrit ce qu'on produit, pas le changement obtenu. Output classique."},{id:"warmup.l1.reduire",level:1,kind:"verb",prompt:"Réduire",expected:"outcome",explanation:"« Réduire » appelle un avant et un après mesurables. Le verbe oriente clairement vers un résultat constaté."},{id:"warmup.l1.refactorer",level:1,kind:"verb",prompt:"Refactorer",expected:"output",explanation:"« Refactorer » nomme une activité interne à l'équipe. Aucun bénéficiaire externe, aucun changement constaté. Output."},{id:"warmup.l1.permettre",level:1,kind:"verb",prompt:"Permettre à",expected:"outcome",explanation:"« Permettre à [bénéficiaire] de [faire X] » place le résultat du côté d'un utilisateur. Outcome."},{id:"warmup.l1.deployer",level:1,kind:"verb",prompt:"Déployer",expected:"output",explanation:"Déployer = activité technique. Que la chose déployée serve quelqu'un et soit mesurée reste à dire ailleurs. Output."},{id:"warmup.l1.atteindre",level:1,kind:"verb",prompt:"Atteindre",expected:"outcome",explanation:"« Atteindre X » place le résultat sur une cible chiffrée. Verbe outcome qui structure naturellement un Sprint Goal."},{id:"warmup.l1.mettre-en-place",level:1,kind:"verb",prompt:"Mettre en place",expected:"output",explanation:"Décrit l'installation d'un dispositif. Tant qu'on n'a pas nommé son effet sur un bénéficiaire, c'est un output."},{id:"warmup.l1.diviser",level:1,kind:"verb",prompt:"Diviser",expected:"outcome",explanation:"« Diviser par N » force à nommer une métrique et un facteur de réduction. Outcome immédiatement falsifiable."},{id:"warmup.l1.construire",level:1,kind:"verb",prompt:"Construire",expected:"output",explanation:"Construire = produire. Le verbe parle de l'effort de l'équipe, pas du résultat constaté côté utilisateur. Output."},{id:"warmup.l1.faire-entrer",level:1,kind:"verb",prompt:"Faire entrer",expected:"outcome",explanation:"« Faire entrer [bénéficiaire] dans [état] » place le résultat du côté d'un acteur observable. Outcome typique pour cibler des utilisateurs ou clients."},{id:"warmup.l2.ameliorer-module",level:2,kind:"objective",prompt:"Améliorer le module commande.",expected:"output",explanation:"« Améliorer » est un mot flou. Sans bénéficiaire ni seuil, on décrit du travail à faire. Output déguisé."},{id:"warmup.l2.ameliorer-conversion",level:2,kind:"objective",prompt:"Améliorer la conversion essai → payant de 12 % à 18 % d'ici fin de sprint.",expected:"outcome",explanation:"Même verbe que ci-dessus, mais ici un seuil chiffré, un avant/après, une échéance. Le contexte rend l'objectif outcome — le verbe seul ne suffit pas à juger."},{id:"warmup.l2.stabiliser",level:2,kind:"objective",prompt:"Stabiliser la plateforme.",expected:"output",explanation:"« Stabiliser » est une action technique sans mesure ni bénéficiaire nommé. Output. Pour le rendre outcome il faudrait nommer qui en profite et la mesure (incidents, MTTR…)."},{id:"warmup.l2.pilotes-marketplace",level:2,kind:"objective",prompt:"Faire entrer 3 clients pilotes sur la nouvelle offre marketplace avant la PI Review.",expected:"outcome",explanation:"Bénéficiaire (clients), seuil (3), borne temporelle (PI Review). Tous les ingrédients d'un outcome — même si la livraison technique est ailleurs."},{id:"warmup.l2.migrer-oauth",level:2,kind:"objective",prompt:"Migrer l'authentification vers OAuth.",expected:"output",explanation:"Migrer = activité technique pure. Aucun changement constaté du point de vue de l'utilisateur n'est nommé. Output."},{id:"warmup.l2.diviser-chargement",level:2,kind:"objective",prompt:"Diviser par 2 le temps de chargement de la home (de 4 s à 2 s) avant la fin du sprint.",expected:"outcome",explanation:"Métrique nommée, indre",level:1,kind:"verb",prompt:"Atteindre",expected:"outcome",explanation:"« Atteindre X » place le résultat dans une cible chiffrée. Sert bien les KPI de PI (NPS, taux d'activation, MRR…)."},{id:"warmup.pi.l1.refactorer",level:1,kind:"verb",prompt:"Refactorer",expected:"output",explanation:"À l'échelle PI, refactoriser sans nommer le bénéfice (vélocité, stabilité, etc.) reste un output isolé."},{id:"warmup.pi.l1.permettre",level:1,kind:"verb",prompt:"Permettre à",expected:"outcome",explanation:"« Permettre à [segment de clients] de [faire X] » formule un PI Objective côté valeur métier. Outcome."},{id:"warmup.pi.l1.mettre-en-place",level:1,kind:"verb",prompt:"Mettre en place",expected:"output",explanation:"Décrit l'installation d'un dispositif (process, système, organisation). Le dispositif est un moyen, le PI Objective doit nommer son effet métier."},{id:"warmup.pi.l1.convertir",level:1,kind:"verb",prompt:"Convertir",expected:"outcome",explanation:"« Convertir N % de [population] en [état] » est exactement la forme d'un outcome business — métrique de conversion, segment, état cible."},{id:"warmup.pi.l1.stabiliser",level:1,kind:"verb",prompt:"Stabiliser",expected:"output",explanation:"Action technique sans seuil ni mesure du bénéficiaire. Pour passer en outcome, il faudrait nommer la métrique (MTTR, taux d'incidents…) et l'avant/après."},{id:"warmup.pi.l1.reduire",level:1,kind:"verb",prompt:"Réduire",expected:"outcome",explanation:"« Réduire X de A à B » porte mécaniquement la mesure. Verbe outcome qui structure les PI Objectives de fiabilité, performance, churn…"},{id:"warmup.pi.l2.livrer-marketplace",level:2,kind:"objective",prompt:"Livrer la v1 de la marketplace.",expected:"output",explanation:"Aucune métrique d'adoption, aucun bénéficiaire mesuré. La marketplace pourrait être livrée et personne ne l'utiliser. Output."},{id:"warmup.pi.l2.sso-self-serve",level:2,kind:"objective",prompt:"Permettre à 80 % de nos clients entreprise d'activer le SSO en self-service d'ici la fin du PI.",expected:"outcome",explanation:"Bénéficiaire (clients entreprise), seuil (80 %), borne (fin de PI). Tous les ingrédients d'un outcome de PI committed."},{id:"warmup.pi.l2.churn-premium",level:2,kind:"objective",prompt:"Faire passer le taux de churn mensuel des comptes premium de 4 % à 2,5 % avant la PI Review.",expected:"outcome",explanation:"Indicateur clair, avant/après, échéance. Métrique business observable à la revue."},{id:"warmup.pi.l2.stabiliser-platform",level:2,kind:"objective",prompt:"Stabiliser la plateforme avant l'arrivée des nouveaux clients.",expected:"output",explanation:"« Stabiliser » sans seuil ni mesure. « Arrivée des nouveaux clients » donne un horizon mais aucune mesure du changement. Output déguisé."},{id:"warmup.pi.l2.nps-onboarding",level:2,kind:"objective",prompt:"Augmenter le NPS du parcours d'onboarding de 32 à 50 sur le dernier mois du PI.",expected:"outcome",explanation:"Métrique d'expérience (NPS), avant/après, fenêtre temporelle précise. Le verbe « augmenter » devient outcome grâce au contexte."},{id:"warmup.pi.l2.refactor-tunnel",level:2,kind:"objective",prompt:"Refactorer l'architecture du tunnel d'achat pour préparer la v3.",expected:"output",explanation:"Refactor + préparation. Aucune cible métier nommée. Le Business Owner ne saura pas à la PI Review si l'objectif est atteint."},{id:"warmup.pi.l2.contrats-enterprise",level:2,kind:"objective",prompt:"Atteindre 100 contrats signés sur la nouvelle offre Enterprise d'ici la PI Review.",expected:"outcome",explanation:"Seuil chiffré (100), métrique business (contrats signés), fenêtre (PI Review). Outcome typique d'un train commercial."},{id:"warmup.pi.l2.facturation",level:2,kind:"objective",prompt:"Mettre en place le nouveau système de facturation d'ici la PI Review.",expected:"output",explanation:"Le système mis en place est un livrable interne. Il faudrait nommer l'effet attendu (factures émises plus vite, erreurs réduites, équipes finance autonomes…) pour passer en outcome."},{id:"warmup.pi.l2.cac-midmarket",level:2,kind:"objective",prompt:"Diviser par 2 le coût d'acquisition d'un client mid-market d'ici la fin du PI.",expected:"outcome",explanation:"Métrique business (CAC), facteur de variation (par 2), segment (mid-market), fenêtre. Outcome PI exemplaire — c'est le langage du Business Owner."}],Zg=[{id:"warmup.okr.l1.atteindre",level:1,kind:"verb",prompt:"Atteindre",expected:"outcome",explanation:"« Atteindre » appelle une cible chiffrée à dépasser. Verbe outcome typique des KR."},{id:"warmup.okr.l1.livrer",level:1,kind:"verb",prompt:"Livrer",expected:"output",explanation:"« Livrer » décrit ce qu'on produit, pas le changement obtenu. Si un KR commence par « Livrer », c'est un KR-projet."},{id:"warmup.okr.l1.faire-passer",level:1,kind:"verb",prompt:"Faire passer",expected:"outcome",explanation:"« Faire passer de X à Y » est la signature d'un KR : un avant, un après, un écart à creuser."},{id:"warmup.okr.l1.implementer",level:1,kind:"verb",prompt:"Implémenter",expected:"output",explanation:"« Implémenter » = activité technique pure. Aucun bénéficiaire, aucun changement mesurable. Output."},{id:"warmup.okr.l1.reduire",level:1,kind:"verb",prompt:"Réduire",expected:"outcome",explanation:"« Réduire » appelle un avant et un après. Verbe outcome qui structure bien un KR."},{id:"warmup.okr.l1.convertir",level:1,kind:"verb",prompt:"Convertir",expected:"outcome",explanation:"« Convertir N % de [population] en [état] » formule un KR de conversion : métrique nette, segment, état cible. Outcome."},{id:"warmup.okr.l1.maintenir",level:1,kind:"verb",prompt:"Maintenir",expected:"output",explanation:"Piège classique en OKR : « maintenir au-dessus de N » décrit un état à préserver, pas un changement à atteindre. C'est une health metric — pas un Key Result."},{id:"warmup.okr.l1.mettre-en-place",level:1,kind:"verb",prompt:"Mettre en place",expected:"output",explanation:"Décrit l'installation d'un dispositif. Le dispositif est un moyen pour faire bouger une métrique — c'est cette dernière qui est un KR."},{id:"warmup.okr.l1.multiplier",level:1,kind:"verb",prompt:"Multiplier",expected:"outcome",explanation:"« Multiplier par N » force à nommer la métrique et le facteur. Verbe outcome qui structure un KR ambitieux."},{id:"warmup.okr.l1.documenter",level:1,kind:"verb",prompt:"Documenter",expected:"output",explanation:"Documenter est une activité de production. Le KR serait l'effet attendu : équipes autonomes, tickets « comment faire » divisés, time-to-onboard raccourci…"},{id:"warmup.okr.l2.migrer-k8s",level:2,kind:"objective",prompt:"Migrer 100 % des services vers Kubernetes.",expected:"output",explanation:"Une migration est un projet, pas un Key Result. Reformuler en outcome : qu'est-ce que cette migration va changer ? (temps de déploiement, fiabilité, coût…)"},{id:"warmup.okr.l2.nps",level:2,kind:"objective",prompt:"Faire passer le NPS de 32 à 50.",expected:"outcome",explanation:"Métrique nommée, point de départ, cible. Format de KR exemplaire."},{id:"warmup.okr.l2.pipeline",level:2,kind:"objective",prompt:"Construire le nouveau pipeline de déploiement.",expected:"output",explanation:"Construire = projet, pas un changement mesuré. Le pipeline construit, et ensuite ? Outcome : « Diviser par 3 le temps moyen de déploiement (de 30 min à 10 min) »."},{id:"warmup.okr.l2.adoption-api",level:2,kind:"objective",prompt:"Atteindre 80 % d'adoption de l'API par les équipes consommatrices.",expected:"outcome",explanation:"Cible chiffrée, bénéficiaire identifié (équipes consommatrices), unité claire (% d'adoption). KR valide."},{id:"warmup.okr.l2.ux-floue",level:2,kind:"objective",prompt:"Améliorer l'expérience utilisateur.",expected:"output",explanation:"Ni mesurable, ni un changement nommé. C'est une intention, pas un KR. Pour le rendre KR : « Faire passer le score SUS de l'app de 65 à 80 »."},{id:"warmup.okr.l2.uptime-maintain",level:2,kind:"objective",prompt:"Maintenir l'uptime du service paiement au-dessus de 99,9 %.",expected:"output",explanation:"Health metric déguisée en KR. « Maintenir au-dessus de » décrit un seuil de service à préserver, pas un changement à atteindre. Pour en faire un KR : nommer un avant et un après (« passer de 98,5 % à 99,9 % »)."},{id:"warmup.okr.l2.retention-m3",level:2,kind:"objective",prompt:"Faire passer la rétention M3 des nouveaux comptes de 28 % à 50 % d'ici la fin du trimestre.",expected:"outcome",explanation:"Métrique nommée (rétention M3), segment (nouveaux comptes), avant/après chiffré, échéance trimestre. KR exemplaire."},{id:"warmup.okr.l2.refactor-db",level:2,kind:"objective",prompt:"Refactorer l'architecture de la base de données.",expected:"output",explanation:"Activité technique pure. Aucun changement constaté pour un bénéficiaire externe. Pour en faire un KR, nommer l'effet attendu (latence p95 divisée par 2, incidents de prod réduits, etc.)."},{id:"warmup.okr.l2.integration-time",level:2,kind:"objective",prompt:"Diviser par 4 le délai moyen de première intégration d'une équipe consommatrice (de 4 h à 1 h).",expected:"outcome",explanation:"Métrique opérationnelle (délai d'intégration), bénéficiaire (équipes consommatrices), avant/après chiffré. KR clair et falsifiable."},{id:"warmup.okr.l2.documenter-api",level:2,kind:"objective",prompt:"Documenter complètement notre API publique d'ici la fin du trimestre.",expected:"output",explanation:"Activité de production. « Complètement » n'est pas mesurable côté changement constaté. Le vrai KR est l'effet attendu : développeurs autonomes, tickets divisés, temps d'onboarding raccourci."}],Jg=[{id:"quiz.sprint.dev.checkout-maintenance",type:"sprint",audience:"dev",teamLabel:"Équipe Checkout",iconName:"wrench",context:"5 devs, 1 Product Owner. L'équipe travaille sur le module de paiement d'une plateforme SaaS B2B. Sprint dédié à la maintenance après une vague d'incidents en production.",metrics:[{label:"Incidents production / semaine (module commande)",value:"14"},{label:"Tickets support escaladés vers la dev / semaine",value:"8"},{label:"Temps moyen de résolution d'un incident",value:"3 h"}],proposedObjective:"Refactorer le module commande et nettoyer la dette technique.",options:[{id:"A",text:"Refactorer le module commande en suivant les règles d'architecture définies.",verdict:"bad",explanation:"« Refactorer » reste un output technique. Aucun bénéficiaire nommé, aucune mesure observable du changement."},{id:"B",text:"Diminuer le nombre d'incidents sur le module commande.",verdict:"partial",explanation:"Outcome correct mais sans avant/après chiffré ni échéance. Reste un vœu."},{id:"C",text:"Faire passer le nombre d'incidents production du module commande de 14 à 5 par semaine d'ici la fin du sprint.",verdict:"good",explanation:"Outcome mesurable, indicateur précis, avant/après chiffré, échéance dans le sprint. La structure est solide — les chiffres exacts restent à convenir avec le PO."},{id:"D",text:"Améliorer la stabilité du module commande et réduire la dette technique.",verdict:"bad",explanation:"Composite (« et »), deux formulations floues (« améliorer », « dette technique »), aucun seuil ni échéance."}]},{id:"quiz.sprint.dev.onboarding-scale",type:"sprint",audience:"dev",teamLabel:"Équipe Onboarding",iconName:"practice",context:"7 devs, 1 Product Owner. L'équipe travaille sur le parcours d'inscription d'une plateforme B2C en croissance. Sprint feature.",metrics:[{label:"Taux d'activation des nouveaux comptes à J+30",value:"42 %"},{label:"Temps moyen pour compléter l'inscription",value:"9 min"},{label:"Comptes créés / semaine",value:"1 200"}],proposedObjective:"Améliorer significativement l'expérience utilisateur du parcours d'inscription.",options:[{id:"A",text:"Améliorer significativement l'expérience utilisateur du parcours d'inscription.",verdict:"bad",explanation:"« Améliorer » et « significativement » sont flous. Aucun seuil mesurable, aucune échéance."},{id:"B",text:"Faire passer le taux d'activation des nouveaux comptes à J+30 de 42 % à 60 % d'ici la fin du sprint.",verdict:"good",explanation:"Outcome chiffré sur un indicateur métier nommé, avec échéance précise. La structure tient."},{id:"C",text:"Livrer un nouveau parcours d'inscription plus fluide.",verdict:"bad",explanation:"« Livrer » est un output. « Plus fluide » est subjectif et non mesurable."},{id:"D",text:"Augmenter le taux d'activation à J+30.",verdict:"partial",explanation:"Indicateur correct mais ni avant/après ni échéance. La structure est incomplète."}]},{id:"quiz.sprint.dev.plateforme-archi",type:"sprint",audience:"dev",teamLabel:"Équipe Plateforme",iconName:"puzzle",context:"8 devs, 1 Tech Lead. L'équipe maintient l'infrastructure consommée par 6 autres équipes feature. Migration en cours vers une architecture micro-services.",metrics:[{label:"Temps moyen de déploiement d'un hotfix",value:"4 h"},{label:"Releases / mois (toutes équipes)",value:"12"},{label:"Incidents d'infra / mois",value:"5"}],proposedObjective:"Mettre en place la nouvelle architecture micro-services.",options:[{id:"A",text:"Mettre en place la nouvelle architecture micro-services sur le périmètre prévu.",verdict:"bad",explanation:"« Mettre en place » est un output. Aucune mesure du bénéfice côté équipes consommatrices ni côté ops."},{id:"B",text:"Faire passer le temps moyen de déploiement d'un hotfix de 4 h à 1 h d'ici la fin du sprint.",verdict:"good",explanation:"Indicateur ops observable, avant/après chiffré, échéance. Bénéficiaires implicites mais clairs (équipes feature, oncall)."},{id:"C",text:"Permettre aux équipes feature de déployer plus rapidement leurs hotfixs.",verdict:"partial",explanation:"Bénéficiaire nommé, outcome correct, mais ni seuil ni échéance. Reste qualitatif."},{id:"D",text:"Refactorer le module de déploiement et finaliser l'orchestrateur.",verdict:"bad",explanation:"Composite (« et »), deux outputs techniques juxtaposés, aucune mesure côté bénéficiaire."}]},{id:"quiz.sprint.dev.mobile-backlog",type:"sprint",audience:"dev",teamLabel:"Équipe Mobile",iconName:"sprint",context:`6 devs, 1 Product Owner. L'équipe travaille sur l'app mobile d'une plateforme de réservation de salles de sport. 80 000 utilisateurs actifs mensuels.

sé."},{id:"B",text:"Améliorer l'expérience de recherche.",verdict:"bad",explanation:"« Améliorer » et « expérience » sont flous. Aucun bénéficiaire mesurable, aucun seuil."},{id:"C",text:"Faire passer le taux de clic sur les résultats de recherche de 12 % à 20 % d'ici la fin du sprint.",verdict:"good",explanation:"Outcome utilisateur mesurable, avant/après chiffré, échéance. L'autocomplete devient un moyen, pas le but."},{id:"D",text:"Permettre aux utilisateurs de trouver plus rapidement ce qu'ils cherchent.",verdict:"partial",explanation:"Bénéficiaire et direction corrects mais aucune mesure (que veut dire « plus rapidement » ?) ni échéance."}]},{id:"quiz.sprint.dev.data-ops",type:"sprint",audience:"dev",teamLabel:"Équipe Data",iconName:"wrench",context:"4 devs, 1 SRE. L'équipe maintient les pipelines ETL nocturnes qui alimentent les dashboards de l'équipe Business. Une astreinte hebdomadaire est tenue par les devs à tour de rôle.",metrics:[{label:"Pipelines qui tombent / semaine",value:"2 à 3"},{label:"Bugs ouverts sur les pipelines",value:"11"},{label:"Temps passé en astreinte / semaine",value:"6 h"}],proposedObjective:"Stabiliser les pipelines ETL et corriger les bugs ouverts.",options:[{id:"A",text:"Stabiliser les pipelines ETL et corriger les 11 bugs ouverts.",verdict:"bad",explanation:"Composite (« et »), « stabiliser » est un output, les bugs corrigés ne mesurent pas le bénéfice côté Business ou oncall."},{id:"B",text:"Réduire le nombre de pipelines qui tombent.",verdict:"partial",explanation:"Outcome correct mais sans seuil ni échéance."},{id:"C",text:"Faire passer le nombre de pipelines qui tombent de 2-3 à 0 par semaine d'ici la fin du sprint.",verdict:"good",explanation:"Outcome mesurable, indicateur précis, échéance, bénéficiaires implicites clairs (Business, oncall)."},{id:"D",text:"Refactorer les pipelines les plus fragiles.",verdict:"bad",explanation:"Output technique pur. Aucun lien explicite avec le bénéfice attendu (moins de chutes, moins d'astrei
