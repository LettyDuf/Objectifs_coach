aque année`,icon:`wrench`,body:`Chaque année, poser la question avant de reconduire quoi que ce soit : ce cap est-il encore le bon, ou juste le plus simple à reprendre ?`,examples:[{bad:`Le séminaire annuel copie l'Objective de l'an dernier et augmente les chiffres de 10 %.`,good:`Le séminaire annuel commence par une vraie question : qu'est-ce qui a changé cette année qui justifierait un autre cap ? Le cap précédent est reconduit seulement après cette discussion, pas par défaut.`,note:`Reconduire un cap peut être la bonne décision, mais seulement si elle a été reprise consciemment, pas par automatisme.`}]},{heading:`Source`,kind:`source`,body:`Felipe Castro, sur le risque de pilotage automatique propre aux cycles longs.`}]},{id:`okr-entreprise.sheet.revue-sans-equipes`,isNamedPitfall:!0,themeId:`okr-entreprise.pieges`,icon:`warn`,title:`La revue du CODIR sans les équipes`,heroPhrase:`Le CODIR fait sa revue trimestrielle entre lui. Les équipes, qui savent si le cap est encore tenable, ne sont jamais consultées.`,intro:``,practiceCtaLabel:`Va préparer une revue avec l'avis des équipes`,sections:[{heading:`Pourquoi c'est piégeux`,icon:`target`,body:`Ce sont les équipes qui exécutent qui savent le mieux si la suite de l'année est réaliste. Une revue qui se tient sans jamais les entendre prend des décisions à l'aveugle sur la faisabilité réelle.`,bullets:[`La revue trimestrielle réunit uniquement le CODIR, sans aucun retour des équipes.`,`Les décisions prises en revue ne s'appuient sur aucune information de terrain récente.`,`Les équipes apprennent les conclusions de la revue après coup, sans avoir été consultées avant.`]},{heading:`Comment ça se voit`,icon:`warn`,kind:`signals`,body:``,bullets:[`Aucun représentant d'équipe n'est jamais invité ni consulté avant la revue.`,`Les décisions de la revue surprennent les équipes qui doivent les exécuter.`,`Le CODIR découvre après coup qu'une hypothèse de la revue était fausse sur le terrain.`]},{heading:`Écouter avant de décider`,icon:`wrench`,body:`Recueillir un avis des équipes juste avant chaque revue trimestrielle : qu'est-ce qui est réaliste pour la suite, qu'est-ce qui ne l'est plus ?`,examples:[{bad:`Le CODIR se réunit à huis clos, décide d'accélérer un chantier, sans avoir demandé aux équipes concernées si c'était tenable.`,good:`Avant la revue, le CODIR recueille en une page l'avis des équipes concernées sur la faisabilité de la suite de l'année. La revue décide en connaissance de cause.`,note:`Le CODIR garde la décision finale, mais elle s'appuie sur une vraie information, pas seulement sur des chiffres de tableau de bord.`}]},{heading:`Source`,kind:`source`,body:`Ben Lamorte, sur l'alignement construit par la conversation entre niveaux plutôt que par une revue en cercle fermé.`}]},{id:`okr-entreprise.sheet.sans-proprietaire`,isNamedPitfall:!0,themeId:`okr-entreprise.pieges`,icon:`warn`,title:`L'OKR entreprise sans responsable identifié`,heroPhrase:`« Le CODIR » est responsable de l'OKR entreprise. C'est-à-dire, en pratique, personne en particulier.`,intro:``,practiceCtaLabel:`Va nommer un responsable pour un Résultat clé`,sections:[{heading:`Pourquoi c'est piégeux`,icon:`target`,body:`Une responsabilité collective, sans nom associé à chaque Résultat clé, se dilue facilement. Si un Résultat clé dérape, personne ne se sent directement comptable de le remonter ou de le corriger.`,bullets:[`Aucun nom n'est associé à chaque Résultat clé, seulement « le CODIR » en général.`,`En cas de dérapage, personne ne se sent directement responsable de réagir.`,`Les questions sur l'avancement d'un Résultat clé n'ont pas d'interlocuteur clair.`]},{heading:`Comment ça se voit`,icon:`warn`,kind:`signals`,body:``,bullets:[`Demander qui suit tel Résultat clé ne produit pas de réponse claire.`,`Plusieurs membres du CODIR pensent chacun que c'est plutôt la responsabilité d'un autre.`,`Un Résultat clé dérape pendant plusieurs semaines avant que quelqu'un ne s'en saisisse.`]},{heading:`Nommer un responsable par Résultat clé`,icon:`wrench`,body:`Nommer un sponsor unique par Résultat clé au sein du CODIR, dès la rédaction de l'OKR entreprise.`,examples:[{bad:`Les 4 Résultats clés de l'OKR entreprise sont suivis collectivement par le CODIR, sans répartition.`,good:`Chacun des 4 Résultats clés a un membre du CODIR clairement identifié comme responsable de son suivi et de son alerte en cas de dérapage.`,note:`La décision reste collégiale, mais le suivi, lui, a toujours un nom.`}]},{heading:`Source`,kind:`source`,body:`Pratique du Scaled Agile Framework (SAFe) sur les thèmes stratégiques de portefeuille, chacun rattaché à un sponsor exécutif identifié.`}]}],Tn=ln,En={sprint:{dev:be},pi:{dev:Ge},"okr-equipe":{dev:bn}},Dn={sprint:{dev:[...Sn,...xe,Cn(`sprint.sheet.verbes-ambigus`,`sprint.fondamentaux`)]},pi:{dev:[...Sn,...Ke,Cn(`pi.sheet.verbes-ambigus`,`pi.fondamentaux`)]},"okr-equipe":{dev:[...Sn,...xn,Cn(`okr-equipe.sheet.verbes-ambigus`,`okr.fondamentaux`)]},"okr-entreprise":{manager:[...Sn,...wn,Cn(`okr-entreprise.sheet.verbes-ambigus`,`okr-entreprise.fondamentaux`)]}},On={sprint:{dev:We},pi:{dev:ht},"okr-equipe":{dev:Lt},"okr-entreprise":{manager:on}},kn={sprint:{dev:sn},pi:{dev:cn}},An={sprint:{dev:un},pi:{dev:dn},"okr-equipe":{dev:fn},"okr-entreprise":{manager:Tn}},jn={sprint:{dev:pn},pi:{dev:mn},"okr-equipe":{dev:hn},"okr-entreprise":{manager:gn}};function P(){return{getHeuristicsConfig(){return ye},getExamples(e,t){return En[e]?.[t]??[]},getSheets(e,t){return Dn[e]?.[t]??[]},getThemes(e,t){let n=Dn[e]?.[t]??[],r=ve[e]?.[t]??[];if(r.length===0)return n.length>0?[{theme:ge,sheets:n}]:[];let i=r.map(e=>({theme:e,sheets:n.filter(t=>t.themeId===e.id)})),a=new Set(r.map(e=>e.id)),o=n.filter(e=>!e.themeId||!a.has(e.themeId));return o.length>0&&i.push({theme:ge,sheets:o}),i.filter(e=>e.sheets.length>0)},getPuzzleSet(e,t,n){return On[e]?.[t]?.[n]??null},getScenarioCards(e,t){return kn[e]?.[t]??[]},getWarmupCases(e,t){return An[e]?.[t]??[]},getChallengeQuizCases(e,t){retur t:!1}],explanation:`Durée mesurée, comparable d'un mois à l'autre. La satisfaction se mesure mais demande une enquête à part ; la réactivité est trop vague.`},{id:`ind.5`,statement:`Stabiliser le site marchand`,question:`Quel indicateur se mesure avec exactitude, sans place pour l'interprétation ?`,options:[{id:`A`,text:`Robustesse de la plateforme`,isCorrect:!1},{id:`B`,text:`Tenue de charge en heure de pointe`,isCorrect:!1},{id:`C`,text:`Taux de disponibilité du site sur le mois`,isCorrect:!0}],explanation:`Le taux de disponibilité est l'indicateur opérationnel standard, calculé sans interprétation. « Tenue de charge » est aussi mesurable mais ne couvre pas la stabilité globale.`},{id:`ind.6`,statement:`Améliorer la qualité des données client`,question:`Quel indicateur se mesure avec exactitude, sans place pour l'interprétation ?`,options:[{id:`A`,text:`Hygiène du référentiel`,isCorrect:!1},{id:`B`,text:`Pourcentage de fiches client uniques après déduplication`,isCorrect:!0},{id:`C`,text:`Propreté des données`,isCorrect:!1}],explanation:`Compter les doublons pousse au mauvais comportement (meilleure détection = chiffre plus haut). Le pourcentage de fiches uniques pointe l'effet visé.`},{id:`ind.7`,statement:`Réduire les retards de facturation fournisseurs`,question:`Quel indicateur se mesure avec exactitude, sans place pour l'interprétation ?`,options:[{id:`A`,text:`Pourcentage de factures payées sous 30 jours`,isCorrect:!0},{id:`B`,text:`Maîtrise du cycle achats`,isCorrect:!1},{id:`C`,text:`Discipline de paiement`,isCorrect:!1}],explanation:`Ratio borné, lisible par tous. Les deux autres sont des qualités, pas des mesures.`},{id:`ind.8`,statement:`Renforcer l'accueil des nouveaux arrivants`,question:`Quel indicateur se mesure avec exactitude, sans place pour l'interprétation ?`,options:[{id:`A`,text:`Délai entre l'arrivée et le premier accès aux outils métier`,isCorrect:!0},{id:`B`,text:`Vivacité du parcours d'accueil (note interne)`,isCorrect:!1},{id:`C`,text:`Qualité de l'intégration`,isCorrect:!1}],explanation:`Durée mesurée, indépendante des perceptions. La « vivacité » dépend de qui note ; la « qualité » est un concept-parapluie.`},{id:`ind.9`,statement:`Améliorer la conversion d'une campagne d'emailing`,question:`Quel indicateur se mesure avec exactitude, sans place pour l'interprétation ?`,options:[{id:`A`,text:`Engagement de l'audience`,isCorrect:!1},{id:`B`,text:`Taux de clic sur le lien principal`,isCorrect:!0},{id:`C`,text:`Performance relationnelle`,isCorrect:!1}],explanation:`Le clic reste un signal fiable. Le taux d'ouverture est devenu bruité depuis 2021 (protections de Mail Privacy). « Engagement » et « performance relationnelle » sont des concepts.`},{id:`ind.10`,statement:`Réduire les incidents en production`,question:`Quel indicateur se mesure avec exactitude, sans place pour l'interprétation ?`,options:[{id:`A`,text:`Solidité des livraisons`,isCorrect:!1},{id:`B`,text:`Robustesse des mises en ligne`,isCorrect:!1},{id:`C`,text:`Nombre d'incidents de sévérité 1 ou 2 sur 30 jours glissants`,isCorrect:!0}],explanation:`La sévérité 1 ou 2 est définie sans ambiguïté dans les politiques d'incident. Dire « critique » sans définition est exactement le piège qu'on veut enseigner à éviter.`}]},lr={kind:`grid`,intro:`Une variation précise donne un chiffre : combien, de combien, par rapport à quoi. Une formulation vague laisse le résultat à l'interprétation.`,data:{consigne:`Coche tous les fragments qui expriment une variation chiffrée précise.`,fragments:[{id:`v.1`,text:`Diviser par deux le nombre de paniers abandonnés`,isCorrect:!0,justification:`Division par 2, base claire.`},{id:`v.2`,text:`Améliorer nettement la satisfaction client`,isCorrect:!1,justification:`« Nettement » n'est pas chiffré.`},{id:`v.3`,text:`Passer de 12 à 6 jours de délai moyen de réponse`,isCorrect:!0,justification:`Valeurs de départ et d'arrivée données.`},{id:`v.4`,text:`Réduire significativement les incidents de paie`,isCorrect:!1,justification:`« Significativement » reste à interpréter.`},{id:`v.5`,text:`Faire baisser de 30 % les retards de facturation`,isCorrect:!0,justification:`Pourcentage explicite.`},{id:`v.6`,text:`Mieux gérer les pics de charge`,isCorrect:!1,justification:`Aucune mesure ni cible.`},{id:`v.7`,text:`Atteindre 95 % de factures payées sous 30 jours`,isCorrect:!0,justification:`Cible chiffrée, seuil net.`},{id:`v.8`,text:`Renforcer la qualité du référentiel client`,isCorrect:!1,justification:`Pas de niveau de départ ni d'arrivée.`}]}},ur={kind:`grid`,intro:`Une échéance précise pose une date, un sprint nommé, un événement repérable. Les formulations vagues n'engagent personne.`,data:{consigne:`Coche tous les fragments qui posent une échéance précise.`,fragments:[{id:`e.1`,text:`D'ici la fin du sprint 14`,isCorrect:!0,justification:`Sprint nommé, fin identifiable.`},{id:`e.2`,text:`Dans les meilleurs délais`,isCorrect:!1,justification:`Formule vide.`},{id:`e.3`,text:`Avant le 30 septembre`,isCorrect:!0,justification:`Date calendaire précise.`},{id:`e.4`,text:`Rapidement après la mise en production`,isCorrect:!1,justification:`« Rapidement » n'est pas une borne.`},{id:`e.5`,text:`À la clôture du trimestre en cours`,isCorrect:!0,justification:`Fin de période identifiée.`},{id:`e.6`,text:`Sur les prochaines semaines`,isCorrect:!1,justification:`Combien de semaines, à partir de quand.`},{id:`e.7`,text:`Au plus tard le vendredi de la revue de sprint`,isCorrect:!0,justification:`Jour et événement précis.`},{id:`e.8`,text:`Dans la durée`,isCorrect:!1,justification:`Aucun horizon.`}]}},dr={kind:`qcm`,intro:`Derrière un objectif, le vrai bénéficiaire est celui dont la vie change quand l'objectif est atteint. Pas l'équipe qui livre, ni la direction qui suit.`,cases:[{id:`ctx.1`,statement:`Réduire de 12 à 6 jours le délai de réponse aux demandes de devis d'ici fin du trimestre`,question:`Qui est le vrai bénéficiaire ?`,options:[{id:`A`,text:`Direction commerciale`,isCorrect:!1},{id:`B`,text:`Clients prospects en attente`,isCorrect:!0},{id:`C`,text:`Équipe avant-vente`,isCorrect:!1},{id:`D`,text:`Service marketing`,isCorrect:!1}],explanation:`Ce sont les prospects qui attendent et qui décident pendant ce délai.`},{id:`ctx.2`,statement:`Passer le taux de bulletins de paie corrigés après envoi sous 1 % d'ici décembre`,question:`Qui est le vrai bénéficiaire ?`,options:[{id:`A`,text:`Équipe paie`,isCorrect:!1},{id:`B`,text:`Direction des ressources humaines`,isCorrect:!1},{id:`C`,text:`Salariés de l'entreprise`,isCorrect:!0},{id:`D`,text:`Cabinet comptable externe`,isCorrect:!1}],explanation:`Ils reçoivent un bulletin juste du premier coup.`},{id:`ctx.3`,statement:`Faire passer le pourcentage de fiches client uniques de 92 % à 99 % d'ici fin du semestre`,question:`Qui est le vrai bénéficiaire ?`,options:[{id:`A`,text:`Équipe données`,isCorrect:!1},{id:`B`,text:`Conseillers qui consultent le dossier client en rendez-vous`,isCorrect:!0},{id:`C`,text:`Direction informatique`,isCorrect:!1},{id:`D`,text:`Auditeurs internes`,isCorrect:!1}],explanation:`Ils utilisent ces fiches en situation de rendez-vous. La qualité du référentiel se ressent à ce moment précis.`},{id:`ctx.4`,statement:`Faire passer le taux de factures fournisseurs payées sous 30 jours de 70 % à 90 % d'ici la fin de l'année`,question:`Qui est le vrai bénéficiaire ?`,options:[{id:`A`,text:`Service comptabilité`,isCorrect:!1},{id:`B`,text:`Direction financière`,isCorrect:!1},{id:`C`,text:`Fournisseurs de l'entreprise`,isCorrect:!0},{id:`D`,text:`Acheteurs internes`,isCorrect:!1}],explanation:`Ils touchent leur argent à temps.`},{id:`ctx.5`,statement:`Diviser par deux le nombre de minutes d'indisponibilité du site marchand sur le mois`,question:`Qui est le vrai bénéficiaire ?`,options:[{id:`A`,text:`Équipe technique`,isCorrect:!1},{id:`B`,text:`Clients en train d'acheter`,isCorrect:!0},{id:`C`,text:`Direction du numérique`,isCorrect:!1},{id:`D`,text:`Prestataire d'hébergement`,isCorrect:!1}],explanat ing.`,question:`Quelle reformulation reflète la vraie valeur de ce travail (maintenance préventive) ?`,options:[{id:`A`,text:`Exécuter le test de bascule complet en staging d'ici fin de sprint.`,isCorrect:!1},{id:`B`,text:`Vérifier que notre plan de reprise fonctionne.`,isCorrect:!1},{id:`C`,text:`Réaliser le test de reprise avant l'audit de sécurité du mois prochain.`,isCorrect:!1},{id:`D`,text:`Faire passer le nombre d'écarts critiques de reprise non résolus de 4 à 0, avec preuve : test de bascule complet exécuté en staging (RTO et RPO mesurés), d'ici fin de sprint.`,isCorrect:!0}],explanation:`Faire le test est un output. La preuve d'écarts résolus (ou du contraire) est ce qui donne une vraie valeur au sprint — sinon le test devient un rituel qu'on coche.`}]};function pr(e){return e.replace(/\.+\s*$/,``)}function mr(e){let t=e.beneficiary.trim(),n=e.change.trim(),r=e.measure.trim();if(!t||!n)return``;let i=`Faire en sorte que ${t} ${pr(n)}`;return r&&(i+=`, mesuré par ${pr(r)}`),i+`.`}function R({variant:e,as:t=e===`context`?`aside`:`section`,title:n,meta:r,actions:i,children:a,"aria-label":o}){return(0,F.jsxs)(t,{className:`zone zone--${e}`,"aria-label":o,children:[(n||r||i)&&(0,F.jsxs)(`div`,{className:`zone__header`,children:[n&&(0,F.jsx)(`h3`,{className:`zone__title`,children:n}),r&&(0,F.jsx)(`span`,{className:`zone__meta`,children:r}),i]}),a]})}var hr=P(),gr={task:``,beneficiary:``,change:``,measure:``};function _r(){return(0,g.useMemo)(()=>hr.getSheets(`sprint`,`dev`).find(e=>e.id===`sprint.sheet.maintenance-value`)?.sections.find(e=>e.heading===`Trois questions à se poser`)?.bullets??[],[])}function vr({onExit:e}){let t=_r(),[n,r]=(0,g.useState)(0),[i,a]=(0,g.useState)(gr),[o,s]=(0,g.useState)(`Copier le brouillon`),c=(0,g.useMemo)(()=>mr(i),[i]);function l(){a(gr),r(0),s(`Copier le brouillon`)}async function u(){if(c)try{await navigator.clipboard.writeText(c),s(`Copié ✓`),window.setTimeout(()=>s(`Copier le brouillon`),1800)}catch{s(`Échec`),window.setTime .`,metrics:[`Tickets paiement par mois : 220`,`Échecs de paiement sans message clair : 40 %`,`Résolution moyenne d'un ticket : 2 jours`],skepticQuestion:xr,steps:[{id:`descente.sprint.tickets.step1`,question:`Pour que les tickets baissent d'ici la fin du trimestre, qu'est-ce qui doit bouger avant ?`,options:[{id:`a`,text:`La part des échecs de paiement sans message clair passe de 40 % à 10 %.`,correct:!0,explanation:`Un client qui comprend pourquoi son paiement a échoué corrige seul et n'ouvre pas de ticket. Mesurable dès la mise en production : constatable à la revue. (Pour la culture : un indicateur qui bouge avant l'impact est dit « leading » ; les tickets, qui bougent après, sont « lagging ».)`},{id:`b`,text:`Le nouveau centre d'aide est en ligne.`,correct:!1,explanation:`C'est une livraison : elle dit ce que l'équipe a fait, pas ce qui a changé. Un centre d'aide peut être en ligne et ne rien changer aux tickets.`},{id:`c`,text:`La satisfaction client (CSAT) remonte de 3,4 à 4,2.`,correct:!1,explanation:`Effet encore plus lointain que les tickets : il bougera après eux, pas avant. Hors d'influence visible d'ici la revue de sprint.`}],flagFeedback:`Pas ici : la chaîne tient, il existe un maillon constatable d'ici la revue (regarde la métrique des 40 %). Garde le drapeau pour le jour où il n'y en a vraiment pas.`,chainText:`La part des échecs de paiement sans message clair passe de 40 % à 10 %`,chainChip:`Constatable à la revue`},{id:`descente.sprint.tickets.step2`,question:`Et pour que la part d'échecs sans message clair baisse, qu'est-ce que l'équipe livre ?`,options:[{id:`a`,text:`Des messages d'explication sur les 5 échecs les plus fréquents, en production.`,correct:!0,explanation:`Une livraison précise et bornée, qui alimente directement le maillon du dessus.`},{id:`b`,text:`Refactorer le module de paiement.`,correct:!1,explanation:`Du travail sur le code, sans lien nommé avec les échecs mal expliqués. On ne saura pas si ça a servi.`},{id:`c`,text:`La refonte complète du parcours de paiement.`,correct:!1,explanation:`Peut-être utile un jour, mais rien de fini dans le sprint : rien à montrer à la revue.`}],flagFeedback:`Pas ici : il existe une livraison finissable dans le sprint qui nourrit le maillon du dessus.`,chainText:`Messages d'explication sur les 5 échecs les plus fréquents, en production`,chainChip:`Livraison`}],line:[{label:`Impact trimestriel`,detail:`les tickets passent de 220 à 120 par mois`,verdict:`bad`,feedback:`Hors d'influence sur un sprint : les tickets mettront des semaines à refléter le changement. C'est le maillon du sponsor, pas celui du sprint.`},{label:`Outcome de sprint`,detail:`les échecs sans message clair passent de 40 % à 10 %`,verdict:`good`,feedback:`Oui. Livré tôt dans le sprint, l'indicateur bouge avant la revue : tu montres une mesure, pas une promesse.`},{label:`Output`,detail:`les messages des 5 échecs sont en production`,verdict:`warn`,feedback:`Prudent, et parfois c'est la réalité. Mais si tu livres tôt, tu peux viser le maillon du dessus et montrer une mesure. À débattre en équipe.`}],finalQcmQuestion:`Alors, quel objectif de sprint écris-tu ?`,finalQcmOptions:[{id:`a`,text:`Mettre en production les nouveaux messages d'erreur d'ici la fin du sprint.`,correct:!1,explanation:`Le maillon livraison : nécessaire, mais l'objectif ne dit pas ce qui change.`},{id:`b`,text:`Réduire la part des échecs de paiement sans message clair de 40 % à 10 % d'ici la fin du sprint.`,correct:!0,explanation:`Le maillon juste sous la ligne de la revue : constatable, sous influence, chiffré. Et il nourrit visiblement l'objectif du trimestre.`},{id:`c`,text:`Réduire les tickets support paiement de 220 à 120 par mois d'ici la fin du sprint.`,correct:!1,explanation:`L'objectif du trimestre recopié dans le sprint : personne ne pourra le constater à l'échelle d'un sprint.`}],endRule:`Le bon objectif de sprint vise le maillon juste sous la ligne de la revue de sprint. Le trimestre garde l'impact, le sprint montre éliorer » ne dit ni quoi, ni pour qui, ni comment on le verra.`},{id:`c`,text:`La refonte complète du parcours d'accueil.`,correct:!1,explanation:`Trop gros pour un sprint : rien de fini à montrer à la revue.`}],flagFeedback:`Pas ici : une livraison finissable dans le sprint existe.`,chainText:`Invitation proposée à la fin de la création du premier projet, message pré-rempli`,chainChip:`Livraison`}],line:[{label:`Impact trimestriel`,detail:`l'activation à J+30 passe de 30 % à 45 %`,verdict:`bad`,feedback:`Il faut 30 jours pour mesurer J+30 : plus long que le sprint lui-même. Mathématiquement invisible à la revue, même si tout se passe bien.`},{label:`Outcome de sprint`,detail:`les invitations en première semaine passent de 28 % à 40 %`,verdict:`good`,feedback:`Oui : la fenêtre de mesure tient dans le sprint si tu livres tôt.`},{label:`Output`,detail:`l'écran d'invitation est en production`,verdict:`warn`,feedback:`Prudent. Livre tôt et tu pourras montrer la mesure du dessus plutôt qu'une copie d'écran.`}],finalQcmQuestion:`Alors, quel objectif de sprint écris-tu ?`,finalQcmOptions:[{id:`a`,text:`Livrer le nouvel écran d'invitation d'ici la fin du sprint.`,correct:!1,explanation:`Une livraison : on ne saura pas si elle change quelque chose.`},{id:`b`,text:`Faire passer la part des nouveaux comptes qui invitent un collègue en première semaine de 28 % à 40 % d'ici la fin du sprint.`,correct:!0,explanation:`Constatable à la revue, sous influence, chiffré, et branché sur l'objectif du trimestre.`},{id:`c`,text:`Faire passer l'activation à J+30 de 30 % à 45 % d'ici la fin du sprint.`,correct:!1,explanation:`La recopie du trimestre : invérifiable à l'échelle d'un sprint.`}],endRule:`Le bon objectif de sprint vise le maillon juste sous la ligne de la revue de sprint. Le trimestre garde l'impact, le sprint montre une mesure qui y mène.`},{id:`descente.sprint.astreinte`,kind:`chaine`,title:`Les réveils d'astreinte`,team:`Équipe Plateforme`,objectiveLabel:`objectif du trimestr ss`,isCorrect:!1},{id:`B`,text:`Délai entre fin de mois et clôture validée, en jours ouvrés, cible 4`,isCorrect:!0},{id:`C`,text:`Maîtrise des opérations`,isCorrect:!1}],explanation:`Délai chiffré observable chaque mois pendant le PI. « Efficience » et « maîtrise » sont des concepts.`}]},aa={kind:`grid`,intro:`Une variation précise à l'échelle PI donne un chiffre : valeur de référence, cible, écart. Une formulation vague laisse à l'interprétation à la revue de PI.`,data:{consigne:`Coche toutes les variations chiffrées exploitables sur un PI.`,fragments:[{id:`pi.v.1`,text:`Passer de 240 à 180 secondes sur le temps moyen de prise en charge d'appel`,isCorrect:!0,justification:`Valeurs de départ et d'arrivée explicites.`},{id:`pi.v.2`,text:`Améliorer sensiblement la satisfaction des grands comptes`,isCorrect:!1,justification:`« Sensiblement » n'est pas chiffré.`},{id:`pi.v.3`,text:`Diviser par 2 le nombre d'incidents bloquants en production, valeur de référence 8 par mois`,isCorrect:!0,justification:`Facteur et valeur de référence donnés.`},{id:`pi.v.4`,text:`Renforcer la robustesse de la plateforme de paiement`,isCorrect:!1,justification:`Aucune mesure ni cible.`},{id:`pi.v.5`,text:`Atteindre 60 % de démarches publiques finalisées sans contact agent, valeur de référence 42 %`,isCorrect:!0,justification:`Cible et valeur de référence chiffrées.`},{id:`pi.v.6`,text:`Faire progresser l'autonomie des équipes métiers`,isCorrect:!1,justification:`Aucun seuil ni valeur de référence.`},{id:`pi.v.7`,text:`Faire baisser le délai de clôture comptable de 7 à 4 jours ouvrés`,isCorrect:!0,justification:`Valeurs avant et après explicites.`},{id:`pi.v.8`,text:`Avoir un impact significatif sur la dette technique`,isCorrect:!1,justification:`Formulation vide de cible.`}]}},oa={kind:`grid`,intro:`Une échéance à l'échelle du PI est bornée par un événement SAFe identifiable (revue de PI, fin de PI, PI Planning suivant, mi-PI, date calendaire).`,data:{consigne:`Coche toutes les échéances bornées valides à l'échelle d'un PI.`,fragments:[{id:`pi.e.1`,text:`Démontré à la revue de PI du 28 mars`,isCorrect:!0,justification:`Événement et date précis.`},{id:`pi.e.2`,text:`Sur la durée du programme`,isCorrect:!1,justification:`Aucun horizon défini.`},{id:`pi.e.3`,text:`Avant le PI Planning N+1`,isCorrect:!0,justification:`Événement SAFe identifiable.`},{id:`pi.e.4`,text:`Dès que possible`,isCorrect:!1,justification:`Formule sans engagement.`},{id:`pi.e.5`,text:`Mesuré en fin de PI sur les données de la dernière itération`,isCorrect:!0,justification:`Borne PI + source de mesure précisée.`},{id:`pi.e.6`,text:`Dans les prochains PI`,isCorrect:!1,justification:`Combien de PI, à partir de quand.`},{id:`pi.e.7`,text:`Atteint au plus tard mi-PI, soit semaine 6`,isCorrect:!0,justification:`Repère mi-PI converti en semaine.`},{id:`pi.e.8`,text:`Rapidement après le démarrage`,isCorrect:!1,justification:`« Rapidement » non borné.`}]}},sa=`Qui est le vrai bénéficiaire de cet objectif PI ?`,ca={kind:`qcm`,intro:`À l'échelle d'un PI SAFe, le bénéficiaire peut être un client final, un autre train arrimé, une équipe partenaire interne. Toujours distinguer le porteur (qui livre) du bénéficiaire (qui en profite).`,cases:[{id:`pi.ctx.1`,statement:`Le train paiement expose une nouvelle interface de règlement instantané pour que le train e-commerce l'intègre dans le tunnel`,question:sa,options:[{id:`A`,text:`Clients finaux du e-commerce`,isCorrect:!1},{id:`B`,text:`Train e-commerce qui consomme l'interface`,isCorrect:!0},{id:`C`,text:`Équipe paiement qui produit`,isCorrect:!1},{id:`D`,text:`Direction financière`,isCorrect:!1}],explanation:`À la livraison du PI, c'est le train e-commerce qui peut avancer ; les clients n'en profitent qu'après son intégration.`},{id:`pi.ctx.2`,statement:`Le train données livre un catalogue exposé permettant aux équipes marketing d'auto-servir leurs segments`,question:sa,options:[{id:`A`,text:`Équipes marketing utilisatrices du catalogue`,isCorrect:!0
