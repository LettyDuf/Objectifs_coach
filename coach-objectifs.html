nte)."}]},{id:"quiz.sprint.dev.search-window",type:"sprint",audience:"dev",teamLabel:"Équipe Search",iconName:"practice",context:"5 devs, 1 Product Owner. L'équipe travaille sur la recherche d'un site e-commerce. Sprint dédié à la refonte de l'algorithme de tri des résultats.",metrics:[{label:"CTR sur les résultats de recherche",value:"18 %"},{label:"Sessions avec recherche / jour",value:"4 500"},{label:"Taux de retour M+1 des utilisateurs ayant cherché",value:"32 %"}],proposedObjective:"Augmenter le taux de retour mensuel des utilisateurs du module search.",options:[{id:"A",text:"Augmenter le taux de retour mensuel des utilisateurs du module search.",verdict:"bad",explanation:"Pas de seuil, pas de point de départ, pas d'échéance. Et le « taux de retour mensuel » ne peut pas être observé dans un sprint de 2-4 semaines : la fenêtre de mesure ne tient pas dans la fenêtre de l'objectif."},{id:"B",text:"Faire passer le CTR sur les résultats de recherche de 18 % à 28 % d'ici la fin du sprint.",verdict:"good",explanation:"Métrique observable dans la fenêtre du sprint, point de départ, cible, échéance. C'est un indicateur leading qu'un meilleur tri peut réellement bouger sur cette période."},{id:"C",text:"Faire passer le taux de retour M+1 des utilisateurs search de 32 % à 45 % d'ici la fin du sprint.",verdict:"partial",explanation:"Forme exemplaire (métrique nommée, avant, après, échéance) — mais le taux M+1 se mesure à 1 mois minimum après une session. En fin de sprint, on ne pourra pas dire si l'objectif est atteint. Piège : la fenêtre temporelle de la métrique dépasse la fenêtre du sprint."},{id:"D",text:"Améliorer la pertinence des résultats de recherche.",verdict:"bad",explanation:"« Améliorer » et « pertinence » sont flous. Aucune métrique, aucun seuil, aucune échéance."}]},{id:"quiz.sprint.dev.mobile-vanity",type:"sprint",audience:"dev",teamLabel:"Équipe Mobile",iconName:"okr",context:"6 devs, 1 Product Owner. L'équipe construit l'application mobile. Sprint sur la refonte du parcours d'onboarding pour les nouveaux utilisateurs.",metrics:[{label:"Téléchargements / semaine",value:"2 200"},{label:"Taux d'activation (1ʳᵉ action clé) des nouveaux utilisateurs",value:"38 %"},{label:"Utilisateurs actifs mensuels (MAU)",value:"14 200"}],proposedObjective:"Augmenter le nombre de téléchargements de l'app.",options:[{id:"A",text:"Faire passer le nombre de téléchargements de 2 200 à 3 500 par semaine d'ici la fin du sprint.",verdict:"partial",explanation:"Forme correcte (métrique, avant, après, échéance) mais c'est une vanity metric : un téléchargement ne dit rien de l'usage réel. L'objectif du sprint étant l'onboarding, la métrique pertinente est l'activation."},{id:"B",text:"Faire passer le taux d'activation des nouveaux utilisateurs (1ʳᵉ action clé) de 38 % à 55 % d'ici la fin du sprint.",verdict:"good",explanation:"Métrique d'usage qui mesure l'effet réel de l'onboarding — pas un téléchargement orphelin. Aligné avec le travail effectif de l'équipe."},{id:"C",text:"Livrer la nouvelle page d'onboarding mobile.",verdict:"bad",explanation:"Output pur. La page peut être livrée sans changer le moindre comportement utilisateur."},{id:"D",text:"Optimiser le parcours d'onboarding mobile.",verdict:"bad",explanation:"« Optimiser » est flou. Aucun chiffre, aucune cible, aucune fenêtre."}]},{id:"quiz.sprint.dev.api-ambition",type:"sprint",audience:"dev",teamLabel:"Équipe Plateforme API",iconName:"wrench",context:"4 devs, 1 SRE, 1 Tech Lead. L'équipe maintient les APIs internes utilisées par les équipes produit. Sprint perf pour préparer une montée en charge prévue dans deux mois.",metrics:[{label:"Temps de réponse p95 de l'API (actuel)",value:"850 ms"},{label:"Charge max supportée sans dégradation",value:"1 200 req/s"},{label:"Incidents perf signalés par les consommateurs / semaine",value:"4"}],proposedObjective:"Diviser par 10 le temps de réponse p95 de l'API d'ici la fin du sprint.",options:[{id:"A",text:"Diviser par 10 le temps de réponse p95 de l'API d'ici la fin du sprint.",verdict:"bad",explanation:"Passer de 850 ms à 85 ms en 2-4 semaines est très peu crédible — c'est un vœu pieux, pas un objectif. Sprint Goal mal calibré : ambition incohérente avec la fenêtre. Mieux vaut viser ambitieux mais crédible."},{id:"B",text:"Faire passer le temps de réponse p95 de l'API de 850 ms à 400 ms d'ici la fin du sprint.",verdict:"good",explanation:"Ambition crédible (~50 % de réduction), métrique nommée, avant, après, échéance. L'équipe peut s'engager honnêtement et juger à la fin du sprint."},{id:"C",text:"Diviser par 2 le temps de réponse p95 de l'API.",verdict:"partial",explanation:"Métrique nommée, facteur de variation correct (par 2 = crédible). Mais sans point de départ explicite ni échéance, on perd la lecture immédiate de l'effort. Préférer la forme « de A à B d'ici X »."},{id:"D",text:"Optimiser les performances de l'API.",verdict:"bad",explanation:"Pas de métrique, pas de cible, pas d'échéance. « Optimiser » seul ne crée aucun engagement vérifiable."}]},{id:"quiz.sprint.dev.upgrade-leading",type:"sprint",audience:"dev",teamLabel:"Équipe Upgrade",iconName:"target",context:"4 devs, 1 Product Owner. L'équipe travaille sur le tunnel de passage essai → payant. Sprint de redesign de l'écran de fin d'essai. Le pricing et le commercial sont gérés ailleurs.",metrics:[{label:"Taux de conversion essai → payant (PI précédent)",value:"12 %"},{label:"Sessions essai arrivant en fin de période / semaine",value:"1 800"},{label:"Taux de clic sur le bouton « souscrire » depuis l'écran de fin",value:"22 %"}],proposedObjective:"Faire passer le taux de conversion essai → payant de 12 % à 18 % d'ici la fin du sprint.",options:[{id:"A",text:"Faire passer le taux de conversion essai → payant de 12 % à 18 % d'ici la fin du sprint.",verdict:"partial",explanation:"Forme exemplaire — mais la conversion finale dépend aussi du pricing, du commercial, du temps de réflexion utilisateur. L'équipe n'a pas la main directe sur tous ces leviers. Pour un sprint, mieux vaut viser un indicateur leading sous influence directe."},{id:"B",text:"Faire passer le taux de clic sur « souscrire » depuis l'écran de fin d'essai de 22 % à 35 % d'ici la fin du sprint.",verdict:"good",explanation:"Métrique directement sous l'influence du redesign que l'équipe livre. Observable immédiatement en fin de sprint. Indicateur leading qui contribue à la conversion (suivie en aval, par l'équipe Upgrade au PI)."},{id:"C",text:"Améliorer le tunnel premium.",verdict:"bad",explanation:"Pas de métrique, pas de cible. Reformulation vide pour un sprint qui demande un cap clair."},{id:"D",text:"Livrer la nouvelle landing page premium d'ici la fin du sprint.",verdict:"bad",explanation:"Output. La page peut être livrée sans effet sur la conversion."}]},{id:"quiz.sprint.dev.oauth-implicit-composite",type:"sprint",audience:"dev",teamLabel:"Équipe Auth",iconName:"target",context:"5 devs, 1 Product Owner. L'équipe travaille sur l'authentification du site marchand. Sprint sur l'ouverture de la connexion OAuth pour réduire la friction au paiement.",metrics:[{label:"Tentatives OAuth / jour",value:"480"},{label:"Sessions OAuth réussies / jour",value:"12"},{label:"Taux d'abandon sur la page de login",value:"28 %"}],proposedObjective:"Permettre aux utilisateurs invités de se connecter via OAuth pour réduire les abandons de paiement.",options:[{id:"A",text:"Permettre aux utilisateurs invités de se connecter via OAuth pour réduire les abandons de paiement.",verdict:"bad",explanation:"Composite caché par le « pour » causal. Deux objectifs liés : ouvrir OAuth ET faire baisser l'abandon. Si OAuth marche mais l'abandon ne baisse pas, l'objectif est-il atteint ? Le « pour » fait passer un implicite pour une certitude."},{id:"B",text:"Faire passer le taux d'abandon sur la page de login de 28 % à 12 % d'ici la fin du sprint.",verdict:"good",explanation:"Un seul outcome mesurable. OAuth devient un moyen, l'objectif est ce qu'on cherche à constater chez l'utilisateur."},{id:"C",text:"Mettre en place OAuth pour les utilisateurs invités d'ici la fin du sprint.",verdict:"bad",explanation:"Output. La fonctionnalité peut être en place sans effet observable côté abandon. Mauvais Sprint Goal."},{id:"D",text:"Améliorer l'expérience de connexion sur la page de paiement.",verdict:"bad",explanation:"« Améliorer » + « expérience » : flou pur. Pas de métrique, pas de seuil."}]},{id:"quiz.sprint.dev.search-front-nps",type:"sprint",audience:"dev",teamLabel:"Équipe Frontend Search",iconName:"practice",context:"4 devs front, 1 Product Owner. L'équipe maintient l'affichage des résultats de recherche. Sprint d'optimisation du rendu (composant ResultsList).",metrics:[{label:"Temps de rendu front p95 des résultats",value:"320 ms"},{label:"NPS de la fonctionnalité recherche (enquête trimestrielle)",value:"42"},{label:"Taux de clic sur les résultats",value:"18 %"}],proposedObjective:"Faire passer le NPS de la fonctionnalité recherche de 42 à 60 d'ici la fin du sprint.",options:[{id:"A",text:"Faire passer le NPS de la fonctionnalité recherche de 42 à 60 d'ici la fin du sprint.",verdict:"partial",explanation:"Forme exemplaire — mais le NPS se mesure via une enquête trimestrielle. En fin de sprint, aucune mesure ne sera disponible. Piège classique : bonne grammaire, mauvaise cadence de mesure."},{id:"B",text:"Diviser par 2 le temps de rendu front des résultats de recherche (de 320 ms à 160 ms) d'ici la fin du sprint.",verdict:"good",explanation:"Métrique technique observable en continu, sous influence directe de l'équipe, mesurable en fin de sprint. Cadence cohérente."},{id:"C",text:"Optimiser le rendu des résultats de recherche.",verdict:"bad",explanation:"« Optimiser » est flou. Pas de seuil ni d'échéance."},{id:"D",text:"Refactorer le composant ResultsList en suivant les nouvelles règles d'architecture.",verdict:"bad",explanation:"Output technique. Aucun effet nommé côté rendu, utilisateur ou métrique observable."}]}],eb=[{id:"quiz.pi.dev.checkout-train",type:"pi",audience:"dev",teamLabel:"Train Checkout · 4 équipes",iconName:"wrench",context:"Le train regroupe 4 équipes autour du tunnel d'achat. Le Business Owner pousse pour augmenter les conversions mobile. PI Planning dans deux semaines, objectif à figer en committed.",metrics:[{label:"Taux de conversion tunnel mobile (PI précédent)",value:"2,3 %"},{label:"Trafic mobile / mois",value:"1,4 M visites"},{label:"Sessions abandonnées au paiement / mois",value:"32 %"}],proposedObjective:"Refactorer le tunnel d'achat mobile et améliorer l'UX globale.",options:[{id:"A",text:"Refactorer le tunnel d'achat mobile et améliorer l'UX globale.",verdict:"bad",explanation:"« Refactorer » est un output technique. « Améliorer l'UX » est flou. Le Business Owner ne saura pas à la PI Review si l'objectif est atteint ou pas."},{id:"B",text:"Faire passer le taux de conversion du tunnel mobile de 2,3 % à 3,5 % d'ici la PI Review.",verdict:"good",explanation:"Outcome de valeur métier, métrique nommée, point de départ, cible, fenêtre de mesure (PI Review). Le Business Owner peut juger sans ambiguïté."},{id:"C",text:"Augmenter les conversions sur mobile.",verdict:"partial",explanation:"Outcome correct, métrique implicite. Mais aucun seuil chiffré, aucune fenêtre. À renforcer avec « de X à Y » et l'échéance de PI."},{id:"D",text:"Livrer la v2 du tunnel d'achat mobile sur le PI.",verdict:"bad",explanation:"« Livrer la v2 » est une livraison, pas un résultat de valeur. Et si la v2 est livrée mais que la conversion baisse ? La PI Review devra trancher sans critère."}]},{id:"quiz.pi.dev.sso-enterprise",type:"pi",audience:"dev",teamLabel:"Train Auth · 3 équipes",iconName:"target",context:"Le commercial bloque depuis 6 mois sur l'argument SSO chez les grands comptes. Activation SSO aujourd'hui manuelle, 2 semaines par client. PI Planning impose un committed avec une cible chiffrée.",metrics:[{label:"Clients entreprise avec SSO activé",value:"8 sur 47"},{label:"Temps moyen d'activation SSO par client",value:"12 jours"},{label:"Deals bloqués par l'argument SSO (sales)",value:"11"}],proposedObjective:"Migrer l'authentification vers OAuth 2.0.",options:[{id:"A",text:"Migrer l'authentification vers OAuth 2.0.",verdict:"bad",explanation:"Activité technique pure. Le verrou commercial reste sans réponse mesurable : combien de clients passeront en self-service, en combien de temps ?"},{id:"B",text:"Permettre à 80 % des clients entreprise d'activer le SSO en self-service avant la fin du PI (de 8 / 47 à 38 / 47).",verdict:"good",explanation:"Outcome côté client, métrique nommée, point de départ, cible, fenêtre de mesure. La migration OAuth devient un moyen, pas une fin."},{id:"C",text:"Réduire le temps d'activation SSO d'un client entreprise.",verdict:"partial",explanation:"Bonne métrique, mais sans seuil ni point de départ. Préciser : passer de 12 jours à 1 jour, par exemple."},{id:"D",text:"Mettre en place le self-service pour le SSO d'ici la PI Review.",verdict:"bad",explanation:"« Mettre en place » nomme un projet, pas un changement constaté. Si le self-service est en place mais utilisé par 2 clients, est-ce un succès ?"}]},{id:"quiz.pi.dev.marketplace-pilot",type:"pi",audience:"dev",teamLabel:"Train Marketplace · 5 équipes",iconName:"okr",context:"Nouvelle offre marketplace en lancement, le train explore. Le PI Planning impose un objectif **stretch** : ambitieux, confiance 30-60 %. Tout le monde sait que ça peut tomber à 0, mais on vise haut.",metrics:[{label:"Clients pilotes signés à ce jour",value:"0"},{label:"Prospects en discussion",value:"23"},{label:"Hypothèse de volume de transactions cible (offre)",value:"non figée"}],proposedObjective:"Lancer la marketplace en production avec succès sur ce PI.",options:[{id:"A",text:"Lancer la marketplace en production avec succès sur ce PI.",verdict:"bad",explanation:"« Avec succès » est vide. À la PI Review, deux personnes peuvent défendre des verdicts opposés. Sur un stretch, c'est précisément là où la rigueur de mesure compte."},{id:"B",text:"Faire entrer 3 clients pilotes sur la nouvelle offre marketplace avant la PI Review.",verdict:"good",explanation:"Seuil chiffré (3), bénéficiaire (clients pilotes), fenêtre (PI Review). Ambitieux pour un stretch (on est à 0 aujourd'hui), mais falsifiable d'un coup d'œil."},{id:"C",text:"Atteindre 100 transactions sur la marketplace d'ici la fin du PI.",verdict:"partial",explanation:"Métrique observable, cible chiffrée — bonne structure. Mais 100 transactions sans qualifier qui les fait : 100 transactions chez 1 seul gros client ne valide pas l'hypothèse marketplace."},{id:"D",text:"Déployer toutes les fonctionnalités prévues pour la v1 de la marketplace.",verdict:"bad",explanation:"Mesure le travail interne, pas l'adoption. Sur un stretch, l'enjeu est l'apprentissage marché — pas la complétion d'une roadmap."}]},{id:"quiz.pi.dev.onboarding-scale",type:"pi",audience:"dev",teamLabel:"Train Onboarding · 4 équipes",iconName:"practice",context:"Le taux d'activation des nouveaux comptes stagne à 42 % depuis deux trimestres. Le board demande +20 points sur ce PI. Train coordonné acquisition / produit / support. Cible committed, confiance équipe estimée à 85 %.",metrics:[{label:"Taux d'activation à J+30 (PI précédent)",value:"42 %"},{label:"Nouveaux comptes créés / mois",value:"1 200"},{label:"Cible board exprimée",value:"62 %"}],proposedObjective:"Augmenter significativement l'activation utilisateur.",options:[{id:"A",text:"Augmenter significativement l'activation utilisateur.",verdict:"bad",explanation:"« Significativement » est flou alors que la cible est connue (+20 pts, 62 %). Sur un committed, l'absence de seuil chiffré est une faute."},{id:"B",text:"Faire passer le taux d'activation à J+30 de 42 % à 62 % d'ici la PI Review.",verdict:"good",explanation:"Métrique nommée, point de départ (42 %), cible (62 %), fenêtre (PI Review). Aligné avec la demande du board, mesurable sans débat."},{id:"C",text:"Améliorer le parcours d'inscription et réduire le taux d'abandon.",verdict:"bad",explanation:"« Améliorer » est flou, et c'est composite (deux objectifs). Sur un committed, on attend un cap unique chiffré."},{id:"D",text:"Atteindre 62 % d'activation à J+30 d'ici la fin du PI.",verdict:"partial",explanation:"Cible chiffrée et fenêtre — bonne base. Mais sans point de départ (42 %), on perd la lecture de l'effort fourni par le train."}]},{id:"quiz.pi.dev.platform-stability",type:"pi",audience:"dev",teamLabel:"Train Plateforme · 6 équipes",iconName:"wrench",context:"La plateforme est victime de son succès. MTTR de 45 min, 8 incidents majeurs ce trimestre. Les équipes feature passent 30 % de leur temps en oncall. Objectif stretch ambitieux pour ce PI.",metrics:[{label:"MTTR moyen (PI précédent)",value:"45 min"},{label:"Incidents majeurs / trimestre",value:"8"},{label:"Temps oncall des équipes feature",value:"30 %"}],proposedObjective:"Stabiliser la plateforme et alléger la charge oncall des équipes feature.",options:[{id:"A",text:"Stabiliser la plateforme et alléger la charge oncall des équipes feature.",verdict:"bad",explanation:"Composite (« et » coordonne deux objectifs distincts) + verbe d'output (« stabiliser ») + flou. Sépare en deux PI Objectives, chacun mesurable."},{id:"B",text:"Diviser par 3 le MTTR moyen de la plateforme (de 45 min à 15 min) d'ici la PI Review.",verdict:"good",explanation:"Un seul résultat, métrique nommée, point de départ, cible, fenêtre. Le sujet « charge oncall » devient un autre PI Objective du même train, séparé."},{id:"C",text:"Réduire la dette technique de la plateforme.",verdict:"bad",explanation:"« Dette technique » est flou. Le Business Owner ne pourra pas juger à la PI Review. Aucun bénéficiaire externe ne ressent directement la dette technique."},{id:"D",text:"Ramener le temps oncall des équipes feature de 30 % à 10 % d'ici la PI Review.",verdict:"partial",explanation:"Bon outcome, bonne mesure, bonne fenêtre — c'est un PI Objective valide. Mais c'est la **deuxième moitié** de l'objectif initial. À porter dans un autre PI Objective du même train, pas en remplacement."}]},{id:"quiz.pi.dev.churn-premium",type:"pi",audience:"dev",teamLabel:"Train Retention · 3 équipes",iconName:"target",context:"Le churn mensuel des comptes premium est passé de 1,8 % à 4 % sur les derniers trimestres. Le board veut un committed avec cible chiffrée pour ce PI. Confiance équipe estimée à 80 %.",metrics:[{label:"Churn mensuel comptes premium (actuel)",value:"4 %"},{label:"Churn mensuel historique (référence)",value:"1,8 %"},{label:"Nombre de comptes premium actifs",value:"2 400"}],proposedObjective:"Réduire le churn premium de manière notable d'ici la fin du PI.",options:[{id:"A",text:"Réduire le churn premium de manière notable d'ici la fin du PI.",verdict:"bad",explanation:"« De manière notable » est non mesurable. Sur un committed à 80 % de confiance, on attend une cible chiffrée nette — la métrique et la référence historique existent."},{id:"B",text:"Faire passer le churn mensuel des comptes premium de 4 % à 2 % d'ici la PI Review.",verdict:"good",explanation:"Métrique nommée, point de départ (4 %), cible (2 %, proche de l'historique 1,8 %), fenêtre. Falsifiable, calibré sur la confiance équipe."},{id:"C",text:"Diviser le churn premium par deux d'ici la fin du PI.",verdict:"partial",explanation:"Variation chiffrée, fenêtre — bonne base. Mais formulation relative (« par deux ») qui demande un calcul mental. La forme « de 4 % à 2 % » se vérifie d'un coup d'œil."},{id:"D",text:"Améliorer la rétention des comptes premium.",verdict:"bad",explanation:"Pas de chiffre, pas de seuil, mot flou (« améliorer »). À la PI Review, deux personnes peuvent défendre que c'est atteint sans s'accorder."}]},{id:"quiz.pi.dev.mobile-ltv-window",type:"pi",audience:"dev",teamLabel:"Train Mobile · 5 équipes",iconName:"okr",context:"Le train mobile prépare une refonte UX importante. Le Business Owner pousse sur la valeur long terme par utilisateur. PI Planning impose un committed avec cible mesurable à la PI Review (8 semaines).",metrics:[{label:"LTV utilisateurs mobile (cohorte 12 mois)",value:"80 €"},{label:"Taux d'engagement à 30 jours (proxy retention)",value:"28 %"},{label:"MAU mobile",value:"62 000"}],proposedObjective:"Faire passer le LTV des utilisateurs mobile de 80 € à 120 € sur le PI.",options:[{id:"A",text:"Faire passer le LTV des utilisateurs mobile de 80 € à 120 € sur le PI.",verdict:"partial",explanation:"Forme exemplaire (métrique, avant, après) — mais le LTV se calcule sur 12 mois de comportement. À la PI Review (8 semaines), aucune mesure de LTV ne sera disponible. La cadence de mesure ne tient pas dans la cadence PI."},{id:"B",text:"Faire passer le taux d'engagement à 30 jours des nouveaux utilisateurs mobile de 28 % à 50 % d'ici la PI Review.",verdict:"good",explanation:"Proxy leading du LTV, observable dans la fenêtre PI. Sous influence directe du train (refonte UX). Mesurable et attribuable à la PI Review."},{id:"C",text:"Améliorer significativement la valeur des utilisateurs mobile.",verdict:"bad",explanation:"« Améliorer » + « significativement » : double flou. Pas de métrique nommée, pas de seuil, pas de fenêtre."},{id:"D",text:"Livrer la refonte UX mobile sur ce PI.",verdict:"bad",explanation:"Output. La refonte peut être livrée sans effet sur la valeur produit. Mauvais PI Objective."}]},{id:"quiz.pi.dev.analytics-cross-team",type:"pi",audience:"dev",teamLabel:"Train Données · 4 équipes",iconName:"wrench",context:"Train Données qui maintient la plateforme analytics interne. Les équipes business sont les clientes. Sur ce PI, le train veut formaliser sa contribution à la prise de décision business.",metrics:[{label:"Équipes business utilisant la plateforme / mois",value:"9 / 14"},{label:"Temps moyen entre question business et réponse via plateforme",value:"3 jours"},{label:"Tickets « besoin d'aide analyse » / mois",value:"42"}],proposedObjective:"Permettre aux équipes business de prendre 80 % de leurs décisions via la plateforme analytics d'ici la PI Review.",options:[{id:"A",text:"Permettre aux équipes business de prendre 80 % de leurs décisions via la plateforme analytics d'ici la PI Review.",verdict:"partial",explanation:"Bonne intention, métrique attractive — mais qu'une équipe business « prenne une décision via la plateforme » dépend autant de leur maturité analytique que de la plateforme. Le train n'a pas la main directe : sous-influence partielle. Et la métrique est difficile à instrumenter objectivement."},{id:"B",text:"Faire passer le temps moyen pour répondre à une question business via la plateforme de 3 jours à 2 h d'ici la PI Review.",verdict:"good",explanation:"Métrique directement sous l'influence du train (vitesse de réponse de la plateforme). Mesurable, observable à la PI Review. Crée un appel à utiliser la plateforme — sans dépendre de la maturité des équipes clientes."},{id:"C",text:"Améliorer la plateforme analytics pour les équipes business.",verdict:"bad",explanation:"Flou pur. Aucune métrique, aucun seuil. À la PI Review, personne ne saura trancher."},{id:"D",text:"Mettre en place les 12 nouveaux tableaux de bord demandés par les équipes business sur ce PI.",verdict:"bad",explanation:"Output. Les 12 tableaux peuvent être livrés sans changer le temps de réponse ni l'usage réel. Mesure le travail, pas la valeur."}]},{id:"quiz.pi.dev.compliance-miscalibration",type:"pi",audience:"dev",teamLabel:"Train Conformité · 3 équipes",iconName:"target",context:"Échéance réglementaire RGPD dans 18 mois. Le train fait une première vague d'audit. Le DPO veut une cible engageante. Confiance équipe à 45 % de tenir la cible 100 % en un PI.",metrics:[{label:"Traitements de données client identifiés",value:"184"},{label:"Traitements actuellement conformes RGPD",value:"62 / 184"},{label:"Confiance équipe d'atteindre 100 % en un PI",value:"45 %"}],proposedObjective:"Atteindre 100 % de conformité RGPD sur les traitements de données client d'ici la PI Review — classé committed.",options:[{id:"A",text:"Atteindre 100 % de conformité RGPD sur les traitements de données client d'ici la PI Review — classé committed.",verdict:"bad",explanation:"Calibrage incohérent. Un committed se vise à 80-100 % de confiance ; ici l'équipe est à 45 %. À la PI Review, l'objectif ratera l'engagement committed — perte de crédibilité pour le train."},{id:"B",text:"Atteindre 100 % de conformité RGPD sur les traitements de données client d'ici la PI Review — classé stretch.",verdict:"good",explanation:"Même cible, classement honnête. Un stretch se vise à 30-60 % de confiance — exactement la situation. À la PI Review, atteindre 80 % sur un stretch est un vrai succès."},{id:"C",text:"Faire passer le nombre de traitements conformes RGPD de 62 à 122 d'ici la PI Review — classé committed.",verdict:"partial",explanation:"Cible chiffrée crédible (≈ doubler), classement committed cohérent avec une confiance probable >80 %. C'est défendable, mais moins ambitieux que ce que veut le DPO. Selon le contexte stratégique, B (stretch à 100 %) ou C (committed à 122) peuvent se défendre — le piège est uniquement A (committed à 100 % avec 45 % de confiance)."},{id:"D",text:"Améliorer notre conformité RGPD.",verdict:"bad",explanation:"Pas de chiffre, pas de seuil, pas de fenêtre. Hors-jeu pour un PI Objective."}]},{id:"quiz.pi.dev.marketplace-vanity",type:"pi",audience:"dev",teamLabel:"Train Marketplace · 5 équipes",iconName:"okr",context:"La marketplace a 8 mois. Phase scale-up. Le Business Owner pousse pour démontrer la traction commerciale au board, qui décidera de l'investissement sur l'année suivante.",metrics:[{label:"Visiteurs uniques mensuels marketplace",value:"12 000"},{label:"GMV mensuel (Gross Merchandise Value)",value:"50 k€"},{label:"Acheteurs uniques mensuels",value:"180"}],proposedObjective:"Atteindre 50 000 visiteurs uniques mensuels sur la marketplace d'ici la PI Review.",options:[{id:"A",text:"Atteindre 50 000 visiteurs uniques mensuels sur la marketplace d'ici la PI Review.",verdict:"partial",explanation:"Métrique nommée, cible, fenêtre. Mais c'est une vanity metric : un visiteur ne dit rien de la traction commerciale. Le board attend du GMV ou des acheteurs, pas du trafic."},{id:"B",text:"Faire passer le GMV mensuel de la marketplace de 50 k€ à 200 k€ d'ici la PI Review.",verdict:"good",explanation:"Métrique de fin (valeur économique), point de départ, cible, fenêtre. Aligné avec ce que le board veut voir, mesurable à la PI Review."},{id:"C",text:"Faire de notre marketplace la plus dynamique de notre secteur.",verdict:"bad",explanation:"C'est un Objective qualitatif inspirant, pas un PI Objective mesurable. Pas de métrique, pas de seuil."},{id:"D",text:"Lancer 5 nouvelles catégories produit sur la marketplace ce PI.",verdict:"bad",explanation:"Output. 5 catégories peuvent être lancées sans traction commerciale. Le PI Objective ne doit pas mesurer le travail interne."}]},{id:"quiz.pi.dev.signup-guardrail",type:"pi",audience:"dev",teamLabel:"Train Acquisition · 4 équipes",iconName:"challenge",context:"Le train Acquisition pousse la croissance via la landing page principale. Le board veut +3x sur les inscriptions. L'équipe Rétention rappelle qu'augmenter le volume sans qualifier dégrade le churn.",metrics:[{label:"Taux d'inscription depuis la landing page",value:"4 %"},{label:"Taux d'activation J+7 des nouveaux inscrits",value:"45 %"},{label:"Inscriptions qualifiées (activées J+7) / mois",value:"320"}],proposedObjective:"Faire passer le taux d'inscription depuis la landing page de 4 % à 12 % d'ici la PI Review.",options:[{id:"A",text:"Faire passer le taux d'inscription depuis la landing page de 4 % à 12 % d'ici la PI Review.",verdict:"partial",explanation:"Forme correcte. Mais isolément, on peut tripler le taux d'inscription en attirant n'importe qui — au prix d'un churn massif derrière. Sans métrique guardrail (qualité), le PI Objective peut être atteint en détruisant de la valeur en aval."},{id:"B",text:"Faire passer le taux d'inscription qualifiée (activée J+7) depuis la landing page de 1,8 % à 5 % d'ici la PI Review.",verdict:"good",explanation:"Métrique composée qui intègre la qualité : on ne compte que les inscrits qui ont fait quelque chose. Impossible de l'atteindre en attirant n'importe qui. Outcome aligné avec la valeur, pas avec le volume."},{id:"C",text:"Augmenter le volume d'inscriptions sur la landing page sans dégrader la rétention.",verdict:"partial",explanation:"Intention juste (le guardrail est nommé) mais pas de chiffre, pas de seuil, pas de fenêtre. Pour un PI Objective, il faut quantifier."},{id:"D",text:"Refondre la landing page et améliorer le tunnel d'acquisition.",verdict:"bad",explanation:"Composite (« et »), deux outputs. Aucune métrique. Vœu pieux côté valeur."}]},{id:"quiz.pi.dev.platform-means-vs-ends",type:"pi",audience:"dev",teamLabel:"Train Plateforme · 6 équipes",iconName:"wrench",context:"Train Plateforme. PI Objective autour de la fiabilité. Le SRE pousse pour des indicateurs de mécanique interne (couverture, alerting). Le Business Owner veut des indicateurs perçus par les équipes feature consommatrices.",metrics:[{label:"MTTR moyen des incidents plateforme",value:"45 min"},{label:"Couverture de tests d'intégration",value:"62 %"},{label:"Temps oncall des équipes feature",value:"30 %"}],proposedObjective:"Atteindre 90 % de couverture de tests d'intégration sur la plateforme d'ici la PI Review.",options:[{id:"A",text:"Atteindre 90 % de couverture de tests d'intégration sur la plateforme d'ici la PI Review.",verdict:"partial",explanation:"Métrique nommée, cible, fenêtre — forme correcte. Mais la couverture est une métrique de moyen, pas de fin. Atteindre 90 % de couverture ne garantit pas que la plateforme est plus fiable côté équipes feature. Le Business Owner attend une métrique de fin."},{id:"B",text:"Faire passer le MTTR moyen des incidents plateforme de 45 min à 15 min d'ici la PI Review.",verdict:"good",explanation:"Métrique de fin (la fiabilité perçue par les équipes feature : moins de temps en panne). La couverture devient un des leviers possibles pour y arriver, parmi d'autres. Aligné avec ce que mesure le Business Owner."},{id:"C",text:"Stabiliser la plateforme et alléger la charge oncall.",verdict:"bad",explanation:"Composite + flou. Deux objectifs (stabilisation + oncall) sans seuils chiffrés."},{id:"D",text:"Mettre en place le nouveau système d'alerting.",verdict:"bad",explanation:"Output. Le système peut être en place sans effet sur la fiabilité ressentie."}]}],tb=[{id:"quiz.okr-equipe.dev.kr-project-dashboard",type:"okr-equipe",audience:"dev",teamLabel:"Équipe Observabilité",iconName:"okr",context:"6 devs, 1 Product Manager. L'équipe maintient les outils internes d'observabilité utilisés par les autres équipes data. Cycle OKR trimestriel.",metrics:[{label:"Équipes data actives sur le module pipeline / mois",value:"8"},{label:"NPS dev du module pipeline (dernier sondage)",value:"28"},{label:"Temps moyen de détection d'un pipeline cassé",value:"45 min"}],objectiveContext:"Devenir l'outil de référence des équipes data pour l'observabilité des pipelines.",proposedObjective:"Livrer le nouveau dashboard métriques v2 d'ici fin du trimestre.",options:[{id:"A",text:"Livrer le nouveau dashboard métriques v2 d'ici fin du trimestre.",verdict:"bad",explanation:"« Livrer » nomme un projet. Un KR vise un **changement à atteindre**, pas une livraison. Demande-toi : qu'est-ce que le dashboard va faire bouger une fois en place ?"},{id:"B",text:"Faire passer le NPS dev du module pipeline de 28 à 50 d'ici fin du trimestre.",verdict:"good",explanation:"Métrique nommée (NPS dev), point de départ (28), cible (50), échéance. Outcome qu'un dashboard v2 peut effectivement faire bouger."},{id:"C",text:"Améliorer l'adoption du nouveau dashboard.",verdict:"bad",explanation:"« Améliorer » est flou. Pas de métrique, pas de chiffre, pas d'échéance. Non falsifiable."},{id:"D",text:"Faire adopter le dashboard métriques v2 par les équipes data.",verdict:"partial",explanation:"Outcome correct (adoption), bénéficiaire clair, mais aucun avant/après ni cible chiffrée. Précise : passer de combien d'équipes à combien."}]},{id:"quiz.okr-equipe.dev.kr-fuzzy-satisfaction",type:"okr-equipe",audience:"dev",teamLabel:"Équipe Plateforme API",iconName:"wrench",context:"5 devs, 1 Product Manager. L'équipe fournit les APIs internes consommées par les équipes produit de l'entreprise. Cycle OKR trimestriel.",metrics:[{label:"Équipes consommatrices internes",value:"12"},{label:"CSAT moyen des équipes consommatrices",value:"3,2 / 5"},{label:"Tickets « comment faire » / semaine",value:"40"}],objectiveContext:"Devenir le partenaire technique préféré des équipes produit.",proposedObjective:"Améliorer la satisfaction des équipes consommatrices.",options:[{id:"A",text:"Améliorer la satisfaction des équipes consommatrices.",verdict:"bad",explanation:"« Améliorer » sans chiffre. Pas de métrique nommée, pas de seuil, pas d'échéance. Vœu pieux."},{id:"B",text:"Faire passer le CSAT moyen des équipes consommatrices de 3,2 / 5 à 4,3 / 5 d'ici fin du trimestre.",verdict:"good",explanation:"Métrique nommée, point de départ, cible, échéance. Falsifiable sans ambiguïté."},{id:"C",text:"Avoir des équipes consommatrices contentes.",verdict:"bad",explanation:"« Contentes » n'est pas mesurable. Pas de métrique, pas de seuil. Reformulation à éviter complètement."},{id:"D",text:"Atteindre un CSAT moyen de 4 / 5 sur l'enquête trimestrielle.",verdict:"partial",explanation:"Métrique nommée et cible chiffrée — bien. Mais sans le point de départ (3,2), on perd la notion d'effort. Un KR montre l'avant ET l'après."}]},{id:"quiz.okr-equipe.dev.kr-health-uptime",type:"okr-equipe",audience:"dev",teamLabel:"Équipe Paiement",iconName:"target",context:"8 devs, 1 Product Manager, 1 SRE. L'équipe maintient et fait évoluer le système de paiement d'une plateforme e-commerce. Cycle OKR trimestriel.",metrics:[{label:"Taux de réussite des paiements",value:"96,2 %"},{label:"Temps moyen de détection d'un incident",value:"15 min"},{label:"Escalades support / semaine",value:"12"}],objectiveContext:"Faire de notre plateforme de paiement la plus fiable de notre marché.",proposedObjective:"Maintenir l'uptime du service paiement au-dessus de 99,9 %.",options:[{id:"A",text:"Maintenir l'uptime du service paiement au-dessus de 99,9 %.",verdict:"bad",explanation:"« Maintenir » décrit un garde-fou, pas un changement à atteindre. Un KR vise une progression — sinon, c'est une norme de service à surveiller ailleurs, pas un Key Result."},{id:"B",text:"Faire passer le taux de réussite des paiements de 96,2 % à 99,5 % d'ici fin du trimestre.",verdict:"good",explanation:"Métrique nommée, point de départ, cible, échéance. Un vrai changement mesurable — c'est ça un KR."},{id:"C",text:"Garantir 99,9 % d'uptime sur la plateforme paiement.",verdict:"bad",explanation:"Même piège que A reformulé. « Garantir » est aussi un état à maintenir, pas un outcome à atteindre. C'est une SLO (service level objective), pas un KR."},{id:"D",text:"Diviser par 3 le temps moyen de détection d'un incident paiement (de 15 min à 5 min).",verdict:"partial",explanation:"Bon format de KR (point de départ, cible chiffrée, échéance implicite du cycle). Mais lié à l'observabilité, pas directement à la fiabilité perçue par les clients — l'option B correspond mieux à l'Objective de fiabilité."}]},{id:"quiz.okr-equipe.dev.kr-overconfident-coverage",type:"okr-equipe",audience:"dev",teamLabel:"Équipe Qualité Logicielle",iconName:"challenge",context:"4 devs, 1 Tech Lead. L'équipe transverse outille la qualité logicielle pour toutes les équipes produit. Cycle OKR trimestriel.",metrics:[{label:"Couverture de tests automatisés (moyenne entreprise)",value:"78 %"},{label:"Bugs critiques en prod / trimestre précédent",value:"23"},{label:"Délai moyen de revue d'une PR",value:"2,3 jours"}],objectiveContext:"Donner aux équipes produit la confiance de déployer plusieurs fois par jour.",proposedObjective:"Faire passer la couverture de tests automatisés de 78 % à 80 % d'ici fin du trimestre.",options:[{id:"A",text:"Faire passer la couverture de tests automatisés de 78 % à 80 % d'ici fin du trimestre.",verdict:"bad",explanation:"L'écart est trivial (2 points). Si l'équipe estime ses chances de succès à 95-100 %, ce n'est plus un KR mais une tâche planifiée. L'OKR pousse à l'ambition calibrée (50 à 70 % de confiance)."},{id:"B",text:"Faire passer la couverture de tests automatisés de 78 % à 92 % d'ici fin du trimestre.",verdict:"good",explanation:"Écart ambitieux (+14 pts) qui demande un vrai effort. Probablement autour de 60 % de confiance pour l'équipe — dans la fourchette OKR."},{id:"C",text:"Maximiser la couverture de tests automatisés.",verdict:"bad",explanation:"« Maximiser » sans cible chiffrée n'est pas falsifiable. Combien suffit pour dire « c'est fait » ?"},{id:"D",text:"Diviser par 3 le nombre de bugs critiques en prod (de 23 à 8 sur le trimestre).",verdict:"partial",explanation:"KR exemplaire dans la forme. Mais il ne parle pas de la couverture de tests — c'est un autre outcome (effet du Tdd vs cause). Peut être un autre KR du même Objective, plutôt qu'une reformulation de celui-ci."}]},{id:"quiz.okr-equipe.dev.kr-composite-perf",type:"okr-equipe",audience:"dev",teamLabel:"Équipe Performance",iconName:"practice",context:"5 devs, 1 Product Manager. L'équipe travaille sur la performance front-end de l'application principale. Cycle OKR trimestriel.",metrics:[{label:"LCP médian (Largest Contentful Paint)",value:"3,8 s"},{label:"INP médian (Interaction to Next Paint)",value:"320 ms"},{label:"Taux de bounce sur la home",value:"42 %"}],objectiveContext:"Rendre l'application aussi rapide que les meilleurs du marché.",proposedObjective:"Améliorer le temps de chargement et réduire le taux de bounce sur la home.",options:[{id:"A",text:"Améliorer le temps de chargement et réduire le taux de bounce sur la home.",verdict:"bad",explanation:"Composite (« et » coordonne deux résultats distincts) + flou (« améliorer »). Sépare en deux KR distincts, chacun mesurable."},{id:"B",text:"Faire passer le LCP médian de 3,8 s à 1,8 s d'ici fin du trimestre.",verdict:"good",explanation:"Un seul résultat, métrique nommée, point de départ, cible, échéance. Le KR sur le bounce est une autre histoire — ce sera un autre KR du même Objective."},{id:"C",text:"Optimiser la performance perçue de la home.",verdict:"bad",explanation:"« Optimiser » et « performance perçue » sont flous. Aucune métrique nommée, aucun seuil."},{id:"D",text:"Faire passer le LCP médian de 3,8 s à 1,8 s, puis le taux de bounce de 42 % à 30 %, d'ici fin du trimestre.",verdict:"partial",explanation:"Bien chiffré, bien mesuré — mais c'est encore deux KR cachés en un. Sépare-les : un OKR a 3 à 5 KR justement pour porter plusieurs dimensions."}]},{id:"quiz.okr-equipe.dev.kr-no-baseline-onboarding",type:"okr-equipe",audience:"dev",teamLabel:"Équipe Onboarding Dev",iconName:"learn",context:"3 devs, 1 Developer Advocate. L'équipe construit la documentation et les outils d'intégration pour les développeurs externes qui consomment l'API publique. Cycle OKR trimestriel.",metrics:[{label:"Temps moyen avant 1er appel API réussi (« time to hello world »)",value:"4 h"},{label:"Nouveaux développeurs intégrés / trimestre",value:"65"},{label:"Taux d'abandon avant 1er appel API",value:"38 %"}],objectiveContext:"Faire de notre API publique la plus accueillante pour un développeur qui débute.",proposedObjective:"Atteindre un « time to hello world » de 30 minutes d'ici fin du trimestre.",options:[{id:"A",text:"Atteindre un « time to hello world » de 30 minutes d'ici fin du trimestre.",verdict:"partial",explanation:"Métrique nommée, cible chiffrée, échéance. Mais sans le point de départ (4 h aujourd'hui), on perd la mesure de l'effort. Un KR montre l'avant ET l'après."},{id:"B",text:"Faire passer le temps moyen avant 1er appel API réussi de 4 h à 30 min d'ici fin du trimestre.",verdict:"good",explanation:"Point de départ explicite (4 h), cible (30 min), échéance, métrique nommée. La structure idéale d'un KR."},{id:"C",text:"Rendre l'onboarding fluide et rapide.",verdict:"bad",explanation:"« Fluide » et « rapide » sont flous. Aucune métrique, aucun seuil. Vœu, pas un KR."},{id:"D",text:"Réduire le « time to hello world » d'au moins 80 % d'ici fin du trimestre.",verdict:"partial",explanation:"Variation chiffrée, échéance, métrique nommée — bonne base. Mais formulation relative (« d'au moins 80 % ») qui demande un calcul mental. La forme « de 4 h à 30 min » se vérifie d'un coup d'œil."}]},{id:"quiz.okr-equipe.dev.mobile-nps-baseline",type:"okr-equipe",audience:"dev",teamLabel:"Équipe App Mobile",iconName:"target",context:"5 devs mobile, 1 Product Manager. L'équipe construit l'application mobile principale. Cycle OKR trimestriel. L'enquête NPS tourne tous les 3 mois — un cycle complet par trimestre.",metrics:[{label:"NPS mobile (dernière enquête trimestrielle)",value:"32"},{label:"Score moyen App Store / Play Store",value:"4,1 / 5"},{label:"Sessions / utilisateur actif / semaine",value:"5,3"}],objectiveContext:"Faire de notre appli mobile l'une des préférées de nos utilisateurs.",proposedObjective:"Atteindre un NPS de 60 sur l'appli mobile d'ici la fin du trimestre.",options:[{id:"A",text:"Atteindre un NPS de 60 sur l'appli mobile d'ici la fin du trimestre.",verdict:"partial",explanation:"Cible chiffrée, fenêtre. Mais sans le point de départ (32 aujourd'hui), on perd la lecture de l'effort (+28 pts = ambition forte). Un KR montre l'avant ET l'après."},{id:"B",text:"Faire passer le NPS de l'appli mobile (enquête trimestrielle) de 32 à 60 d'ici la fin du trimestre.",verdict:"good",explanation:"Point de départ explicite, cible, fenêtre cohérente avec la cadence de la métrique. La structure idéale d'un KR."},{id:"C",text:"Améliorer la satisfaction des utilisateurs de l'appli mobile.",verdict:"bad",explanation:"Pas de métrique nommée, pas de chiffre. Non falsifiable."},{id:"D",text:"Livrer les 8 améliorations UX prévues sur le backlog mobile ce trimestre.",verdict:"bad",explanation:"Output / KR-projet. Les 8 améliorations peuvent être livrées sans bouger le NPS."}]},{id:"quiz.okr-equipe.dev.payment-cadence",type:"okr-equipe",audience:"dev",teamLabel:"Équipe Paiement",iconName:"challenge",context:"6 devs, 1 Product Manager. L'équipe maintient le service paiement. Cycle OKR trimestriel. L'équipe court en sprints de 2 semaines.",metrics:[{label:"Bugs critiques production sur paiement (mois en cours)",value:"12"},{label:"Temps moyen de résolution d'un bug critique",value:"4 h"},{label:"Réclamations clients / mois liées au paiement",value:"28"}],objectiveContext:"Faire de notre plateforme de paiement la plus fiable de notre marché.",proposedObjective:"Réduire le nombre de bugs critiques production sur le paiement de 12 à 3 d'ici la fin du sprint 24.",options:[{id:"A",text:"Réduire le nombre de bugs critiques production sur le paiement de 12 à 3 d'ici la fin du sprint 24.",verdict:"bad",explanation:"Fenêtre mal calibrée : un KR trimestriel ne se borne pas par un numéro de sprint (~2 semaines). Confusion avec un Sprint Goal. L'horizon OKR équipe = 90 jours, pas une itération."},{id:"B",text:"Réduire le nombre de bugs critiques production sur le paiement de 12 à 3 par mois d'ici la fin du trimestre.",verdict:"good",explanation:"Métrique nommée, point de départ, cible (par mois pour rester comparable), fenêtre trimestrielle cohérente avec le cycle OKR."},{id:"C",text:"Maintenir le nombre de bugs critiques production paiement au-dessus de 5 par mois ce trimestre.",verdict:"bad",explanation:"Health metric (« maintenir au-dessus de ») et formulation à l'envers (un seuil supérieur n'a pas de sens pour un nombre de bugs). Double piège."},{id:"D",text:"Améliorer la fiabilité du paiement d'ici la fin du trimestre.",verdict:"bad",explanation:"Pas de métrique, pas de seuil. Non falsifiable."}]},{id:"quiz.okr-equipe.dev.platform-kr-as-objective",type:"okr-equipe",audience:"dev",teamLabel:"Équipe Plateforme API",iconName:"wrench",context:"4 devs, 1 Tech Lead. L'équipe fournit l'API consommée par les autres équipes produit. L'Objective trimestriel est posé. L'équipe rédige les KR.",metrics:[{label:"Taux de réussite des appels API (actuel)",value:"99,2 %"},{label:"p95 latence API",value:"180 ms"},{label:"Tickets « API instable » des équipes consommatrices / sem",value:"6"}],objectiveContext:"Devenir la référence interne pour la fiabilité des services techniques.",proposedObjective:"Devenir la plateforme de référence pour la fiabilité des appels API ce trimestre.",options:[{id:"A",text:"Devenir la plateforme de référence pour la fiabilité des appels API ce trimestre.",verdict:"bad",explanation:"C'est un Objective (qualitatif, inspirant) reformulé en KR — sans chiffre, sans cible. Un KR doit être mesurable. Ici on a reformulé l'Objective au lieu de produire un KR distinct."},{id:"B",text:"Faire passer le taux de réussite des appels API plateforme de 99,2 % à 99,9 % d'ici la fin du trimestre.",verdict:"good",explanation:"Métrique nommée, point de départ, cible (qui demande un vrai effort), fenêtre. Un KR mesurable qui sert l'Objective sans s'y substituer."},{id:"C",text:"Maintenir le taux de réussite des appels API au-dessus de 99,5 %.",verdict:"bad",explanation:"Health metric. Décrit un état à préserver, pas un changement à atteindre. Si on est déjà à 99,5 %, c'est une norme de service, pas un KR."},{id:"D",text:"Réduire le nombre de tickets « API instable » de 6 à 1 par semaine et faire passer le p95 latence à 100 ms d'ici la fin du trimestre.",verdict:"bad",explanation:"Composite (deux résultats coordonnés par « et »). Sépare en deux KR distincts du même Objective."}]},{id:"quiz.okr-equipe.dev.adoption-vanity-proxy",type:"okr-equipe",audience:"dev",teamLabel:"Équipe Adoption Feature",iconName:"okr",context:"3 devs, 1 Product Manager. L'équipe a livré au PI précédent une nouvelle feature « collaboration en temps réel ». Cycle OKR trimestriel pour faire monter l'adoption.",metrics:[{label:"Utilisateurs ayant cliqué sur le bouton « Collaborer »",value:"42 %"},{label:"Utilisateurs ayant complété ≥ 3 sessions collaboratives",value:"8 %"},{label:"Utilisateurs actifs (≥ 1 action / sem)",value:"12 400"}],objectiveContext:"Faire de la collaboration en temps réel un usage quotidien dans nos équipes clientes.",proposedObjective:"Atteindre 80 % de clic sur le bouton « Collaborer » depuis l'écran d'accueil d'ici la fin du trimestre.",options:[{id:"A",text:"Atteindre 80 % de clic sur le bouton « Collaborer » depuis l'écran d'accueil d'ici la fin du trimestre.",verdict:"partial",explanation:"Métrique observable, cible, fenêtre. Mais le clic en surface ne dit rien de l'usage profond — c'est un proxy vanity. L'Objective parle d'usage quotidien, le KR ne mesure que la curiosité."},{id:"B",text:"Faire passer le pourcentage d'utilisateurs ayant complété au moins 3 sessions collaboratives de 8 % à 35 % d'ici la fin du trimestre.",verdict:"good",explanation:"Métrique d'usage réel (3 sessions = signal d'adoption), aligné avec l'Objective. Le clic devient un proxy intermédiaire, le KR mesure l'effet de fin."},{id:"C",text:"Livrer 5 améliorations majeures sur la fonctionnalité de collaboration ce trimestre.",verdict:"bad",explanation:"KR-projet. 5 améliorations livrées peuvent ne rien changer à l'adoption."},{id:"D",text:"Améliorer l'adoption de la collaboration en temps réel.",verdict:"bad",explanation:"Pas de métrique, pas de chiffre. Vœu pieux."}]},{id:"quiz.okr-equipe.dev.dx-overconfidence",type:"okr-equipe",audience:"dev",teamLabel:"Équipe Developer Experience",iconName:"challenge",context:"4 devs, 1 Developer Advocate. L'équipe maintient le SDK consommé par les devs externes. Le dernier NPS est à 48. L'équipe estime ses chances à 100 % de gagner 2 points si elle corrige les bugs en attente.",metrics:[{label:"NPS dev du SDK (actuel)",value:"48"},{label:"Bugs en attente sur SDK",value:"23"},{label:"Confiance équipe d'atteindre la cible proposée",value:"100 %"}],objectiveContext:"Faire du SDK une référence dans la communauté dev.",proposedObjective:"Faire passer le NPS dev du SDK de 48 à 50 d'ici la fin du trimestre.",options:[{id:"A",text:"Faire passer le NPS dev du SDK de 48 à 50 d'ici la fin du trimestre.",verdict:"bad",explanation:"L'écart est trivial (+2 pts) et l'équipe estime ses chances à 100 %. À ce niveau, ce n'est plus un KR mais une tâche du backlog. Un KR vise 50-70 % de confiance — l'ambition doit demander un vrai effort."},{id:"B",text:"Faire passer le NPS dev du SDK de 48 à 65 d'ici la fin du trimestre.",verdict:"good",explanation:"Écart ambitieux (+17 pts) qui demande un vrai changement (pas juste corriger les bugs en attente). Probablement autour de 50-60 % de confiance — calibrage OKR correct."},{id:"C",text:"Corriger les 23 bugs en attente sur le SDK ce trimestre.",verdict:"bad",explanation:"KR-projet. Corriger 23 bugs peut être achevé sans bouger le NPS — surtout si les bugs ne sont pas ceux qui frustrent les devs."},{id:"D",text:"Faire de notre SDK le SDK le mieux noté de notre marché.",verdict:"bad",explanation:"C'est un Objective qualitatif inspirant, pas un KR. Pas de métrique chiffrée."}]},{id:"quiz.okr-equipe.dev.insights-hidden-composite",type:"okr-equipe",audience:"dev",teamLabel:"Équipe Insights & Dashboards",iconName:"practice",context:"5 devs, 1 Product Manager. L'équipe construit les dashboards utilisés par les équipes business. Cycle OKR trimestriel. Le PM veut un KR qui couvre à la fois l'usage et la satisfaction.",metrics:[{label:"Utilisation hebdomadaire du dashboard principal",value:"22 %"},{label:"Score de satisfaction des utilisateurs du dashboard",value:"3,1 / 5"},{label:"Tickets « besoin d'aide dashboard » / sem",value:"14"}],objectiveContext:"Faire des dashboards le réflexe quotidien des équipes business pour piloter.",proposedObjective:"Faire passer l'utilisation hebdomadaire du dashboard de 22 % à 45 % et le score de satisfaction de 3,1 à 4,2 d'ici la fin du trimestre.",options:[{id:"A",text:"Faire passer l'utilisation hebdomadaire du dashboard de 22 % à 45 % et le score de satisfaction de 3,1 à 4,2 d'ici la fin du trimestre.",verdict:"bad",explanation:"Composite caché : deux métriques dans le même KR. Si l'usage monte mais la satisfaction baisse, le KR est-il atteint ? Un OKR a 3 à 5 KR distincts pour porter plusieurs dimensions — c'est exactement pour ça."},{id:"B",text:"Faire passer l'utilisation hebdomadaire du dashboard de 22 % à 45 % d'ici la fin du trimestre.",verdict:"good",explanation:"Un seul outcome mesurable. La satisfaction devient un autre KR du même Objective, ou une métrique guardrail surveillée à côté. Clarté + falsifiabilité."},{id:"C",text:"Améliorer significativement l'usage et la satisfaction du dashboard.",verdict:"bad",explanation:"Composite ET flou (« améliorer », « significativement »). Triple piège."},{id:"D",text:"Livrer la v3 du dashboard ce trimestre.",verdict:"bad",explanation:"KR-projet. La v3 livrée ≠ adoption ou satisfaction qui bouge."}]}],nb=[{id:"okr-equipe.good.observability",verdict:"good",draft:{type:"okr-equipe",text:"Devenir l'outil de référence des équipes data pour l'observabilité des pipelines.",audience:"dev",hasExplicitDeadline:!0,isUnderTeamInfluence:!0,keyResults:[{text:"Atteindre 25 équipes actives mensuelles utilisant notre SDK d'ici fin du trimestre.",confidence:60},{text:"Faire passer le NPS dev du module pipeline de 28 à 50.",confidence:55},{text:"Réduire le temps moyen de détection d'un pipeline cassé de 45 min à 10 min.",confidence:65}]},rationale:"Objective qualitatif inspirant. 3 KR chiffrés, outcome, calibrés autour de 60 % (fourchette 50-70 %). Mesures observables côté équipe."},{id:"okr-equipe.good.payment-reliability",verdict:"good",draft:{type:"okr-equipe",text:"Faire de notre plateforme de paiement la plus fiable de notre marché.",audience:"dev",hasExplicitDeadline:!0,isUnderTeamInfluence:!0,keyResults:[{text:"Faire passer le taux de réussite des paiements de 96,2 % à 99,5 % d'ici fin du trimestre.",confidence:60},{text:"Diviser par 3 le temps moyen de détection d'un incident paiement (de 15 min à 5 min).",confidence:65},{text:"Ramener le nombre d'escalades support sur le paiement de 12 à 2 par semaine.",confidence:55}]},rationale:"O qualitatif et ambitieux. KR mesurables, chacun avec point de départ et cible. Calibrage stretch cohérent."},{id:"okr-equipe.good.dev-experience",verdict:"good",draft:{type:"okr-equipe",text:"Devenir le partenaire technique préféré des équipes produit.",audience:"dev",hasExplicitDeadline:!0,isUnderTeamInfluence:!0,keyResults:[{text:"Faire passer le temps moyen d'onboarding d'une nouvelle équipe sur notre API de 4 h à 1 h.",confidence:60},{text:"Atteindre 80 % d'équipes consommatrices qui notent notre support 4 sur 5 ou plus (enquête trimestrielle).",confidence:55},{text:"Réduire de 50 % le nombre de tickets « comment faire » dans notre canal support (de 40 à 20 par semaine).",confidence:65}]},rationale:"O qualitatif. KR centrés sur les équipes clientes internes, mesures observables, calibration ambitieuse mais crédible."},{id:"okr-equipe.bad.objective-with-number",verdict:"bad",draft:{type:"okr-equipe",text:"Améliorer notre observabilité de 30 %.",audience:"dev",hasExplicitDeadline:!0,isUnderTeamInfluence:!0,keyResults:[{text:"Atteindre 25 équipes actives mensuelles utilisant notre SDK.",confidence:60},{text:"Faire passer le NPS dev de 28 à 50.",confidence:55},{text:"Réduire le temps de détection d'un pipeline cassé de 45 min à 10 min.",confidence:65}]},rationale:"L'Objective porte un chiffre (30 %) — c'est le rôle des KR. En plus, « améliorer » est un mot flou. Reformuler en qualitatif : « Devenir l'outil de référence pour l'observabilité ».",trapWords:["améliorer","30"],expectedFailingCriteria:["outcome","okr.objectiveQualitative"]},{id:"okr-equipe.bad.kr-project",verdict:"bad",draft:{type:"okr-equipe",text:"Devenir l'outil de référence des équipes data pour l'observabilité.",audience:"dev",hasExplicitDeadline:!0,isUnderTeamInfluence:!0,keyResults:[{text:"Livrer le nouveau dashboard métriques v2 d'ici fin du trimestre.",confidence:65},{text:"Atteindre 25 équipes actives mensuelles.",confidence:60},{text:"Faire passer le NPS de 28 à 50.",confidence:55}]},rationale:"Le 1er KR est un KR-projet (« Livrer le dashboard v2 »). Un KR vise un **changement à atteindre**, pas une livraison. Reformuler : qu'est-ce que le dashboard va faire bouger ? Adoption ? Temps gagné ? Incidents évités ?",trapWords:["livrer"],expectedFailingCriteria:["okr.keyResultQuality"]},{id:"okr-equipe.bad.kr-fuzzy",verdict:"bad",draft:{type:"okr-equipe",text:"Devenir le partenaire technique préféré des équipes produit.",audience:"dev",hasExplicitDeadline:!0,isUnderTeamInfluence:!0,keyResults:[{text:"Améliorer la satisfaction client.",confidence:60},{text:"Faire passer le temps d'onboarding API de 4 h à 1 h.",confidence:55},{text:"Réduire de 50 % les tickets « comment faire » (de 40 à 20 par semaine).",confidence:65}]},rationale:"Le 1er KR n'a ni chiffre, ni unité, ni seuil. Non falsifiable. Reformuler en nommant la métrique (NPS, CSAT, etc.) avec un point de départ et une cible.",trapWords:["améliorer","satisfaction"],expectedFailingCriteria:["okr.keyResultQuality"]},{id:"okr-equipe.bad.composite-objective",verdict:"bad",draft:{type:"okr-equipe",text:"Améliorer la performance et la satisfaction utilisateur.",audience:"dev",hasExplicitDeadline:!0,isUnderTeamInfluence:!0,keyResults:[{text:"Faire passer le temps de réponse p95 de 800 ms à 200 ms.",confidence:60},{text:"Faire passer le NPS de 30 à 50.",confidence:55},{text:"Réduire le taux d'erreur de 2 % à 0,5 %.",confidence:65}]},rationale:"L'Objective contient « et » : il y a deux Objectives ici (performance et satisfaction). Sépare en deux OKR distincts, chacun avec son propre lot de KR.",trapWords:["améliorer","et","performance","satisfaction"],expectedFailingCriteria:["outcome","general.composite"]}],rb=[{id:"okr-equipe.sheet.structure",themeId:"okr.fondamentaux",icon:"okr",title:"OKR équipe : 1 Objective + 3 à 5 Key Results",heroPhrase:"L'Objective dit vers quoi. Les Key Results disent comment on saura qu'on y est arrivé.",intro:"",practiceCtaLabel:"Va écrire ton premier OKR équipe",sections:[{heading:"L'Objective : qualitatif et mémorisable",icon:"target",body:"Pas de chiffre dans l'Objective : le chiffre est l'affaire des KR. Une équipe doit pouvoir le réciter sans le lire.",examples:[{bad:"Améliorer notre observabilité de 30 %.",good:"Devenir l'outil de référence des équipes data pour l'observabilité.",note:"Un Objective est qualitatif et inspirant. Si tu as besoin d'un chiffre dans l'Objective, c'est qu'il devrait être dans un KR."}]},{heading:"Les Key Results : 3 à 5, chiffrés, outcome",icon:"practice",body:"Chaque KR vise un changement mesurable : « de X à Y », « par N », « à N % ». Pas de KR-projet (« livrer Z » n'est pas un KR). Au-delà de 5 KR, on dilue.",bullets:["3 à 5 KR par Objective : assez pour couvrir, pas trop pour disperser.","Chaque KR a une métrique nommée, un point de départ, une cible.","« Livrer », « Migrer », « Implémenter » sont des moyens, pas des KR."]},{heading:"Calibrage de l'ambition",icon:"challenge",body:"Chaque KR se vise avec 50 à 70 % de confiance d'atteinte. 100 % = c'est une tâche, pas un KR. Moins de 30 % = irréaliste, on s'épuise."},{heading:"La place de l'OKR équipe",icon:"learn",body:"OKR entreprise (annuel, le pourquoi) → OKR équipe (trimestriel, le vers où) → PI Objectives (8-12 sem, le quoi engagé) → Sprint Goals (1-4 sem, le comment). Chaque étage a sa grammaire. Les confondre fait perdre une dimension du pilotage."},{heading:"Qui le rédige, sur quelle base",icon:"target",body:"Co-construit par l'équipe entière (incluant son PM ou PO), animé par un facilitateur (leader d'équipe, coach OKR interne ou externe). Bottom-up, pas dicté top-down. Les OKR entreprise donnent la direction ; l'équipe propose comment elle y contribue — elle n'attend pas qu'on lui dicte ses KR. Cadre de travail : workshop de cadrage en début de cycle (typiquement une demi-journée), puis check-in hebdomadaire de 15-30 min.",bullets:["OKR entreprise du cycle en cours (le « pourquoi » stratégique)","Retours du cycle OKR précédent (ce qui a marché, ce qui n'a pas)","Connaissance terrain de l'équipe (ce qu'elle voit, que les autres ne voient pas)","Capacités réelles (effort disponible et compétences)","Hypothèses produit en cours, notamment pour calibrer les KR stretch"],examples:[{bad:"Recevoir l'OKR équipe complet du management et l'exécuter tel quel.",good:"Lire l'OKR entreprise, en discuter en workshop, proposer un OKR équipe qui porte la couleur de l'équipe.",note:"Un OKR équipe que l'équipe n'a pas posé n'engage personne — c'est l'anti-pattern cascade brutale documenté par Wodtke."}]},{heading:"Source",kind:"source",body:"Niven, OKRs For Dummies. Lamorte, The OKRs Field Book (2021) — Phase 1 Deployment Coaching, distinction Top-Level vs Team-Level Workshops. Morisseau, La boîte à outils OKR (Dunod). Wodtke, OKR Mistakes : « OKRs are great bottom up, not just top down. » Cadence trimestrielle, bi-niveau strict et co-construction convergent dans ces sources."}]},{id:"okr-equipe.sheet.kr-traps",themeId:"okr.pieges-kr",icon:"warn",title:"Les 4 pièges du Key Result",heroPhrase:"Un KR vise un résultat à atteindre. Pas une livraison, pas un état à maintenir, pas une certitude.",intro:"",practiceCtaLabel:"Va corriger un KR mal posé",sections:[{heading:"Piège 1 — Le KR-projet",icon:"bad",body:"« Livrer X », « Migrer Y », « Déployer Z » = un moyen, pas un résultat. Symptôme : verbe d'output en tête.",examples:[{bad:"Livrer le nouveau dashboard métriques v2 d'ici fin du trimestre.",good:"Atteindre 80 % d'équipes utilisant le dashboard métriques (de 0 à 24 équipes).",note:"Demande-toi : qu'est-ce que ce projet va faire bouger ? Adoption, temps gagné, incidents évités…"}]},{heading:"Piège 2 — Le KR-flou",icon:"bad",body:"Pas de chiffre, pas d'unité, pas de seuil. Non falsifiable.",examples:[{bad:"Améliorer la satisfaction client.",good:"Faire passer le CSAT du module commande de 3,2 / 5 à 4,3 / 5.",note:"Nomme la métrique, donne la valeur de départ et la valeur cible."}]},{heading:"Piège 3 — La health metric déguisée en KR",icon:"bad",body:"Une health metric est un garde-fou qu'on surveille en continu (uptime, code coverage, latence p95). Un KR vise un **changement à atteindre**, pas un état à maintenir.",examples:[{bad:"Maintenir l'uptime au-dessus de 99,9 %.",good:"Faire passer l'uptime de 98,5 % à 99,9 % d'ici fin du trimestre.",note:"Si c'est déjà à 99,9 %, c'est une norme de service. Si tu veux l'améliorer, chiffre la progression. Sinon, surveille-la ailleurs, pas dans tes KR."}]},{heading:"Piège 4 — La sur-confiance",icon:"bad",body:"KR estimé atteint à 100 % = c'est une tâche planifiée, pas un KR. L'OKR pousse à l'ambition calibrée : 50 à 70 % de confiance.",examples:[{bad:"Faire passer la couverture de tests de 78 % à 80 % d'ici fin du trimestre. (confiance : 100 %)",good:"Faire passer la couverture de tests de 78 % à 90 %. (confiance : 60 %)",note:"Si l'équipe sait qu'elle va y arriver, l'ambition est trop faible. Vise un écart qui demande un vrai effort."}]},{heading:"Source",kind:"source",body:"Lamorte, The OKRs Field Book : chapitres « Examples of ineffective and effective key results » et « Measurable objectives vs health metrics »."}]},{id:"okr-equipe.sheet.anatomy-kr",themeId:"okr.fondamentaux",icon:"target",title:"L'anatomie d'un Key Result",heroPhrase:"Un Key Result tient en quatre briques. Si l'une manque, le KR est cassé.",intro:"",practiceCtaLabel:"Va construire un KR brique par brique",sections:[{heading:"Les quatre briques d'un Key Result",icon:"target",body:"Un KR bien posé est une phrase courte qui combine quatre éléments. Visualise-les pour repérer ce qui manque.",kind:"bricks",bricksSentence:"Faire passer le NPS dev du module pipeline de 28 à 50 d'ici la fin du trimestre.",bricks:[{num:1,label:"Verbe d'outcome",hint:"Le sens du mouvement.",examples:"Faire passer, Réduire, Atteindre, Diviser par",snippet:"Faire passer",color:"purple"},{num:2,label:"Indicateur",hint:"La métrique nommée, pas le projet.",examples:"NPS dev, CSAT module commande, nombre d'incidents P1, temps moyen de résolution",snippet:"le NPS dev du module pipeline",color:"teal"},{num:3,label:"Variation chiffrée",hint:"De X à Y. Le point de départ rend l'effort visible.",examples:"de 28 à 50, de 4,2 % à 1 %, par 3, à 90 %",snippet:"de 28 à 50",color:"pink"},{num:4,label:"Échéance",hint:"Sans date, ce n'est pas un KR.",examples:"d'ici la fin du trimestre, d'ici fin Q3, d'ici le 30 septembre",snippet:"d'ici la fin du trimestre",color:"blue"}]},{heading:"Et la confiance ?",icon:"challenge",body:"La confiance d'atteinte (50 à 70 %) accompagne le KR mais n'est pas dans la phrase. Elle s'écrit en note : « (confiance : 60 %) ». Voir la fiche calibrage."},{heading:"Test rapide",icon:"practice",body:"Lis ton KR à voix haute. Si tu ne peux pas pointer les quatre briques, retravaille-le.",bullets:["Pas de verbe d'outcome (« livrer », « migrer ») : c'est un projet, pas un KR.","Pas d'indicateur nommé : on ne saura pas mesurer.","Pas de point de départ : on ne saura pas si la cible est ambitieuse.","Pas d'échéance : c'est une intention, pas un engagement."]},{heading:"Source",kind:"source",body:"Niven, OKRs For Dummies (structure d'un KR mesurable). Lamorte, The OKRs Field Book : chapitre « Effective vs ineffective key results ». Doerr, Measure What Matters (le « from X to Y by when »)."}]},{id:"okr-equipe.sheet.too-many-okrs",themeId:"okr.fondamentaux",icon:"warn",title:"Trop d'OKR par équipe",heroPhrase:"Plus tu ajoutes d'Objectives, plus tu dilues la focalisation. Une équipe = un Objective par cycle.",intro:"",practiceCtaLabel:"Va réduire ta liste à un seul Objective",sections:[{heading:"Le principe : un seul Objective par équipe par cycle",icon:"target",body:"L'OKR sert à concentrer l'énergie sur ce qui compte le plus. Si une équipe se donne trois ou quatre Objectives en parallèle, elle n'en a plus aucun — elle a une liste de courses. Christina Wodtke est explicite : « Have a maximum of one OKR per team per quarter ».",bullets:["1 Objective + 3 à 5 Key Results : c'est le format de référence.","Au-delà, l'équipe ne sait plus quoi arbitrer quand le temps manque.","La focalisation est une compétence d'équipe : elle se travaille."]},{heading:"Pourquoi on tombe dedans",icon:"bad",body:"Plusieurs réflexes poussent à empiler les Objectives, tous compréhensibles, tous coûteux.",bullets:["Peur de laisser un sujet de côté (« si on ne le met pas en OKR, personne ne s'en occupera »).","Pression descendante (le management ajoute des Objectives au fil de l'eau).","Confusion OKR / liste de chantiers (on met dedans tout ce que l'équipe fait, pas seulement ce qui doit changer)."]},{heading:"Comment trancher",icon:"good",body:"Si la liste contient trois Objectives, demande : « Lequel des trois, si on échoue, fait le plus mal au trimestre ? ». Garde celui-là. Les autres sont du business as usual, des KR d'un autre Objective, ou attendent le cycle suivant.",examples:[{bad:"Objective 1 : Devenir la référence observabilité. Objective 2 : Réduire la dette technique. Objective 3 : Améliorer la satisfaction des stakeholders.",good:"Objective : Devenir la référence observabilité. (Les autres sujets vivent dans le backlog ou dans un KR de cet Objective.)",note:"Trois Objectives = trois équipes en parallèle dans la même équipe. C'est exactement ce que l'OKR cherche à éviter."}]},{heading:"Source",kind:"source",body:"Wodtke, Radical Focus (2e éd., 2021) : « Have a maximum of one OKR per team per quarter ». Lamorte, The OKRs Field Book : chapitre « Common mistakes in OKR design ». Doerr, Measure What Matters (focus comme premier super-pouvoir des OKR)."}]},{id:"okr-equipe.sheet.sandbagging",themeId:"okr.pieges-kr",icon:"bad",title:"Le sandbagging",heroPhrase:"Quand on calibre un KR pour être sûr de l'atteindre, on a déjà perdu l'esprit OKR.",intro:"",practiceCtaLabel:"Va remonter ton niveau d'ambition",sections:[{heading:"Le réflexe : poser la barre où on sait l'atteindre",icon:"bad",body:"Sandbagging = poser un KR volontairement bas pour garantir un score de 100 %. C'est souvent rationnel à court terme (bonus, image, peur de l'échec) mais cela vide l'OKR de son sens : la cible n'est plus ambitieuse, elle décrit ce qui allait se produire de toute façon.",bullets:["Symptôme : tous les KR atteints à 100 %, cycle après cycle.","Symptôme : l'équipe est très détendue en fin de cycle, sans avoir rien dû arbitrer.","Symptôme : la confiance déclarée en début de cycle est à 90 % ou plus."]},{heading:"L'antidote : calibrer à 50 à 70 % de confiance",icon:"good",body:"Un bon KR est calibré pour que l'équipe se dise « on a une vraie chance d'y arriver, mais on va devoir trouver des choses ». 100 % de confiance = c'est une tâche planifiée. Moins de 30 % = c'est de la pensée magique, l'équipe va décrocher.",examples:[{bad:"Faire passer la couverture de tests de 78 % à 80 %. (confiance : 100 %)",good:"Faire passer la couverture de tests de 78 % à 90 %. (confiance : 60 %)",note:"Si l'équipe est sûre à 100 %, l'ambition est trop faible. Vise un écart qui demande un vrai effort."}]},{heading:"Le rôle du facilitateur",icon:"challenge",body:"Le sandbagging se nomme. Quand un KR sort avec une confiance affichée trop haute, le facilitateur pose la question : « Si on y arrive à coup sûr, qu'est-ce qu'on apprend ? ». Souvent, rien. Et c'est là qu'on remonte la barre."},{heading:"Source",kind:"source",body:"Doerr, Measure What Matters (la culture du « stretch » et la séparation OKR / évaluation individuelle). Lamorte, The OKRs Field Book : section « Avoiding sandbagging ». Wodtke, Radical Focus : importance du calibrage à 50-70 %."}]},{id:"okr-equipe.sheet.project-tracking",themeId:"okr.pieges-kr",icon:"bad",title:"L'OKR utilisé comme suivi de projet",heroPhrase:"L'OKR n'est pas un tableau de bord de chantiers. Si tu listes ce que tu vas faire, ce n'est plus un OKR.",intro:"",practiceCtaLabel:"Va recadrer ton OKR en outcome",sections:[{heading:"Le glissement",icon:"bad",body:"L'équipe ouvre son OKR comme un fichier de suivi : on coche les jalons, on remonte les pourcentages d'avancement projet. Le KR devient « livrer le module X à 50 %, puis 80 %, puis 100 % ». On a transformé un outil d'outcome en un outil de gestion de projet.",bullets:["Symptôme : les KR parlent de jalons (« phase 1 livrée », « MVP déployé »).","Symptôme : le check-in OKR ressemble à un comité de pilotage projet.","Symptôme : impossible de distinguer un KR d'une ligne de roadmap."]},{heading:"Pourquoi c'est un problème",icon:"warn",body:"Livrer un projet ne garantit pas l'outcome. On peut livrer le dashboard et que personne ne l'utilise. On peut migrer la stack et n'avoir aucun gain de performance perçu. L'OKR demande la question d'après : « qu'est-ce que ça doit faire bouger ? ».",examples:[{bad:"KR : Migrer le service de paiement vers la nouvelle stack à 100 % d'ici fin Q2.",good:"KR : Réduire la latence p95 du service de paiement de 1,2 s à 400 ms d'ici fin Q2.",note:"La migration est le moyen. Le KR mesure ce que le moyen est censé produire."}]},{heading:"Comment redresser",icon:"good",body:"Pour chaque KR-projet, pose la question : « Ce projet existe pour faire bouger quoi ? ». La réponse devient le KR. Le projet retourne dans la roadmap ou le backlog, où il est suivi avec les outils de gestion de projet.",bullets:["OKR = ce qui doit changer dans le monde, mesuré chiffré.","Roadmap = ce que l'équipe va faire pour y contribuer.","Backlog = comment l'équipe va le faire, sprint après sprint."]},{heading:"Source",kind:"source",body:"Niven, OKRs For Dummies : distinction outcome / output. Lamorte, The OKRs Field Book : chapitre « Output-based vs outcome-based key results ». Wodtke, Radical Focus : « OKRs are not a task list »."}]},{id:"okr-equipe.sheet.top-down",themeId:"okr.pieges-kr",icon:"bad",title:"L'OKR équipe dicté top-down",heroPhrase:"Un OKR qu'une équipe n'a pas posé n'engage personne. Bottom-up n'est pas une option.",intro:"",practiceCtaLabel:"Va co-construire ton OKR avec ton équipe",sections:[{heading:"Le scénario",icon:"bad",body:"Le management déroule l'OKR entreprise puis distribue à chaque équipe son OKR équipe préparé en comité. L'équipe découvre ses Key Results dans un slide. C'est efficace en apparence : tout est aligné, tout est documenté. C'est inefficace en réalité : personne dans l'équipe ne se sent comptable de cibles qu'elle n'a pas calibrées.",bullets:["Symptôme : les KR sont écrits avec un vocabulaire que l'équipe n'emploie pas.","Symptôme : la confiance affichée est haute par politesse, basse en off.","Symptôme : le check-in OKR est une obligation, pas un outil de pilotage."]},{heading:"Pourquoi le bottom-up est non négociable",icon:"warn",body:"L'équipe est la seule à connaître sa capacité réelle, ses contraintes techniques, les hypothèses produit qu'elle peut raisonnablement tester ce trimestre. Un OKR dicté ignore ces trois éléments : il est faux dès qu'il est écrit. Christina Wodtke l'a documenté comme l'un des plus grands « OKR mistakes » : « OKRs are great bottom up, not just top down »."},{heading:"Le bon flux",icon:"good",body:"Le management partage l'OKR entreprise et les attendus stratégiques. Chaque équipe se réunit en workshop de cadrage (demi-journée typique), facilité par un coach ou un leader d'équipe. Elle propose son OKR. Ce qui remonte est arbitré et calibré dans un dialogue, pas imposé.",examples:[{bad:"Recevoir un slide « OKR équipe Q3 » du management et l'intégrer tel quel dans Jira.",good:"Lire l'OKR entreprise Q3, tenir un workshop d'équipe d'une demi-journée, proposer un OKR équipe et le soumettre au management pour calibrage.",note:"Le management arbitre ce qui remonte. Il ne fabrique pas ce qui descend."}]},{heading:"Source",kind:"source",body:"Wodtke, OKR Mistakes : « OKRs are great bottom up, not just top down ». Lamorte, The OKRs Field Book : Phase 1 Deployment Coaching, distinction Top-Level vs Team-Level Workshops. Niven, OKRs For Dummies (co-construction comme condition d'engagement)."}]}],Os=[{id:"shared.values.transparence",themeId:"valeurs.posture",icon:"good",title:"Transparence",heroPhrase:"Nommer ce qu'on ne sait pas. L'incertitude assumée vaut mieux que le flou qui rassure.",intro:"",practiceCtaLabel:"Va rédiger un objectif transparent",sections:[{heading:"Pourquoi",icon:"target",body:"Le flou (« optimiser », « renforcer », « significativement ») rassure ceux qui le prononcent et désarme ceux qui l'écoutent. Personne ne saura à la fin si l'objectif est atteint, donc personne n'aura à rendre compte. La transparence inverse ce contrat : on dit ce qu'on sait, on chiffre ce qu'on peut, on nomme ce qu'on ignore.",bullets:["Une métrique nommée vaut mieux qu'une intention partagée.","« Je ne sais pas encore » est une réponse transparente, pas une faute.","Le flou est rarement modeste : il cache souvent une absence de pensée."]},{heading:"Comment ça se voit",icon:"good",body:"",bullets:["Présence d'au moins un chiffre ou d'une référence vérifiable.","Les hypothèses sous-jacentes sont nommées (« on suppose que… »).","Le calibrage de confiance est déclaré, pas implicite."]},{heading:"Comment l'incarner",icon:"wrench",body:"Devant chaque mot flou, demander « tu veux dire quoi, concrètement, mesurable comment ? » et écrire la réponse comme nouvel objectif. Si la réponse est « je ne sais pas », c'est un sujet de discovery, pas un objectif d'engagement.",examples:[{bad:"Renforcer l'expérience utilisateur sur le module commande.",good:"Faire passer le CSAT du module commande de 3,2 à 4,1 d'ici fin de sprint, ou ouvrir un spike d'une semaine pour comprendre ce qui le bloque.",note:"Soit on chiffre, soit on assume qu'on cherche encore. Pas d'entre-deux."}]},{heading:"Source",kind:"source",body:"Doctrine outcome-over-output convergente chez Christina Wodtke, Marty Cagan et la communauté Lean Startup. Le flou comme stratégie d'évitement est documenté dans Lencioni (Five Dysfunctions of a Team)."}]},{id:"shared.values.honnetete-calibrage",themeId:"valeurs.posture",icon:"good",title:"Honnêteté du calibrage",heroPhrase:"Dire ce qu'on pense vraiment de ses chances de succès. Ni 100 %, ni vague.",intro:"",practiceCtaLabel:"Va déclarer ta confiance honnêtement",sections:[{heading:"Pourquoi",icon:"target",body:"Deux dérives opposées sabotent le calibrage : la sur-confiance qui sabote la crédibilité (l'objectif passé en committed à 50 % détruit la confiance au PI suivant), et le sandbagging qui se réserve une marge facile (le KR à 100 % de confiance n'apprend rien). L'honnêteté du calibrage est le contrat invisible qui fait fonctionner OKR et SAFe.",bullets:["Calibrer trop haut, c'est promettre ce qu'on ne pourra pas tenir.","Calibrer trop bas, c'est se voler un apprentissage potentiel.","Le bon calibrage demande du courage : il rend la prévision falsifiable."]},{heading:"Comment ça se voit",icon:"good",body:"",bullets:["Une fourchette de confiance est déclarée explicitement (« on est à 60-70 % »).","Le calibrage est réajusté à mi-parcours quand de nouveaux signaux arrivent.","Personne ne pense « je dirai 90 % pour qu'on me laisse tranquille »."]},{heading:"Comment l'incarner",icon:"wrench",body:"Avant de figer le calibrage, poser la question : « si nous étions tous payés à dire la vérité maintenant, qui mettrait quel chiffre ? » Utiliser le confidence vote anonyme quand l'équipe a tendance à converger artificiellement.",examples:[{bad:"Committed à 100 % sur un objectif qu'on n'a jamais réussi à atteindre dans les 3 derniers PI.",good:"Stretch à 50 % sur le même objectif, avec un plan B chiffré si on n'y arrive pas avant la PI Review.",note:"Le wording n'est pas magique : c'est le chiffre de confiance qui matérialise l'engagement."}]},{heading:"Source",kind:"source",body:"Christina Wodtke sur le sandbagging (eleganthack.com). Ben Lamorte sur le confidence vote (The OKRs Field Book). SAFe sur le ROAM et le confidence vote en PI Planning."}]},{id:"shared.values.co-construction",themeId:"valeurs.posture",icon:"good",title:"Co-construction",heroPhrase:"L'objectif est négocié, pas dicté. Ni par le PO seul, ni par le manager seul, ni par les Devs seuls.",intro:"",practiceCtaLabel:"Va co-construire un objectif",sections:[{heading:"Pourquoi",icon:"target",body:"Un objectif imposé est inerte. L'équipe l'exécute parce qu'il faut bien faire quelque chose, mais elle n'y croit pas. À la moindre difficulté, elle abandonne sans regret. Un objectif co-construit, à l'inverse, devient un engagement personnel : chacun le défend parce que chacun a participé à le poser.",bullets:["Le PO apporte le cap, l'équipe apporte la faisabilité, le management apporte le contexte stratégique.","Sans la voix des Devs, on s'engage sur ce qu'on ne sait pas livrer.","Sans la voix du PO, on livre ce qui ne sert à personne."]},{heading:"Comment ça se voit",icon:"good",body:"",bullets:["Chacun a parlé au moins une fois pendant la rédaction.","Les désaccords ont été exprimés, pas étouffés.","La formulation finale est rédigée à plusieurs voix, pas par une seule."]},{heading:"Comment l'incarner",icon:"wrench",body:"Faire un tour de table avant de figer. Respecter les silences (quelqu'un qui se tait n'est pas d'accord, il cherche ses mots). Utiliser un vote de confiance final. Inviter explicitement les juniors et les voix discrètes à se prononcer.",examples:[{bad:"Le manager arrive avec l'objectif déjà rédigé et demande « ça vous va ? ». Tout le monde hoche la tête.",good:"Le manager énonce le contexte stratégique (5 min), puis se tait. L'équipe propose 2-3 reformulations possibles, vote, ajuste.",note:"La parole du chef éteint la discussion. La discussion produit l'engagement."}]},{heading:"Source",kind:"source",body:"Scrum Guide 2020 sur la co-création par l'équipe Scrum. Christina Wodtke : « OKRs are great bottom up, not just top down. » Patrick Lencioni sur la culture de confiance comme préalable au désaccord productif."}]},{id:"shared.values.service-beneficiaire",themeId:"valeurs.posture",icon:"good",title:"Service du bénéficiaire",heroPhrase:"L'utilisateur passe avant le confort de l'équipe. Le refactor sans bénéficiaire nommé est un caprice.",intro:"",practiceCtaLabel:"Va nommer le bénéficiaire de ton objectif",sections:[{heading:"Pourquoi",icon:"target",body:"La vélocité est une ressource finie. La dépenser sur un objectif qui ne change rien chez personne, c'est la perdre. Cette valeur protège contre les objectifs auto-centrés (vélocité, propreté du code, « on se sent mieux ») qui se déguisent en travail utile. Elle ne dit pas qu'on ne fait jamais de technique, elle dit qu'on nomme l'effet attendu côté bénéficiaire.",bullets:["Un refactor a un bénéficiaire : l'équipe qui livrera plus vite, les ops qui dormiront mieux, l'utilisateur qui aura moins de bugs.","Si on ne peut pas nommer le bénéficiaire et l'effet, le travail est probablement un caprice.","Le bénéficiaire n'est pas toujours l'utilisateur final : c'est parfois l'équipe support, le commercial, l'oncall."]},{heading:"Comment ça se voit",icon:"good",body:"",bullets:["Un bénéficiaire est nommé dans l'objectif (« pour les nouveaux utilisateurs », « pour l'équipe oncall »).","L'effet attendu est formulé côté bénéficiaire, pas côté équipe.","La mesure se fait côté bénéficiaire (NPS, CSAT, temps gagné)."]},{heading:"Comment l'incarner",icon:"wrench",body:"Avant de figer un objectif, faire le test « qui en profite hors de l'équipe ? ». Si la liste est vide, reformuler. Si elle est vide pour de bon, accepter que ce travail n'est peut-être pas prioritaire ce cycle.",examples:[{bad:"Refactorer le module de gestion des permissions.",good:"Permettre aux administrateurs clients de modifier les rôles utilisateurs en moins de 30 secondes (vs 4
