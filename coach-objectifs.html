prise.manager.kr-health-disponibilite`,type:`okr-entreprise`,audience:`manager`,teamLabel:`Entreprise Néria`,iconName:`target`,metrics:[{label:`Taux de disponibilité de la plateforme (SLA contractuel)`,value:`99,5 %`},{label:`Incidents majeurs signalés par des clients / trimestre`,value:`6`},{label:`Clients grands comptes couverts par un SLA`,value:`48`}],objectiveContext:`Faire de la fiabilité de notre plateforme un avantage concurrentiel reconnu par le marché.`,proposedObjective:`Maintenir la disponibilité de la plateforme au-dessus de 99,5 %.`,options:[{id:`A`,text:`Maintenir la disponibilité de la plateforme au-dessus de 99,5 %, un engagement couvrant nos 48 clients grands comptes sous SLA.`,verdict:`bad`,explanation:`« Maintenir » décrit un garde-fou, pas un changement à atteindre. Un Résultat clé vise une progression, sinon c'est une norme de service à surveiller ailleurs, pas un KR.`},{id:`B`,text:`Réduire le nombre d'incidents majeurs signalés par des clients de 6 à 1 par trimestre d'ici la fin de l'année.`,verdict:`good`,explanation:`Métrique nommée, point de départ, cible, échéance. Un vrai changement mesurable, c'est ça un Résultat clé.`},{id:`C`,text:`Garantir 99,9 % de disponibilité sur la plateforme, engagement contractuel couvrant nos 48 clients grands comptes.`,verdict:`bad`,explanation:`Même piège reformulé. « Garantir » est aussi un état à maintenir, pas un outcome à atteindre. C'est un SLA (engagement de service), pas un Résultat clé.`},{id:`D`,text:`Réduire de 3 points le taux d'incidents majeurs affectant nos 48 clients grands comptes sous SLA.`,verdict:`partial`,explanation:`Bon format (variation, bénéficiaires nommés). Mais sans avant/après en valeur absolue ni échéance précise, l'effort reste difficile à vérifier d'un coup d'œil.`}]},{id:`quiz.okr-entreprise.manager.kr-health-solvabilite`,type:`okr-entreprise`,audience:`manager`,teamLabel:`Entreprise Néria`,iconName:`challenge`,context:`Le CODIR prépare une levée de fonds série C. Les investisseurs surveillent de près la trésorerie et l'endettement.`,metrics:[{label:`Ratio d'endettement net / EBITDA`,value:`2,1x`},{label:`Trésorerie disponible (runway)`,value:`14 mois`},{label:`Marge brute annuelle`,value:`58 %`}],objectiveContext:`Sécuriser une structure financière saine pour aborder la levée de fonds en position de force.`,proposedObjective:`Maintenir le ratio d'endettement net / EBITDA sous 2,5x.`,options:[{id:`A`,text:`Maintenir le ratio d'endettement net / EBITDA sous 2,5x sur l'année.`,verdict:`bad`,explanation:`« Maintenir sous » décrit un plafond à ne pas dépasser, pas un changement à atteindre. C'est un garde-fou financier, pas un Résultat clé.`},{id:`B`,text:`Porter la trésorerie disponible (runway) de 14 à 20 mois d'ici la fin de l'année.`,verdict:`good`,explanation:`Métrique nommée, point de départ, cible, échéance. Un vrai changement qui renforce concrètement la position de négociation avant la levée.`},{id:`C`,text:`Garder une marge brute annuelle au-dessus de 55 %.`,verdict:`bad`,explanation:`Même piège que A. « Garder au-dessus de » est un seuil de sécurité à préserver, pas un objectif de progression.`},{id:`D`,text:`Améliorer le ratio d'endettement net / EBITDA (2,1x actuellement) pour rassurer les investisseurs de la série C.`,verdict:`partial`,explanation:`Point de départ présent, direction claire. Mais « améliorer » reste sans cible chiffrée : viser combien de x exactement ?`}]},{id:`quiz.okr-entreprise.manager.kr-overconfident-part-marche`,type:`okr-entreprise`,audience:`manager`,teamLabel:`Division Retail`,iconName:`practice`,context:`Le CODIR de la division estime ses chances de succès à plus de 90 % sur la cible proposée, sans effort particulier au-delà du plan déjà engagé.`,metrics:[{label:`Part de marché sur le segment principal`,value:`12,4 %`},{label:`Nombre de nouveaux magasins ouverts cette année`,value:`6`},{label:`Confiance CODIR d'atteindre la cible proposée`,value:`90 %`}],objectiveContext:`Devenir le leader incontesté de notre segment sur le marché national.`,proposedObjective:`Faire passer la part de marché du segment principal de 12,4 % à 12,9 % d'ici la fin de l'année.`,options:[{id:`A`,text:`Faire passer la part de marché du segment principal de 12,4 % à 12,9 % d'ici la fin de l'année.`,verdict:`bad`,explanation:`L'écart est trivial (0,5 point) et le CODIR estime ses chances à 90 %. À ce niveau, ce n'est plus un Résultat clé mais une trajectoire déjà engagée. L'OKR pousse à l'ambition calibrée (50 à 70 % de confiance).`},{id:`B`,text:`Relever la part de marché du segment principal de 12,4 % à 18 % d'ici la fin de l'année.`,verdict:`good`,explanation:`Écart ambitieux (+5,6 pts) qui demande un vrai effort au-delà du plan déjà engagé. Probablement autour de 50-60 % de confiance pour le CODIR, dans la fourchette OKR.`},{id:`C`,text:`Maximiser la part de marché sur le segment principal.`,verdict:`bad`,explanation:`« Maximiser » sans cible chiffrée n'est pas falsifiable. Combien suffit pour dire « c'est fait » ?`},{id:`D`,text:`Ouvrir 6 nouveaux magasins sur le segment principal cette année.`,verdict:`partial`,explanation:`Résultat clé exemplaire dans la forme (chiffré, daté). Mais c'est un output (ouverture de magasins), pas la part de marché elle-même : les 6 ouvertures peuvent ne rien changer à la position concurrentielle.`}]},{id:`quiz.okr-entreprise.manager.kr-overconfident-recrutement`,type:`okr-entreprise`,audience:`manager`,teamLabel:`Entreprise Néria`,iconName:`challenge`,context:`Le plan de recrutement de l'année est déjà à 96 % validé avec les 3 cabinets partenaires ; il ne reste qu'à signer les contrats en attente.`,metrics:[{label:`Effectif total (actuel)`,value:`1 240`},{label:`Postes en cours de recrutement`,value:`35`},{label:`Confiance RH d'atteindre la cible proposée`,value:`95 %`}],objectiveContext:`Doubler notre capacité d'innovation grâce à une accélération forte du recrutement tech.`,proposedObjective:`Faire passer l'effectif tech de 1 240 à 1 275 collaborateurs d'ici la fin de l'année.`,options:[{id:`A`,text:`Faire passer l'effectif tech de 1 240 à 1 275 collaborateurs d'ici la fin de l'année.`,verdict:`bad`,explanation:`L'écart est trivial (+35, déjà quasi bouclé avec les 3 cabinets partenaires) et la confiance RH est à 95 %. À ce niveau, ce n'est plus un Résultat clé mais un suivi de contrats déjà signés.`},{id:`B`,text:`Faire croître l'effectif tech de 1 240 à 1 500 collaborateurs d'ici la fin de l'année.`,verdict:`good`,explanation:`Écart ambitieux (+260) qui dépasse largement le plan déjà validé et demande un vrai effort de sourcing. Calibrage cohérent avec l'ambition OKR (50-70 % de confiance).`},{id:`C`,text:`Recruter massivement pour doubler notre capacité d'innovation.`,verdict:`bad`,explanation:`« Massivement » sans cible chiffrée n'est pas falsifiable. Combien de recrutements suffisent pour dire « c'est fait » ?`},{id:`D`,text:`Signer les contrats des 35 postes en cours de recrutement avec nos 3 cabinets partenaires.`,verdict:`partial`,explanation:`Résultat clé formé correctement (chiffré, borné). Mais c'est un output administratif (signatures), pas un changement de capacité d'innovation mesurable en soi.`}]},{id:`quiz.okr-entreprise.manager.kr-composite-international`,type:`okr-entreprise`,audience:`manager`,teamLabel:`Entreprise Néria`,iconName:`puzzle`,metrics:[{label:`Chiffre d'affaires réalisé à l'international`,value:`22 M€`},{label:`Marchés actifs à l'international`,value:`5`},{label:`Taux de marge sur les ventes internationales`,value:`31 %`}],objectiveContext:`Faire de l'international un moteur de croissance aussi fort que le marché domestique.`,proposedObjective:`Augmenter le chiffre d'affaires international et améliorer la marge sur nos 5 marchés.`,options:[{id:`A`,text:`Augmenter le chiffre d'affaires international et améliorer la marge sur nos 5 marchés.`,verdict:`bad`,explanation:`Composite (« et » coordonne deux résultats distincts) et flou (« augmenter », « améliorer » sans chiffre). Sépare en deux Résultats clés distincts, chacun mesurable.`},{id:`B`,text:`Faire passer le chiffre d'affaires international de 22 M€ à 34 M€ d'ici la fin de l'année.`,verdict:`good`,explanation:`Un seul résultat, métrique nommée, point de départ, cible, échéance. Le Résultat clé sur la marge est une autre histoire, ce sera un autre KR du même Objective.`},{id:`C`,text:`Optimiser la performance de nos 5 marchés internationaux.`,verdict:`bad`,explanation:`« Optimiser » et « performance » sont flous. Aucune métrique nommée, aucun seuil.`},{id:`D`,text:`Faire passer le chiffre d'affaires international de 22 M€ à 34 M€, puis la marge de 31 % à 38 %, d'ici la fin de l'année.`,verdict:`partial`,explanation:`Bien chiffré, bien mesuré, mais c'est encore deux Résultats clés cachés en un. Sépare-les : un Objective a 3 à 5 KR justement pour porter plusieurs dimensions.`}]},{id:`quiz.okr-entreprise.manager.kr-composite-produit-phare`,type:`okr-entreprise`,audience:`manager`,teamLabel:`Division Retail`,iconName:`puzzle`,context:`Le produit phare de la division représente déjà 40 % du chiffre d'affaires. Le CODIR veut à la fois faire croître les ventes et réduire les retours produits.`,metrics:[{label:`Ventes du produit phare (unités / an)`,value:`180 000`},{label:`Taux de retour produit`,value:`9 %`},{label:`Note moyenne produit (avis clients)`,value:`3,6 / 5`}],objectiveContext:`Faire du produit phare une référence incontournable du marché.`,proposedObjective:`Augmenter les ventes du produit phare et réduire son taux de retour.`,options:[{id:`A`,text:`Augmenter les ventes du produit phare et réduire son taux de retour.`,verdict:`bad`,explanation:`Composite : « et » coordonne deux résultats distincts (ventes, retours). Si les ventes montent mais les retours aussi, le Résultat clé est-il atteint ? Sépare en deux KR.`},{id:`B`,text:`Porter les ventes du produit phare de 180 000 à 230 000 unités par an d'ici la fin de l'année.`,verdict:`good`,explanation:`Un seul outcome mesurable. Le taux de retour devient un autre Résultat clé du même Objective, ou une métrique guardrail surveillée à côté.`},{id:`C`,text:`Renforcer la position du produit phare sur le marché.`,verdict:`bad`,explanation:`« Renforcer » est flou. Aucune métrique nommée, aucun seuil, aucune échéance.`},{id:`D`,text:`Faire passer les ventes de 180 000 à 230 000 unités et le taux de retour de 9 % à 4 % d'ici la fin de l'année.`,verdict:`partial`,explanation:`Bien chiffré des deux côtés, mais ce sont deux Résultats clés cachés en un seul énoncé. Un Objective a 3 à 5 KR distincts pour porter plusieurs dimensions, exactement pour ce cas.`}]},{id:`quiz.okr-entreprise.manager.kr-no-baseline-nps`,type:`okr-entreprise`,audience:`manager`,teamLabel:`Entreprise Néria`,iconName:`learn`,metrics:[{label:`NPS entreprise (baromètre annuel)`,value:`18`},{label:`Clients actifs sur nos 4 marchés`,value:`62 000`},{label:`Taux de recommandation spontanée`,value:`22 %`}],objectiveContext:`Faire de la recommandation client notre principal moteur d'acquisition.`,proposedObjective:`Atteindre un NPS entreprise de 40 d'ici la fin de l'année.`,options:[{id:`A`,text:`Atteindre un NPS entreprise de 40 d'ici la fin de l'année.`,verdict:`partial`,explanation:`Métrique nommée, cible chiffrée, échéance. Mais sans le point de départ (18 aujourd'hui), on perd la mesure de l'effort. Un Résultat clé montre l'avant ET l'après.`},{id:`B`,text:`Relever le NPS entreprise de 18 à 40 d'ici la fin de l'année.`,verdict:`good`,explanation:`Point de départ explicite (18), cible (40), échéance, métrique nommée. La structure idéale d'un Résultat clé.`},{id:`C`,text:`Rendre nos clients plus prescripteurs de notre marque.`,verdict:`bad`,explanation:`« Plus prescripteurs » est flou. Aucune métrique nommée, aucun seuil. Vœu, pas un Résultat clé.`},{id:`D`,text:`Améliorer le NPS entreprise d'au moins 20 points sur nos 4 marchés d'ici la fin de l'année.`,verdict:`partial`,explanation:`Variation chiffrée, échéance, métrique nommée, bonne base. Mais la formulation relative (« d'au moins 20 points ») demande un calcul mental. La forme « de 18 à 40 » se vérifie d'un coup d'œil.`}]},{id:`quiz.okr-entreprise.manager.kr-no-baseline-empreinte-carbone`,type:`okr-entreprise`,audience:`manager`,teamLabel:`Division Retail`,iconName:`target`,context:`180 magasins en France. La direction RSE prépare le rapport annuel attendu par les investisseurs et les grands clients B2B.`,metrics:[{label:`Émissions carbone scope 1+2 (tonnes CO2 / an)`,value:`14 200`},{label:`Magasins engagés dans la démarche bas-carbone`,value:`60`},{label:`Score RSE externe (agence de notation)`,value:`B-`}],objectiveContext:`Faire de la division Retail une référence de la transition bas-carbone du secteur.`,proposedObjective:`Atteindre 9 000 tonnes de CO2 émises sur l'année (scope 1+2).`,options:[{id:`A`,text:`Atteindre 9 000 tonnes de CO2 émises sur l'année (scope 1+2).`,verdict:`partial`,explanation:`Métrique nommée, cible chiffrée, échéance. Mais sans le point de départ (14 200 tonnes aujourd'hui), on perd la mesure de l'effort demandé. Un Résultat clé montre l'avant ET l'après.`},{id:`B`,text:`Ramener les émissions carbone scope 1+2 de 14 200 à 9 000 tonnes de CO2 par an d'ici la fin de l'année.`,verdict:`good`,explanation:`Point de départ explicite (14 200), cible (9 000), échéance, métrique nommée. La structure idéale d'un Résultat clé.`},{id:`C`,text:`Réduire fortement notre empreinte carbone.`,verdict:`bad`,explanation:`« Fortement » est flou. Aucune métrique chiffrée, aucun seuil. Vœu, pas un Résultat clé.`},{id:`D`,text:`Réduire les émissions carbone scope 1+2 d'au moins 35 % sur les 180 magasins, d'ici la fin de l'année.`,verdict:`partial`,explanation:`Variation chiffrée, échéance, métrique nommée, bonne base. Mais la formulation relative (« d'au moins 35 % ») demande un calcul mental. La forme « de 14 200 à 9 000 tonnes » se vérifie d'un coup d'œil.`}]}];function _n(e){let t=[];for(let n of e){if(!n.isNamedPitfall)continue;let e=vn(n);!e||!e.good||t.push({id:`pitfall-quiz.${n.id}`,badExample:e.bad,correctPitfallId:n.id,correctLabel:n.title,explanation:e.note??``,goodExample:e.good,categoryRule:n.heroPhrase??``,detectionSignal:yn(n),themeId:n.themeId})}return t}function vn(e){for(let t of e.sections)if(t.examples&&t.examples.length>0)return t.examples[0]}function yn(e){let t=e.sections.find(e=>e.kind===`signals`);return!t||!t.bullets||t.bullets.length===0?``:t.bullets.join(` `)}var bn=[{id:`okr-equipe.good.observability`,verdict:`good`,draft:{type:`okr-equipe`,text:`Devenir l'outil de référence des équipes data pour l'observabilité des pipelines.`,audience:`dev`,hasExplicitDeadline:!0,isUnderTeamInfluence:!0,keyResults:[{text:`Atteindre 25 équipes actives mensuelles utilisant notre SDK d'ici fin du trimestre.`,confidence:60},{text:`Faire passer le NPS dev du module pipeline de 28 à 50.`,confidence:55},{text:`Réduire le temps moyen de détection d'un pipeline cassé de 45 min à 10 min.`,confidence:65}]},rationale:`Objectif qualitatif inspirant. 3 KR chiffrés, outcome, calibrés autour de 60 % (fourchette 50-70 %). Mesures observables côté équipe.`},{id:`okr-equipe.good.payment-reliability`,verdict:`good`,draft:{type:`okr-equipe`,text:`Faire de notre plateforme de paiement la plus fiable de notre marché.`,audience:`dev`,hasExplicitDeadline:!0,isUnderTeamInfluence:!0,keyResults:[{text:`Faire passer le taux de réussite des paiements de 96,2 % à 99,5 % d'ici fin du trimestre.`,confidence:60},{text:`Diviser par 3 le temps moyen de détection d'un incident paiement (de 15 min à 5 min).`,confidence:65},{text:`Ramener le nombre d'escalades support sur le paiement de 12 à 2 par semaine.`,confidence:55}]},rationale:`O qualitatif et ambitieux. KR mesurables, chacun avec point de départ et cible. Calibrage stretch cohérent.`},{id:`okr-equipe.good.dev-experience`,verdict:`good`,draft:{type:`okr-equipe`,text:`Devenir le partenaire technique préféré des équipes produit.`,audience:`dev`,hasExplicitDeadline:!0,isUnderTeamInfluence:!0,keyResults:[{text:`Faire passer le temps moyen d'intégration d'une nouvelle équipe sur notre API de 4 h à 1 h.`,confidence:60},{text:`Atteindre 80 % d'équipes consommatrices qui notent notre support 4 sur 5 ou plus (enquête trimestrielle).`,confidence:55},{text:`Réduire de 50 % le nombre de tickets « comment faire » dans notre canal support (de 40 à 20 par semaine).`,confidence:65}]},rationale:`O qualitatif. KR centrés sur les équipes clientes internes, mesures observables, calibration ambitieuse mais crédible.`},{id:`okr-equipe.bad.objective-with-number`,verdict:`bad`,draft:{type:`okr-equipe`,text:`Améliorer notre observabilité de 30 %.`,audience:`dev`,hasExplicitDeadline:!0,isUnderTeamInfluence:!0,keyResults:[{text:`Atteindre 25 équipes actives mensuelles utilisant notre SDK.`,confidence:60},{text:`Faire passer le NPS dev de 28 à 50.`,confidence:55},{text:`Réduire le temps de détection d'un pipeline cassé de 45 min à 10 min.`,confidence:65}]},rationale:`L'Objectif porte un chiffre (30 %) — c'est le rôle des KR. En plus, « améliorer » est un mot flou. Reformuler en qualitatif : « Devenir l'outil de référence pour l'observabilité ».`,trapWords:[`améliorer`,`30`],expectedFailingCriteria:[`outcome`,`okr.objectiveQualitative`]},{id:`okr-equipe.bad.kr-project`,verdict:`bad`,draft:{type:`okr-equipe`,text:`Devenir l'outil de référence des équipes data pour l'observabilité.`,audience:`dev`,hasExplicitDeadline:!0,isUnderTeamInfluence:!0,keyResults:[{text:`Livrer le nouveau tableau de bord métriques v2 d'ici fin du trimestre.`,confidence:65},{text:`Atteindre 25 équipes actives mensuelles.`,confidence:60},{text:`Faire passer le NPS de 28 à 50.`,confidence:55}]},rationale:`Le 1er KR est un Résultat clé projet (« Livrer le tableau de bord v2 »). Un KR vise un **changement à atteindre**, pas une livraison. Reformuler : qu'est-ce que le tableau de bord va faire bouger ? Adoption ? Temps gagné ? Incidents évités ?`,trapWords:[`livrer`],expectedFailingCriteria:[`okr.keyResultQuality`]},{id:`okr-equipe.bad.kr-fuzzy`,verdict:`bad`,draft:{type:`okr-equipe`,text:`Devenir le partenaire technique préféré des équipes produit.`,audience:`dev`,hasExplicitDeadline:!0,isUnderTeamInfluence:!0,keyResults:[{text:`Améliorer la satisfaction client.`,confidence:60},{text:`Faire passer le temps d'intégration API de 4 h à 1 h.`,confidence:55},{text:`Réduire de 50 % les tickets « comment faire » (de 40 à 20 par semaine).`,confidence:65}]},rationale:`Le 1er KR n'a ni chiffre, ni unité, ni seuil. Non falsifiable. Reformuler en nommant la métrique (NPS, CSAT, etc.) avec un point de départ et une cible.`,trapWords:[`améliorer`,`satisfaction`],expectedFailingCriteria:[`okr.keyResultQuality`]},{id:`okr-equipe.bad.composite-objective`,verdict:`bad`,draft:{type:`okr-equipe`,text:`Améliorer la performance et la satisfaction utilisateur.`,audience:`dev`,hasExplicitDeadline:!0,isUnderTeamInfluence:!0,keyResults:[{text:`Faire passer le temps de réponse p95 de 800 ms à 200 ms.`,confidence:60},{text:`Faire passer le NPS de 30 à 50.`,confidence:55},{text:`Réduire le taux d'erreur de 2 % à 0,5 %.`,confidence:65}]},rationale:`L'Objectif contient « et » : il y a deux Objectifs ici (performance et satisfaction). Sépare en deux OKR distincts, chacun avec son propre lot de KR.`,trapWords:[`améliorer`,`et`,`performance`,`satisfaction`],expectedFailingCriteria:[`outcome`,`general.composite`]}],xn=[{id:`okr-equipe.sheet.structure`,themeId:`okr.fondamentaux`,icon:`okr`,title:`OKR équipe : 1 Objectif + 3 à 5 Résultats clés`,heroPhrase:`L'Objectif dit vers quoi. Les Résultats clés disent comment on saura qu'on y est arrivé.`,intro:``,practiceCtaLabel:`Va écrire ton premier OKR équipe`,sections:[{heading:`L'Objectif : qualitatif et mémorisable`,icon:`target`,body:`Pas de chiffre dans l'Objectif : le chiffre est l'affaire des KR. Une équipe doit pouvoir le réciter sans le lire.`,examples:[{bad:`Améliorer notre observabilité de 30 %.`,good:`Devenir l'outil de référence des équipes data pour l'observabilité.`,note:`Un Objectif est qualitatif et inspirant. Si tu as besoin d'un chiffre dans l'Objectif, c'est qu'il devrait être dans un KR.`}]},{heading:`Les Résultats clés : 3 à 5, chiffrés, outcome`,icon:`practice`,body:`Chaque KR vise un changement mesurable : « de X à Y », « par N », « à N % ». Pas de Résultat clé projet (« livrer Z » n'est pas un KR). Au-delà de 5 KR, on dilue.`,bullets:[`3 à 5 KR par Objectif : assez pour couvrir, pas trop pour disperser.`,`Chaque KR a une métrique nommée, un point de départ, une cible.`,`« Livrer », « Migrer », « Implémenter » sont des moyens, pas des KR.`]},{heading:`Calibrage de l'ambition`,icon:`challenge`,body:`Chaque KR se vise avec 50 à 70 % de confiance d'atteinte. 100 % = c'est une tâche, pas un KR. Moins de 30 % = irréaliste, on s'épuise.`},{heading:`La place de l'OKR équipe`,icon:`learn`,body:`OKR entreprise (annuel, le pourquoi) → OKR équipe (trimestriel, le vers où) → objectifs de PI (8-12 sem, le quoi engagé) → objectifs de Sprint (1-4 sem, le comment). Chaque étage a sa grammaire. Les confondre fait perdre une dimension du pilotage.`},{heading:`Qui le rédige, sur quelle base`,icon:`target`,body:`Co-construit par l'équipe entière (incluant son PM ou PO), animé par un facilitateur (leader d'équipe, coach OKR interne ou externe). Bottom-up, pas dicté top-down. Les OKR entreprise donnent la direction ; l'équipe propose comment elle y contribue — elle n'attend pas qu'on lui dicte ses KR. Cadre de travail : atelier de cadrage en début de cycle (typiquement une demi-journée), puis check-in hebdomadaire de 15-30 min. L'OKR dicté d'en haut est un piège nommé : sa fiche t'attend dans « Les pièges classiques ».`,bullets:[`OKR entreprise du cycle en cours (le « pourquoi » stratégique)`,`Retours du cycle OKR précédent (ce qui a marché, ce qui n'a pas)`,`Connaissance terrain de l'équipe (ce qu'elle voit, que les autres ne voient pas)`,`Capacités réelles (effort disponible et compétences)`,`Hypothèses produit en cours, notamment pour calibrer les KR stretch`]},{heading:`Source`,kind:`source`,body:`Niven, OKRs For Dummies. Lamorte, The OKRs Field Book (2021) — Phase 1 Deployment Coaching, distinction Top-Level vs Team-Level Ateliers. Morisseau, La boîte à outils OKR (Dunod). Wodtke, OKR Mistakes : « OKRs are great bottom up, not just top down. » Cadence trimestrielle, bi-niveau strict et co-construction convergent dans ces sources.`}]},{id:`okr-equipe.sheet.kr-traps`,themeId:`okr.pieges-kr`,icon:`warn`,title:`Les 4 pièges du Résultat clé`,heroPhrase:`Un KR vise un résultat à atteindre. Pas une livraison, pas un état à maintenir, pas une certitude.`,intro:``,practiceCtaLabel:`Va corriger un KR mal posé`,sections:[{heading:`Piège 1 — Le Résultat clé projet`,icon:`bad`,body:`« Livrer X », « Migrer Y », « Déployer Z » = un moyen, pas un résultat. Symptôme : verbe d'output en tête.`},{heading:`Piège 2 — Le KR-flou`,icon:`bad`,body:`Pas de chiffre, pas d'unité, pas de seuil. Non falsifiable.`},{heading:`Piège 3 — La health metric déguisée en KR`,icon:`bad`,body:`Une health metric est un garde-fou qu'on surveille en continu (uptime, code coverage, latence p95). Un KR vise un **changement à atteindre**, pas un état à maintenir.`},{heading:`Piège 4 — La sur-confiance`,icon:`bad`,body:`KR estimé atteint à 100 % = c'est une tâche planifiée, pas un KR. L'OKR pousse à l'ambition calibrée : 50 à 70 % de confiance. Chacun de ces pièges a sa fiche détaillée dans « Les pièges classiques », et le Défi te les fera reconnaître sur des cas réels.`},{heading:`Source`,kind:`source`,body:`Lamorte, The OKRs Field Book : chapitres « Examples of ineffective and effective key results » et « Measurable objectives vs health metrics ».`}]},{id:`okr-equipe.sheet.anatomy-kr`,themeId:`okr.fondamentaux`,icon:`target`,title:`L'anatomie d'un Résultat clé`,heroPhrase:`Un Résultat clé tient en quatre briques. Si l'une manque, le KR est cassé.`,intro:``,practiceCtaLabel:`Va construire un KR brique par brique`,sections:[{heading:`Les quatre briques d'un Résultat clé`,icon:`target`,body:`Un KR bien posé est une phrase courte qui combine quatre éléments. Visualise-les pour repérer ce qui manque.`,kind:`bricks`,bricksSentence:`Faire passer le NPS dev du module pipeline de 28 à 50 d'ici la fin du trimestre.`,bricks:[{num:1,label:`Verbe d'outcome`,hint:`Le sens du mouvement.`,examples:`Faire passer, Réduire, Atteindre, Diviser par`,snippet:`Faire passer`,color:`purple`},{num:2,label:`Indicateur`,hint:`La métrique nommée, pas le projet.`,examples:`NPS dev, CSAT module commande, nombre d'incidents P1, temps moyen de résolution`,snippet:`le NPS dev du module pipeline`,color:`teal`},{num:3,label:`Variation chiffrée`,hint:`De X à Y. Le point de départ rend l'effort visible.`,examples:`de 28 à 50, de 4,2 % à 1 %, par 3, à 90 %`,snippet:`de 28 à 50`,color:`pink`},{num:4,label:`Échéance`,hint:`Sans date, ce n'est pas un KR.`,examples:`d'ici la fin du trimestre, d'ici fin Q3, d'ici le 30 septembre`,snippet:`d'ici la fin du trimestre`,color:`blue`}]},{heading:`Et la confiance ?`,icon:`challenge`,body:`La confiance d'atteinte (50 à 70 %) accompagne le KR mais n'est pas dans la phrase. Elle s'écrit en note : « (confiance : 60 %) ». Voir la fiche calibrage.`},{heading:`Test rapide`,icon:`practice`,body:`Lis ton KR à voix haute. Si tu ne peux pas pointer les quatre briques, retravaille-le.`,bullets:[`Pas de verbe d'outcome (« livrer », « migrer ») : c'est un projet, pas un KR.`,`Pas d'indicateur nommé : on ne saura pas mesurer.`,`Pas de point de départ : on ne saura pas si la cible est ambitieuse.`,`Pas d'échéance : c'est une intention, pas un engagement.`]},{heading:`Source`,kind:`source`,body:`Niven, OKRs For Dummies (structure d'un KR mesurable). Lamorte, The OKRs Field Book : chapitre « Effective vs ineffective key results ». Doerr, Measure What Matters (le « from X to Y by when »).`}]},{id:`okr-equipe.sheet.too-many-okrs`,isNamedPitfall:!0,themeId:`okr.fondamentaux`,icon:`warn`,title:`Trop d'OKR par équipe`,heroPhrase:`Plus tu ajoutes d'Objectifs, plus tu dilues la focalisation. Une équipe = un Objectif par cycle.`,intro:``,practiceCtaLabel:`Va réduire ta liste à un seul Objectif`,sections:[{heading:`Le principe : un seul Objectif par équipe par cycle`,icon:`target`,body:`L'OKR sert à concentrer l'énergie sur ce qui compte le plus. Si une équipe se donne trois ou quatre Objectifs en parallèle, elle n'en a plus aucun — elle a une liste de courses. Christina Wodtke est explicite : « Have a maximum of one OKR per team per quarter ». [traduction : « Avoir au maximum un OKR par équipe par trimestre. »]`,bullets:[`1 Objectif + 3 à 5 Résultats clés : c'est le format de référence.`,`Au-delà, l'équipe ne sait plus quoi arbitrer quand le temps manque.`,`La focalisation est une compétence d'équipe : elle se travaille.`]},{heading:`Pourquoi on tombe dedans`,icon:`bad`,body:`Plusieurs réflexes poussent à empiler les Objectifs, tous compréhensibles, tous coûteux.`,bullets:[`Peur de laisser un sujet de côté (« si on ne le met pas en OKR, personne ne s'en occupera »).`,`Pression descendante (le management ajoute des Objectifs au fil de l'eau).`,`Confusion OKR / liste de chantiers (on met dedans tout ce que l'équipe fait, pas seulement ce qui doit changer).`]},{heading:`Signaux d'alerte`,icon:`warn`,kind:`signals`,body:``,bullets:[`Plus de 3 Objectifs actifs pour la même équipe sur le même trimestre.`,`Chaque Objectif capte une part mineure de la capacité de l'équipe — aucun n'est clairement le cap du trimestre.`,`L'équipe ne peut pas réciter ses Objectifs de mémoire sans les relire.`]},{heading:`Comment trancher`,icon:`good`,body:`Si la liste contient trois Objectifs, demande : « Lequel des trois, si on échoue, fait le plus mal au trimestre ? ». Garde celui-là. Les autres sont du business as usual, des KR d'un autre Objectif, ou attendent le cycle suivant.`,examples:[{bad:`Objectif 1 : Devenir la référence observabilité. Objectif 2 : Réduire la dette technique. Objectif 3 : Améliorer la satisfaction des parties prenantes.`,good:`Objectif : Devenir la référence observabilité. (Les autres sujets vivent dans le backlog ou dans un KR de cet Objectif.)`,note:`Trois Objectifs = trois équipes en parallèle dans la même équipe. C'est exactement ce que l'OKR cherche à éviter.`}]},{heading:`Source`,kind:`source`,body:`Wodtke, Radical Focus (2e éd., 2021) : « Have a maximum of one OKR per team per quarter ». Lamorte, The OKRs Field Book : chapitre « Common mistakes in OKR design ». Doerr, Measure What Matters (focus comme premier super-pouvoir des OKR).`}]},{id:`okr-equipe.sheet.sandbagging`,isNamedPitfall:!0,themeId:`okr.pieges-kr`,icon:`bad`,title:`Le sandbagging`,heroPhrase:`Quand on calibre un KR pour être sûr de l'atteindre, on a déjà perdu l'esprit OKR.`,intro:``,practiceCtaLabel:`Va remonter ton niveau d'ambition`,sections:[{heading:`Le réflexe : poser la barre où on sait l'atteindre`,icon:`bad`,kind:`signals`,body:`Sandbagging = poser un KR volontairement bas pour garantir un score de 100 %. C'est souvent rationnel à court terme (bonus, image, peur de l'échec) mais cela vide l'OKR de son sens : la cible n'est plus ambitieuse, elle décrit ce qui allait se produire de toute façon.`,bullets:[`Symptôme : tous les KR atteints à 100 %, cycle après cycle.`,`Symptôme : l'équipe est très détendue en fin de cycle, sans avoir rien dû arbitrer.`,`Symptôme : la confiance déclarée en début de cycle est à 90 % ou plus.`]},{heading:`L'antidote : calibrer à 50 à 70 % de confiance`,icon:`good`,body:`Un bon KR est calibré pour que l'équipe se dise « on a une vraie chance d'y arriver, mais on va devoir trouver des choses ». 100 % de confiance = c'est une tâche planifiée. Moins de 30 % = c'est de la pensée magique, l'équipe va décrocher.`,examples:[{bad:`Faire passer la couverture de tests de 78 % à 80 %. (confiance : 100 %)`,good:`Faire passer la couverture de tests de 78 % à 90 %. (confiance : 60 %)`,note:`Si l'équipe est sûre à 100 %, l'ambition est trop faible. Vise un écart qui demande un vrai effort.`}]},{heading:`Le rôle du facilitateur`,icon:`challenge`,body:`Le sandbagging se nomme. Quand un KR sort avec une confiance affichée trop haute, le facilitateur pose la question : « Si on y arrive à coup sûr, qu'est-ce qu'on apprend ? ». Souvent, rien. Et c'est là qu'on remonte la barre.`},{heading:`Source`,kind:`source`,body:`Doerr, Measure What Matters (la culture du « stretch » et la séparation OKR / évaluation individuelle). Lamorte, The OKRs Field Book : section « Avoiding sandbagging ». Wodtke, Radical Focus : importance du calibrage à 50-70 %.`}]},{id:`okr-equipe.sheet.project-tracking`,isNamedPitfall:!0,themeId:`okr.pieges-kr`,icon:`bad`,title:`L'OKR utilisé comme suivi de projet`,heroPhrase:`L'OKR n'est pas un tableau de bord de chantiers. Si tu listes ce que tu vas faire, ce n'est plus un OKR.`,intro:``,practiceCtaLabel:`Va recadrer ton OKR en outcome`,sections:[{heading:`Le glissement`,icon:`bad`,kind:`signals`,body:`L'équipe ouvre son OKR comme un fichier de suivi : on coche les jalons, on remonte les pourcentages d'avancement projet. Le KR devient « livrer le module X à 50 %, puis 80 %, puis 100 % ». On a transformé un outil d'outcome en un outil de gestion de projet.`,bullets:[`Symptôme : les KR parlent de jalons (« phase 1 livrée », « MVP déployé »).`,`Symptôme : le check-in OKR ressemble à un comité de pilotage projet.`,`Symptôme : impossible de distinguer un KR d'une ligne de feuille de route.`]},{heading:`Pourquoi c'est un problème`,icon:`warn`,body:`Livrer un projet ne garantit pas l'outcome. On peut livrer le tableau de bord et que personne ne l'utilise. On peut migrer la stack et n'avoir aucun gain de performance perçu. L'OKR demande la question d'après : « qu'est-ce que ça doit faire bouger ? ».`,examples:[{bad:`KR : Migrer le service de paiement vers la nouvelle stack à 100 % d'ici fin Q2.`,good:`KR : Réduire la latence p95 du service de paiement de 1,2 s à 400 ms d'ici fin Q2.`,note:`La migration est le moyen. Le KR mesure ce que le moyen est censé produire.`}]},{heading:`Comment redresser`,icon:`good`,body:`Pour chaque Résultat clé projet, pose la question : « Ce projet existe pour faire bouger quoi ? ». La réponse devient le KR. Le projet retourne dans la feuille de route ou le backlog, où il est suivi avec les outils de gestion de projet.`,bullets:[`OKR = ce qui doit changer dans le monde, mesuré chiffré.`,`Feuille de route = ce que l'équipe va faire pour y contribuer.`,`Backlog = comment l'équipe va le faire, sprint après sprint.`]},{heading:`Source`,kind:`source`,body:`Niven, OKRs For Dummies : distinction outcome / output. Lamorte, The OKRs Field Book : chapitre « Output-based vs outcome-based key results ». Wodtke, Radical Focus : « OKRs are not a task list ».`}]},{id:`okr-equipe.sheet.top-down`,isNamedPitfall:!0,themeId:`okr.pieges-kr`,icon:`bad`,title:`L'OKR équipe dicté top-down`,heroPhrase:`Un OKR qu'une équipe n'a pas posé n'engage personne. Bottom-up n'est pas une option.`,intro:``,practiceCtaLabel:`Va co-construire ton OKR avec ton équipe`,sections:[{heading:`Le scénario`,icon:`bad`,kind:`signals`,body:`Le management déroule l'OKR entreprise puis distribue à chaque équipe son OKR équipe préparé en comité. L'équipe découvre ses Résultats clés dans un slide. C'est efficace en apparence : tout est aligné, tout est documenté. C'est inefficace en réalité : personne dans l'équipe ne se sent comptable de cibles qu'elle n'a pas calibrées.`,bullets:[`Symptôme : les KR sont écrits avec un vocabulaire que l'équipe n'emploie pas.`,`Symptôme : la confiance affichée est haute par politesse, basse en off.`,`Symptôme : le check-in OKR est une obligation, pas un outil de pilotage.`]},{heading:`Pourquoi le bottom-up est non négociable`,icon:`warn`,body:`L'équipe est la seule à connaître sa capacité réelle, ses contraintes techniques, les hypothèses produit qu'elle peut raisonnablement tester ce trimestre. Un OKR dicté ignore ces trois éléments : il est faux dès qu'il est écrit. Christina Wodtke l'a documenté comme l'un des plus grands « OKR mistakes » : « OKRs are great bottom up, not just top down ». [traduction : « Les OKR fonctionnent très bien de manière ascendante, pas seulement descendante. »]`},{heading:`Le bon flux`,icon:`good`,body:`Le management partage l'OKR entreprise et les attendus stratégiques. Chaque équipe se réunit en atelier de cadrage (demi-journée typique), facilité par un coach ou un leader d'équipe. Elle propose son OKR. Ce qui remonte est arbitré et calibré dans un dialogue, pas imposé.`,examples:[{bad:`Recevoir un slide « OKR équipe Q3 » du management et l'intégrer tel quel dans Jira.`,good:`Lire l'OKR entreprise Q3, tenir un atelier d'équipe d'une demi-journée, proposer un OKR équipe et le soumettre au management pour calibrage.`,note:`Le management arbitre ce qui remonte. Il ne fabrique pas ce qui descend.`}]},{heading:`Source`,kind:`source`,body:`Wodtke, OKR Mistakes : « OKRs are great bottom up, not just top down ». Lamorte, The OKRs Field Book : Phase 1 Deployment Coaching, distinction Top-Level vs Team-Level Ateliers. Niven, OKRs For Dummies (co-construction comme condition d'engagement).`}]},{id:`okr-equipe.sheet.individual-cascade`,isNamedPitfall:!0,themeId:`okr.pieges-kr`,icon:`bad`,title:`La cascade individuelle depuis l'objectif de la direction`,heroPhrase:`Un objectif individuel qui recopie celui de la direction n'engage personne de plus qu'une liste de tâches — c'est le niveau équipe qu'on a sauté.`,intro:``,practiceCtaLabel:`Va construire un OKR équipe co-construit`,sections:[{heading:`Le scénario`,icon:`bad`,kind:`signals`,body:`La direction (DP, direction produit, ou tout n+1 porteur d'un objectif de haut niveau) annonce son objectif. Au lieu de le faire descendre au niveau de l'équipe, le manager le découpe directement en « objectifs individuels » : chaque personne reçoit une reformulation réduite du même objectif, avec son nom dessus.`,bullets:[`Symptôme : l'objectif individuel est la même phrase que celui de la direction, en plus petit.`,`Symptôme : personne ne sait dire en une phrase pourquoi ce résultat est sa responsabilité propre et pas celle du collectif.`,`Symptôme : le « Résultat clé » individuel est en réalité une tâche assignée (« livrer X », « finir Y »), pas un résultat mesurable dont la personne est seule maîtresse.`]},{heading:`Pourquoi c'est un problème`,icon:`warn`,body:`Ce n'est pas une variante acceptable du bon flux, c'est un saut de niveau. L'OKR équipe (co-construit, calibré collectivement) est remplacé par une distribution individuelle qui viole le critère « sous influence » du tronc commun : le résultat final dépend du travail de plusieurs personnes, pas d'une seule. Mesurer un individu dessus est à la fois injuste et peu falsifiable. C'est la même famille que « L'OKR équipe dicté top-down » (voir fiche liée), un niveau plus bas : au lieu d'imposer l'OKR à l'équipe, on saute directement l'équipe.`},{heading:`Le bon niveau`,icon:`good`,body:`L'équipe co-construit un seul OKR équipe qui contribue à l'objectif de la direction — et c'est cet OKR équipe partagé, pas des fragments individuels, qui relie le travail de chacun. Le lien avec le travail quotidien de chaque personne se fait par les rituels d'équipe (planification, priorisation du backlog), pas par un objectif personnel dupliqué.`,examples:[{bad:`Dev A : Améliorer la fiabilité de l'API de paiement. Dev B : Réduire les frictions du parcours de paiement. Dev C : Contribuer à l'amélioration du taux de conversion sur le paiement.`,good:`OKR équipe : Faire de notre parcours de paiement la référence de fluidité pour nos clients entreprise, avec des Résultats clés partagés (taux d'abandon, satisfaction post-paiement, incidents de production).`,note:`Le travail de Dev A, B et C contribue à un seul OKR équipe via le backlog partagé — aucun n'a besoin d'un objectif personnel dupliqué.`}]},{heading:`Source`,kind:`source`,body:`Morisseau, La boîte à outils de la méthode OKR (bi-niveau annuel/trimestriel, pas d'OKR individuel). Lamorte, The OKRs Field Book (distinction Top-Level vs Team-Level Workshops). Niven, OKRs For Dummies (structure 1 O + 3-5 KR portée par l'équipe, pas par l'individu). Voir aussi la fiche « L'OKR équipe dicté top-down » : même famille de piège, un niveau plus haut.`}]},{id:`okr-equipe.sheet.set-and-forget`,isNamedPitfall:!0,themeId:`okr.pieges-kr`,icon:`warn`,title:`Le set-it-and-forget-it`,heroPhrase:`L'OKR est fixé en début de trimestre, puis plus jamais rouvert. Il redevient réel seulement le jour du bilan.`,intro:``,practiceCtaLabel:`Va remettre un OKR au centre d'un suivi régulier`,sections:[{heading:`Pourquoi c'est piégeux`,icon:`target`,body:`Un OKR fixé sans suivi régulier ne guide aucune décision entre le jour où il est écrit et le jour où il est jugé. Sans check-in, une dérive de trois semaines n'est découverte qu'à la fin du trimestre, l'équipe découvre l'échec au bilan, jamais assez tôt pour corriger le tir.`,bullets:[`Un OKR fixé sans suivi régulier ne guide aucune décision entre sa rédaction et son bilan.`,`Sans check-in, une dérive de plusieurs semaines n'est découverte qu'à la fin du trimestre.`,`L'équipe découvre l'échec au bilan, jamais assez tôt pour corriger le tir.`]},{heading:`Comment ça se voit`,icon:`warn`,kind:`signals`,body:``,bullets:[`Aucun rituel ne mentionne l'OKR entre sa rédaction et la revue de fin de trimestre.`,`Personne ne sait dire, à mi-trimestre, si l'OKR est en bonne voie ou pas.`,`Le premier vrai bilan de la progression a lieu le jour même du bilan final.`]},{heading:`Réintroduire le check-in`,icon:`wrench`,body:`Mettre en place un point dédié toutes les deux semaines qui vérifie la progression du Résultat clé, pas seulement l'état des tâches.`,examples:[{bad:`OKR rédigé en semaine 1 du trimestre, jamais revu jusqu'au bilan en semaine 12.`,good:`Point dédié toutes les deux semaines : « où en est le Résultat clé, qu'est-ce qui bloque, faut-il ajuster l'effort ? »`,note:`Le suivi régulier transforme l'OKR d'un vœu figé en un outil de pilotage vivant.`}]},{heading:`Source`,kind:`source`,body:`Ben Lamorte, sur la nécessité de check-ins bi-hebdomadaires plutôt qu'une seule revue en fin de trimestre pour éviter le « set it and forget it ».`}]},{id:`okr-equipe.sheet.reverse-engineered-kr`,isNamedPitfall:!0,themeId:`okr.pieges-kr`,icon:`warn`,title:`Le KR reverse-engineered`,heroPhrase:`L'équipe part de son backlog déjà décidé, puis invente un Résultat clé qui colle dessus. Rien ne change dans le travail réel.`,intro:``,practiceCtaLabel:`Va vérifier si un KR a vraiment changé un plan`,sections:[{heading:`Pourquoi c'est piégeux`,icon:`target`,body:`Le backlog ne change pas d'un mot après la rédaction des OKR : ils ne font que l'habiller. Le Résultat clé est choisi parce qu'il est facile à atteindre avec le travail déjà prévu, pas l'inverse, et les OKR ne font jamais reconsidérer ou reprioriser le plan existant.`,bullets:[`Le backlog ne change pas d'un mot après la rédaction des OKR : ils ne font que l'habiller.`,`Le Résultat clé est choisi parce qu'il colle au travail déjà prévu, pas l'inverse.`,`Les OKR ne font jamais reconsidérer ou reprioriser le plan existant.`]},{heading:`Comment ça se voit`,icon:`warn`,kind:`signals`,body:``,bullets:[`Le Résultat clé est rédigé après que la roadmap du trimestre est déjà figée.`,`Aucun élément du backlog n'a été retiré ou ajouté à cause des OKR.`,`Le Résultat clé se mesure exactement par ce que l'équipe avait déjà prévu de livrer.`]},{heading:`Laisser le KR reprioriser`,icon:`wrench`,body:`Rédiger le Résultat clé à partir de l'effet recherché, puis le laisser challenger le backlog existant. Si rien dans le plan ne change, le Résultat clé n'était pas réel.`,examples:[{bad:`Le backlog du trimestre est déjà arbitré ; le Résultat clé rédigé ensuite reprend exactement les livrables déjà prévus.`,good:`Le Résultat clé est fixé sur l'effet recherché ; deux éléments du backlog jugés non alignés sont retirés, un nouveau est ajouté pour l'atteindre.`,note:`Un vrai OKR change ce que l'équipe fait, pas seulement comment elle le raconte.`}]},{heading:`Source`,kind:`source`,body:`Jeff Gothelf, OKR Anti-pattern: reverse engineering key results to match your backlog.`}]},{id:`okr-equipe.sheet.no-stretch`,isNamedPitfall:!0,themeId:`okr.pieges-kr`,icon:`warn`,title:`L'objectif sans stretch`,heroPhrase:`La cible est fixée sans ambition. La confiance de réussite frôle 100 % dès le premier jour.`,intro:``,practiceCtaLabel:`Va recalibrer l'ambition d'un KR trop facile`,sections:[{heading:`Pourquoi c'est piégeux`,icon:`target`,body:`Un Résultat clé fixé à 95-100 % de confiance de réussite n'est plus un OKR, c'est une tâche planifiée. Sans tension créative, l'équipe ne cherche pas de nouvelle façon de faire, elle exécute du connu. L'ambition calibrée, autour de 50 à 70 % de confiance, est ce qui distingue un OKR d'un engagement classique.`,bullets:[`Un Résultat clé fixé à 95-100 % de confiance n'est plus un OKR, c'est une tâche planifiée.`,`Sans tension créative, l'équipe exécute du connu au lieu de chercher une nouvelle façon de faire.`,`L'ambition calibrée (50 à 70 % de confiance) distingue un OKR d'un engagement classique.`]},{heading:`Comment ça se voit`,icon:`warn`,kind:`signals`,body:``,bullets:[`L'équipe est certaine, dès la rédaction, d'atteindre la cible.`,`Le Résultat clé est atteint dans les toutes premières semaines du trimestre, sans effort notable.`,`Personne ne peut citer une nouvelle façon de travailler que cet OKR a demandée.`]},{heading:`Recalibrer l'ambition`,icon:`wrench`,body:`Demander à l'équipe son niveau de confiance honnête sur la cible. Viser 50 à 70 % : en dessous, la cible est déraisonnable ; au-dessus, elle n'est pas un OKR.`,examples:[{bad:`Faire passer la couverture de tests automatisés de 78 % à 80 % d'ici fin du trimestre.`,good:`Faire passer la couverture de tests automatisés de 78 % à 92 % d'ici fin du trimestre, à environ 60 % de confiance pour l'équipe.`,note:`L'écart demande un vrai effort, dans la fourchette OKR.`}]},{heading:`Source`,kind:`source`,body:`Christina Wodtke (Radical Focus), sur les objectifs « trop faciles » comme l'un des trois modes d'échec courants des OKR, avec le trop nombreux et le trop vague.`}]},{id:`okr-equipe.sheet.vague-objective`,isNamedPitfall:!0,themeId:`okr.pieges-kr`,icon:`warn`,title:`L'objectif trop vague`,heroPhrase:`Personne ne sait dire la même chose de ce à quoi ressemble la réussite. Chacun se fait sa propre idée.`,intro:``,practiceCtaLabel:`Va tester la clarté d'un objectif qualitatif`,sections:[{heading:`Pourquoi c'est piégeux`,icon:`target`,body:`Un objectif qualitatif doit être inspirant mais interprétable de façon univoque, pas ouvert à toutes les lectures. Deux membres de l'équipe qui décrivent séparément « à quoi ressemble la réussite » racontent alors deux histoires différentes, et le flou de l'objectif se répercute sur le choix des Résultats clés, qui partent dans des directions disjointes.`,bullets:[`Un objectif qualitatif doit être inspirant mais interprétable de façon univoque.`,`Deux membres de l'équipe qui le décrivent séparément racontent deux histoires différentes.`,`Le flou de l'objectif se répercute sur des Résultats clés qui partent dans des directions disjointes.`]},{heading:`Comment ça se voit`,icon:`warn`,kind:`signals`,body:``,bullets:[`Demander à deux personnes de décrire l'objectif dans leurs mots produit deux réponses très différentes.`,`L'objectif pourrait s'appliquer à n'importe quelle équipe de l'entreprise sans rien changer au libellé.`,`Les Résultats clés rattachés semblent parfois sans lien évident entre eux.`]},{heading:`Le test des deux voix`,icon:`wrench`,body:`Faire reformuler l'objectif indépendamment par deux membres de l'équipe. Si leurs versions divergent nettement, l'objectif est trop vague et doit être réécrit.`,examples:[{bad:`Objectif : « Être excellents pour nos utilisateurs. »`,good:`Objectif : « Faire de notre plateforme de paiement la plus fiable de notre marché. »`,note:`Le second objectif reste qualitatif et inspirant, mais désigne un terrain précis (fiabilité, paiement, marché) que tout le monde peut se représenter pareil.`}]},{heading:`Source`,kind:`source`,body:`Christina Wodtke (Radical Focus), sur les objectifs « trop vagues » comme mode d'échec courant des OKR.`}]},{id:`okr-equipe.sheet.kr-without-guardrail`,isNamedPitfall:!0,themeId:`okr.pieges-kr`,icon:`warn`,title:`Le KR sans garde-fou`,heroPhrase:`Un Résultat clé de croissance poussé seul, sans contre-mesure. L'effet secondaire se dégrade en coulisse, hors du radar.`,intro:``,practiceCtaLabel:`Va ajouter un garde-fou à un KR de croissance`,sections:[{heading:`Pourquoi c'est piégeux`,icon:`target`,body:`Un Résultat clé de croissance poussé seul crée une incitation à optimiser ce chiffre au détriment du reste. L'effet secondaire indésirable se dégrade en coulisse, sans qu'aucun indicateur ne l'alerte, et le succès affiché du KR peut cacher une dégradation réelle ailleurs dans le produit.`,bullets:[`Un Résultat clé de croissance poussé seul incite à optimiser ce chiffre au détriment du reste.`,`L'effet secondaire indésirable se dégrade en coulisse, sans qu'aucun indicateur ne l'alerte.`,`Le succès affiché du KR peut cacher une dégradation réelle ailleurs dans le produit.`]},{heading:`Comment ça se voit`,icon:`warn`,kind:`signals`,body:``,bullets:[`Un seul KR de volume ou de croissance existe, sans aucun KR de qualité en vis-à-vis.`,`Une autre équipe (support, rétention, qualité) signale une dégradation qui coïncide avec la poussée du KR.`,`Personne n'a listé, à la rédaction du KR, ce qui pourrait se dégrader en le poussant fort.`]},{heading:`Ajouter le garde-fou`,icon:`wrench`,body:`Associer à tout Résultat clé de croissance ou de volume un indicateur garde-fou explicite, qui ne doit pas se dégrader au-delà d'un seuil défini à l'avance.`,examples:[{bad:`Faire passer le taux d'inscription depuis la landing page de 4 % à 12 %.`,good:`Faire passer le taux d'inscription depuis la landing page de 4 % à 12 %, garde-fou : le taux de churn à 30 jours des nouveaux inscrits ne doit pas dépasser 8 % (actuellement 6 %).`,note:`Le garde-fou rend visible l'effet secondaire avant qu'il ne devienne un problème caché.`}]},{heading:`Source`,kind:`source`,body:`Pratique OKR courante (Doerr, Lamorte) recommandant d'associer un indicateur garde-fou à tout Résultat clé de croissance pour éviter les effets pervers.`}]}],Sn=[{id:`shared.values.transparence`,themeId:`valeurs.posture`,icon:`good`,title:`Transparence`,heroPhrase:`Nommer ce qu'on ne sait pas. L'incertitude assumée vaut mieux que le flou qui rassure.`,intro:``,practiceCtaLabel:`Va rédiger un objectif transparent`,sections:[{heading:`Pourquoi`,icon:`target`,body:`Le flou (« optimiser », « renforcer », « significativement ») rassure ceux qui le prononcent et désarme ceux qui l'écoutent. Personne ne saura à la fin si l'objectif est atteint, donc personne n'aura à rendre compte. La transparence inverse ce contrat : on dit ce qu'on sait, on chiffre ce qu'on peut, on nomme ce qu'on ignore.`,bullets:[`Une métrique nommée vaut mieux qu'une intention partagée.`,`« Je ne sais pas encore » est une réponse transparente, pas une faute.`,`Le flou est rarement modeste : il cache souvent une absence de pensée.`]},{heading:`Comment ça se voit`,icon:`good`,body:``,bullets:[`Présence d'au moins un chiffre ou d'une référence vérifiable.`,`Les hypothèses sous-jacentes sont nommées (« on suppose que… »).`,`Le calibrage de confiance est déclaré, pas implicite.`]},{heading:`Comment l'incarner`,icon:`wrench`,body:`Devant chaque mot flou, demander « tu veux dire quoi, concrètement, mesurable comment ? » et écrire la réponse comme nouvel objectif. Si la réponse est « je ne sais pas », c'est un sujet de discovery, pas un objectif d'engagement.`,examples:[{bad:`Enrichir l'expérience de consultation des factures.`,good:`Faire passer le CSAT de la consultation des factures de 3,2 à 4,1 d'ici fin de sprint, ou ouvrir une exploration d'une semaine pour comprendre ce qui la bloque.`,note:`Soit on chiffre, soit on assume qu'on cherche encore. Pas d'entre-deux.`}]},{heading:`Source`,kind:`source`,body:`Doctrine outcome-over-output convergente chez Christina Wodtke, Marty Cagan et la communauté Lean Startup. Le flou comme stratégie d'évitement est documenté dans Lencioni (Five Dysfunctions of a Team).`}]},{id:`shared.values.honnetete-calibrage`,themeId:`valeurs.posture`,icon:`good`,title:`Honnêteté du calibrage`,heroPhrase:`Dire ce qu'on pense vraiment de ses chances de succès. Ni 100 %, ni vague.`,intro:``,practiceCtaLabel:`Va déclarer ta confiance honnêtement`,sections:[{heading:`Pourquoi`,icon:`target`,body:`Deux dérives opposées sabotent le calibrage : la sur-confiance qui sabote la crédibilité (l'objectif passé en engagé à 50 % détruit la confiance au PI suivant), et le sandbagging qui se réserve une marge facile (le KR à 100 % de confiance n'apprend rien). L'honnêteté du calibrage est le contrat invisible qui fait fonctionner OKR et SAFe.`,bullets:[`Calibrer trop haut, c'est promettre ce qu'on ne pourra pas tenir.`,`Calibrer trop bas, c'est se voler un apprentissage potentiel.`,`Le bon calibrage demande du courage : il rend la prévision falsifiable.`]},{heading:`Comment ça se voit`,icon:`good`,body:``,bullets:[`Une fourchette de confiance est déclarée explicitement (« on est à 60-70 % »).`,`Le calibrage est réajusté à mi-parcours quand de nouveaux signaux arrivent.`,`Personne ne pense « je dirai 90 % pour qu'on me laisse tranquille ».`]},{heading:`Comment l'incarner`,icon:`wrench`,body:`Avant de figer le calibrage, poser la question : « si nous étions tous payés à dire la vérité maintenant, qui mettrait quel chiffre ? » Utiliser le vote de confiance anonyme quand l'équipe a tendance à converger artificiellement.`,examples:[{bad:`Engagé à 100 % sur un taux de disponibilité de 99,9 % pour le service interne de facturation, alors qu'il plafonne à 98 % depuis un an.`,good:`Stretch à 50 % pour viser 99,9 %, avec un plan B chiffré si on n'y arrive pas : stabiliser au moins 99 % avant la revue.`,note:`Le wording n'est pas magique : c'est le chiffre de confiance qui matérialise l'engagement.`}]},{heading:`Source`,kind:`source`,body:`Christina Wodtke sur le sandbagging (eleganthack.com). Ben Lamorte sur le vote de confiance (The OKRs Field Book). SAFe sur le ROAM et le vote de confiance en PI Planning.`}]},{id:`shared.values.co-construction`,themeId:`valeurs.posture`,icon:`good`,title:`Co-construction`,heroPhrase:`L'objectif est négocié, pas dicté. Ni par le PO seul, ni par le manager seul, ni par les Devs seuls.`,intro:``,practiceCtaLabel:`Va co-construire un objectif`,sections:[{heading:`Pourquoi`,icon:`target`,body:`Un objectif imposé est inerte. L'équipe l'exécute parce qu'il faut bien faire quelque chose, mais elle n'y croit pas. À la moindre difficulté, elle abandonne sans regret. Un objectif co-construit, à l'inverse, devient un engagement personnel : chacun le défend parce que chacun a participé à le poser.`,bullets:[`Le PO apporte le cap, l'équipe apporte la faisabilité, le management apporte le contexte stratégique.`,`Sans la voix des Devs, on s'engage sur ce qu'on ne sait pas livrer.`,`Sans la voix du PO, on livre ce qui ne sert à personne.`]},{heading:`Comment ça se voit`,icon:`good`,body:``,bullets:[`Chacun a parlé au moins une fois pendant la rédaction.`,`Les désaccords ont été exprimés, pas étouffés.`,`La formulation finale est rédigée à plusieurs voix, pas par une seule.`]},{heading:`Comment l'incarner`,icon:`wrench`,body:`Faire un tour de table avant de figer. Respecter les silences (quelqu'un qui se tait n'est pas d'accord, il cherche ses mots). Utiliser un vote de confiance final. Inviter explicitement les juniors et les voix discrètes à se prononcer.`,examples:[{bad:`Le manager arrive avec l'objectif déjà rédigé et demande « ça vous va ? ». Tout le monde hoche la tête.`,good:`Le manager énonce le contexte stratégique (5 min), puis se tait. L'équipe propose 2-3 reformulations possibles, vote, ajuste.`,note:`La parole du chef éteint la discussion. La discussion produit l'engagement.`}]},{heading:`Source`,kind:`source`,body:`Scrum Guide 2020 sur la co-création par l'équipe Scrum. Christina Wodtke : « OKRs are great bottom up, not just top down. » [traduction : « Les OKR fonctionnent très bien de manière ascendante, pas seulement descendante. »] Patrick Lencioni sur la culture de confiance comme préalable au désaccord productif.`}]},{id:`shared.values.service-beneficiaire`,themeId:`valeurs.posture`,icon:`good`,title:`Service du bénéficiaire`,heroPhrase:`L'utilisateur passe avant le confort de l'équipe. Le refactor sans bénéficiaire nommé est un caprice.`,intro:``,practiceCtaLabel:`Va nommer le bénéficiaire de ton objectif`,sections:[{heading:`Pourquoi`,icon:`target`,body:`La vélocité est une ressource finie. La dépenser sur un objectif qui ne change rien chez personne, c'est la perdre. Cette valeur protège contre les objectifs auto-centrés (vélocité, propreté du code, « on se sent mieux ») qui se déguisent en travail utile. Elle ne dit pas qu'on ne fait jamais de technique, elle dit qu'on nomme l'effet attendu côté bénéficiaire.`,bullets:[`Un refactor a un bénéficiaire : l'équipe qui livrera plus vite, les ops qui dormiront mieux, l'utilisateur qui aura moins de bugs.`,`Si on ne peut pas nommer le bénéficiaire et l'effet, le travail est probablement un caprice.`,`Le bénéficiaire n'est pas toujours l'utilisateur final : c'est parfois l'équipe support, le commercial, l'astreinte.`]},{heading:`Comment ça se voit`,icon:`good`,body:``,bullets:[`Un bénéficiaire est nommé dans l'objectif (« pour les nouveaux utilisateurs », « pour l'équipe astreinte »).`,`L'effet attendu est formulé côté bénéficiaire, pas côté équipe.`,`La mesure se fait côté bénéficiaire (NPS, CSAT, temps gagné).`]},{heading:`Comment l'incarner`,icon:`wrench`,body:`Avant de figer un objectif, faire le test « qui en profite hors de l'équipe ? ». Si la liste est vide, reformuler. Si elle est vide pour de bon, accepter que ce travail n'est peut-être pas prioritaire ce cycle.`,examples:[{bad:`Moderniser le pipeline de déploiement.`,good:`Réduire le temps entre la fusion d'un correctif et sa mise en production de 45 à 10 minutes, pour les équipes qui livrent chaque jour.`,note:`La modernisation reste possible, mais comme moyen au service du bénéficiaire, pas comme fin en soi.`}]},{heading:`Source`,kind:`source`,body:`Marty Cagan (Inspired) sur la centralité du client dans la discovery produit. Christina Wodtke sur la mesure outcome-based.`}]},{id:`shared.values.apprentissage`,themeId:`valeurs.posture`,icon:`good`,title:`Apprentissage`,heroPhrase:`Un objectif raté qui apprend vaut mieux qu'un objectif atteint sans apprendre.`,intro:``,practiceCtaLabel:`Va isoler l'hypothèse de ton objectif`,sections:[{heading:`Pourquoi`,icon:`target`,body:`La pire issue d'un cycle n'est pas l'échec, c'est l'absence d'apprentissage. Un objectif atteint sans surprise confirme ce qu'on savait déjà ; un objectif raté qui modifie le sprint suivant fait progresser l'équipe et le produit. Cette valeur protège contre le sandbagging et l'auto-félicitation.`,bullets:[`L'objectif porte une hypothèse vérifiable, pas une certitude.`,`Le succès se mesure aussi à ce qu'on a appris, pas seulement à la cible atteinte.`,`Un objectif qui ne pouvait pas échouer n'avait pas grand-chose à apprendre.`]},{heading:`Comment ça se voit`,icon:`good`,body:``,bullets:[`L'hypothèse sous-jacente est nommée (« on suppose que X bouge Y »).`,`Les rétros parlent de ce qui a été appris, pas juste de ce qui a été fait.`,`Un objectif raté est analysé, pas occulté.`]},{heading:`Comment l'incarner`,icon:`wrench`,body:`Poser la question « qu'est-ce qu'on va apprendre avec ce cycle, indépendamment de l'atteinte ? » avant de figer l'objectif. Isoler l'hypothèse de la métrique : qu'est-ce qu'on testera vraiment ?`,examples:[{bad:`Faire passer le NPS de 28 à 32 d'ici fin de trimestre (on sait que les améliorations UX en cours suffiront).`,good:`Faire passer le NPS de 28 à 50 d'ici fin de trimestre. Hypothèse testée : les UX écran principal ont plus d'impact que les écrans secondaires.`,note:`Le second objectif est plus ambitieux et plus apprenant. S'il rate, l'équipe sait quoi creuser au cycle suivant.`}]},{heading:`Source`,kind:`source`,body:`Eric Ries, Lean Startup, sur l'apprentissage validé comme unité de progrès. Marty Cagan sur la discovery produit. Christina Wodtke sur la posture d'apprentissage en OKR.`}]},{id:`shared.values.courage-desaccord`,themeId:`valeurs.posture`,icon:`good`,title:`Courage du désaccord`,heroPhrase:`Dire non aux objectifs creux, demander des reformulations, porter un dissensus. Hocher la tête sape l'équipe.`,intro:``,practiceCtaLabel:`Va poser une objection constructive`,sections:[{heading:`Pourquoi`,icon:`target`,body:`Un consensus mou produit un objectif mou. Quand personne n'ose dire « cet objectif n'est pas clair », « ce calibrage est faux », « ce KR est un projet déguisé », l'équipe se condamne à exécuter un mauvais cap pendant tout un cycle. Le courage du désaccord est ce qui transforme un atelier de rédaction en débat productif.`,bullets:[`Hocher la tête poliment est une trahison de l'équipe.`,`Une objection non exprimée devient un mauvais résultat à l'arrivée.`,`Le dissensus, exprimé tôt et calmement, économise des semaines de mauvais travail.`]},{heading:`Comment ça se voit`,icon:`good`,body:``,bullets:[`Au moins une objection est posée pendant la rédaction.`,`Les juniors et les voix discrètes sont sollicités explicitement.`,`Le vote de confiance anonyme révèle parfois des écarts que la discussion publique cachait.`]},{heading:`Comment l'incarner`,icon:`wrench`,body:`Créer un espace de désaccord sûr : interdire les sarcasmes, accueillir chaque objection comme un cadeau (« merci de l'avoir dit »). Poser la question « qui n'est pas convaincu ? » en fin de rédaction. Pour SAFe : utiliser le ROAM honnêtement. Pour OKR : insister sur le vote de confiance.`,examples:[{bad:`Le facilitateur lit l'objectif et demande « tout le monde est d'accord ? ». Silence interprété comme assentiment.`,good:`Le facilitateur lit l'objectif puis demande « qui a une réserve, même petite ? Tour de table obligatoire. ». Les objections sont notées et adressées une à une.`,note:`Le silence n'est pas un accord. Le silence est un trou dans le contrat.`}]},{heading:`Source`,kind:`source`,body:`Patrick Lencioni, The Five Dysfunctions of a Team, chapitre sur l'absence de désaccord productif. SAFe sur le ROAM et le vote de confiance en PI Planning. Ben Lamorte sur le devoir de l'équipe coachée.`}]}];function Cn(e,t){return{id:e,themeId:t,icon:`warn`,title:`Les verbes ambigus`,heroPhrase:`« Stabiliser », d'accord. Mais qui le verra ?`,intro:`Certains verbes sonnent comme des résultats parce qu'ils décrivent un avant et un après : stabiliser, fiabiliser, sécuriser, accélérer, simplifier, moderniser. Le piège n'est pas dans le verbe. Il est dans la question qu'on oublie de poser.`,sections:[{heading:`Le malentendu`,icon:`warn`,body:`« Stabiliser, il y a bien une différence entre avant et après. Pourquoi ce serait un output ? » L'objection est légitime. La réponse : parce que sans mesure, cette différence reste un jugement. À la fin du sprint, qui décide que la plateforme est « stable » ? Ceux qui ont fait le travail, en regardant leur travail. Un jugement ne se conteste pas, une mesure si.`},{heading:`La question test`,icon:`target`,body:`Devant un verbe qui promet un changement, pose une seule question : comment le constatera-t-on, sans demander à ceux qui ont fait le travail ? Un outcome se lit dans une mesure : des incidents qui passent de 14 à 5, un temps de rétablissement qui fond. Le bénéficiaire peut être le client, le support, ou l'équipe elle-même : une astreinte qui dort la nuit est un vrai bénéfice. Ce qui disqualifie un objectif, ce n'est pas d'être son propre bénéficiaire, c'est de se juger sans mesure.`,examples:[{bad:`Stabiliser la plateforme.`,good:`Faire passer les incidents de production de 14 à 5 par semaine d'ici la fin du sprint.`,note:`Même intention, mais maintenant n'importe qui peut vérifier sans demander à l'équipe.`}]},{heading:`Trois familles de verbes`,icon:`learn`,body:`Pour classer un verbe rapidement, regarde ce qu'il prend pour objet.`,bullets:[`Les verbes d'activité (livrer, coder, installer, déployer) : ils décrivent le travail. Output, presque toujours.`,`Les verbes de variation (réduire, faire passer, convertir) : ils appellent une mesure et un sens. Bien accompagnés, ils portent un outcome.`,`Les verbes de promesse (stabiliser, sécuriser, simplifier, moderniser) : ils annoncent un changement sans dire comment on le verra. Ambigus tant que la mesure et le bénéficiaire manquent.`]}]}}var wn=[{id:`okr-entreprise.sheet.fondamentaux`,themeId:`okr-entreprise.fondamentaux`,icon:`okr`,title:`Anatomie d'un bon OKR entreprise`,heroPhrase:`Un bon OKR entreprise tient sur un post-it. Si personne ne peut le réciter trois mois après l'avoir entendu, il est trop compliqué.`,intro:``,practiceCtaLabel:`Va rédiger un OKR entreprise`,sections:[{heading:`Pourquoi c'est différent d'un OKR équipe`,icon:`target`,body:`Un OKR entreprise n'est pas un OKR équipe en plus gros. Il fixe le cap de toute l'organisation pour l'année, pas le travail d'un trimestre. Il est porté par le CODIR, qui en répond devant le board. Mais il ne se décide pas seul dans un bureau fermé : le CODIR discute avec les équipes avant de s'engager, pour vérifier que le cap est tenable.`,bullets:[`Il dure un an, avec une vraie vérification chaque trimestre, pas une réécriture complète.`,`Il parle à toute l'entreprise, du commercial au support, pas seulement à une équipe.`,`Le CODIR en répond publiquement : si ça échoue, c'est lui qui explique pourquoi.`]},{heading:`Comment le reconnaître`,icon:`warn`,kind:`signals`,body:``,bullets:[`N'importe qui dans l'entreprise peut le répéter de mémoire, des mois après.`,`Il a 3 à 5 preuves de réussite (les Résultats clés), pas seulement un chiffre financier.`,`La revue trimestrielle change vraiment quelque chose : on ajuste, on reconnaît un retard, on apprend.`]},{heading:`Le piège le plus fréquent`,icon:`wrench`,body:`Confondre l'Objective avec un chiffre financier. Le chiffre financier a sa place, mais en Résultat clé, pas en Objective. Un Objective doit donner une direction que tout le monde comprend, pas juste un montant à atteindre. Ce piège précis, l'Objective qui n'est qu'un chiffre financier, a sa fiche : « Le bilan financier déguisé ».`},{heading:`Source`,kind:`source`,body:`John Doerr, Measure What Matters (2018) : un Objective dit « quoi » atteindre de façon inspirante, les Résultats clés en sont la preuve chiffrée.`}]},{id:`okr-entreprise.sheet.financial-bilan-deguise`,isNamedPitfall:!0,themeId:`okr-entreprise.pieges`,icon:`warn`,title:`Le bilan financier déguisé en OKR`,heroPhrase:`L'Objective n'est qu'un chiffre de chiffre d'affaires habillé en ambition. Personne hors des ventes ne sait quoi en faire.`,intro:``,practiceCtaLabel:`Va redonner un cap à un Objective financier`,sections:[{heading:`Pourquoi c'est piégeux`,icon:`target`,body:`Le CODIR a un vrai budget à défendre devant le board. La tentation est grande de recopier ce chiffre tel quel comme Objective. Mais un chiffre financier ne dit à personne comment y contribuer, sauf à l'équipe commerciale.`,bullets:[`L'Objective se limite à un montant ou un pourcentage financier.`,`Aucune équipe hors vente ne sait ce qu'elle doit faire pour y contribuer.`,`Le « pourquoi » stratégique derrière ce chiffre n'est jamais expliqué.`]},{heading:`Comment ça se voit`,icon:`warn`,kind:`signals`,body:``,bullets:[`L'Objective ressemble à une ligne de budget, pas à une ambition.`,`Seule l'équipe commerciale se sent concernée.`,`Personne ne sait dire ce que ce chiffre change pour un client.`]},{heading:`Remettre le chiffre à sa place`,icon:`wrench`,body:`Le chiffre financier reste un Résultat clé parmi d'autres, jamais l'Objective lui-même. L'Objective doit répondre à « pourquoi ce chiffre compte », pas juste « combien ».`,examples:[{bad:`Atteindre 15 M€ d'ARR d'ici la fin de l'année.`,good:`Devenir le partenaire de référence des PME sur notre segment. Résultats clés : ARR à 15 M€, churn sous 5 %, 3 études de cas clients publiques.`,note:`Le chiffre reste là, mais il n'est plus seul et il sert une ambition plus large.`}]},{heading:`Source`,kind:`source`,body:`Felipe Castro, « An OKR should measure the outcome, not the work » (read.felipecastro.com).`}]},{id:`okr-entreprise.sheet.gouffre-execution`,isNamedPitfall:!0,themeId:`okr-entreprise.pieges`,icon:`warn`,title:`Le gouffre entre l'ambition et la capacité`,heroPhrase:`Le CODIR vise haut sans jamais demander aux équipes si c'est jouable. Le cap devient un slogan que personne ne peut suivre.`,intro:``,practiceCtaLabel:`Va confronter une ambition à la capacité réelle`,sections:[{heading:`Pourquoi c'est piégeux`,icon:`target`,body:`Le CODIR fixe une ambition seul, sans vérifier auprès de ceux qui devront la tenir si c'est réaliste. L'écart entre ce qui est annoncé et ce qui est faisable devient trop grand pour être comblé.`,bullets:[`L'ambition est fixée avant toute discussion avec les équipes concernées.`,`Personne n'a demandé aux équipes si l'objectif est atteignable avec les moyens actuels.`,`L'écart entre l'annonce et la réalité se découvre après coup, trop tard.`]},{heading:`Comment ça se voit`,icon:`warn`,kind:`signals`,body:``,bullets:[`Les équipes apprennent l'Objective en même temps que tout le monde, sans avoir été consultées.`,`Dès l'annonce, plusieurs personnes pensent en privé que ce n'est pas possible.`,`Aucun chiffre de capacité réelle (effectifs, budget, charge) n'a été confronté à l'ambition.`]},{heading:`Sonder avant d'engager`,icon:`wrench`,body:`Avant d'engager le cap, sonder la faisabilité auprès des équipes ou de leurs représentants. Ajuster si besoin, puis seulement engager.`,examples:[{bad:`Le CODIR annonce en réunion générale : « Nous doublons notre présence internationale cette année », sans avoir consulté les équipes qui devront l'exécuter.`,good:`Le CODIR présente un projet de cap, recueille les retours des équipes sur la faisabilité pendant deux semaines, ajuste le rythme, puis annonce le cap engagé.`,note:`Le cap ne change pas de nature, mais il devient tenable parce qu'il a été confronté au réel avant d'être figé.`}]},{heading:`Source`,kind:`source`,body:`Ben Lamorte, The OKRs Field Book (Wiley, 2022).`}]},{id:`okr-entreprise.sheet.girouette-strategique`,isNamedPitfall:!0,themeId:`okr-entreprise.pieges`,icon:`warn`,title:`Le cap qui change sans prévenir`,heroPhrase:`L'Objective de l'année change au gré des annonces de couloir. La revue trimestrielle qui devrait trancher n'a jamais lieu.`,intro:``,practiceCtaLabel:`Va cadrer un changement de cap en cours d'année`,sections:[{heading:`Pourquoi c'est piégeux`,icon:`target`,body:`Le marché bouge, c'est normal. Le problème, c'est quand le cap change sans passer par la revue trimestrielle prévue pour ça. Chaque ajustement informel abîme un peu plus la confiance dans le cap annoncé.`,bullets:[`Le cap change plusieurs fois dans le trimestre, hors de toute revue formelle.`,`Les équipes apprennent le changement par un message informel, pas par une décision expliquée.`,`Personne ne sait dire si le cap actuel est encore celui de janvier ou déjà le troisième de l'année.`]},{heading:`Comment ça se voit`,icon:`warn`,kind:`signals`,body:``,bullets:[`Un message interne annonce une nouvelle priorité sans lien avec la revue prévue au calendrier.`,`Les équipes ne savent plus quel Objective est le bon cette semaine.`,`Aucune trace écrite n'explique pourquoi le cap a changé.`]},{heading:`Ramener le changement dans le cadre prévu`,icon:`wrench`,body:`Garder les ajustements de cap dans le cadre de la revue trimestrielle prévue, même en retard. Documenter ce qui a changé et pourquoi, plutôt que d'annoncer un nouveau cap au fil de l'eau.`,examples:[{bad:`Un concurrent bouge en avril ; le CODIR envoie un message interne annonçant une nouvelle priorité, sans revue ni explication.`,good:`La revue trimestrielle est convoquée dès le mouvement du marché ; le CODIR documente ce qui change, décide si le cap annuel tient encore, communique sa décision et son raisonnement.`,note:`Le marché peut bouger vite ; la décision, elle, reste posée et tracée.`}]},{heading:`Source`,kind:`source`,body:`Christina Wodtke, Radical Focus, sur le rituel de revue rythmée et documentée.`}]},{id:`okr-entreprise.sheet.mur-invisible`,isNamedPitfall:!0,themeId:`okr-entreprise.pieges`,icon:`warn`,title:`Le mur invisible entre l'entreprise et les équipes`,heroPhrase:`Aucune équipe ne sait dire comment son travail sert le cap de l'entreprise. Les deux niveaux existent côte à côte, sans jamais se parler.`,intro:``,practiceCtaLabel:`Va relier un OKR équipe au cap de l'entreprise`,sections:[{heading:`Pourquoi c'est piégeux`,icon:`target`,body:`L'OKR entreprise donne un cap, mais si personne ne fait le lien avec le travail quotidien des équipes, il reste un objet du CODIR, déconnecté du reste de l'organisation.`,bullets:[`Aucune équipe ne peut expliquer en une phrase comment elle contribue au cap de l'entreprise.`,`L'OKR entreprise n'est jamais mentionné pendant les rituels d'équipe (revue, planning).`,`Le lien entre les deux niveaux n'existe dans aucune conversation, ni imposée ni spontanée.`]},{heading:`Comment ça se voit`,icon:`warn`,kind:`signals`,body:``,bullets:[`Demander à une équipe le cap de l'entreprise produit une hésitation ou une réponse approximative.`,`L'OKR entreprise n'apparaît dans aucun support de travail des équipes.`,`Les OKR équipe et l'OKR entreprise semblent parler de sujets complètement différents.`]},{heading:`Créer le moment qui manque`,icon:`wrench`,body:`Créer un moment régulier où chaque équipe explicite, dans ses mots, comment son travail sert le cap de l'entreprise. Pas une case à cocher : une vraie conversation.`,examples:[{bad:`L'OKR entreprise est publié sur l'intranet en janvier et jamais revisité ailleurs de l'année.`,good:`Chaque équipe consacre 15 minutes en début de trimestre à formuler, dans ses mots, le lien entre son travail et le cap de l'entreprise.`,note:`Le but n'est pas de forcer un lien artificiel partout, mais de vérifier que le lien existe et se dit.`}]},{heading:`Source`,kind:`source`,body:`Ben Lamorte, sur la nécessité d'un lien de sens maintenu par la conversation régulière entre niveaux.`}]},{id:`okr-entreprise.sheet.theatre-revue`,isNamedPitfall:!0,themeId:`okr-entreprise.pieges`,icon:`warn`,title:`Le théâtre de la revue trimestrielle`,heroPhrase:`La revue existe au calendrier. Tout y est toujours vert. Rien n'y est jamais remis en question.`,intro:``,practiceCtaLabel:`Va redonner du poids à une revue trimestrielle`,sections:[{heading:`Pourquoi c'est piégeux`,icon:`target`,body:`La revue trimestrielle du CODIR a un vrai poids : c'est ce qui est raconté au board. Si elle ne sert qu'à confirmer que tout va bien, elle perd sa fonction, vérifier honnêtement si le cap tient.`,bullets:[`Aucun Résultat clé n'est jamais revu à la baisse, quoi qu'il arrive.`,`La revue dure quelques minutes, sans vraie discussion.`,`Personne ne se souvient d'un apprentissage tiré d'une revue passée.`]},{heading:`Comment ça se voit`,icon:`warn`,kind:`signals`,body:``,bullets:[`Le compte rendu de la revue se ressemble d'un trimestre à l'autre, mot pour mot.`,`Aucune décision concrète ne sort jamais de la revue.`,`La revue sert à présenter des chiffres, pas à décider de quoi que ce soit.`]},{heading:`Poser la question qui dérange`,icon:`wrench`,body:`Poser une question simple à chaque revue : qu'est-ce qu'on a appris ce trimestre, et qu'est-ce qu'on change en conséquence ? Si la réponse est toujours « rien », c'est le signal à corriger.`,examples:[{bad:`La revue trimestrielle présente les chiffres en 10 minutes ; personne ne pose de question, la réunion suivante commence.`,good:`La revue commence par : qu'est-ce qui a surpris ce trimestre ? Chaque Résultat clé en retard est discuté ouvertement, avec une décision explicite (on ajuste, on accepte le retard, on documente pourquoi).`,note:`Une revue qui ne change jamais rien n'est plus une revue, c'est une présentation.`}]},{heading:`Source`,kind:`source`,body:`John Doerr, Measure What Matters, sur les CFR (conversations régulières et sincères autour des objectifs).`}]},{id:`okr-entreprise.sheet.jargon-codir`,isNamedPitfall:!0,themeId:`okr-entreprise.pieges`,icon:`warn`,title:`L'OKR que personne ne comprend hors CODIR`,heroPhrase:`L'Objective est écrit dans la langue du CODIR : acronymes, chiffres de plan stratégique, formulations abstraites. Le reste de l'entreprise ne le comprend pas.`,intro:``,practiceCtaLabel:`Va simplifier un Objective trop savant`,sections:[{heading:`Pourquoi c'est piégeux`,icon:`target`,body:`Un Objective doit pouvoir se répéter et se comprendre par n'importe qui dans l'entreprise. S'il est rédigé pour un public de dirigeants uniquement, il ne peut tout simplement pas remplir son rôle de cap partagé.`,bullets:[`L'Objective contient des acronymes ou des termes que seul le CODIR comprend.`,`Une personne hors CODIR ne peut pas expliquer l'Objective avec ses propres mots.`,`Le langage utilisé vient d'un document stratégique interne, pas d'une conversation ordinaire.`]},{heading:`Comment ça se voit`,icon:`warn`,kind:`signals`,body:``,bullets:[`Demander à une personne au hasard de reformuler l'Objective produit un silence ou une paraphrase mot pour mot.`,`L'Objective ressemble à une phrase de rapport annuel, pas à une phrase qu'on dirait à voix haute.`,`Personne ne le cite jamais spontanément dans une conversation de travail.`]},{heading:`Le test de la reformulation`,icon:`wrench`,body:`Tester l'Objective en le faisant reformuler par quelqu'un qui n'était pas dans la pièce lors de sa rédaction. Si la reformulation trahit une incompréhension, simplifier.`,examples:[{bad:`Objective : « Optimiser notre positionnement omnicanal pour capter la valeur incrémentale du segment PME dans un contexte de consolidation du marché. »`,good:`Objective : « Devenir le partenaire de référence des PME sur notre marché. »`,note:`La même ambition, mais dite comme on la dirait à un collègue, pas comme on l'écrirait dans un rapport.`}]},{heading:`Source`,kind:`source`,body:`Christina Wodtke, Radical Focus, citant Jeff Weiner (LinkedIn) : « quand tu es fatigué de le répéter, les gens commencent tout juste à l'entendre » [« when you are tired of saying it, people are starting to hear it »] — encore faut-il que la phrase soit simple à répéter.`}]},{id:`okr-entreprise.sheet.silo-comite`,isNamedPitfall:!0,themeId:`okr-entreprise.pieges`,icon:`warn`,title:`L'OKR écrit par un seul service`,heroPhrase:`L'OKR entreprise est en réalité rédigé par une seule fonction, souvent la Finance ou les Ventes, puis imposé aux autres comme s'il venait de tous.`,intro:``,practiceCtaLabel:`Va ouvrir la rédaction d'un OKR entreprise à plusieurs fonctions`,sections:[{heading:`Pourquoi c'est piégeux`,icon:`target`,body:`L'OKR entreprise doit parler à toute l'organisation. S'il n'est écrit que par une fonction, il porte naturellement sa vision et ses priorités, pas celles de l'ensemble.`,bullets:[`Une seule fonction a participé à la rédaction, les autres découvrent le résultat.`,`Le vocabulaire et les priorités du document reflètent une seule culture métier.`,`Les équipes hors de cette fonction ne se reconnaissent pas dans l'Objective.`]},{heading:`Comment ça se voit`,icon:`warn`,kind:`signals`,body:``,bullets:[`Seule une fonction, souvent Finance ou Ventes, était présente à la rédaction.`,`Le RH, le Support ou la R&D découvrent l'Objective en même temps que tout le monde.`,`Des personnes de plusieurs services disent séparément que ça ne les concerne pas vraiment.`]},{heading:`Ouvrir la rédaction`,icon:`wrench`,body:`Impliquer des personnes de plusieurs fonctions dès la rédaction, pas seulement au moment de la diffusion.`,examples:[{bad:`L'Objective est rédigé en comité restreint Finance et direction générale, puis annoncé à toute l'entreprise en réunion générale.`,good:`Un représentant de chaque grande fonction (Produit, Ventes, Support, RH) participe à un atelier de rédaction avant que le CODIR ne finalise l'Objective.`,note:`Le CODIR garde la décision finale, mais l'ambition reflète plusieurs regards, pas un seul.`}]},{heading:`Source`,kind:`source`,body:`Ben Lamorte, sur le besoin de sponsors multi-fonctionnels dès la rédaction d'un OKR entreprise.`}]},{id:`okr-entreprise.sheet.objectif-perpetuel`,isNamedPitfall:!0,themeId:`okr-entreprise.pieges`,icon:`warn`,title:`L'objectif reconduit sans jamais se remettre en question`,heroPhrase:`Le même Objective revient chaque année, avec juste les chiffres relevés un peu plus haut. Personne ne se demande si l'ambition est encore la bonne.`,intro:``,practiceCtaLabel:`Va challenger un objectif reconduit par habitude`,sections:[{heading:`Pourquoi c'est piégeux`,icon:`target`,body:`Sur un cycle annuel, la routine s'installe plus facilement que sur un cycle trimestriel. Reconduire le même Objective par habitude, sans se reposer la question, c'est perdre l'occasion de vérifier si le cap est toujours pertinent.`,bullets:[`Le même Objective revient d'année en année, seuls les chiffres changent.`,`Personne ne se souvient de la dernière fois où le cap a été vraiment discuté.`,`L'Objective ne reflète plus un choix récent, juste une habitude.`]},{heading:`Comment ça se voit`,icon:`warn`,kind:`signals`,body:``,bullets:[`Le séminaire annuel se résume à ajuster des chiffres sur l'Objective de l'an dernier.`,`Personne ne peut expliquer pourquoi ce cap précis reste le bon cette année.`,`Le marché ou l'entreprise ont changé, mais pas l'Objective.`]},{heading:`Reposer la question ch
