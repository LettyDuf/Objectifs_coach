ext:`Mettre en place le nouveau pipeline CI.`,audience:`dev`,confidence:85,hasExplicitDeadline:!1,isUnderTeamInfluence:!0},rationale:`Commence par 'mettre en place' (output), aucune mesure de succès, pas d'échéance.`,expectedFailingCriteria:[`outcome`,`falsifiable`,`timeBounded`],trapWords:[`mettre`]},{id:`sprint.bad.retro.three-deliverables`,verdict:`bad`,draft:{type:`sprint`,text:`Livrer la fonctionnalité de notification, terminer l'API export et corriger les bugs ouverts du module commande.`,audience:`dev`,confidence:80,hasExplicitDeadline:!1,isUnderTeamInfluence:!0},rationale:`Objectif rétrospectif : énumération de 3 livrables coordonnés par « et ». Tout est output, aucun changement constatable.`,expectedFailingCriteria:[`outcome`,`general.composite`,`timeBounded`],trapWords:[`livrer`,`terminer`,`et`,`corriger`]},{id:`sprint.bad.retro.advance-récits`,verdict:`bad`,draft:{type:`sprint`,text:`Avancer sur les 8 récits prioritaires du backlog.`,audience:`dev`,confidence:80,hasExplicitDeadline:!1,isUnderTeamInfluence:!0},rationale:`Objectif rétrospectif déguisé : 'avancer sur N récits' décrit le travail, pas le résultat. Aucun outcome.`,expectedFailingCriteria:[`outcome`,`timeBounded`],trapWords:[`avancer`]},{id:`sprint.bad.retro.finish-everything`,verdict:`bad`,draft:{type:`sprint`,text:`Finir tout ce qui était prévu pour ce sprint.`,audience:`dev`,confidence:80,hasExplicitDeadline:!1,isUnderTeamInfluence:!0},rationale:`Objectif fourre-tout : équivalent à « faire le sprint ». Aucun cap, aucune mesure.`,expectedFailingCriteria:[`outcome`,`falsifiable`,`timeBounded`],trapWords:[`finir`,`tout`]},{id:`sprint.good.maintenance.incidents`,verdict:`good`,draft:{type:`sprint`,text:`Réduire le nombre d'incidents de production sur le module commande de 14 à 5 par semaine d'ici fin de sprint.`,audience:`dev`,confidence:80,hasExplicitDeadline:!0,isUnderTeamInfluence:!0},rationale:`Sprint maintenance avec bénéficiaire (utilisateurs / ops), seuil chiffré, échéance — pas un output.`},{id:`sprint.good.maintenance.support`,verdict:`good`,draft:{type:`sprint`,text:`Permettre à l'équipe support de résoudre 70 % des tickets module commande sans escalade vers la dev d'ici fin du sprint.`,audience:`dev`,confidence:80,hasExplicitDeadline:!0,isUnderTeamInfluence:!0},rationale:`Bénéficiaire explicite (support), métrique vérifiable, échéance.`},{id:`sprint.good.maintenance.hotfix`,verdict:`good`,draft:{type:`sprint`,text:`Diviser par 2 le temps moyen de déploiement d'un hotfix (de 4 h à 2 h) avant la fin du sprint.`,audience:`dev`,confidence:80,hasExplicitDeadline:!0,isUnderTeamInfluence:!0},rationale:`Outcome interne mesurable, échéance, sous influence directe de l'équipe.`},{id:`sprint.good.maintenance.astreinte`,verdict:`good`,draft:{type:`sprint`,text:`Atteindre 0 alerte critique non triée durant l'astreinte week-end qui suit ce sprint.`,audience:`dev`,confidence:80,hasExplicitDeadline:!0,isUnderTeamInfluence:!0},rationale:`Bénéficiaire = équipe astreinte, seuil net (zéro), borne temporelle.`},{id:`sprint.bad.maintenance.refactor`,verdict:`bad`,draft:{type:`sprint`,text:`Refactorer le module commande.`,audience:`dev`,confidence:80,hasExplicitDeadline:!1,isUnderTeamInfluence:!0},rationale:`Output pur, aucun bénéficiaire nommé, aucune mesure, pas d'échéance.`,expectedFailingCriteria:[`outcome`,`timeBounded`],trapWords:[`refactorer`]},{id:`sprint.bad.maintenance.tech-debt`,verdict:`bad`,draft:{type:`sprint`,text:`Réduire la dette technique du back-end.`,audience:`dev`,confidence:80,hasExplicitDeadline:!1,isUnderTeamInfluence:!0},rationale:`« Dette technique » est flou : aucun bénéficiaire, aucune mesure objective, pas d'échéance.`,expectedFailingCriteria:[`falsifiable`,`timeBounded`],trapWords:[`dette`]},{id:`sprint.bad.maintenance.stabilize`,verdict:`bad`,draft:{type:`sprint`,text:`Stabiliser la plateforme.`,audience:`dev`,confidence:80,hasExplicitDeadline:!1,isUnderTeamInfluence:!0},rationale:`Verbe d'output (« stabiliser »), aucune mesure, pas d'échéance.`,expectedFailingCriteria:[`outcome`,`timeBounded`],trapWords:[`stabiliser`]}],xe=[{id:`sprint.sheet.anatomy`,themeId:`sprint.fondamentaux`,icon:`target`,title:`L'anatomie d'un objectif de Sprint`,heroPhrase:`Verbe d'outcome, indicateur, variation chiffrée, contexte, échéance. Cinq briques. Une phrase.`,intro:``,practiceCtaLabel:`Va assembler ton premier objectif de Sprint`,sections:[{heading:`Les cinq briques`,icon:`target`,kind:`bricks`,body:`Un objectif de Sprint solide tient en une phrase et porte cinq briques. Chacune répond à une question. Si l'une manque, l'objectif est ambigu : quelqu'un finira par défendre un verdict qu'un autre contestera.`,bricksSentence:`Réduire le taux d'abandon au paiement de 50 % sur mobile d'ici la fin du sprint 24.`,bricks:[{num:1,label:`Verbe outcome`,hint:`L'action qui amorce le résultat`,examples:`Réduire, Faire passer, Atteindre, Permettre à`,snippet:`Réduire`,color:`purple`},{num:2,label:`Indicateur`,hint:`La métrique nommée`,examples:`taux d'abandon, p95 de l'API, NPS dev`,snippet:`le taux d'abandon au paiement`,color:`teal`},{num:3,label:`Variation chiffrée`,hint:`L'avant et l'après`,examples:`de X à Y, par N, à N %`,snippet:`de 50 %`,color:`pink`},{num:4,label:`Contexte`,hint:`Sur quoi, pour qui`,examples:`sur mobile, pour les invités, en production`,snippet:`sur mobile`,color:`amber`},{num:5,label:`Échéance`,hint:`D'ici quand`,examples:`fin du sprint, sprint 24, prochaine démo`,snippet:`d'ici la fin du sprint 24`,color:`blue`}]},{heading:`Le test des cinq briques`,icon:`good`,body:`Lire son objectif à voix haute et compter. Si une brique manque, l'identifier explicitement avant de figer. Tu t'exerceras à ce geste complet dans le Défi : un cas réel, quatre reformulations, une seule tient debout.`},{heading:`Le piège du contexte implicite`,icon:`warn`,body:`Le contexte est souvent omis (« on sait de quoi on parle »). C'est un risque : en revue de sprint, la mémoire collective diverge. Mieux vaut nommer le contexte même s'il semble évident.`},{heading:`Source`,kind:`source`,body:`Cette grammaire à cinq briques recoupe la doctrine du puzzle (voir mode Puzzle dans la pratique). Elle s'inspire des SMART goals (Doran, 1981) débarrassés de leur ambiguïté Mesurable/Atteignable, et de Kniberg pour le rôle du contexte.`}]},{id:`sprint.sheet.single-goal`,themeId:`sprint.fondamentaux`,icon:`target`,title:`Un seul objectif de Sprint`,heroPhrase:`Un seul objectif par sprint. Pas deux. Pas une liste.`,intro:``,practiceCtaLabel:`Va corriger un objectif mal posé`,sections:[{heading:`Pourquoi`,icon:`target`,body:``,bullets:[`Focus : un seul objectif force l'arbitrage des récits.`,`Mémorisable : récitable sans lire l'écran.`,`Trie le backlog : « cette récit contribue-t-elle à l'objectif ? »`,`Bilan clair en fin de sprint : atteint / pas atteint.`]},{heading:`Signaux d'alerte`,icon:`warn`,body:``,bullets:[`Le tableau affiche « Objectif 1 / Objectif 2 / Objectif 3 ».`,`L'objectif est rédigé après la sélection des récits.`,`Il contient un « et » coordonnant deux résultats.`,`Personne ne le récite à la rétro sans le relire.`]},{heading:`Comment consolider`,icon:`wrench`,body:`Identifier l'enjeu transverse qui relie les N objectifs proposés, puis le reformuler en un seul outcome. Si aucun enjeu transverse n'existe vraiment, c'est que le sprint mélange deux travaux qui auraient dû être deux sprints.`,examples:[{bad:`Objectif 1 : Migrer l'authentification vers OAuth. Objectif 2 : Réduire les bugs sur le panier de 8 à 2.`,good:`Augmenter le taux de connexions sans incident (auth + panier) de 92 % à 99 % d'ici fin de sprint.`,note:`Enjeu transverse : la confiance utilisateur dans le tunnel d'achat. Les deux travaux y contribuent.`}]},{heading:`Qui le rédige, sur quelle base`,icon:`learn`,body:`Co-construit en Sprint Planning par l'équipe Scrum entière : le PO propose un cap dérivé du objectif de produit, les Devs challengent au regard de leur capacité et de leur connaissance technique, le Scrum Master facilite la convergence. Pas un acte solo du PO. L'objectif de Sprint défini, les récits du backlog deviennent des hypothèses de ce qui aidera à l'atteindre.`,bullets:[`objectif de produit (le cap moyen terme du produit, l'amont)`,`État du backlog produit (ce qui est prioritaire et prêt)`,`Vélocité historique de l'équipe (capacité réaliste sur l'itération)`,`Retour de la dernière rétrospective (ce qu'on change ou garde)`,`Retour de la dernière Sprint Review (ce qui a bougé côté utilisateur)`]},{heading:`Source`,kind:`source`,body:`Scrum Guide 2020 : « The Sprint Goal is the single objective for the Sprint » [traduction : « L'objectif de Sprint est l'unique objectif du Sprint »] et « The Developers… define a Sprint Goal that communicates why the Sprint is valuable to stakeholders. » [traduction : « Les Developers… définissent un objectif de Sprint qui communique pourquoi le Sprint a de la valeur pour les parties prenantes. »] Convergent avec Kniberg, Cohn. SAFe : pluralité au niveau PI uniquement.`}]},{id:`sprint.sheet.product-goal-link`,themeId:`sprint.fondamentaux`,icon:`learn`,title:`L'objectif de Sprint et l'objectif de produit`,heroPhrase:`L'objectif de produit donne le cap. L'objectif de Sprint est l'étape qui sert ce cap, dans la fenêtre du sprint.`,intro:``,practiceCtaLabel:`Va écrire un objectif de Sprint aligné`,sections:[{heading:`Pourquoi cette relation compte`,icon:`target`,body:`Le Scrum Guide 2020 introduit explicitement le **Product Goal** (objectif de produit) : un cap moyen terme du produit, formulé en outcome. Chaque objectif de Sprint est une étape vers ce cap. Cette chaîne d'alignement rend chaque sprint signifiant. L'équipe sait pourquoi elle fait ce qu'elle fait.`,bullets:[`L'objectif de produit vit à l'année / au trimestre, l'objectif de Sprint à l'itération.`,`Sans objectif de produit, l'objectif de Sprint flotte (le PO décide chaque fois sans cap stable).`,`Sans objectif de Sprint, l'objectif de produit devient une plaque décorative sans traduction opérationnelle.`]},{heading:`Comment dériver l'un de l'autre`,icon:`wrench`,body:`L'objectif de Sprint n'est pas un objectif de produit en miniature. Il en est une étape concrète, formulée avec les cinq briques d'un objectif de Sprint, dans la fenêtre du sprint.`,examples:[{bad:`objectif de produit : « Devenir l'outil de paiement le plus simple du marché ». objectif de Sprint : « Devenir l'outil de paiement le plus simple du marché ».`,good:`objectif de produit : « Devenir l'outil de paiement le plus simple du marché ». objectif de Sprint : « Faire passer le temps moyen pour finaliser un paiement de 45 s à 30 s d'ici la fin du sprint 24 ».`,note:`L'objectif de Sprint traduit le cap en mesure observable sur l'itération.`}]},{heading:`Le test d'alignement`,icon:`good`,body:`À chaque Sprint Planning, poser la question : « notre objectif de Sprint contribue-t-il directement à notre objectif de produit en cours ? » Si l'équipe ne sait pas répondre clairement, soit l'objectif de produit n'est pas vraiment partagé, soit l'objectif de Sprint s'éparpille.`},{heading:`Source`,kind:`source`,body:`Scrum Guide 2020 (révision Schwaber/Sutherland) : ajout du Product Goal (objectif de produit) aux Scrum artifacts. Voir aussi Roman Pichler sur la cascade vision → objectif de produit → objectif de Sprint.`}]},{id:`sprint.sheet.goal-is-met`,themeId:`sprint.fondamentaux`,icon:`good`,title:`Comment savoir que l'objectif de Sprint est atteint`,heroPhrase:`La définition de succès se pose en Sprint Planning, pas à la Sprint Review. Tu écris l'objectif et son critère d'atteinte ensemble.`,intro:``,practiceCtaLabel:`Va définir le critère d'atteinte`,sections:[{heading:`Pourquoi définir le succès en amont`,icon:`target`,body:`Si le critère d'atteinte se discute à la Sprint Review, tout le monde devient juge et partie. Le facilitateur défend que c'est atteint, le PO ergote, les Devs s'épuisent à argumenter. À l'inverse, un critère écrit en amont est un contrat : la Review n'est plus qu'une lecture.`,bullets:[`Le critère est observable (chiffre, état, mesure).`,`Il est posé avant le sprint, pas pendant.`,`Il dit « atteint / pas atteint », pas « plutôt bien / plutôt mal ».`]},{heading:`Trois niveaux d'atteinte (à connaître, sans les multiplier)`,icon:`learn`,body:`Tu peux formaliser trois verdicts en fin de sprint, mais l'objectif doit fonctionner même avec un binaire atteint/raté. Les nuances servent en rétro, pas à l'affichage du résultat.`,bullets:[`**Atteint** : le critère mesurable est rempli ou dépassé.`,`**Partiel** : on n'a pas atteint la cible mais on a appris quelque chose qui change le sprint suivant.`,`**Raté** : ni la cible ni l'apprentissage. À examiner sérieusement en rétro.`]},{heading:`Le test de la phrase « Comment saurons-nous »`,icon:`wrench`,body:`À la fin du Sprint Planning, demander : « comment saurons-nous, en fin de sprint, si nous l'avons atteint ? » Si l'équipe ne sait pas répondre en moins de 30 secondes, l'objectif est mal posé. Reformuler avant de démarrer.`,examples:[{bad:`objectif de Sprint : « Rendre le module commande plus fiable. » Critère d'atteinte : non posé.`,good:`objectif de Sprint : « Réduire le nombre d'incidents production du module commande de 14 à 5 par semaine d'ici la fin du sprint. » Critère : nombre d'incidents mesuré la dernière semaine du sprint, comparé à la moyenne hebdomadaire précédente.`,note:`Le critère d'atteinte est implicite dans l'objectif bien rédigé, mais le formuler explicitement protège contre les divergences d'interprétation.`}]},{heading:`Source`,kind:`source`,body:`Mike Cohn, Succeeding with Agile, chapitre sur les Sprint Reviews. Convergent avec Henrik Kniberg, Lean from the Trenches, sur l'importance de poser le critère d'atteinte avant l'observation.`}]},{id:`sprint.sheet.maintenance-value`,themeId:`sprint.cas-particuliers`,icon:`wrench`,title:`Sprint de maintenance : trouver la valeur`,heroPhrase:`Un sprint de maintenance a toujours un bénéficiaire. À toi de le nommer.`,intro:``,practiceCtaLabel:`Reformuler un objectif de maintenance`,sections:[{heading:`Trois questions à se poser`,icon:`target`,body:``,bullets:[`Pour qui ce travail produit-il un changement ?`,`Quel changement constatable du point de vue du bénéficiaire ?`,`Quelle mesure rendra ce changement visible à la revue de sprint ?`]},{heading:`Quatre bénéficiaires fréquents`,icon:`learn`,body:``,bullets:[`Utilisateur final : moins de bugs visibles, moins d'incidents en production.`,`Équipe support : moins d'escalades, temps de résolution plus court.`,`Équipe ops / astreinte : déploiements plus rapides, astreintes plus calmes.`,`Équipe dev : vélocité retrouvée, moins de temps sur les bugs hérités.`]},{heading:`Quatre familles de maintenance (ISO/IEC 14764)`,icon:`puzzle`,body:`Nommer la famille aide à reconnaître qu'on a bien un travail de maintenance avec un bénéficiaire — pas une tâche sans objectif.`,bullets:[`Corrective : corriger un défaut déjà en production (bugs, incidents).`,`Adaptative : s'ajuster à un changement d'environnement (dépendances, OS, réglementation).`,`Perfective : améliorer la performance ou l'expérience sur un usage déjà en place.`,`Préventive : réduire un risque futur avant qu'il ne devienne un incident (tests de reprise, durcissement, supervision).`]},{heading:`Le même réflexe dans les quatre familles`,icon:`wrench`,body:`Le réflexe est le même dans les quatre cas : remplacer la tâche par ce qu'elle change pour quelqu'un, avec une mesure. Les cas concrets t'attendent dans l'exercice « Maintenance : trouver la valeur » de S'entraîner : autant les découvrir en jouant plutôt qu'en lisant la réponse ici.`},{heading:`Source`,kind:`source`,body:`ISO/IEC 14764 (taxonomie corrective / adaptative / perfective / préventive), reprise par Lientz & Swanson (1980) et la littérature technique courante sur la maintenance logicielle.`}]},{id:`sprint.sheet.not-a-récit-list`,isNamedPitfall:!0,themeId:`sprint.pieges-classiques`,icon:`warn`,title:`L'objectif liste de tâches`,heroPhrase:`L'équipe s'engage sur un résultat. Les récits sont une hypothèse de ce qui aidera à l'atteindre.`,intro:``,practiceCtaLabel:`Va corriger un objectif mal posé`,sections:[{heading:`Pourquoi`,icon:`target`,body:`Le Scrum Guide est clair : la sélection des items du backlog produit (Product Backlog Items) est une **hypothèse** de ce qui aidera à atteindre l'objectif de Sprint, pas l'engagement en soi. Si l'équipe s'engage sur les récits au lieu de l'objectif, le sprint devient une course à la complétion, pas une recherche de valeur.`,bullets:[`L'engagement porte sur le résultat, pas sur la livraison.`,`Si la moitié des récits suffisent à atteindre l'objectif, on s'arrête.`,`Si les récits ne suffisent pas, on ajuste les récits, pas l'objectif.`]},{heading:`Signaux d'alerte`,icon:`warn`,kind:`signals`,body:``,bullets:[`« On a fini tous les récits » devient la fierté de fin de sprint, indépendamment du résultat constaté.`,`L'objectif de Sprint est rédigé après la sélection des récits pour les résumer.`,`À la rétro, l'équipe parle de récits livrées, pas de bénéficiaires touchés.`]},{heading:`Comment recadrer`,icon:`wrench`,body:`Reformuler l'objectif en outcome avant de finaliser la sélection. Demander : « quelles récits nous permettent vraiment d'atteindre cet objectif ? » et laisser tomber le reste.`,examples:[{bad:`Livrer les 12 récits de l'epic intégration.`,good:`Permettre à 80 % des nouveaux utilisateurs de compléter l'inscription en moins de 90 secondes, fin de sprint.`,note:`Les récits deviennent un moyen mesuré contre l'outcome, pas une fin en soi.`}]},{heading:`Source`,kind:`source`,body:`Scrum Guide 2020 : « The selected Product Backlog items are a hypothesis of what is needed to achieve the Sprint Goal. » [traduction : « Les items sélectionnés du backlog produit sont une hypothèse de ce qui est nécessaire pour atteindre l'objectif de Sprint. »] Voir aussi Scrum.org, Sprint Backlog Antipatterns.`}]},{id:`sprint.sheet.vanity-goal`,isNamedPitfall:!0,themeId:`sprint.pieges-classiques`,icon:`warn`,title:`L'objectif vitrine`,heroPhrase:`Un objectif qui sonne bien mais n'engage personne. Il rassure les parties prenantes sans rien promettre.`,intro:``,practiceCtaLabel:`Va corriger un objectif vitrine`,sections:[{heading:`Pourquoi c'est piégeux`,icon:`target`,body:`L'objectif vitrine coche la case « on a un objectif de Sprint » sans accepter le coût d'un engagement vérifiable. Personne ne saura à la fin du sprint si l'objectif est atteint ou pas, donc tout le monde déclare la victoire.`,bullets:[`Aucune mesure ne tranche en fin de sprint.`,`L'objectif est compatible avec n'importe quel résultat.`,`Il rassure les parties prenantes mais ne change pas le comportement de l'équipe.`]},{heading:`Signaux d'alerte`,icon:`warn`,kind:`signals`,body:``,bullets:[`Présence de mots flous (« renforcer », « valoriser », « consolider », « explorer »).`,`Aucun chiffre, aucune métrique, aucun bénéficiaire nommé.`,`Le test « est-ce qu'on peut être en désaccord sur l'atteinte ? » donne oui.`]},{heading:`Comment reformuler`,icon:`wrench`,body:`Repérer le mot flou, demander « tu veux dire quoi, concrètement, mesurable comment ? » et écrire la réponse comme nouvel objectif.`,examples:[{bad:`Renforcer l'expérience utilisateur sur le module commande.`,good:`Faire passer le taux de complétion du tunnel de paiement de 68 % à 80 % d'ici fin de sprint.`,note:`Le renforcement disparaît au profit de ce qu'il était censé produire.`}]},{heading:`Source`,kind:`source`,body:`Scrum.org, Sprint Anti-Patterns. Convergent avec le test pédagogique de Mike Cohn : « can two people defending opposite verdicts both be right ? » [traduction : « deux personnes défendant des verdicts opposés peuvent-elles avoir raison toutes les deux ? »] Si oui, l'objectif est creux.`}]},{id:`sprint.sheet.pet-project-goal`,isNamedPitfall:!0,themeId:`sprint.pieges-classiques`,icon:`warn`,title:`L'objectif de confort`,heroPhrase:`Un objectif qui sert un seul interlocuteur ou une obsession interne. Aucun bénéficiaire externe ne ressent l'effet.`,intro:``,practiceCtaLabel:`Va recentrer un objectif mal aligné`,sections:[{heading:`Pourquoi`,icon:`target`,body:`L'objectif de confort est techniquement bien rédigé mais sert un public minoritaire ou interne : demande d'un manager isolé, refactor que seule l'équipe verra, fonctionnalité réclamée par un seul client. La vélocité est dépensée sans contrepartie utilisateur.`,bullets:[`Aucun bénéficiaire externe n'est nommé, ou un seul.`,`L'effet attendu reste dans l'équipe (vélocité, propreté du code).`,`Le retour sur effort est défendable mais sur un public marginal.`]},{heading:`Signaux d'alerte`,icon:`warn`,kind:`signals`,body:``,bullets:[`Le bénéficiaire nommé est un membre de l'équipe ou un manager.`,`L'effet attendu n'est observable qu'en interne.`,`Le sprint d'avant avait déjà un objectif sur le même sous-sujet.`]},{heading:`Le test « qui en profite hors de l'équipe ? »`,icon:`wrench`,body:`Avant de figer l'objectif, nommer 3 bénéficiaires hors équipe et l'effet observable sur chacun. Si la liste est vide, l'objectif est un objectif de confort.`,examples:[{bad:`Refactorer le module de gestion des permissions pour qu'il soit plus clair.`,good:`Permettre aux administrateurs clients de modifier les rôles utilisateurs en moins de 30 secondes (vs 4 min aujourd'hui), fin de sprint.`,note:`Le bénéficiaire passe de l'équipe à un utilisateur externe avec une mesure observable.`}]},{heading:`Source`,kind:`source`,body:`Christina Wodtke (Radical Focus) et Mike Cohn convergent : l'objectif d'un sprint doit servir un changement constatable par un public extérieur à l'équipe pour mériter la vélocité dépensée.`}]},{id:`sprint.sheet.renew-the-goal`,isNamedPitfall:!0,themeId:`sprint.pieges-classiques`,icon:`warn`,title:`L'objectif recyclé`,heroPhrase:`Le même objectif sprint après sprint signale soit qu'on n'apprend rien, soit qu'on ne mesure jamais.`,intro:``,practiceCtaLabel:`Va écrire un nouvel objectif`,sections:[{heading:`Pourquoi le renouveler`,icon:`target`,body:`Si l'objectif du sprint N est identique à celui du sprint N-1 (et N-2), trois lectures possibles : (1) l'objectif n'est pas atteint, donc il faut le revoir ou changer d'approche ; (2) il est atteint mais on ne le mesure pas ; (3) c'est un faux objectif qui ne sert que d'étiquette. Aucune n'est saine.`,bullets:[`Un objectif porte une intention bornée : quand l'intention est servie, l'objectif passe à autre chose.`,`Répéter sans mesurer transforme l'objectif en formule magique.`,`L'apprentissage d'un sprint doit modifier le suivant : nouvel objectif ou approche modifiée.`]},{heading:`Signaux d'alerte`,icon:`warn`,kind:`signals`,body:``,bullets:[`Trois sprints consécutifs avec le même objectif (ou variantes mineures).`,`Personne ne sait dire si l'objectif précédent a été atteint.`,`La rétro ne parle pas de l'objectif, seulement des récits.`]},{heading:`Comment renouveler`,icon:`wrench`,body:`À la fin de chaque sprint, statuer sur l'objectif : atteint, partiel, raté. Si atteint, passer à l'enjeu suivant. Si partiel ou raté, soit relever le seuil de la prochaine étape, soit changer d'approche (l'objectif ne se reproduit pas à l'identique).`,examples:[{bad:`Améliorer la conversion du tunnel de paiement (sprint après sprint).`,good:`Sprint 24 : faire passer la conversion de 12 % à 18 %. Sprint 25 (si atteint) : faire passer le taux d'abandon mobile de 35 % à 22 %. Sprint 25 (si raté) : reformuler l'hypothèse, peut-être que le problème n'est pas la conversion mais le ré-engagement.`,note:`Le sprint suivant porte un objectif **différent**, soit qu'on monte d'un cran, soit qu'on change d'angle.`}]},{heading:`Source`,kind:`source`,body:`Henrik Kniberg sur l'apprentissage d'un sprint à l'autre. Et Scrum.org : « The Sprint Goal is a single objective for the Sprint, not a recurring theme. » [traduction : « L'objectif de Sprint est un objectif unique du Sprint, pas un thème récurrent. »]`}]},{id:`sprint.sheet.discovery-exploration`,themeId:`sprint.cas-particuliers`,icon:`learn`,title:`Sprint d'exploration (ou exploration)`,heroPhrase:`Tu n'as pas une livraison à faire, tu as une question à trancher. L'objectif de Sprint vise une preuve, pas un livrable.`,intro:``,practiceCtaLabel:`Va écrire un objectif de Sprint d'exploration`,sections:[{heading:`La logique de l'exploration`,icon:`target`,body:`Un sprint d'exploration sert à trancher une incertitude (technique, produit, marché) avant de s'engager sur du développement. L'objectif de Sprint n'est donc pas « livrer X » mais « répondre à la question Y avec une preuve observable ». Le piège : confondre le sprint d'exploration avec un sprint sans objectif.`,bullets:[`L'incertitude à lever est nommée explicitement (la question).`,`Le critère de réponse est observable : un prototype, un test utilisateur, une mesure de performance, une preuve de concept chiffrée.`,`L'équipe accepte un verdict : « la réponse est non, on n'y va pas » est un succès de l'exploration.`]},{heading:`Reformuler en outcome`,icon:`wrench`,body:`L'objectif de Sprint d'exploration prend la forme « répondre à [question] avec [preuve] d'ici fin de sprint ». La preuve est ce qui rend l'objectif mesurable.`,examples:[{bad:`Explorer la faisabilité du paiement en crypto.`,good:`Répondre à : « peut-on intégrer le paiement crypto en moins de 6 semaines sans dépendre d'un prestataire tiers ? » avec une preuve de concept fonctionnelle couvrant 3 cryptos majeures et une estimation chiffrée du coût d'intégration, d'ici fin de sprint.`,note:`La question est posée, la preuve est définie. À la Review, on peut dire oui ou non sans débat.`}]},{heading:`Le piège de l'exploration sans verdict`,icon:`warn`,body:`Un sprint d'exploration qui ne tranche pas est un sprint perdu. La pire formulation : « explorer », « étudier », « regarder ». Ces verbes ne s'engagent à rien. Le verdict doit être annoncé en début de sprint comme une question fermée (oui ou non, et ce qui change).`},{heading:`Source`,kind:`source`,body:`Marty Cagan (Inspired) sur la discovery produit. Mike Cohn pour les explorations techniques en Scrum. Convergent : un exploration a une question, un budget temps et un verdict.`}]},{id:`sprint.sheet.event-prep`,themeId:`sprint.cas-particuliers`,icon:`challenge`,title:`Sprint préparatoire à un événement`,heroPhrase:`Une release, une démo, une conférence. L'objectif ne dit pas « tout préparer » mais ce qui changera chez le public visé.`,intro:``,practiceCtaLabel:`Va écrire l'objectif d'un sprint d'événement`,sections:[{heading:`Pourquoi c'est piégeux`,icon:`warn`,body:`Un sprint préparatoire (release, conférence, démo client important) attire les goals creux du type « préparer la conférence ». Tout le monde est mobilisé, personne ne sait précisément ce qu'on cherche à produire chez les participants. Résultat : on s'agite, on accumule des tâches, et la satisfaction post-événement reste subjective.`,bullets:[`Le bénéficiaire est le **public** de l'événement, pas l'équipe.`,`L'effet attendu est nommé : ce que le public doit ressentir / faire / décider.`,`La mesure existe : retours après l'événement, conversions, demandes de suite.`]},{heading:`Reformuler en outcome côté public`,icon:`wrench`,body:`L'objectif de Sprint vise le changement chez le public, pas la complétion du contenu.`,examples:[{bad:`Préparer la conférence client annuelle prévue fin de sprint.`,good:`Obtenir au moins 10 demandes de RDV commercial qualifiées de la part des participants de la conférence client annuelle, d'ici 48 h après l'événement.`,note:`Le contenu de la conférence devient un moyen pour atteindre ce résultat, pas une fin en soi. L'équipe arbitre ce qu'elle prépare en fonction de ça.`}]},{heading:`Le piège de l'échéance floue`,icon:`warn`,body:`L'événement crée une échéance forte (la date), ce qui peut faire croire que l'échéance suffit comme borne. Mais une échéance n'est pas un objectif : l'objectif dit ce qu'on cherche à obtenir avant ou après cette échéance. Sans cet ajout, la date devient le seul critère et tout le travail s'aligne dessus, même s'il rate l'effet.`},{heading:`Source`,kind:`source`,body:`Convergent avec la doctrine outcome-over-output (Marty Cagan, Christina Wodtke). Adapté au contexte sprint par Henrik Kniberg dans ses retours sur les release sprints.`}]},{id:`sprint.sheet.external-blockers`,themeId:`sprint.cas-particuliers`,icon:`wrench`,title:`Sprint avec dépendances bloquantes externes`,heroPhrase:`Tu ne contrôles pas tout. L'objectif dit ce que tu peux honnêtement engager, avec un plan B explicite.`,intro:``,practiceCtaLabel:`Va écrire un objectif honnête face aux blocages`,sections:[{heading:`La situation`,icon:`target`,body:`L'équipe attend une API externe, une validation légale, un accès production, une décision d'un autre département. Sans cette entrée, une partie de l'objectif est inatteignable. Deux mauvais réflexes : (1) prétendre que le blocage va se lever et s'engager comme si de rien n'était ; (2) renoncer à l'objectif et faire un sprint « au mieux » sans cap.`,bullets:[`Le blocage est nommé en début de sprint, pas découvert à mi-parcours.`,`L'objectif porte sur ce que l'équipe peut vraiment engager (donc parfois sur une étape antérieure au blocage).`,`Un plan B explicite est posé pour les ressources non bloquées.`]},{heading:`Trois formulations honnêtes`,icon:`wrench`,body:`Selon la nature du blocage, l'objectif de Sprint s'adapte.`,bullets:[`**Si le blocage est probable à se lever** : « Faire passer X de A à B **conditionnellement à la réception de Y avant le jour J du sprint**. À défaut, livrer la version isolée prête à intégrer dès réception. »`,`**Si le blocage est durable** : « Réduire de 30 % le temps de traitement des cas sans dépendance Y, en isolant l'intégration Y pour livraison dès qu'elle est disponible. »`,`**Si le blocage est inconnu** : « Lever en première semaine la dépendance Y (sous responsabilité du Product Owner) puis exécuter sur le reste du sprint ». L'objectif devient en partie l'engagement à débloquer.`]},{heading:`Le piège du « on fera au mieux »`,icon:`warn`,body:`« On fera de notre mieux » n'est pas un objectif de Sprint. C'est une posture, pas un cap. Si tu ne peux pas chiffrer ce que tu engages, demande-toi si ce sprint a vraiment un sens, ou s'il faut le repousser et utiliser la fenêtre pour autre chose (exploration, technique, refonte).`},{heading:`Source`,kind:`source`,body:`Henrik Kniberg sur la gestion des dépendances en Scrum at Scale. SAFe propose le ROAM (Risks Owned, Accepted, Mitigated) au PI Planning ; appliqué à l'échelle sprint, la même logique s'applique.`}]},{id:`sprint.sheet.alibi-goal`,isNamedPitfall:!0,themeId:`sprint.pieges-classiques`,icon:`warn`,title:`L'objectif alibi`,heroPhrase:`Les récits sont choisis avant l'objectif. L'objectif n'est qu'une étiquette collée après coup pour leur donner un air de cohérence.`,intro:``,practiceCtaLabel:`Va vérifier l'ordre d'un objectif suspect`,sections:[{heading:`Pourquoi c'est piégeux`,icon:`target`,body:`La sélection des récits précède la rédaction de l'objectif, jamais l'inverse. Le Product Owner ou l'équipe remplit le sprint avec ce qui rentre dans la vélocité, puis rédige une phrase qui les relie après coup. L'objectif n'a alors aucun pouvoir de décision : il ne change rien au travail réel.`,bullets:[`La sélection des récits précède la rédaction de l'objectif, jamais l'inverse.`,`Plusieurs formulations d'objectif colleraient aussi bien aux mêmes récits.`,`Retirer l'objectif de la page ne changerait rien au travail du sprint.`]},{heading:`Comment ça se voit`,icon:`warn`,kind:`signals`,body:``,bullets:[`L'objectif est écrit en dernier, après la sélection des récits au Sprint Planning.`,`Personne ne sait dire ce qui ferait échouer le sprint si tous les récits étaient livrés.`,`Changer l'ordre des mots de l'objectif ne changerait rien au travail prévu.`]},{heading:`Le test de l'ordre`,icon:`wrench`,body:`Avant de sélectionner le moindre récit, décider et écrire l'effet attendu. Les récits deviennent ensuite une hypothèse sur ce qui devrait produire cet effet, pas une liste qu'on habille après coup.`,examples:[{bad:`Objectif : « Améliorer le parcours d'achat. » Récits sélectionnés : filtre prix, tri par avis, bouton d'achat fixe, choisis pour remplir la vélocité, objectif écrit après.`,good:`Faire passer le taux d'ajout au panier de 24 % à 30 % d'ici la fin du sprint. Hypothèse à vérifier : le filtre prix, le tri par avis et le bouton fixe y contribuent.`,note:`Le même travail, mais l'ordre s'inverse : l'effet attendu est décidé avant les moyens, pas déduit après.`}]},{heading:`Source`,kind:`source`,body:`Scrum.org, 27 Sprint Anti-Patterns : les équipes sélectionnent des éléments du backlog puis tentent de leur fabriquer un objectif commun, même sans fil conducteur réel.`}]},{id:`sprint.sheet.composite-goal`,isNamedPitfall:!0,themeId:`sprint.pieges-classiques`,icon:`warn`,title:`L'objectif composite`,heroPhrase:`Deux objectifs recousus par « et ». Si l'un échoue et l'autre réussit, personne ne sait si le sprint a gagné.`,intro:``,practiceCtaLabel:`Va séparer un objectif composite`,sections:[{heading:`Pourquoi c'est piégeux`,icon:`target`,body:`Le tronc commun d'un bon objectif de Sprint est un but unique et cohérent. Un « et » qui relie deux effets mesurés séparément casse cette unité : l'un des deux peut être atteint sans que l'autre le soit, et le verdict de réussite devient une négociation, pas un fait.`,bullets:[`« Et » relie deux effets mesurés séparément, pas un seul.`,`L'équipe protège en priorité le plus facile des deux, pas forcément le plus important.`,`À la Revue, la réussite se discute au lieu de se constater.`]},{heading:`Comment ça se voit`,icon:`warn`,kind:`signals`,body:``,bullets:[`L'objectif contient « et » entre deux verbes ou deux indicateurs différents.`,`À la Revue, l'équipe négocie lequel des deux comptait vraiment.`,`Deux tableaux de bord différents sont montrés pour justifier la réussite.`]},{heading:`Le test du split`,icon:`wrench`,body:`Séparer mentalement l'objectif de part et d'autre du « et ». Si les deux morceaux ont chacun leur propre indicateur et leur propre sens sans l'autre, ce sont deux objectifs, pas un. Choisir celui qui compte le plus pour ce sprint ; l'autre attend son tour.`,examples:[{bad:`Réduire le temps de chargement de la page produit et augmenter le taux de clic sur les recommandations.`,good:`Faire passer le temps de chargement de la page produit de 3,2 s à 1,5 s d'ici la fin du sprint.`,note:`Le taux de clic sur les recommandations devient un sujet du sprint suivant, pas un objectif caché dans celui-ci.`}]},{heading:`Source`,kind:`source`,body:`Scrum.org, Sprint Anti-Patterns, sur les objectifs qui juxtaposent plusieurs éléments du backlog sans fil conducteur unique.`}]},{id:`sprint.sheet.invisible-goal`,isNamedPitfall:!0,themeId:`sprint.pieges-classiques`,icon:`warn`,title:`L'objectif invisible`,heroPhrase:`Il existe sur le tableau. Il n'existe nulle part ailleurs : ni au Daily, ni à la Revue, ni à la Rétrospective.`,intro:``,practiceCtaLabel:`Va ramener un objectif dans les rituels`,sections:[{heading:`Pourquoi c'est piégeux`,icon:`target`,body:`L'objectif est rempli dans l'outil de suivi puis jamais rouvert. Le Daily Scrum se résume à un tour de statut des tickets. La Revue présente les récits livrés, pas l'effet visé. L'objectif ne pilote alors aucune décision réelle : c'est un champ de formulaire, pas un cap.`,bullets:[`Le Daily Scrum ne mentionne jamais où en est l'objectif, seulement les tickets.`,`À la Revue, on présente des récits livrés, pas l'effet attendu par l'objectif.`,`L'équipe pourrait citer les récits du sprint sans pouvoir citer l'objectif.`]},{heading:`Comment ça se voit`,icon:`warn`,kind:`signals`,body:``,bullets:[`L'objectif n'est mentionné dans aucun rituel après le Sprint Planning.`,`Demander l'objectif du sprint en cours à un membre de l'équipe produit une hésitation.`,`Le champ objectif de l'outil de suivi est rempli, mais jamais rouvert.`]},{heading:`Le test du silence`,icon:`wrench`,body:`Réintroduire l'objectif dans chaque rituel : le Daily s'ouvre en s'y rapportant, la Revue le rappelle avant de montrer les récits, la Rétro demande explicitement s'il a été atteint.`,examples:[{bad:`Daily Scrum : « Hier j'ai fait le ticket X, aujourd'hui je fais le ticket Y. »`,good:`Daily Scrum : « Le ticket X que j'ai fini nous rapproche de l'objectif du sprint parce que... »`,note:`Le rituel change de forme : on relie le travail du jour à l'effet visé, pas seulement à la tâche.`}]},{heading:`Source`,kind:`source`,body:`Age-of-Product.com, Missing Sprint Goals : un objectif absent des rituels quotidiens n'a d'existence que sur le papier.`}]},{id:`sprint.sheet.never-renegotiated-goal`,isNamedPitfall:!0,themeId:`sprint.pieges-classiques`,icon:`warn`,title:`L'objectif jamais renégocié`,heroPhrase:`Le Sprint Backlog change en cours de route. Personne ne se demande si l'objectif tient encore.`,intro:``,practiceCtaLabel:`Va protéger un objectif face à un imprévu`,sections:[{heading:`Pourquoi c'est piégeux`,icon:`target`,body:`Le Scrum Guide autorise à renégocier le périmètre en cours de sprint avec le Product Owner, tant que l'objectif reste protégé. Beaucoup d'équipes renégocient le périmètre sans jamais revenir sur l'objectif : il devient un vœu figé au premier jour, jamais réévalué à la lumière des faits du sprint.`,bullets:[`Le périmètre peut légitimement bouger en cours de sprint ; l'objectif, lui, doit rester une décision consciente.`,`Quand un récit est retiré ou ajouté, personne ne revérifie si l'objectif est toujours atteignable.`,`L'objectif devient un vœu figé au premier jour, jamais réévalué.`]},{heading:`Comment ça se voit`,icon:`warn`,kind:`signals`,body:``,bullets:[`Un récit qui portait l'objectif est abandonné en cours de sprint sans discussion sur l'objectif lui-même.`,`La Rétrospective ne pose jamais la question « avons-nous protégé l'objectif ou seulement la liste ? »`,`Le Scrum Master ne relance jamais l'objectif quand le périmètre bouge.`]},{heading:`Protéger l'objectif, pas la liste`,icon:`wrench`,body:`Quand le périmètre change, poser explicitement la question à l'équipe : l'objectif tient-il encore ? Si non, deux choix honnêtes : réduire l'ambition chiffrée, ou protéger l'objectif en repoussant l'imprévu après la Revue.`,examples:[{bad:`Le récit qui portait la mesure de l'objectif est retiré à mi-sprint pour absorber un incident. Personne ne revient sur l'objectif.`,good:`« Le récit qui portait notre objectif est retiré. On réduit l'ambition chiffrée de l'objectif, ou on protège l'objectif en repoussant l'incident après la Revue. » Décision prise en équipe.`,note:`L'objectif reste la boussole, même quand le contenu du sprint change.`}]},{heading:`Source`,kind:`source`,body:`Scrum Guide 2020, sur l'adaptation du Sprint Backlog en cours de sprint et la protection du Sprint Goal.`}]},{id:`sprint.sheet.unnamed-dependency`,isNamedPitfall:!0,themeId:`sprint.pieges-classiques`,icon:`warn`,title:`La dépendance non nommée`,heroPhrase:`L'objectif dépend d'une autre équipe ou d'un service externe, mais ce risque n'est jamais dit à voix haute.`,intro:``,practiceCtaLabel:`Va nommer une dépendance avant qu'elle ne casse un objectif`,sections:[{heading:`Pourquoi c'est piégeux`,icon:`target`,body:`L'objectif suppose qu'une autre équipe ou qu'un service externe livre à temps, sans que cela soit vérifié ni nommé au Sprint Planning. Si la dépendance glisse, l'objectif échoue pour une raison jamais discutée, et l'équipe porte seule la responsabilité d'un risque qu'elle ne maîtrisait pas.`,bullets:[`L'objectif suppose une livraison externe sans qu'elle soit vérifiée ni nommée.`,`Si la dépendance glisse, l'objectif échoue pour une raison jamais discutée au Planning.`,`L'équipe porte seule la responsabilité d'un risque qu'elle ne maîtrise pas.`]},{heading:`Comment ça se voit`,icon:`warn`,kind:`signals`,body:``,bullets:[`L'objectif contient un verbe d'action sur un système que l'équipe ne possède pas.`,`Aucune conversation avec l'équipe ou le service dépendant n'a eu lieu avant le Planning.`,`À la Rétro, l'échec de l'objectif s'explique par « on attendait après l'équipe X ».`]},{heading:`Nommer le risque avant le Planning`,icon:`wrench`,body:`Vérifier la dépendance avec l'équipe concernée avant de figer l'objectif, et prévoir un plan de repli dans l'objectif lui-même si elle glisse.`,examples:[{bad:`Faire passer le taux de connexion réussie de 80 % à 95 %, en s'appuyant sur la nouvelle API d'authentification de l'équipe Plateforme (date de livraison non confirmée).`,good:`Vérifié auprès de l'équipe Plateforme : l'API sera livrée mardi. Faire passer le taux de connexion réussie de 80 % à 95 % d'ici la fin du sprint, avec un plan de repli testé si l'API glisse.`,note:`La dépendance devient un fait vérifié et un risque nommé, pas un espoir silencieux.`}]},{heading:`Source`,kind:`source`,body:`SAFe propose le ROAM (Risks Owned, Accepted, Mitigated) au PI Planning ; la même discipline s'applique à l'échelle d'un sprint dès qu'une dépendance externe existe.`}]},{id:`sprint.sheet.hypothesis-as-certainty`,isNamedPitfall:!0,themeId:`sprint.pieges-classiques`,icon:`warn`,title:`L'hypothèse maquillée en certitude`,heroPhrase:`« On veut voir si… » devient « on va prouver que… ». L'expérimentation perd son droit à l'échec.`,intro:``,practiceCtaLabel:`Va redonner à un objectif le droit d'avoir tort`,sections:[{heading:`Pourquoi c'est piégeux`,icon:`target`,body:`Une expérimentation a deux issues légitimes : l'hypothèse tient, ou elle ne tient pas, les deux sont un succès d'apprentissage. Rédigée comme une certitude, seule l'issue positive compte comme réussite, et l'équipe évite ensuite les sujets vraiment incertains pour ne pas « rater » un objectif qu'elle ne maîtrisait pas.`,bullets:[`Une expérimentation a deux issues légitimes ; les deux sont un succès d'apprentissage.`,`Rédigée comme une certitude, seule l'issue positive compte comme réussite.`,`L'équipe évite ensuite les sujets incertains pour ne pas « rater » un objectif hasardeux.`]},{heading:`Comment ça se voit`,icon:`warn`,kind:`signals`,body:``,bullets:[`Le mot « tester », « explorer » ou « voir si » a disparu entre l'intention initiale et l'objectif écrit.`,`Aucun critère n'est prévu pour le cas où l'hypothèse est invalidée.`,`L'équipe qualifie déjà au Planning le résultat attendu comme acquis.`]},{heading:`Garder le droit d'avoir tort`,icon:`wrench`,body:`Garder la nature d'hypothèse explicite dans l'objectif et définir à l'avance ce que signifie « apprendre », même si l'hypothèse échoue.`,examples:[{bad:`Faire passer l'engagement sur la recherche de 12 % à 20 % grâce à la nouvelle autocomplétion.`,good:`Tester si la nouvelle autocomplétion améliore l'engagement sur la recherche. Réussite si le taux de clic dépasse 15 % (vs 12 % aujourd'hui) ; en dessous, l'hypothèse est invalidée et documentée pour la suite.`,note:`Les deux issues sont écrites à l'avance : l'objectif reste falsifiable même quand la réponse est non.`}]},{heading:`Source`,kind:`source`,body:`Marty Cagan (Inspired), sur la distinction entre découverte (hypothèses à tester) et livraison (engagements à tenir).`}]}];function O(e,t,n,r){return{kind:`text`,id:e,category:t,quality:n,text:r}}function Se(e,t,n,r){return{kind:`numericField`,id:e,category:`variation`,quality:t,template:n,fieldCount:r}}function Ce(e,t,n,r){return{kind:`numericField`,id:e,category:t,quality:`good`,template:n,fieldCount:r,fieldKind:`text`}}function we(e,t){return{kind:`numericField`,id:e,category:t,quality:`neutral`,template:`[X]`,fieldCount:1,fieldKind:`text`,handLabel:`Écrire moi-même…`}}var Te=[O(`a-good-reduce`,`action`,`good`,`Réduire`),O(`a-good-divide`,`action`,`good`,`Diviser`),O(`a-good-pass`,`action`,`good`,`Faire passer`),O(`a-good-enable`,`action`,`good`,`Permettre à`)],Ee=[O(`a-neu-increase`,`action`,`neutral`,`Augmenter`),O(`a-neu-reach`,`action`,`neutral`,`Atteindre`),O(`a-neu-bring`,`action`,`neutral`,`Ramener`),O(`a-neu-keep`,`action`,`neutral`,`Maintenir`)],De=[O(`a-dis-deliver`,`action`,`distractor`,`Livrer`),O(`a-dis-refactor`,`action`,`distractor`,`Refactorer`),O(`a-dis-setup`,`action`,`distractor`,`Mettre en place`),O(`a-dis-improve`,`action`,`distractor`,`Améliorer`)],Oe=[O(`i-good-cart`,`indicator`,`good`,`le taux d'abandon au paiement`),O(`i-good-latency`,`indicator`,`good`,`le temps moyen de réponse de l'API`),O(`i-good-incidents`,`indicator`,`good`,`le nombre d'incidents de production`),O(`i-good-hotfix`,`indicator`,`good`,`le délai de déploiement d'un hotfix`)],ke=[O(`i-neu-ticket`,`indicator`,`neutral`,`le temps de résolution d'un ticket support`),O(`i-neu-nps`,`indicator`,`neutral`,`le score NPS`),O(`i-neu-5xx`,`indicator`,`neutral`,`le taux d'erreur 5xx`),O(`i-neu-coverage`,`indicator`,`neutral`,`la couverture des tests automatisés`)],Ae=[O(`i-dis-page`,`indicator`,`distractor`,`la nouvelle page de paiement`),O(`i-dis-perf`,`indicator`,`distractor`,`la performance`),O(`i-dis-debt`,`indicator`,`distractor`,`la dette technique`),O(`i-dis-all`,`indicator`,`distractor`,`tout ce qui était prévu pour ce sprint`)],je=[Se(`v-good-range`,`good`,`de [X] à [Y]`,2),Se(`v-good-factor`,`good`,`par [X]`,1),Se(`v-good-target`,`good`,`à [X]`,1),Se(`v-good-points`,`good`,`de [X] points`,1),Se(`v-good-atleast`,`good`,`d'au moins [X] %`,1)],Me=[Se(`v-neu-percent`,`neutral`,`de [X] %`,1)],Ne=[O(`v-dis-signif`,`variation`,`distractor`,`significativement`),O(`v-dis-drastic`,`variation`,`distractor`,`drastiquement`),O(`v-dis-notable`,`variation`,`distractor`,`de manière notable`),O(`v-dis-up`,`variation`,`distractor`,`vers le haut`)],Pe=[O(`c-good-mobile`,`context`,`good`,`sur mobile`),O(`c-good-guest`,`context`,`good`,`pour les utilisateurs invités`),O(`c-good-support`,`context`,`good`,`pour l'équipe support`),O(`c-good-prod`,`context`,`good`,`en production`),O(`c-good-internal-cons`,`context`,`good`,`pour les consommateurs internes`),O(`c-good-allied-teams`,`context`,`good`,`pour les équipes internes arrimées au sujet`),O(`c-good-final-clients`,`context`,`good`,`pour les clients finaux`),Ce(`c-good-team-custom`,`context`,`pour l'équipe [X]`,1)],Fe=[O(`c-neu-astreinte`,`context`,`neutral`,`pour l'équipe astreinte`),O(`c-neu-order`,`context`,`neutral`,`sur le module commande`),O(`c-neu-new`,`context`,`neutral`,`pour les nouveaux comptes`),O(`c-neu-none`,`context`,`neutral`,``)],Ie=[O(`c-dis-all`,`context`,`distractor`,`pour tout le monde`),O(`c-dis-internal`,`context`,`distractor`,`en interne`),O(`c-dis-global`,`context`,`distractor`,`globalement`),O(`c-dis-everywhere`,`context`,`distractor`,`partout`)],Le=[O(`p-good-by`,`preposition`,`good`,`d'ici`),O(`p-good-before`,`preposition`,`good`,`avant`)],Re=[O(`p-neu-for`,`preposition`,`neutral`,`pour`),O(`p-neu-at`,`preposition`,`neutral`,`à`)],ze=[O(`p-dis-fast`,`preposition`,`distractor`,`rapidement`),O(`p-dis-asap`,`preposition`,`distractor`,`dès que possible`)],Be=[O(`t-good-sprint`,`timeReference`,`good`,`la fin du sprint`),O(`t-good-pi`,`timeReference`,`good`,`la prochaine revue de PI`),O(`t-good-s24`,`timeReference`,`good`,`le sprint 24`),O(`t-good-month`,`timeReference`,`good`,`la fin du mois`),Ce(`t-good-custom-date`,`timeReference`,`le [X]`,1)],Ve=[O(`t-neu-retro`,`timeReference`,`neutral`,`la prochaine rétrospective`),O(`t-neu-demo`,`timeReference`,`neutral`,`la démo`),O(`t-neu-next`,`timeReference`,`neutral`,`le mois suivant`),O(`t-neu-plan`,`timeReference`,`neutral`,`la prochaine PI Planning`)],He=[O(`t-dis-soon`,`timeReference`,`distractor`,`bientôt`),O(`t-dis-someday`,`timeReference`,`distractor`,`un jour`),O(`t-dis-later`,`timeReference`,`distractor`,`plus tard`),O(`t-dis-none`,`timeReference`,`distractor`,`(sans repère)`)];function Ue(e,t,n){return{level:e,blocksByCategory:{action:[...Te,...Ee,we(`a-free`,`action`),...De.slice(0,t)],indicator:[...Oe,...ke,we(`i-free`,`indicator`),...Ae.slice(0,t)],variation:[...je,...Me,...Ne.slice(0,n)],context:[...Pe,...Fe,we(`c-free`,`context`),...Ie.slice(0,t)],preposition:[...Le,...Re,...ze.slice(0,n)],timeReference:[...Be,...Ve,we(`t-free`,`timeReference`),...He.slice(0,t)]}}}var We={easy:Ue(`easy`,0,0),medium:Ue(`medium`,2,1),hard:Ue(`hard`,4,2)},Ge=[{id:`pi.good.sso-committed`,verdict:`good`,draft:{type:`pi`,text:`Permettre à 80 % de nos clients entreprise d'activer le SSO en self-service, mesuré sur le dernier mois du PI.`,audience:`dev`,confidence:85,hasExplicitDeadline:!0,isUnderTeamInfluence:!0,piClass:`committed`,businessValue:8},rationale:`Engagé bien calibré : valeur métier explicite, seuil chiffré, échéance PI, confiance >80 % cohérente avec un engagement.`},{id:`pi.good.marketplace-stretch`,verdict:`good`,draft:{type:`pi`,text:`Faire entrer 3 clients pilotes sur la nouvelle offre marketplace avant la revue de PI.`,audience:`dev`,confidence:50,hasExplicitDeadline:!0,isUnderTeamInfluence:!0,piClass:`stretch`,businessValue:7},rationale:`Stretch bien calibré : ambition élevée (3 pilotes en un PI), confiance 50 % cohérente avec la classe stretch.`},{id:`pi.bad.deliver-billing`,verdict:`bad`,draft:{type:`pi`,text:`Livrer le module facturation v2.`,audience:`dev`,confidence:90,hasExplicitDeadline:!1,isUnderTeamInfluence:!0,piClass:`committed`,businessValue:6},rationale:`Output pur (« livrer ») : aucune valeur métier mesurée, pas de bénéficiaire, pas de seuil.`,expectedFailingCriteria:[`outcome`,`falsifiable`,`timeBounded`],trapWords:[`livrer`]},{id:`pi.bad.stability-debt`,verdict:`bad`,draft:{type:`pi`,text:`Améliorer la stabilité de la plateforme et réduire la dette technique.`,audience:`dev`,confidence:80,hasExplicitDeadline:!1,isUnderTeamInfluence:!0,piClass:`committed`,businessValue:5},rationale:`Composite (« et »), deux mots flous (« améliorer », « dette »), aucun seuil, pas d'échéance.`,expectedFailingCriteria:[`outcome`,`falsifiable`,`timeBounded`,`general.composite`],trapWords:[`améliorer`,`stabilité`,`et`,`dette`]},{id:`pi.bad.engagé-low-confidence`,verdict:`bad`,draft:{type:`pi`,text:`Permettre à 80 % de nos clients entreprise d'activer le SSO en self-service, mesuré sur le dernier mois du PI.`,audience:`dev`,confidence:40,hasExplicitDeadline:!0,isUnderTeamInfluence:!0,piClass:`committed`,businessValue:8},rationale:`Mauvais calibrage : un engagé estimé à 40 % de confiance est en réalité un stretch mal nommé. Soit reclasser, soit revoir l'ambition.`,expectedFailingCriteria:[`crediblyAmbitious`]}],Ke=[{id:`pi.sheet.engagé-stretch`,themeId:`pi.engagement`,icon:`target`,title:`Engagé vs Stretch`,heroPhrase:`Engagé : 80 à 100 % de confiance. Stretch : 30 à 60 %. Pas l'inverse.`,intro:``,practiceCtaLabel:`Rédiger un objectif de PI`,sections:[{heading:`Engagé`,icon:`good`,body:`Un objectif que l'équipe s'engage à atteindre. Confiance attendue : 80 à 100 %. En dessous, ce n'est plus un engagement, c'est un pari.`},{heading:`Stretch`,icon:`okr`,body:`Un objectif qu'on vise sans le garantir. Confiance attendue : 30 à 60 %. Ambitieux par construction : ne pas l'atteindre n'est pas un échec.`},{heading:`Le piège classique`,icon:`warn`,body:`Un engagé estimé à 40 % de confiance est un stretch mal nommé. Soit on requalifie, soit on revoit l'ambition.`,examples:[{bad:`Engagé : « Faire passer 100 % de nos clients entreprise sur la marketplace » (confiance 30 %).`,good:`Stretch : « Faire entrer 3 clients pilotes sur la marketplace » (confiance 50 %).`,note:`L'engagement crédible dépend du calibrage, pas du wording.`}]},{heading:`Qui le rédige, sur quelle base`,icon:`learn`,body:`Co-construit en PI Planning (event de 2 jours) par chaque équipe du train avec son Product Owner. Le Release Train Engineer facilite. Les fonctionnalités descendent de Product Management ; les objectifs de PI sont rédigés côté équipes, et traduisent les fonctionnalités en outcomes attendus à la revue de PI. Une équipe peut transformer 3 fonctionnalités en 2 objectifs de PI, ou un objectif de PI peut être servi par 4 fonctionnalités. Le piège de la fonctionnalité recopiée a sa propre fiche dans « Les pièges classiques ».`,bullets:[`Vision produit (~10 min en ouverture du PI Planning)`,`Fonctionnalités du PI (descendues de Product Management, déjà priorisées)`,`Dépendances cross-équipes matérialisées sur le Program Board`,`Objectifs stratégiques énoncés par les Business Owners en ouverture`,`Capacité historique du train et de chaque équipe`]},{heading:`Source`,kind:`source`,body:`Scaled Agile Framework, sections PI Planning et Team objectifs de PI. Voir aussi : Business Value attribuée par les Business Owners dans un dialogue avec l'équipe, pas unilatéralement.`}]},{id:`pi.sheet.business-value`,themeId:`pi.valeur-business`,icon:`wrench`,title:`Valeur business`,heroPhrase:`La valeur business est stockée, pas jugée. Le moteur n'a pas d'avis sur ta stratégie.`,intro:``,practiceCtaLabel:`Rédiger un objectif avec valeur business`,sections:[{heading:`Pourquoi c'est demandé`,icon:`target`,body:`Sans valeur business, pas de suivi engagé/réalisé en rétrospective. C'est un préalable au bilan de PI.`},{heading:`Quel chiffre`,icon:`wrench`,body:`À discuter avec le Business Owner. 1 = peu de valeur, 10 = valeur maximale. Un PI où tout est à 10 perd le sens du tri.`}]},{id:`pi.sheet.anatomy`,themeId:`pi.fondamentaux`,icon:`target`,title:`L'anatomie d'un objectif de PI`,heroPhrase:`Cinq briques pour la grammaire. Deux métadonnées pour la classe et la valeur. Une phrase, un engagement.`,intro:``,practiceCtaLabel:`Va assembler ton premier objectif de PI`,sections:[{heading:`Les cinq briques de grammaire`,icon:`target`,kind:`bricks`,body:`Un objectif de PI bien rédigé porte les mêmes cinq briques qu'un objectif de Sprint, mais à l'échelle du train et à l'horizon revue de PI. La grammaire est universelle ; seul le vocabulaire change (business plutôt que technique, train plutôt qu'équipe seule).`,bricksSentence:`Permettre à 80 % des clients entreprise d'activer le SSO en self-service avant la fin du PI.`,bricks:[{num:1,label:`Verbe outcome`,hint:`L'action qui amorce le résultat`,examples:`Permettre à, Faire passer, Réduire, Atteindre`,snippet:`Permettre à`,color:`purple`},{num:2,label:`Indicateur business`,hint:`La métrique observable à la revue de PI`,examples:`% clients activés, NPS, GMV, churn`,snippet:`80 %`,color:`pink`},{num:3,label:`Segment / bénéficiaire`,hint:`Pour qui ça compte`,examples:`clients entreprise, segment premium, équipes consommatrices`,snippet:`des clients entreprise`,color:`teal`},{num:4,label:`Action observable`,hint:`Ce que le bénéficiaire fera`,examples:`activer en self-service, prendre une décision, déployer`,snippet:`d'activer le SSO en self-service`,color:`amber`},{num:5,label:`Échéance PI`,hint:`Quand on mesure`,examples:`fin du PI, revue de PI, dernier mois du PI`,snippet:`avant la fin du PI`,color:`blue`}]},{heading:`Les deux métadonnées PI`,icon:`wrench`,body:`L'objectif de PI ne se réduit pas à sa phrase. Il porte aussi deux métadonnées non visibles dans la phrase mais essentielles à l'engagement du train.`,bullets:[`**Classe** : engagé (engagement, confiance 80 à 100 %) ou stretch (ambition, confiance 30 à 60 %). Voir la fiche dédiée.`,`**Valeur business** : 1 à 10, attribuée par le Business Owner en dialogue avec l'équipe. Permet le suivi engagé vs réalisé en rétrospective de PI.`]},{heading:`Source`,kind:`source`,body:`Scaled Agile Framework, sections PI Planning et Team objectifs de PI. La grammaire à cinq briques recoupe celle du objectif de Sprint (cf. fiche correspondante).`}]},{id:`pi.sheet.planning-to-objective`,themeId:`pi.fondamentaux`,icon:`learn`,title:`Du PI Planning au objectif de PI`,heroPhrase:`La vision descend, les fonctionnalités descendent, les objectifs de PI remontent. Trois mouvements en deux jours.`,intro:``,practiceCtaLabel:`Va co-construire un objectif de PI`,sections:[{heading:`L'événement PI Planning`,icon:`target`,body:`Un PI Planning est un événement de deux jours qui réunit toutes les équipes d'un train (5 à 12 équipes en général). C'est la pièce centrale de SAFe : un train n'a pas de objectifs de PI valables sans cet événement, parce que la co-construction et l'alignement transverse n'arrivent pas par mail.`,bullets:[`Jour 1 matin : vision produit, contexte stratégique, présentation des fonctionnalités priorisées.`,`Jour 1 après-midi : chaque équipe planifie son PI et propose ses objectifs de PI.`,`Jour 2 matin : draft plans review, ajustements croisés entre équipes.`,`Jour 2 après-midi : finalisation des objectifs de PI, attribution Business Value, vote de confiance.`]},{heading:`Trois mouvements d'élaboration`,icon:`wrench`,body:`L'objectif de PI n'apparaît pas de nulle part. Il naît du croisement de trois mouvements clairs, chacun porté par un acteur différent. Quand les objectifs arrivent tout écrits dans le train, c'est le piège de l'objectif imposé : sa fiche détaille comment le recadrer.`,bullets:[`**Descente du contexte** : Product Management donne la vision, les Business Owners donnent les enjeux stratégiques. Sans cette descente, l'équipe planifie dans le vide.`,`**Descente des fonctionnalités** : Product Management priorise et descend les fonctionnalités candidates au PI. L'équipe ne choisit pas tout, mais elle choisit comment les traduire.`,`**Remontée des objectifs de PI** : chaque équipe traduit les fonctionnalités en outcomes attendus, en intégrant ses contraintes de capacité et ses dépendances. La traduction remonte au train.`]},{heading:`Le rôle des acteurs clés`,icon:`good`,body:``,bullets:[`**Product Management** : descend les fonctionnalités priorisées, défend les arbitrages, écoute les retours du train.`,`**Business Owners** : posent le contexte stratégique, attribuent la Business Value 1 à 10 en dialogue avec les équipes.`,`**Release Train Engineer** : facilite l'événement, protège la qualité du processus (ROAM, vote de confiance, time-box).`,`**Product Owners (équipe)** : portent la voix produit dans la rédaction des objectifs de PI.`,`**Équipes (Devs + PO)** : rédigent les objectifs de PI, estiment la capacité, soulèvent les dépendances.`]},{heading:`Source`,kind:`source`,body:`Scaled Agile Framework, section PI Planning (le seul événement non négociable de SAFe). Voir aussi Dean Leffingwell sur l'importance de la co-localisation (physique ou bien orchestrée à distance) pour la qualité de la co-construction.`}]},{id:`pi.sheet.objective-met`,themeId:`pi.fondamentaux`,icon:`good`,title:`Comment savoir qu'un objectif de PI est atteint`,heroPhrase:`La revue de PI n'est pas un débat. C'est une mesure contre ce qui a été dit en PI Planning.`,intro:``,practiceCtaLabel:`Va définir un critère mesurable`,sections:[{heading:`Pourquoi définir le critère en amont`,icon:`target`,body:`Si le critère d'atteinte se discute à la revue de PI, on retombe dans le piège classique : chacun défend sa lecture, le Business Owner négocie sa note de Business Value, et la conversation devient politique. À l'inverse, un critère écrit en PI Planning est un contrat tacite. La revue de PI devient une lecture, pas un débat.`,bullets:[`Le critère est observable : un chiffre, un pourcentage, une étape franchie.`,`Il est posé au moment de l'écriture du objectif de PI, pas découvert après coup.`,`Il dit « atteint / partiel / raté », pas « plutôt bien / plutôt mal ».`]},{heading:`Le score réalisé à la revue de PI`,icon:`wrench`,body:`À la revue de PI, le Business Owner réévalue la Business Value 1 à 10 selon ce qui a été réellement livré. Le rapport entre la BV planifiée et la BV réalisée donne le score de prévisibilité du train (objectif SAFe : 80 à 100 % sur la durée).`,bullets:[`**Engagé atteint** : BV réalisée = BV planifiée.`,`**Engagé partiel** : BV réalisée < BV planifiée (généralement 50 à 80 %).`,`**Stretch atteint** : BV réalisée = BV planifiée (bonus pour le train).`,`**Stretch raté** : BV réalisée = 0 (sans pénalité, c'était un stretch).`]},{heading:`Le test « comment le saura-t-on »`,icon:`good`,body:`À la fin du PI Planning, pour chaque objectif de PI, demander : « comment saurons-nous, à la revue de PI, si l'objectif est atteint ? » Si l'équipe ne sait pas répondre en 30 secondes, l'objectif de PI est mal posé. Reformuler avant de figer.`,examples:[{bad:`objectif de PI : « Renforcer la fiabilité du paiement. » Critère d'atteinte : non posé. À la revue de PI, débat sur ce qu'on entend par « renforcer ».`,good:`objectif de PI : « Faire passer le taux de réussite des paiements de 96,2 % à 99,5 % d'ici la revue de PI. » Critère : taux de réussite mesuré sur les 4 dernières semaines du PI, comparé à la valeur de référence. Lecture immédiate.`,note:`Le critère est implicite dans l'objectif de PI bien rédigé, mais le formuler explicitement évite les divergences d'interprétation à la Review.`}]},{heading:`Source`,kind:`source`,body:`Scaled Agile Framework, section PI System Demo et PI Predictability Measure. Convergent avec Mike Cohn sur l'importance du critère d'acceptation posé en amont, transposé à l'échelle PI.`}]},{id:`pi.sheet.objective-impose`,isNamedPitfall:!0,themeId:`pi.engagement`,icon:`warn`,title:`L'objectif de PI imposé`,heroPhrase:`Un objectif descendu sans dialogue. L'équipe hoche la tête. La revue de PI révèle le malentendu.`,intro:``,practiceCtaLabel:`Va porter une objection constructive`,sections:[{heading:`Pourquoi c'est piégeux`,icon:`target`,body:`Quand le management ou les Business Owners arrivent en PI Planning avec un objectif déjà rédigé et le présentent comme non négociable, l'équipe a deux choix : hocher la tête (et perdre l'engagement réel) ou s'opposer (et passer pour difficile). Les deux mènent au même résultat : un objectif inerte qu'on porte sans y croire.`,bullets:[`Un objectif imposé n'engage personne en pratique.`,`Le vote de confiance est faussé : l'équipe vote ce qu'on attend d'elle.`,`À la revue de PI, l'écart entre la promesse et la réalité érode la confiance des deux côtés.`]},{heading:`Comment ça se voit`,icon:`warn`,kind:`signals`,body:``,bullets:[`L'objectif est annoncé, pas débattu : « voici ce qu'on attend de vous ce PI ».`,`Les questions de capacité sont éludées (« on verra à mi-PI »).`,`Le ROAM ne contient que des risques mineurs.`,`Confidence vote convergent à 5/5 sans hésitation, signe d'un assentiment factice.`]},{heading:`Comment recadrer`,icon:`wrench`,body:`Le Release Train Engineer protège l'espace de négociation. Les Business Owners apportent le contexte stratégique ; les équipes apportent la traduction réaliste en objectif de PI. Le ROAM est utilisé honnêtement, le vote de confiance est anonyme si nécessaire.`,examples:[{bad:`Business Owner : « L'objectif de PI de votre équipe est : atteindre 100 contrats Enterprise. C'est ce que le board attend. »`,good:`Business Owner : « Le board pousse pour mettre à l'échelle l'offre Enterprise ce PI. Comment vous voyez votre contribution réaliste ? » Équipe : « On peut viser 60 contrats engagés, et un stretch à 100 si la nouvelle vague de leads se confirme. »`,note:`Le contexte stratégique reste descendu. La traduction en objectif de PI remonte de l'équipe.`}]},{heading:`Source`,kind:`source`,body:`Scaled Agile Framework, ROAM et vote de confiance en PI Planning. Patrick Lencioni, The Five Dysfunctions of a Team, sur la culture de désaccord productif.`}]},{id:`pi.sheet.bv-uniforme`,isNamedPitfall:!0,themeId:`pi.valeur-business`,icon:`warn`,title:`La Business Value uniforme`,heroPhrase:`Tout à 10. Tout à 5. Aucune valeur ne se distingue. Le Business Owner abdique son rôle.`,intro:``,practiceCtaLabel:`Va aider le Business Owner à différencier`,sections:[{heading:`Pourquoi c'est piégeux`,icon:`target`,body:`La valeur business 1 à 10 existe pour permettre la priorisation : à la revue de PI, le score réalisé pondère selon la valeur. Si tout est noté pareil, plus de priorité possible. C'est généralement le signe d'un Business Owner qui n'a pas pris le temps de discriminer, ou qui ne veut pas faire de choix qu'il devrait défendre.`,bullets:[`Tout à 10 : « tout est important », donc rien n'est prioritaire.`,`Tout à 5 : neutralité par défaut, équivalent à l'absence de note.`,`Hans Samios (Lean-Agile Knowledge Base) note ce piège comme l'anti-pattern le plus fréquent en PI Planning.`]},{heading:`Comment ça se voit`,icon:`warn`,kind:`signals`,body:``,bullets:[`Les valeurs business sont remplies en quelques secondes, sans discussion.`,`Aucune note inférieure à 5 (« si je note bas, l'équipe va le mal prendre »).`,`Pas de dialogue avec l'équipe au moment de l'attribution.`]},{heading:`Comment recadrer`,icon:`wrench`,body:`L'attribution se fait dans un dialogue, pas en silence. Forcer une distribution : au moins une note basse, au moins une haute. Le Business Owner doit pouvoir justifier chaque écart.`,examples:[{bad:`objectifs de PI notés : 10, 10, 10, 10, 10. Aucune priorité émerge à la revue de PI.`,good:`objectifs de PI notés : 10 (compliance bloquante), 8 (croissance), 5 (dette technique), 3 (refonte UI). Le Business Owner défend chaque écart en moins de 30 secondes.`,note:`Une distribution variée révèle qu'un choix stratégique a été fait. C'est ce qu'on attend du Business Owner.`}]},{heading:`Source`,kind:`source`,body:`Hans Samios (Personal Lean-Agile Knowledge Base), section how_do_we_assign_business_value_to_pi_objectives. Scaled Agile Framework, recommandation explicite contre la business value uniforme.`}]},{id:`pi.sheet.fonctionnalité-vs-objective`,isNamedPitfall:!0,themeId:`pi.pieges-classiques`,icon:`warn`,title:`Une fonctionnalité n'est pas un objectif de PI`,heroPhrase:`Une fonctionnalité dit ce qu'on livre. Un objectif de PI dit ce qui aura changé pour le bénéficiaire.`,intro:``,practiceCtaLabel:`Va traduire une fonctionnalité en objectif de PI`,sections:[{heading:`Pourquoi c'est l'erreur la plus fréquente`,icon:`target`,body:`Product Management descend des fonctionnalités (« SSO Enterprise », « refonte panier mobile »). Les équipes, sous pression de temps en PI Planning, recopient ces fonctionnalités dans leurs objectifs de PI. Résultat : le Business Owner ne sait pas quoi noter en valeur business, la revue de PI ne sait pas quoi mesurer, et la confusion grandit entre ce qu'on livre et ce qui doit changer.`,bullets:[`Une fonctionnalité est un livrable. Un objectif de PI est un outcome attendu.`,`Une fonctionnalité peut être livrée sans atteindre l'outcome (et inversement).`,`L'objectif de PI rend la fonctionnalité falsifiable : on saura si elle a fait son effet.`]},{heading:`Comment ça se voit`,icon:`warn`,kind:`signals`,body:``,bullets:[`L'objectif de PI porte un nom de fonctionnalité ou de projet (« Livrer X », « Refondre Y »).`,`Aucune métrique n'est nommée.`,`Le Business Owner peine à attribuer une valeur business (« je note l'effort, pas la valeur »).`]},{heading:`Comment recadrer`,icon:`wrench`,body:`Devant chaque fonctionnalité, poser la question : « qu'est-ce que cette fonctionnalité, une fois livrée, va faire bouger chez le bénéficiaire ? » La réponse est l'objectif de PI. La fonctionnalité reste, comme moyen pour y arriver.`,examples:[{bad:`Fonctionnalité recopiée : « Livrer la fonctionnalité SSO Enterprise ce PI. »`,good:`objectif de PI dérivé : « Permettre à 80 % des clients entreprise d'activer le SSO en self-service avant la fin du PI. » La fonctionnalité SSO Enterprise reste, mais comme moyen.`,note:`Le test : si la fonctionnalité est livrée mais que l'outcome ne bouge pas, l'objectif de PI n'est pas atteint. Cette tension est exactement ce qu'on veut révéler.`}]},{heading:`Source`,kind:`source`,body:`Scaled Agile Framework, recommandations explicites contre le « fonctionnalité = objectif de PI ». Agile Seekers (article 2024) liste cet anti-pattern comme le plus fréquent à l'introduction de SAFe.`}]},{id:`pi.sheet.tous-committed`,isNamedPitfall:!0,themeId:`pi.pieges-classiques`,icon:`warn`,title:`Tous les objectifs de PI en engagé`,heroPhrase:`Un train sans stretch est un train sans ambition. Ou un train qui se ment sur sa capacité.`,intro:``,practiceCtaLabel:`Va calibrer un mix engagé / stretch`,sections:[{heading:`Pourquoi c'est piégeux`,icon:`target`,body:`Quand un train classe tous ses objectifs de PI en engagé, deux interprétations possibles : (1) il sous-promet pour être sûr d'atteindre 100 % à la revue de PI (sandbagging à l'échelle train), ou (2) il sur-promet en s'engageant sur des objectifs qu'il ratera. Les deux abîment la confiance des Business Owners et coupent l'équipe de tout apprentissage stretch.`,bullets:[`Le stretch est l'espace où on tente quelque chose dont l'issue est incertaine, où on apprend.`,`Un train à 100 % engagé se prive de cet espace.`,`Le Business Owner ne sait plus quel objectif compte vraiment.`]},{heading:`Comment ça se voit`,icon:`warn`,kind:`signals`,body:``,bullets:[`Aucun objectif classé stretch sur la page de PI Planning.`,`Les objectifs réalisés à 100 % à la revue de PI trois PI consécutifs (signe de sandbagging).`,`Ou inversement : taux de réalisation moyen sous 70 % (signe de sur-promesse).`]},{heading:`Comment recadrer`,icon:`wrench`,body:`Le RTE peut suggérer un mix de référence : autour de 60 à 70 % d'engagé, 30 à 40 % de stretch. Le Business Owner peut demander explicitement « quel objectif vous engagez à coup sûr, et quel objectif vous tentez sans garantir ? ». La discrimination crée la lisibilité.`,examples:[{bad:`5 objectifs de PI ce trimestre, tous classés engagé. Aucun stretch.`,good:`3 objectifs de PI engagés (cap commercial, fiabilité, conformité), 2 stretch (marketplace pilote, intégration nouveau partenaire).`,note:`Le mix raconte une histoire stratégique : voici ce qu'on tient, voici ce qu'on tente.`}]},{heading:`Source`,kind:`source`,body:`Scaled Agile Framework, recommandations sur le mix engagé / stretch. Ben Lamorte (The OKRs Field Book) sur la valeur d'apprentissage du stretch, transposable à PI.`}]},{id:`pi.sheet.ip-iteration-overloaded`,isNamedPitfall:!0,themeId:`pi.pieges-classiques`,icon:`warn`,title:`L'Innovation and Planning phagocyté`,heroPhrase:`L'itération IP existe pour respirer, innover et se stabiliser. Le train la remplit de tickets comme n'importe quelle autre itération.`,intro:``,practiceCtaLabel:`Va protéger une itération IP menacée`,sections:[{heading:`Pourquoi c'est piégeux`,icon:`target`,body:`L'Innovation and Planning (IP) Iteration est prévue par SAFe comme un tampon : absorber l'incertitude d'estimation, dégager du temps d'innovation et de formation, stabiliser, préparer le PI suivant. Quand le train y planifie une charge normale, ce tampon disparaît, la marge de manœuvre du train aussi, et le rythme devient intenable.`,bullets:[`L'itération IP est un espace tampon, pas une itération de plus pour rattraper le retard.`,`Sans cette marge, la moindre estimation optimiste rend tout le PI intenable.`,`Le temps d'innovation et de formation prévu par SAFe disparaît en premier.`]},{heading:`Comment ça se voit`,icon:`warn`,kind:`signals`,body:``,bullets:[`La charge planifiée sur l'itération IP est proche de celle des autres itérations.`,`Le train n'a jamais de créneau formation ou hackathon sur un PI entier.`,`L'itération IP sert systématiquement à finir ce qui a débordé des itérations précédentes.`]},{heading:`Rendre le tampon à l'itération IP`,icon:`wrench`,body:`Protéger explicitement l'itération IP comme du temps sans charge planifiée dédiée à rattraper du retard, et suivre son taux de charge comme un indicateur de santé du train à part entière.`,examples:[{bad:`Itération IP planifiée à 90 % de charge avec les tickets en retard des itérations précédentes.`,good:`Itération IP réservée à la stabilisation, l'innovation et la préparation du PI suivant : moins de 20 % de charge planifiée, le reste laissé ouvert.`,note:`Le tampon retrouve sa fonction : absorber l'imprévu du PI qui vient de se terminer, pas prolonger sa charge.`}]},{heading:`Source`,kind:`source`,body:`Scaled Agile Framework, description de l'Innovation and Planning Iteration comme espace de stabilisation, innovation et préparation, distinct des itérations de développement.`}]},{id:`pi.sheet.iteration-by-iteration-planning`,isNamedPitfall:!0,themeId:`pi.pieges-classiques`,icon:`warn`,title:`Le plan iteration par iteration`,heroPhrase:`Le train détaille l'itération 1 dans les moindres détails. Le reste du PI n'existe encore nulle part.`,intro:``,practiceCtaLabel:`Va esquisser un PI entier avant de le détailler`,sections:[{heading:`Pourquoi c'est piégeux`,icon:`target`,body:`Une itération parfaitement détaillée ne dit rien sur la faisabilité du PI entier. Quand le train ne construit sa vision qu'itération après itération, les dépendances entre équipes n'apparaissent qu'en fin de PI, quand il est trop tard pour les anticiper, et la revue du plan de draft ne peut challenger que ce qui a été rendu visible.`,bullets:[`Une itération parfaitement détaillée ne dit rien sur la faisabilité du PI entier.`,`Les dépendances entre équipes n'apparaissent qu'en fin de PI, trop tard pour les anticiper.`,`La revue du plan de draft ne peut challenger que ce qui a été rendu visible.`]},{heading:`Comment ça se voit`,icon:`warn`,kind:`signals`,body:``,bullets:[`À la revue du plan de draft, seule l'itération 1 a un contenu détaillé.`,`Le Program Board reste vide au-delà de l'itération 1.`,`Les risques identifiés portent tous sur le court terme, aucun sur la fin du PI.`]},{heading:`Planifier en largeur avant la profondeur`,icon:`wrench`,body:`Esquisser les 5 itérations à haut niveau dès la revue du plan de draft, avec les dépendances inter-équipes posées sur le Program Board, avant d'affiner le détail d'une seule itération.`,examples:[{bad:`Itération 1 planifiée récit par récit ; itérations 2 à 5 laissées en blanc en attendant d'y voir plus clair.`,good:`Les 5 itérations esquissées à haut niveau dès la revue du plan de draft, dépendances inter-équipes posées sur le Program Board avant d'affiner le détail de l'itération 1.`,note:`La vision d'ensemble précède le détail, pas l'inverse.`}]},{heading:`Source`,kind:`source`,body:`Scaled Agile Journey, PI Planning — Plan to Discover the Next PI, sur la nécessité d'un plan de bout en bout avant l'approfondissement itération par itération.`}]},{id:`pi.sheet.commitment-ceremony`,isNamedPitfall:!0,themeId:`pi.engagement`,icon:`warn`,title:`La cérémonie d'engagement`,heroPhrase:`Chaque récit découpé, estimé, verrouillé au chiffre près. Le PI Planning devient un rituel de contrôle, pas un dialogue sur la valeur.`,intro:``,practiceCtaLabel:`Va recentrer un PI Planning sur la valeur`,sections:[{heading:`Pourquoi c'est piégeux`,icon:`target`,body:`Le temps du PI Planning part dans le découpage et l'estimation des récits, pas dans la discussion de la valeur avec le Business Owner. Les objectifs de PI deviennent une formalité signée en fin de journée, pas le fil conducteur de l'événement : l'équipe s'engage sur un chiffre d'estimation plus que sur un effet à produire.`,bullets:[`Le temps de Planning part dans le découpage et l'estimation, pas dans la discussion de la valeur.`,`Les objectifs de PI sont rédigés en fin d'événement, dans la précipitation.`,`Le vote de confiance porte sur « avoir fini d'estimer », pas sur l'atteinte de l'objectif.`]},{heading:`Comment ça se voit`,icon:`warn`,kind:`signals`,body:``,bullets:[`La majorité du temps de Planning est passée à estimer et découper, pas à discuter des objectifs.`,`Les objectifs de PI sont rédigés dans les dernières minutes avant le vote de confiance.`,`Le Business Owner n'intervient jamais pendant les deux jours de l'événement.`]},{heading:`Remettre l'objectif avant l'estimation`,icon:`wrench`,body:`Garder le découpage et l'estimation comme des moyens, pas comme le centre de l'événement. Ouvrir la journée 1 par la discussion des objectifs de PI avec les Business Owners ; le détail d'exécution vient ensuite, au service de ces objectifs déjà clarifiés.`,examples:[{bad:`Journée 1 du PI Planning entièrement consacrée au découpage et à l'estimation des récits ; les objectifs de PI rédigés en 20 minutes juste avant le vote de confiance.`,good:`La discussion des objectifs de PI avec le Business Owner ouvre la journée 1 ; le découpage des récits vient ensuite, au service des objectifs déjà clarifiés.`,note:`L'ordre du Planning matérialise ce qui compte vraiment : l'objectif d'abord, le détail d'exécution ensuite.`}]},{heading:`Source`,kind:`source`,body:`Top 12 mistakes to avoid during PI Planning (LinkedIn), sur la dérive du PI Planning en cérémonie d'engagement centrée sur l'estimation plutôt que sur la valeur.`}]},{id:`pi.sheet.unprepared-pi-planning`,isNamedPitfall:!0,themeId:`pi.pieges-classiques`,icon:`warn`,title:`Le PI Planning non préparé`,heroPhrase:`Les équipes découvrent les fonctionnalités en direct, pendant l'événement. La préparation qui devait précéder n'a pas eu lieu.`,intro:``,practiceCtaLabel:`Va préparer un PI Planning en amont`,sections:[{heading:`Pourquoi c'est piégeux`,icon:`target`,body:`Le backlog n'est pas préparé : les équipes découvrent les fonctionnalités pendant l'événement, pas avant. Les dépendances inter-équipes ne sont pas identifiées en amont, elles surgissent en direct. Les objectifs de PI rédigés sur cette base restent fragiles, car personne n'a eu le temps d'en vérifier la faisabilité.`,bullets:[`Le backlog n'est pas préparé : les équipes découvrent les fonctionnalités pendant l'événement.`,`Les dépendances inter-équipes ne sont pas identifiées en amont, elles surgissent en direct.`,`Les objectifs de PI rédigés sur cette base restent fragiles, jamais vérifiés en amont.`]},{heading:`Comment ça se voit`,icon:`warn`,kind:`signals`,body:``,bullets:[`Le Pre-PI Planning n'a pas eu lieu, ou sans les bonnes personnes.`,`Des questions de compréhension basique sur une fonctionnalité se posent en pleine séance de Planning.`,`Le contenu proposé change significativement entre le début et la fin de l'événement.`]},{heading:`Préparer avant de planifier`,icon:`wrench`,body:`Investir dans le Pre-PI Planning : backlog relu et clarifié, dépendances pré-identifiées, rôles clés briefés avant l'événement.`,examples:[{bad:`Les Product Managers présentent des fonctionnalités inédites en séance ; les équipes découvrent le périmètre en même temps qu'elles doivent en tirer des objectifs de PI.`,good:`Le contenu du backlog est revu et clarifié en Pre-PI Planning deux semaines avant ; les équipes arrivent au PI Planning avec les questions de compréhension déjà résolues.`,note:`La qualité des objectifs de PI dépend de la préparation qui précède l'événement, pas de l'événement lui-même.`}]},{heading:`Source`,kind:`source`,body:`Agile Seekers, Overcoming Common PI Planning Anti-Patterns With Discovery Mindset, sur le manque de préparation comme cause principale d'un PI Planning désorganisé.`}]},{id:`pi.sheet.empty-program-board`,isNamedPitfall:!0,themeId:`pi.pieges-classiques`,icon:`warn`,title:`Le Program Board vide`,heroPhrase:`Aucune dépendance inter-équipes n'est rendue visible. L'objectif d'une équipe dépend pourtant d'une autre, en silence.`,intro:``,practiceCtaLabel:`Va tracer une dépendance sur un Program Board`,sections:[{heading:`Pourquoi c'est piégeux`,icon:`target`,body:`Un objectif de PI peut dépendre d'une livraison d'une autre équipe sans que ce lien soit jamais tracé. Sans Program Board rempli, personne ne voit venir le risque avant qu'il ne se matérialise, et le ROAM reste vide alors que les dépendances existent bel et bien.`,bullets:[`Un objectif de PI peut dépendre d'une autre équipe sans que ce lien soit jamais tracé.`,`Sans le Program Board rempli, personne ne voit venir le risque avant qu'il ne se matérialise.`,`Le ROAM reste vide alors que les dépendances existent bel et bien.`]},{heading:`Comment ça se voit`,icon:`warn`,kind:`signals`,body:``,bullets:[`Le Program Board est vide ou quasi vide à la fin du PI Planning.`,`Un objectif de PI mentionne un livrable d'une autre équipe sans fil visible vers cette équipe.`,`Les glissements de dépendances sont découverts à la revue de PI, jamais avant.`]},{heading:`Rendre la dépendance visible`,icon:`wrench`,bo
