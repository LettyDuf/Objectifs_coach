nt debout.`},{heading:`Le piĂ¨ge du contexte implicite`,icon:`warn`,body:`Le contexte est souvent omis (ÂŤ on sait de quoi on parle Âť). C'est un risque : en revue de sprint, la mĂŠmoire collective diverge. Mieux vaut nommer le contexte mĂŞme s'il semble ĂŠvident.`},{heading:`Source`,kind:`source`,body:`Cette grammaire Ă  cinq briques recoupe la doctrine du puzzle (voir mode Puzzle dans la pratique). Elle s'inspire des SMART goals (Doran, 1981) dĂŠbarrassĂŠs de leur ambiguĂŻtĂŠ Mesurable/Atteignable, et de Kniberg pour le rĂ´le du contexte.`}]},{id:`sprint.sheet.single-goal`,themeId:`sprint.fondamentaux`,icon:`target`,title:`Un seul objectif de Sprint`,heroPhrase:`Un seul objectif par sprint. Pas deux. Pas une liste.`,intro:``,practiceCtaLabel:`Va corriger un objectif mal posĂŠ`,sections:[{heading:`Pourquoi`,icon:`target`,body:``,bullets:[`Focus : un seul objectif force l'arbitrage des rĂŠcits.`,`MĂŠmorisable : rĂŠcitable sans lire l'ĂŠcran.`,`Trie le backlog : ÂŤ cette rĂŠcit contribue-t-elle Ă  l'objectif ? Âť`,`Bilan clair en fin de sprint : atteint / pas atteint.`]},{heading:`Signaux d'alerte`,icon:`warn`,body:``,bullets:[`Le tableau affiche ÂŤ Objectif 1 / Objectif 2 / Objectif 3 Âť.`,`L'objectif est rĂŠdigĂŠ aprĂ¨s la sĂŠlection des rĂŠcits.`,`Il contient un ÂŤ et Âť coordonnant deux rĂŠsultats.`,`Personne ne le rĂŠcite Ă  la rĂŠtro sans le relire.`]},{heading:`Comment consolider`,icon:`wrench`,body:`Identifier l'enjeu transverse qui relie les N objectifs proposĂŠs, puis le reformuler en un seul outcome. Si aucun enjeu transverse n'existe vraiment, c'est que le sprint mĂŠlange deux travaux qui auraient dĂť ĂŞtre deux sprints.`,examples:[{bad:`Objectif 1 : Migrer l'authentification vers OAuth. Objectif 2 : RĂŠduire les bugs sur le panier de 8 Ă  2.`,good:`Augmenter le taux de connexions sans incident (auth + panier) de 92 % Ă  99 % d'ici fin de sprint.`,note:`Enjeu transverse : la confiance utilisateur dans le tunnel d'achat. Les deux travaux y contribuent.`}]},{heading:`Qui le rĂŠdige, sur quelle base`,icon:`learn`,body:`Co-construit en Sprint Planning par l'ĂŠquipe Scrum entiĂ¨re : le PO propose un cap dĂŠrivĂŠ du objectif de produit, les Devs challengent au regard de leur capacitĂŠ et de leur connaissance technique, le Scrum Master facilite la convergence. Pas un acte solo du PO. L'objectif de Sprint dĂŠfini, les rĂŠcits du backlog deviennent des hypothĂ¨ses de ce qui aidera Ă  l'atteindre.`,bullets:[`objectif de produit (le cap moyen terme du produit, l'amont)`,`Ătat du backlog produit (ce qui est prioritaire et prĂŞt)`,`VĂŠlocitĂŠ historique de l'ĂŠquipe (capacitĂŠ rĂŠaliste sur l'itĂŠration)`,`Retour de la derniĂ¨re rĂŠtrospective (ce qu'on change ou garde)`,`Retour de la derniĂ¨re Sprint Review (ce qui a bougĂŠ cĂ´tĂŠ utilisateur)`]},{heading:`Source`,kind:`source`,body:`Scrum Guide 2020 : ÂŤ The Sprint Goal is the single objective for the Sprint Âť [traduction : ÂŤ L'objectif de Sprint est l'unique objectif du Sprint Âť] et ÂŤ The DevelopersâŚ define a Sprint Goal that communicates why the Sprint is valuable to stakeholders. Âť [traduction : ÂŤ Les DevelopersâŚ dĂŠfinissent un objectif de Sprint qui communique pourquoi le Sprint a de la valeur pour les parties prenantes. Âť] Convergent avec Kniberg, Cohn. SAFe : pluralitĂŠ au niveau PI uniquement.`}]},{id:`sprint.sheet.product-goal-link`,themeId:`sprint.fondamentaux`,icon:`learn`,title:`L'objectif de Sprint et l'objectif de produit`,heroPhrase:`L'objectif de produit donne le cap. L'objectif de Sprint est l'ĂŠtape qui sert ce cap, dans la fenĂŞtre du sprint.`,intro:``,practiceCtaLabel:`Va ĂŠcrire un objectif de Sprint alignĂŠ`,sections:[{heading:`Pourquoi cette relation compte`,icon:`target`,body:`Le Scrum Guide 2020 introduit explicitement le **Product Goal** (objectif de produit) : un cap moyen terme du produit, formulĂŠ en outcome. Chaque objectif de Sprint est une ĂŠtape vers ce cap. Cette chaĂŽne d'alignement rend chaque sprint signifiant. L'ĂŠquipe sait pourquoi elle fait ce qu'elle fait.`,bullets:[`L'objectif de produit vit Ă  l'annĂŠe / au trimestre, l'objectif de Sprint Ă  l'itĂŠration.`,`Sans objectif de produit, l'objectif de Sprint flotte (le PO dĂŠcide chaque fois sans cap stable).`,`Sans objectif de Sprint, l'objectif de produit devient une plaque dĂŠcorative sans traduction opĂŠrationnelle.`]},{heading:`Comment dĂŠriver l'un de l'autre`,icon:`wrench`,body:`L'objectif de Sprint n'est pas un objectif de produit en miniature. Il en est une ĂŠtape concrĂ¨te, formulĂŠe avec les cinq briques d'un objectif de Sprint, dans la fenĂŞtre du sprint.`,examples:[{bad:`objectif de produit : ÂŤ Devenir l'outil de paiement le plus simple du marchĂŠ Âť. objectif de Sprint : ÂŤ Devenir l'outil de paiement le plus simple du marchĂŠ Âť.`,good:`objectif de produit : ÂŤ Devenir l'outil de paiement le plus simple du marchĂŠ Âť. objectif de Sprint : ÂŤ Faire passer le temps moyen pour finaliser un paiement de 45 s Ă  30 s d'ici la fin du sprint 24 Âť.`,note:`L'objectif de Sprint traduit le cap en mesure observable sur l'itĂŠration.`}]},{heading:`Le test d'alignement`,icon:`good`,body:`Ă chaque Sprint Planning, poser la question : ÂŤ notre objectif de Sprint contribue-t-il directement Ă  notre objectif de produit en cours ? Âť Si l'ĂŠquipe ne sait pas rĂŠpondre clairement, soit l'objectif de produit n'est pas vraiment partagĂŠ, soit l'objectif de Sprint s'ĂŠparpille.`},{heading:`Source`,kind:`source`,body:`Scrum Guide 2020 (rĂŠvision Schwaber/Sutherland) : ajout du Product Goal (objectif de produit) aux Scrum artifacts. Voir aussi Roman Pichler sur la cascade vision â objectif de produit â objectif de Sprint.`}]},{id:`sprint.sheet.goal-is-met`,themeId:`sprint.fondamentaux`,icon:`good`,title:`Comment savoir que l'objectif de Sprint est atteint`,heroPhrase:`La dĂŠfinition de succĂ¨s se pose en Sprint Planning, pas Ă  la Sprint Review. Tu ĂŠcris l'objectif et son critĂ¨re d'atteinte ensemble.`,intro:``,practiceCtaLabel:`Va dĂŠfinir le critĂ¨re d'atteinte`,sections:[{heading:`Pourquoi dĂŠfinir le succĂ¨s en amont`,icon:`target`,body:`Si le critĂ¨re d'atteinte se discute Ă  la Sprint Review, tout le monde devient juge et partie. Le facilitateur dĂŠfend que c'est atteint, le PO ergote, les Devs s'ĂŠpuisent Ă  argumenter. Ă l'inverse, un critĂ¨re ĂŠcrit en amont est un contrat : la Review n'est plus qu'une lecture.`,bullets:[`Le critĂ¨re est observable (chiffre, ĂŠtat, mesure).`,`Il est posĂŠ avant le sprint, pas pendant.`,`Il dit ÂŤ atteint / pas atteint Âť, pas ÂŤ plutĂ´t bien / plutĂ´t mal Âť.`]},{heading:`Trois niveaux d'atteinte (Ă  connaĂŽtre, sans les multiplier)`,icon:`learn`,body:`Tu peux formaliser trois verdicts en fin de sprint, mais l'objectif doit fonctionner mĂŞme avec un binaire atteint/ratĂŠ. Les nuances servent en rĂŠtro, pas Ă  l'affichage du rĂŠsultat.`,bullets:[`**Atteint** : le critĂ¨re mesurable est rempli ou dĂŠpassĂŠ.`,`**Partiel** : on n'a pas atteint la cible mais on a appris quelque chose qui change le sprint suivant.`,`**RatĂŠ** : ni la cible ni l'apprentissage. Ă examiner sĂŠrieusement en rĂŠtro.`]},{heading:`Le test de la phrase ÂŤ Comment saurons-nous Âť`,icon:`wrench`,body:`Ă la fin du Sprint Planning, demander : ÂŤ comment saurons-nous, en fin de sprint, si nous l'avons atteint ? Âť Si l'ĂŠquipe ne sait pas rĂŠpondre en moins de 30 secondes, l'objectif est mal posĂŠ. Reformuler avant de dĂŠmarrer.`,examples:[{bad:`objectif de Sprint : ÂŤ Rendre le module commande plus fiable. Âť CritĂ¨re d'atteinte : non posĂŠ.`,good:`objectif de Sprint : ÂŤ RĂŠduire le nombre d'incidents production du module commande de 14 Ă  5 par semaine d'ici la fin du sprint. Âť CritĂ¨re : nombre d'incidents mesurĂŠ la derniĂ¨re semaine du sprint, comparĂŠ Ă  la moyenne hebdomadaire prĂŠcĂŠdente.`,note:`Le critĂ¨re d'atteinte est implicite dans l'objectif bien rĂŠdigĂŠ, mais le formuler explicitement protĂ¨ge contre les divergences d'interprĂŠtation.`}]},{heading:`Source`,kind:`source`,body:`Mike Cohn, Succeeding with Agile, chapitre sur les Sprint Reviews. Convergent avec Henrik Kniberg, Lean from the Trenches, sur l'importance de poser le critĂ¨re d'atteinte avant l'observation.`}]},{id:`sprint.sheet.maintenance-value`,themeId:`sprint.cas-particuliers`,icon:`wrench`,title:`Sprint de maintenance : trouver la valeur`,heroPhrase:`Un sprint de maintenance a toujours un bĂŠnĂŠficiaire. Ă toi de le nommer.`,intro:``,practiceCtaLabel:`Reformuler un objectif de maintenance`,sections:[{heading:`Trois questions Ă  se poser`,icon:`target`,body:``,bullets:[`Pour qui ce travail produit-il un changement ?`,`Quel changement constatable du point de vue du bĂŠnĂŠficiaire ?`,`Quelle mesure rendra ce changement visible Ă  la revue de sprint ?`]},{heading:`Quatre bĂŠnĂŠficiaires frĂŠquents`,icon:`learn`,body:``,bullets:[`Utilisateur final : moins de bugs visibles, moins d'incidents en production.`,`Ăquipe support : moins d'escalades, temps de rĂŠsolution plus court.`,`Ăquipe ops / astreinte : dĂŠploiements plus rapides, astreintes plus calmes.`,`Ăquipe dev : vĂŠlocitĂŠ retrouvĂŠe, moins de temps sur les bugs hĂŠritĂŠs.`]},{heading:`Quatre familles de maintenance (ISO/IEC 14764)`,icon:`puzzle`,body:`Nommer la famille aide Ă  reconnaĂŽtre qu'on a bien un travail de maintenance avec un bĂŠnĂŠficiaire â pas une tĂ˘che sans objectif.`,bullets:[`Corrective : corriger un dĂŠfaut dĂŠjĂ  en production (bugs, incidents).`,`Adaptative : s'ajuster Ă  un changement d'environnement (dĂŠpendances, OS, rĂŠglementation).`,`Perfective : amĂŠliorer la performance ou l'expĂŠrience sur un usage dĂŠjĂ  en place.`,`PrĂŠventive : rĂŠduire un risque futur avant qu'il ne devienne un incident (tests de reprise, durcissement, supervision).`]},{heading:`Le mĂŞme rĂŠflexe dans les quatre familles`,icon:`wrench`,body:`Le rĂŠflexe est le mĂŞme dans les quatre cas : remplacer la tĂ˘che par ce qu'elle change pour quelqu'un, avec une mesure. Les cas concrets t'attendent dans l'exercice ÂŤ Maintenance : trouver la valeur Âť de S'entraĂŽner : autant les dĂŠcouvrir en jouant plutĂ´t qu'en lisant la rĂŠponse ici.`},{heading:`Source`,kind:`source`,body:`ISO/IEC 14764 (taxonomie corrective / adaptative / perfective / prĂŠventive), reprise par Lientz & Swanson (1980) et la littĂŠrature technique courante sur la maintenance logicielle.`}]},{id:`sprint.sheet.not-a-rĂŠcit-list`,isNamedPitfall:!0,themeId:`sprint.pieges-classiques`,icon:`warn`,title:`L'objectif liste de tĂ˘ches`,heroPhrase:`L'ĂŠquipe s'engage sur un rĂŠsultat. Les rĂŠcits sont une hypothĂ¨se de ce qui aidera Ă  l'atteindre.`,intro:``,practiceCtaLabel:`Va corriger un objectif mal posĂŠ`,sections:[{heading:`Pourquoi`,icon:`target`,body:`Le Scrum Guide est clair : la sĂŠlection des items du backlog produit (Product Backlog Items) est une **hypothĂ¨se** de ce qui aidera Ă  atteindre l'objectif de Sprint, pas l'engagement en soi. Si l'ĂŠquipe s'engage sur les rĂŠcits au lieu de l'objectif, le sprint devient une course Ă  la complĂŠtion, pas une recherche de valeur.`,bullets:[`L'engagement porte sur le rĂŠsultat, pas sur la livraison.`,`Si la moitiĂŠ des rĂŠcits suffisent Ă  atteindre l'objectif, on s'arrĂŞte.`,`Si les rĂŠcits ne suffisent pas, on ajuste les rĂŠcits, pas l'objectif.`]},{heading:`Signaux d'alerte`,icon:`warn`,kind:`signals`,body:``,bullets:[`ÂŤ On a fini tous les rĂŠcits Âť devient la fiertĂŠ de fin de sprint, indĂŠpendamment du rĂŠsultat constatĂŠ.`,`L'objectif de Sprint est rĂŠdigĂŠ aprĂ¨s la sĂŠlection des rĂŠcits pour les rĂŠsumer.`,`Ă la rĂŠtro, l'ĂŠquipe parle de rĂŠcits livrĂŠes, pas de bĂŠnĂŠficiaires touchĂŠs.`]},{heading:`Comment recadrer`,icon:`wrench`,body:`Reformuler l'objectif en outcome avant de finaliser la sĂŠlection. Demander : ÂŤ quelles rĂŠcits nous permettent vraiment d'atteindre cet objectif ? Âť et laisser tomber le reste.`,examples:[{bad:`Livrer les 12 rĂŠcits de l'epic intĂŠgration.`,good:`Permettre Ă  80 % des nouveaux utilisateurs de complĂŠter l'inscription en moins de 90 secondes, fin de sprint.`,note:`Les rĂŠcits deviennent un moyen mesurĂŠ contre l'outcome, pas une fin en soi.`}]},{heading:`Source`,kind:`source`,body:`Scrum Guide 2020 : ÂŤ The selected Product Backlog items are a hypothesis of what is needed to achieve the Sprint Goal. Âť [traduction : ÂŤ Les items sĂŠlectionnĂŠs du backlog produit sont une hypothĂ¨se de ce qui est nĂŠcessaire pour atteindre l'objectif de Sprint. Âť] Voir aussi Scrum.org, Sprint Backlog Antipatterns.`}]},{id:`sprint.sheet.vanity-goal`,isNamedPitfall:!0,themeId:`sprint.pieges-classiques`,icon:`warn`,title:`L'objectif vitrine`,heroPhrase:`Un objectif qui sonne bien mais n'engage personne. Il rassure les parties prenantes sans rien promettre.`,intro:``,practiceCtaLabel:`Va corriger un objectif vitrine`,sections:[{heading:`Pourquoi c'est piĂŠgeux`,icon:`target`,body:`L'objectif vitrine coche la case ÂŤ on a un objectif de Sprint Âť sans accepter le coĂťt d'un engagement vĂŠrifiable. Personne ne saura Ă  la fin du sprint si l'objectif est atteint ou pas, donc tout le monde dĂŠclare la victoire.`,bullets:[`Aucune mesure ne tranche en fin de sprint.`,`L'objectif est compatible avec n'importe quel rĂŠsultat.`,`Il rassure les parties prenantes mais ne change pas le comportement de l'ĂŠquipe.`]},{heading:`Signaux d'alerte`,icon:`warn`,kind:`signals`,body:``,bullets:[`PrĂŠsence de mots flous (ÂŤ renforcer Âť, ÂŤ valoriser Âť, ÂŤ consolider Âť, ÂŤ explorer Âť).`,`Aucun chiffre, aucune mĂŠtrique, aucun bĂŠnĂŠficiaire nommĂŠ.`,`Le test ÂŤ est-ce qu'on peut ĂŞtre en dĂŠsaccord sur l'atteinte ? Âť donne oui.`]},{heading:`Comment reformuler`,icon:`wrench`,body:`RepĂŠrer le mot flou, demander ÂŤ tu veux dire quoi, concrĂ¨tement, mesurable comment ? Âť et ĂŠcrire la rĂŠponse comme nouvel objectif.`,examples:[{bad:`Renforcer l'expĂŠrience utilisateur sur le module commande.`,good:`Faire passer le taux de complĂŠtion du tunnel de paiement de 68 % Ă  80 % d'ici fin de sprint.`,note:`Le renforcement disparaĂŽt au profit de ce qu'il ĂŠtait censĂŠ produire.`}]},{heading:`Source`,kind:`source`,body:`Scrum.org, Sprint Anti-Patterns. Convergent avec le test pĂŠdagogique de Mike Cohn : ÂŤ can two people defending opposite verdicts both be right ? Âť [traduction : ÂŤ deux personnes dĂŠfendant des verdicts opposĂŠs peuvent-elles avoir raison toutes les deux ? Âť] Si oui, l'objectif est creux.`}]},{id:`sprint.sheet.pet-project-goal`,isNamedPitfall:!0,themeId:`sprint.pieges-classiques`,icon:`warn`,title:`L'objectif de confort`,heroPhrase:`Un objectif qui sert un seul interlocuteur ou une obsession interne. Aucun bĂŠnĂŠficiaire externe ne ressent l'effet.`,intro:``,practiceCtaLabel:`Va recentrer un objectif mal alignĂŠ`,sections:[{heading:`Pourquoi`,icon:`target`,body:`L'objectif de confort est techniquement bien rĂŠdigĂŠ mais sert un public minoritaire ou interne : demande d'un manager isolĂŠ, refactor que seule l'ĂŠquipe verra, fonctionnalitĂŠ rĂŠclamĂŠe par un seul client. La vĂŠlocitĂŠ est dĂŠpensĂŠe sans contrepartie utilisateur.`,bullets:[`Aucun bĂŠnĂŠficiaire externe n'est nommĂŠ, ou un seul.`,`L'effet attendu reste dans l'ĂŠquipe (vĂŠlocitĂŠ, propretĂŠ du code).`,`Le retour sur effort est dĂŠfendable mais sur un public marginal.`]},{heading:`Signaux d'alerte`,icon:`warn`,kind:`signals`,body:``,bullets:[`Le bĂŠnĂŠficiaire nommĂŠ est un membre de l'ĂŠquipe ou un manager.`,`L'effet attendu n'est observable qu'en interne.`,`Le sprint d'avant avait dĂŠjĂ  un objectif sur le mĂŞme sous-sujet.`]},{heading:`Le test ÂŤ qui en profite hors de l'ĂŠquipe ? Âť`,icon:`wrench`,body:`Avant de figer l'objectif, nommer 3 bĂŠnĂŠficiaires hors ĂŠquipe et l'effet observable sur chacun. Si la liste est vide, l'objectif est un objectif de confort.`,examples:[{bad:`Refactorer le module de gestion des permissions pour qu'il soit plus clair.`,good:`Permettre aux administrateurs clients de modifier les rĂ´les utilisateurs en moins de 30 secondes (vs 4 min aujourd'hui), fin de sprint.`,note:`Le bĂŠnĂŠficiaire passe de l'ĂŠquipe Ă  un utilisateur externe avec une mesure observable.`}]},{heading:`Source`,kind:`source`,body:`Christina Wodtke (Radical Focus) et Mike Cohn convergent : l'objectif d'un sprint doit servir un changement constatable par un public extĂŠrieur Ă  l'ĂŠquipe pour mĂŠriter la vĂŠlocitĂŠ dĂŠpensĂŠe.`}]},{id:`sprint.sheet.renew-the-goal`,isNamedPitfall:!0,themeId:`sprint.pieges-classiques`,icon:`warn`,title:`L'objectif recyclĂŠ`,heroPhrase:`Le mĂŞme objectif sprint aprĂ¨s sprint signale soit qu'on n'apprend rien, soit qu'on ne mesure jamais.`,intro:``,practiceCtaLabel:`Va ĂŠcrire un nouvel objectif`,sections:[{heading:`Pourquoi le renouveler`,icon:`target`,body:`Si l'objectif du sprint N est identique Ă  celui du sprint N-1 (et N-2), trois lectures possibles : (1) l'objectif n'est pas atteint, donc il faut le revoir ou changer d'approche ; (2) il est atteint mais on ne le mesure pas ; (3) c'est un faux objectif qui ne sert que d'ĂŠtiquette. Aucune n'est saine.`,bullets:[`Un objectif porte une intention bornĂŠe : quand l'intention est servie, l'objectif passe Ă  autre chose.`,`RĂŠpĂŠter sans mesurer transforme l'objectif en formule magique.`,`L'apprentissage d'un sprint doit modifier le suivant : nouvel objectif ou approche modifiĂŠe.`]},{heading:`Signaux d'alerte`,icon:`warn`,kind:`signals`,body:``,bullets:[`Trois sprints consĂŠcutifs avec le mĂŞme objectif (ou variantes mineures).`,`Personne ne sait dire si l'objectif prĂŠcĂŠdent a ĂŠtĂŠ atteint.`,`La rĂŠtro ne parle pas de l'objectif, seulement des rĂŠcits.`]},{heading:`Comment renouveler`,icon:`wrench`,body:`Ă la fin de chaque sprint, statuer sur l'objectif : atteint, partiel, ratĂŠ. Si atteint, passer Ă  l'enjeu suivant. Si partiel ou ratĂŠ, soit relever le seuil de la prochaine ĂŠtape, soit changer d'approche (l'objectif ne se reproduit pas Ă  l'identique).`,examples:[{bad:`AmĂŠliorer la conversion du tunnel de paiement (sprint aprĂ¨s sprint).`,good:`Sprint 24 : faire passer la conversion de 12 % Ă  18 %. Sprint 25 (si atteint) : faire passer le taux d'abandon mobile de 35 % Ă  22 %. Sprint 25 (si ratĂŠ) : reformuler l'hypothĂ¨se, peut-ĂŞtre que le problĂ¨me n'est pas la conversion mais le rĂŠ-engagement.`,note:`Le sprint suivant porte un objectif **diffĂŠrent**, soit qu'on monte d'un cran, soit qu'on change d'angle.`}]},{heading:`Source`,kind:`source`,body:`Henrik Kniberg sur l'apprentissage d'un sprint Ă  l'autre. Et Scrum.org : ÂŤ The Sprint Goal is a single objective for the Sprint, not a recurring theme. Âť [traduction : ÂŤ L'objectif de Sprint est un objectif unique du Sprint, pas un thĂ¨me rĂŠcurrent. Âť]`}]},{id:`sprint.sheet.discovery-exploration`,themeId:`sprint.cas-particuliers`,icon:`learn`,title:`Sprint d'exploration (ou exploration)`,heroPhrase:`Tu n'as pas une livraison Ă  faire, tu as une question Ă  trancher. L'objectif de Sprint vise une preuve, pas un livrable.`,intro:``,practiceCtaLabel:`Va ĂŠcrire un objectif de Sprint d'exploration`,sections:[{heading:`La logique de l'exploration`,icon:`target`,body:`Un sprint d'exploration sert Ă  trancher une incertitude (technique, produit, marchĂŠ) avant de s'engager sur du dĂŠveloppement. L'objectif de Sprint n'est donc pas ÂŤ livrer X Âť mais ÂŤ rĂŠpondre Ă  la question Y avec une preuve observable Âť. Le piĂ¨ge : confondre le sprint d'exploration avec un sprint sans objectif.`,bullets:[`L'incertitude Ă  lever est nommĂŠe explicitement (la question).`,`Le critĂ¨re de rĂŠponse est observable : un prototype, un test utilisateur, une mesure de performance, une preuve de concept chiffrĂŠe.`,`L'ĂŠquipe accepte un verdict : ÂŤ la rĂŠponse est non, on n'y va pas Âť est un succĂ¨s de l'exploration.`]},{heading:`Reformuler en outcome`,icon:`wrench`,body:`L'objectif de Sprint d'exploration prend la forme ÂŤ rĂŠpondre Ă  [question] avec [preuve] d'ici fin de sprint Âť. La preuve est ce qui rend l'objectif mesurable.`,examples:[{bad:`Explorer la faisabilitĂŠ du paiement en crypto.`,good:`RĂŠpondre Ă  : ÂŤ peut-on intĂŠgrer le paiement crypto en moins de 6 semaines sans dĂŠpendre d'un prestataire tiers ? Âť avec une preuve de concept fonctionnelle couvrant 3 cryptos majeures et une estimation chiffrĂŠe du coĂťt d'intĂŠgration, d'ici fin de sprint.`,note:`La question est posĂŠe, la preuve est dĂŠfinie. Ă la Review, on peut dire oui ou non sans dĂŠbat.`}]},{heading:`Le piĂ¨ge de l'exploration sans verdict`,icon:`warn`,body:`Un sprint d'exploration qui ne tranche pas est un sprint perdu. La pire formulation : ÂŤ explorer Âť, ÂŤ ĂŠtudier Âť, ÂŤ regarder Âť. Ces verbes ne s'engagent Ă  rien. Le verdict doit ĂŞtre annoncĂŠ en dĂŠbut de sprint comme une question fermĂŠe (oui ou non, et ce qui change).`},{heading:`Source`,kind:`source`,body:`Marty Cagan (Inspired) sur la discovery produit. Mike Cohn pour les explorations techniques en Scrum. Convergent : un exploration a une question, un budget temps et un verdict.`}]},{id:`sprint.sheet.event-prep`,themeId:`sprint.cas-particuliers`,icon:`challenge`,title:`Sprint prĂŠparatoire Ă  un ĂŠvĂŠnement`,heroPhrase:`Une release, une dĂŠmo, une confĂŠrence. L'objectif ne dit pas ÂŤ tout prĂŠparer Âť mais ce qui changera chez le public visĂŠ.`,intro:``,practiceCtaLabel:`Va ĂŠcrire l'objectif d'un sprint d'ĂŠvĂŠnement`,sections:[{heading:`Pourquoi c'est piĂŠgeux`,icon:`warn`,body:`Un sprint prĂŠparatoire (release, confĂŠrence, dĂŠmo client important) attire les goals creux du type ÂŤ prĂŠparer la confĂŠrence Âť. Tout le monde est mobilisĂŠ, personne ne sait prĂŠcisĂŠment ce qu'on cherche Ă  produire chez les participants. RĂŠsultat : on s'agite, on accumule des tĂ˘ches, et la satisfaction post-ĂŠvĂŠnement reste subjective.`,bullets:[`Le bĂŠnĂŠficiaire est le **public** de l'ĂŠvĂŠnement, pas l'ĂŠquipe.`,`L'effet attendu est nommĂŠ : ce que le public doit ressentir / faire / dĂŠcider.`,`La mesure existe : retours aprĂ¨s l'ĂŠvĂŠnement, conversions, demandes de suite.`]},{heading:`Reformuler en outcome cĂ´tĂŠ public`,icon:`wrench`,body:`L'objectif de Sprint vise le changement chez le public, pas la complĂŠtion du contenu.`,examples:[{bad:`PrĂŠparer la confĂŠrence client annuelle prĂŠvue fin de sprint.`,good:`Obtenir au moins 10 demandes de RDV commercial qualifiĂŠes de la part des participants de la confĂŠrence client annuelle, d'ici 48 h aprĂ¨s l'ĂŠvĂŠnement.`,note:`Le contenu de la confĂŠrence devient un moyen pour atteindre ce rĂŠsultat, pas une fin en soi. L'ĂŠquipe arbitre ce qu'elle prĂŠpare en fonction de Ă§a.`}]},{heading:`Le piĂ¨ge de l'ĂŠchĂŠance floue`,icon:`warn`,body:`L'ĂŠvĂŠnement crĂŠe une ĂŠchĂŠance forte (la date), ce qui peut faire croire que l'ĂŠchĂŠance suffit comme borne. Mais une ĂŠchĂŠance n'est pas un objectif : l'objectif dit ce qu'on cherche Ă  obtenir avant ou aprĂ¨s cette ĂŠchĂŠance. Sans cet ajout, la date devient le seul critĂ¨re et tout le travail s'aligne dessus, mĂŞme s'il rate l'effet.`},{heading:`Source`,kind:`source`,body:`Convergent avec la doctrine outcome-over-output (Marty Cagan, Christina Wodtke). AdaptĂŠ au contexte sprint par Henrik Kniberg dans ses retours sur les release sprints.`}]},{id:`sprint.sheet.external-blockers`,themeId:`sprint.cas-particuliers`,icon:`wrench`,title:`Sprint avec dĂŠpendances bloquantes externes`,heroPhrase:`Tu ne contrĂ´les pas tout. L'objectif dit ce que tu peux honnĂŞtement engager, avec un plan B explicite.`,intro:``,practiceCtaLabel:`Va ĂŠcrire un objectif honnĂŞte face aux blocages`,sections:[{heading:`La situation`,icon:`target`,body:`L'ĂŠquipe attend une API externe, une validation lĂŠgale, un accĂ¨s production, une dĂŠcision d'un autre dĂŠpartement. Sans cette entrĂŠe, une partie de l'objectif est inatteignable. Deux mauvais rĂŠflexes : (1) prĂŠtendre que le blocage va se lever et s'engager comme si de rien n'ĂŠtait ; (2) renoncer Ă  l'objectif et faire un sprint ÂŤ au mieux Âť sans cap.`,bullets:[`Le blocage est nommĂŠ en dĂŠbut de sprint, pas dĂŠcouvert Ă  mi-parcours.`,`L'objectif porte sur ce que l'ĂŠquipe peut vraiment engager (donc parfois sur une ĂŠtape antĂŠrieure au blocage).`,`Un plan B explicite est posĂŠ pour les ressources non bloquĂŠes.`]},{heading:`Trois formulations honnĂŞtes`,icon:`wrench`,body:`Selon la nature du blocage, l'objectif de Sprint s'adapte.`,bullets:[`**Si le blocage est probable Ă  se lever** : ÂŤ Faire passer X de A Ă  B **conditionnellement Ă  la rĂŠception de Y avant le jour J du sprint**. Ă dĂŠfaut, livrer la version isolĂŠe prĂŞte Ă  intĂŠgrer dĂ¨s rĂŠception. Âť`,`**Si le blocage est durable** : ÂŤ RĂŠduire de 30 % le temps de traitement des cas sans dĂŠpendance Y, en isolant l'intĂŠgration Y pour livraison dĂ¨s qu'elle est disponible. Âť`,`**Si le blocage est inconnu** : ÂŤ Lever en premiĂ¨re semaine la dĂŠpendance Y (sous responsabilitĂŠ du Product Owner) puis exĂŠcuter sur le reste du sprint Âť. L'objectif devient en partie l'engagement Ă  dĂŠbloquer.`]},{heading:`Le piĂ¨ge du ÂŤ on fera au mieux Âť`,icon:`warn`,body:`ÂŤ On fera de notre mieux Âť n'est pas un objectif de Sprint. C'est une posture, pas un cap. Si tu ne peux pas chiffrer ce que tu engages, demande-toi si ce sprint a vraiment un sens, ou s'il faut le repousser et utiliser la fenĂŞtre pour autre chose (exploration, technique, refonte).`},{heading:`Source`,kind:`source`,body:`Henrik Kniberg sur la gestion des dĂŠpendances en Scrum at Scale. SAFe propose le ROAM (Risks Owned, Accepted, Mitigated) au PI Planning ; appliquĂŠ Ă  l'ĂŠchelle sprint, la mĂŞme logique s'applique.`}]},{id:`sprint.sheet.alibi-goal`,isNamedPitfall:!0,themeId:`sprint.pieges-classiques`,icon:`warn`,title:`L'objectif alibi`,heroPhrase:`Les rĂŠcits sont choisis avant l'objectif. L'objectif n'est qu'une ĂŠtiquette collĂŠe aprĂ¨s coup pour leur donner un air de cohĂŠrence.`,intro:``,practiceCtaLabel:`Va vĂŠrifier l'ordre d'un objectif suspect`,sections:[{heading:`Pourquoi c'est piĂŠgeux`,icon:`target`,body:`La sĂŠlection des rĂŠcits prĂŠcĂ¨de la rĂŠdaction de l'objectif, jamais l'inverse. Le Product Owner ou l'ĂŠquipe remplit le sprint avec ce qui rentre dans la vĂŠlocitĂŠ, puis rĂŠdige une phrase qui les relie aprĂ¨s coup. L'objectif n'a alors aucun pouvoir de dĂŠcision : il ne change rien au travail rĂŠel.`,bullets:[`La sĂŠlection des rĂŠcits prĂŠcĂ¨de la rĂŠdaction de l'objectif, jamais l'inverse.`,`Plusieurs formulations d'objectif colleraient aussi bien aux mĂŞmes rĂŠcits.`,`Retirer l'objectif de la page ne changerait rien au travail du sprint.`]},{heading:`Comment Ă§a se voit`,icon:`warn`,kind:`signals`,body:``,bullets:[`L'objectif est ĂŠcrit en dernier, aprĂ¨s la sĂŠlection des rĂŠcits au Sprint Planning.`,`Personne ne sait dire ce qui ferait ĂŠchouer le sprint si tous les rĂŠcits ĂŠtaient livrĂŠs.`,`Changer l'ordre des mots de l'objectif ne changerait rien au travail prĂŠvu.`]},{heading:`Le test de l'ordre`,icon:`wrench`,body:`Avant de sĂŠlectionner le moindre rĂŠcit, dĂŠcider et ĂŠcrire l'effet attendu. Les rĂŠcits deviennent ensuite une hypothĂ¨se sur ce qui devrait produire cet effet, pas une liste qu'on habille aprĂ¨s coup.`,examples:[{bad:`Objectif : ÂŤ AmĂŠliorer le parcours d'achat. Âť RĂŠcits sĂŠlectionnĂŠs : filtre prix, tri par avis, bouton d'achat fixe, choisis pour remplir la vĂŠlocitĂŠ, objectif ĂŠcrit aprĂ¨s.`,good:`Faire passer le taux d'ajout au panier de 24 % Ă  30 % d'ici la fin du sprint. HypothĂ¨se Ă  vĂŠrifier : le filtre prix, le tri par avis et le bouton fixe y contribuent.`,note:`Le mĂŞme travail, mais l'ordre s'inverse : l'effet attendu est dĂŠcidĂŠ avant les moyens, pas dĂŠduit aprĂ¨s.`}]},{heading:`Source`,kind:`source`,body:`Scrum.org, 27 Sprint Anti-Patterns : les ĂŠquipes sĂŠlectionnent des ĂŠlĂŠments du backlog puis tentent de leur fabriquer un objectif commun, mĂŞme sans fil conducteur rĂŠel.`}]},{id:`sprint.sheet.composite-goal`,isNamedPitfall:!0,themeId:`sprint.pieges-classiques`,icon:`warn`,title:`L'objectif composite`,heroPhrase:`Deux objectifs recousus par ÂŤ et Âť. Si l'un ĂŠchoue et l'autre rĂŠussit, personne ne sait si le sprint a gagnĂŠ.`,intro:``,practiceCtaLabel:`Va sĂŠparer un objectif composite`,sections:[{heading:`Pourquoi c'est piĂŠgeux`,icon:`target`,body:`Le tronc commun d'un bon objectif de Sprint est un but unique et cohĂŠrent. Un ÂŤ et Âť qui relie deux effets mesurĂŠs sĂŠparĂŠment casse cette unitĂŠ : l'un des deux peut ĂŞtre atteint sans que l'autre le soit, et le verdict de rĂŠussite devient une nĂŠgociation, pas un fait.`,bullets:[`ÂŤ Et Âť relie deux effets mesurĂŠs sĂŠparĂŠment, pas un seul.`,`L'ĂŠquipe protĂ¨ge en prioritĂŠ le plus facile des deux, pas forcĂŠment le plus important.`,`Ă la Revue, la rĂŠussite se discute au lieu de se constater.`]},{heading:`Comment Ă§a se voit`,icon:`warn`,kind:`signals`,body:``,bullets:[`L'objectif contient ÂŤ et Âť entre deux verbes ou deux indicateurs diffĂŠrents.`,`Ă la Revue, l'ĂŠquipe nĂŠgocie lequel des deux comptait vraiment.`,`Deux tableaux de bord diffĂŠrents sont montrĂŠs pour justifier la rĂŠussite.`]},{heading:`Le test du split`,icon:`wrench`,body:`SĂŠparer mentalement l'objectif de part et d'autre du ÂŤ et Âť. Si les deux morceaux ont chacun leur propre indicateur et leur propre sens sans l'autre, ce sont deux objectifs, pas un. Choisir celui qui compte le plus pour ce sprint ; l'autre attend son tour.`,examples:[{bad:`RĂŠduire le temps de chargement de la page produit et augmenter le taux de clic sur les recommandations.`,good:`Faire passer le temps de chargement de la page produit de 3,2 s Ă  1,5 s d'ici la fin du sprint.`,note:`Le taux de clic sur les recommandations devient un sujet du sprint suivant, pas un objectif cachĂŠ dans celui-ci.`}]},{heading:`Source`,kind:`source`,body:`Scrum.org, Sprint Anti-Patterns, sur les objectifs qui juxtaposent plusieurs ĂŠlĂŠments du backlog sans fil conducteur unique.`}]},{id:`sprint.sheet.invisible-goal`,isNamedPitfall:!0,themeId:`sprint.pieges-classiques`,icon:`warn`,title:`L'objectif invisible`,heroPhrase:`Il existe sur le tableau. Il n'existe nulle part ailleurs : ni au Daily, ni Ă  la Revue, ni Ă  la RĂŠtrospective.`,intro:``,practiceCtaLabel:`Va ramener un objectif dans les rituels`,sections:[{heading:`Pourquoi c'est piĂŠgeux`,icon:`target`,body:`L'objectif est rempli dans l'outil de suivi puis jamais rouvert. Le Daily Scrum se rĂŠsume Ă  un tour de statut des tickets. La Revue prĂŠsente les rĂŠcits livrĂŠs, pas l'effet visĂŠ. L'objectif ne pilote alors aucune dĂŠcision rĂŠelle : c'est un champ de formulaire, pas un cap.`,bullets:[`Le Daily Scrum ne mentionne jamais oĂš en est l'objectif, seulement les tickets.`,`Ă la Revue, on prĂŠsente des rĂŠcits livrĂŠs, pas l'effet attendu par l'objectif.`,`L'ĂŠquipe pourrait citer les rĂŠcits du sprint sans pouvoir citer l'objectif.`]},{heading:`Comment Ă§a se voit`,icon:`warn`,kind:`signals`,body:``,bullets:[`L'objectif n'est mentionnĂŠ dans aucun rituel aprĂ¨s le Sprint Planning.`,`Demander l'objectif du sprint en cours Ă  un membre de l'ĂŠquipe produit une hĂŠsitation.`,`Le champ objectif de l'outil de suivi est rempli, mais jamais rouvert.`]},{heading:`Le test du silence`,icon:`wrench`,body:`RĂŠintroduire l'objectif dans chaque rituel : le Daily s'ouvre en s'y rapportant, la Revue le rappelle avant de montrer les rĂŠcits, la RĂŠtro demande explicitement s'il a ĂŠtĂŠ atteint.`,examples:[{bad:`Daily Scrum : ÂŤ Hier j'ai fait le ticket X, aujourd'hui je fais le ticket Y. Âť`,good:`Daily Scrum : ÂŤ Le ticket X que j'ai fini nous rapproche de l'objectif du sprint parce que... Âť`,note:`Le rituel change de forme : on relie le travail du jour Ă  l'effet visĂŠ, pas seulement Ă  la tĂ˘che.`}]},{heading:`Source`,kind:`source`,body:`Age-of-Product.com, Missing Sprint Goals : un objectif absent des rituels quotidiens n'a d'existence que sur le papier.`}]},{id:`sprint.sheet.never-renegotiated-goal`,isNamedPitfall:!0,themeId:`sprint.pieges-classiques`,icon:`warn`,title:`L'objectif jamais renĂŠgociĂŠ`,heroPhrase:`Le Sprint Backlog change en cours de route. Personne ne se demande si l'objectif tient encore.`,intro:``,practiceCtaLabel:`Va protĂŠger un objectif face Ă  un imprĂŠvu`,sections:[{heading:`Pourquoi c'est piĂŠgeux`,icon:`target`,body:`Le Scrum Guide autorise Ă  renĂŠgocier le pĂŠrimĂ¨tre en cours de sprint avec le Product Owner, tant que l'objectif reste protĂŠgĂŠ. Beaucoup d'ĂŠquipes renĂŠgocient le pĂŠrimĂ¨tre sans jamais revenir sur l'objectif : il devient un vĹu figĂŠ au premier jour, jamais rĂŠĂŠvaluĂŠ Ă  la lumiĂ¨re des faits du sprint.`,bullets:[`Le pĂŠrimĂ¨tre peut lĂŠgitimement bouger en cours de sprint ; l'objectif, lui, doit rester une dĂŠcision consciente.`,`Quand un rĂŠcit est retirĂŠ ou ajoutĂŠ, personne ne revĂŠrifie si l'objectif est toujours atteignable.`,`L'objectif devient un vĹu figĂŠ au premier jour, jamais rĂŠĂŠvaluĂŠ.`]},{heading:`Comment Ă§a se voit`,icon:`warn`,kind:`signals`,body:``,bullets:[`Un rĂŠcit qui portait l'objectif est abandonnĂŠ en cours de sprint sans discussion sur l'objectif lui-mĂŞme.`,`La RĂŠtrospective ne pose jamais la question ÂŤ avons-nous protĂŠgĂŠ l'objectif ou seulement la liste ? Âť`,`Le Scrum Master ne relance jamais l'objectif quand le pĂŠrimĂ¨tre bouge.`]},{heading:`ProtĂŠger l'objectif, pas la liste`,icon:`wrench`,body:`Quand le pĂŠrimĂ¨tre change, poser explicitement la question Ă  l'ĂŠquipe : l'objectif tient-il encore ? Si non, deux choix honnĂŞtes : rĂŠduire l'ambition chiffrĂŠe, ou protĂŠger l'objectif en repoussant l'imprĂŠvu aprĂ¨s la Revue.`,examples:[{bad:`Le rĂŠcit qui portait la mesure de l'objectif est retirĂŠ Ă  mi-sprint pour absorber un incident. Personne ne revient sur l'objectif.`,good:`ÂŤ Le rĂŠcit qui portait notre objectif est retirĂŠ. On rĂŠduit l'ambition chiffrĂŠe de l'objectif, ou on protĂ¨ge l'objectif en repoussant l'incident aprĂ¨s la Revue. Âť DĂŠcision prise en ĂŠquipe.`,note:`L'objectif reste la boussole, mĂŞme quand le contenu du sprint change.`}]},{heading:`Source`,kind:`source`,body:`Scrum Guide 2020, sur l'adaptation du Sprint Backlog en cours de sprint et la protection du Sprint Goal.`}]},{id:`sprint.sheet.unnamed-dependency`,isNamedPitfall:!0,themeId:`sprint.pieges-classiques`,icon:`warn`,title:`La dĂŠpendance non nommĂŠe`,heroPhrase:`L'objectif dĂŠpend d'une autre ĂŠquipe ou d'un service externe, mais ce risque n'est jamais dit Ă  voix haute.`,intro:``,practiceCtaLabel:`Va nommer une dĂŠpendance avant qu'elle ne casse un objectif`,sections:[{heading:`Pourquoi c'est piĂŠgeux`,icon:`target`,body:`L'objectif suppose qu'une autre ĂŠquipe ou qu'un service externe livre Ă  temps, sans que cela soit vĂŠrifiĂŠ ni nommĂŠ au Sprint Planning. Si la dĂŠpendance glisse, l'objectif ĂŠchoue pour une raison jamais discutĂŠe, et l'ĂŠquipe porte seule la responsabilitĂŠ d'un risque qu'elle ne maĂŽtrisait pas.`,bullets:[`L'objectif suppose une livraison externe sans qu'elle soit vĂŠrifiĂŠe ni nommĂŠe.`,`Si la dĂŠpendance glisse, l'objectif ĂŠchoue pour une raison jamais discutĂŠe au Planning.`,`L'ĂŠquipe porte seule la responsabilitĂŠ d'un risque qu'elle ne maĂŽtrise pas.`]},{heading:`Comment Ă§a se voit`,icon:`warn`,kind:`signals`,body:``,bullets:[`L'objectif contient un verbe d'action sur un systĂ¨me que l'ĂŠquipe ne possĂ¨de pas.`,`Aucune conversation avec l'ĂŠquipe ou le service dĂŠpendant n'a eu lieu avant le Planning.`,`Ă la RĂŠtro, l'ĂŠchec de l'objectif s'explique par ÂŤ on attendait aprĂ¨s l'ĂŠquipe X Âť.`]},{heading:`Nommer le risque avant le Planning`,icon:`wrench`,body:`VĂŠrifier la dĂŠpendance avec l'ĂŠquipe concernĂŠe avant de figer l'objectif, et prĂŠvoir un plan de repli dans l'objectif lui-mĂŞme si elle glisse.`,examples:[{bad:`Faire passer le taux de connexion rĂŠussie de 80 % Ă  95 %, en s'appuyant sur la nouvelle API d'authentification de l'ĂŠquipe Plateforme (date de livraison non confirmĂŠe).`,good:`VĂŠrifiĂŠ auprĂ¨s de l'ĂŠquipe Plateforme : l'API sera livrĂŠe mardi. Faire passer le taux de connexion rĂŠussie de 80 % Ă  95 % d'ici la fin du sprint, avec un plan de repli testĂŠ si l'API glisse.`,note:`La dĂŠpendance devient un fait vĂŠrifiĂŠ et un risque nommĂŠ, pas un espoir silencieux.`}]},{heading:`Source`,kind:`source`,body:`SAFe propose le ROAM (Risks Owned, Accepted, Mitigated) au PI Planning ; la mĂŞme discipline s'applique Ă  l'ĂŠchelle d'un sprint dĂ¨s qu'une dĂŠpendance externe existe.`}]},{id:`sprint.sheet.hypothesis-as-certainty`,isNamedPitfall:!0,themeId:`sprint.pieges-classiques`,icon:`warn`,title:`L'hypothĂ¨se maquillĂŠe en certitude`,heroPhrase:`ÂŤ On veut voir siâŚ Âť devient ÂŤ on va prouver queâŚ Âť. L'expĂŠrimentation perd son droit Ă  l'ĂŠchec.`,intro:``,practiceCtaLabel:`Va redonner Ă  un objectif le droit d'avoir tort`,sections:[{heading:`Pourquoi c'est piĂŠgeux`,icon:`target`,body:`Une expĂŠrimentation a deux issues lĂŠgitimes : l'hypothĂ¨se tient, ou elle ne tient pas, les deux sont un succĂ¨s d'apprentissage. RĂŠdigĂŠe comme une certitude, seule l'issue positive compte comme rĂŠussite, et l'ĂŠquipe ĂŠvite ensuite les sujets vraiment incertains pour ne pas ÂŤ rater Âť un objectif qu'elle ne maĂŽtrisait pas.`,bullets:[`Une expĂŠrimentation a deux issues lĂŠgitimes ; les deux sont un succĂ¨s d'apprentissage.`,`RĂŠdigĂŠe comme une certitude, seule l'issue positive compte comme rĂŠussite.`,`L'ĂŠquipe ĂŠvite ensuite les sujets incertains pour ne pas ÂŤ rater Âť un objectif hasardeux.`]},{heading:`Comment Ă§a se voit`,icon:`warn`,kind:`signals`,body:``,bullets:[`Le mot ÂŤ tester Âť, ÂŤ explorer Âť ou ÂŤ voir si Âť a disparu entre l'intention initiale et l'objectif ĂŠcrit.`,`Aucun critĂ¨re n'est prĂŠvu pour le cas oĂš l'hypothĂ¨se est invalidĂŠe.`,`L'ĂŠquipe qualifie dĂŠjĂ  au Planning le rĂŠsultat attendu comme acquis.`]},{heading:`Garder le droit d'avoir tort`,icon:`wrench`,body:`Garder la nature d'hypothĂ¨se explicite dans l'objectif et dĂŠfinir Ă  l'avance ce que signifie ÂŤ apprendre Âť, mĂŞme si l'hypothĂ¨se ĂŠchoue.`,examples:[{bad:`Faire passer l'engagement sur la recherche de 12 % Ă  20 % grĂ˘ce Ă  la nouvelle autocomplĂŠtion.`,good:`Tester si la nouvelle autocomplĂŠtion amĂŠliore l'engagement sur la recherche. RĂŠussite si le taux de clic dĂŠpasse 15 % (vs 12 % aujourd'hui) ; en dessous, l'hypothĂ¨se est invalidĂŠe et documentĂŠe pour la suite.`,note:`Les deux issues sont ĂŠcrites Ă  l'avance : l'objectif reste falsifiable mĂŞme quand la rĂŠponse est non.`}]},{heading:`Source`,kind:`source`,body:`Marty Cagan (Inspired), sur la distinction entre dĂŠcouverte (hypothĂ¨ses Ă  tester) et livraison (engagements Ă  tenir).`}]}];function D(e,t,n,r){return{kind:`text`,id:e,category:t,quality:n,text:r}}function Ce(e,t,n,r){return{kind:`numericField`,id:e,category:`variation`,quality:t,template:n,fieldCount:r}}function we(e,t,n,r){return{kind:`numericField`,id:e,category:t,quality:`good`,template:n,fieldCount:r,fieldKind:`text`}}function Te(e,t){return{kind:`numericField`,id:e,category:t,quality:`neutral`,template:`[X]`,fieldCount:1,fieldKind:`text`,handLabel:`Ăcrire moi-mĂŞmeâŚ`}}var Ee=[D(`a-good-reduce`,`action`,`good`,`RĂŠduire`),D(`a-good-divide`,`action`,`good`,`Diviser`),D(`a-good-pass`,`action`,`good`,`Faire passer`),D(`a-good-enable`,`action`,`good`,`Permettre Ă `)],De=[D(`a-neu-increase`,`action`,`neutral`,`Augmenter`),D(`a-neu-reach`,`action`,`neutral`,`Atteindre`),D(`a-neu-bring`,`action`,`neutral`,`Ramener`),D(`a-neu-keep`,`action`,`neutral`,`Maintenir`)],Oe=[D(`a-dis-deliver`,`action`,`distractor`,`Livrer`),D(`a-dis-refactor`,`action`,`distractor`,`Refactorer`),D(`a-dis-setup`,`action`,`distractor`,`Mettre en place`),D(`a-dis-improve`,`action`,`distractor`,`AmĂŠliorer`)],ke=[D(`i-good-cart`,`indicator`,`good`,`le taux d'abandon au paiement`),D(`i-good-latency`,`indicator`,`good`,`le temps moyen de rĂŠponse de l'API`),D(`i-good-incidents`,`indicator`,`good`,`le nombre d'incidents de production`),D(`i-good-hotfix`,`indicator`,`good`,`le dĂŠlai de dĂŠploiement d'un hotfix`)],Ae=[D(`i-neu-ticket`,`indicator`,`neutral`,`le temps de rĂŠsolution d'un ticket support`),D(`i-neu-nps`,`indicator`,`neutral`,`le score NPS`),D( draft:{type:`pi`,text:`Faire entrer 3 clients pilotes sur la nouvelle offre marketplace avant la revue de PI.`,audience:`dev`,confidence:50,hasExplicitDeadline:!0,isUnderTeamInfluence:!0,piClass:`stretch`,businessValue:7},rationale:`Stretch bien calibrĂŠ : ambition ĂŠlevĂŠe (3 pilotes en un PI), confiance 50 % cohĂŠrente avec la classe stretch.`},{id:`pi.bad.deliver-billing`,verdict:`bad`,draft:{type:`pi`,text:`Livrer le module facturation v2.`,audience:`dev`,confidence:90,hasExplicitDeadline:!1,isUnderTeamInfluence:!0,piClass:`committed`,businessValue:6},rationale:`Output pur (ÂŤ livrer Âť) : aucune valeur mĂŠtier mesurĂŠe, pas de bĂŠnĂŠficiaire, pas de seuil.`,expectedFailingCriteria:[`outcome`,`falsifiable`,`timeBounded`],trapWords:[`livrer`]},{id:`pi.bad.stability-debt`,verdict:`bad`,draft:{type:`pi`,text:`AmĂŠliorer la stabilitĂŠ de la plateforme et rĂŠduire la dette technique.`,audience:`dev`,confidence:80,hasExplicitDeadline:!1,isUnderTeamInfluence:!0,piClass:`committed`,businessValue:5},rationale:`Composite (ÂŤ et Âť), deux mots flous (ÂŤ amĂŠliorer Âť, ÂŤ dette Âť), aucun seuil, pas d'ĂŠchĂŠance.`,expectedFailingCriteria:[`outcome`,`falsifiable`,`timeBounded`,`general.composite`],trapWords:[`amĂŠliorer`,`stabilitĂŠ`,`et`,`dette`]},{id:`pi.bad.engagĂŠ-low-confidence`,verdict:`bad`,draft:{type:`pi`,text:`Permettre Ă  80 % de nos clients entreprise d'activer le SSO en self-service, mesurĂŠ sur le dernier mois du PI.`,audience:`dev`,confidence:40,hasExplicitDeadline:!0,isUnderTeamInfluence:!0,piClass:`committed`,businessValue:8},rationale:`Mauvais calibrage : un engagĂŠ estimĂŠ Ă  40 % de confiance est en rĂŠalitĂŠ un stretch mal nommĂŠ. Soit reclasser, soit revoir l'ambition.`,expectedFailingCriteria:[`crediblyAmbitious`]}],qe=[{id:`pi.sheet.engagĂŠ-stretch`,themeId:`pi.engagement`,icon:`target`,title:`EngagĂŠ vs Stretch`,heroPhrase:`EngagĂŠ : 80 Ă  100 % de confiance. Stretch : 30 Ă  60 %. Pas l'inverse.`,intro:``,practiceCtaLabel:`RĂŠdiger un objectif de PI`,sections:[{heading:`EngagĂŠ`,icon:`good`,body:`Un objectif que l'ĂŠquipe s'engage Ă  atteindre. Confiance attendue : 80 Ă  100 %. En dessous, ce n'est plus un engagement, c'est un pari.`},{heading:`Stretch`,icon:`okr`,body:`Un objectif qu'on vise sans le garantir. Confiance attendue : 30 Ă  60 %. Ambitieux par construction : ne pas l'atteindre n'est pas un ĂŠchec.`},{heading:`Le piĂ¨ge classique`,icon:`warn`,body:`Un engagĂŠ estimĂŠ Ă  40 % de confiance est un stretch mal nommĂŠ. Soit on requalifie, soit on revoit l'ambition.`,examples:[{bad:`EngagĂŠ : ÂŤ Faire passer 100 % de nos clients entreprise sur la marketplace Âť (confiance 30 %).`,good:`Stretch : ÂŤ Faire entrer 3 clients pilotes sur la marketplace Âť (confiance 50 %).`,note:`L'engagement crĂŠdible dĂŠpend du calibrage, pas du wording.`}]},{heading:`Qui le rĂŠdige, sur quelle base`,icon:`learn`,body:`Co-construit en PI Planning (event de 2 jours) par chaque ĂŠquipe du train avec son Product Owner. Le Release Train Engineer facilite. Les fonctionnalitĂŠs descendent de Product Management ; les objectifs de PI sont rĂŠdigĂŠs cĂ´tĂŠ ĂŠquipes, et traduisent les fonctionnalitĂŠs en outcomes attendus Ă  la revue de PI. Une ĂŠquipe peut transformer 3 fonctionnalitĂŠs en 2 objectifs de PI, ou un objectif de PI peut ĂŞtre servi par 4 fonctionnalitĂŠs. Le piĂ¨ge de la fonctionnalitĂŠ recopiĂŠe a sa propre fiche dans ÂŤ Les piĂ¨ges classiques Âť.`,bullets:[`Vision produit (~10 min en ouverture du PI Planning)`,`FonctionnalitĂŠs du PI (descendues de Product Management, dĂŠjĂ  priorisĂŠes)`,`DĂŠpendances cross-ĂŠquipes matĂŠrialisĂŠes sur le Program Board`,`Objectifs stratĂŠgiques ĂŠnoncĂŠs par les Business Owners en ouverture`,`CapacitĂŠ historique du train et de chaque ĂŠquipe`]},{heading:`Source`,kind:`source`,body:`Scaled Agile Framework, sections PI Planning et Team objectifs de PI. Voir aussi : Business Value attribuĂŠe par les Business Owners dans un dialogue avec l'ĂŠquipe, pas unilatĂŠralement.`}]},{id:`pi.sheet.business-value`,themeId:`pi.valeur-business`,icon:`wrench`,title:`Valeur business`,heroPhrase:`La valeur business est stockĂŠe, pas jugĂŠe. Le moteur n'a pas d'avis sur ta stratĂŠgie.`,intro:``,practiceCtaLabel:`RĂŠdiger un objectif avec valeur business`,sections:[{heading:`Pourquoi c'est demandĂŠ`,icon:`target`,body:`Sans valeur business, pas de suivi engagĂŠ/rĂŠalisĂŠ en rĂŠtrospective. C'est un prĂŠalable au bilan de PI.`},{heading:`Quel chiffre`,icon:`wrench`,body:`Ă discuter avec le Business Owner. 1 = peu de valeur, 10 = valeur maximale. Un PI oĂš tout est Ă  10 perd le sens du tri.`}]},{id:`pi.sheet.anatomy`,themeId:`pi.fondamentaux`,icon:`target`,title:`L'anatomie d'un objectif de PI`,heroPhrase:`Cinq briques pour la grammaire. Deux mĂŠtadonnĂŠes pour la classe et la valeur. Une phrase, un engagement.`,intro:``,practiceCtaLabel:`Va assembler ton premier objectif de PI`,sections:[{heading:`Les cinq briques de grammaire`,icon:`target`,kind:`bricks`,body:`Un objectif de PI bien rĂŠdigĂŠ porte les mĂŞmes cinq briques qu'un objectif de Sprint, mais Ă  l'ĂŠchelle du train et Ă  l'horizon revue de PI. La grammaire est universelle ; seul le vocabulaire change (business plutĂ´t que technique, train plutĂ´t qu'ĂŠquipe seule).`,bricksSentence:`Permettre Ă  80 % des clients entreprise d'activer le SSO en self-service avant la fin du PI.`,bricks:[{num:1,label:`Verbe outcome`,hint:`L'action qui amorce le rĂŠsultat`,examples:`Permettre Ă , Faire passer, RĂŠduire, Atteindre`,snippet:`Permettre Ă `,color:`purple`},{num:2,label:`Indicateur business`,hint:`La mĂŠtrique observable Ă  la revue de PI`,examples:`% clients activĂŠs, NPS, GMV, churn`,snippet:`80 %`,color:`pink`},{num:3,label:`Segment / bĂŠnĂŠficiaire`,hint:`Pour qui Ă§a compte`,examples:`clients entreprise, segment premium, ĂŠquipes consommatrices`,snippet:`des clients entreprise`,color:`teal`},{num:4,label:`Action observable`,hint:`Ce que le bĂŠnĂŠficiaire fera`,examples:`activer en self-service, prendre une dĂŠcision, dĂŠployer`,snippet:`d'activer le SSO en self-service`,color:`amber`},{num:5,label:`ĂchĂŠance PI`,hint:`Quand on mesure`,examples:`fin du PI, revue de PI, dernier mois du PI`,snippet:`avant la fin du PI`,color:`blue`}]},{heading:`Les deux mĂŠtadonnĂŠes PI`,icon:`wrench`,body:`L'objectif de PI ne se rĂŠduit pas Ă  sa phrase. Il porte aussi deux mĂŠtadonnĂŠes non visibles dans la phrase mais essentielles Ă  l'engagement du train.`,bullets:[`**Classe** : engagĂŠ (engagement, confiance 80 Ă  100 %) ou stretch (ambition, confiance 30 Ă  60 %). Voir la fiche dĂŠdiĂŠe.`,`**Valeur business** : 1 Ă  10, attribuĂŠe par le Business Owner en dialogue avec l'ĂŠquipe. Permet le suivi engagĂŠ vs rĂŠalisĂŠ en rĂŠtrospective de PI.`]},{heading:`Source`,kind:`source`,body:`Scaled Agile Framework, sections PI Planning et Team objectifs de PI. La grammaire Ă  cinq briques recoupe celle du objectif de Sprint (cf. fiche correspondante).`}]},{id:`pi.sheet.planning-to-objective`,themeId:`pi.fondamentaux`,icon:`learn`,title:`Du PI Planning au objectif de PI`,heroPhrase:`La vision descend, les fonctionnalitĂŠs descendent, les objectifs de PI remontent. Trois mouvements en deux jours.`,intro:``,practiceCtaLabel:`Va co-construire un objectif de PI`,sections:[{heading:`L'ĂŠvĂŠnement PI Planning`,icon:`target`,body:`Un PI Planning est un ĂŠvĂŠnement de deux jours qui rĂŠunit toutes les ĂŠquipes d'un train (5 Ă  12 ĂŠquipes en gĂŠnĂŠral). C'est la piĂ¨ce centrale de SAFe : un train n'a pas de objectifs de PI valables sans cet ĂŠvĂŠnement, parce que la co-construction et l'alignement transverse n'arrivent pas par mail.`,bullets:[`Jour 1 matin : vision produit, contexte stratĂŠgique, prĂŠsentation des fonctionnalitĂŠs priorisĂŠes.`,`Jour 1 aprĂ¨s-midi : chaque ĂŠquipe planifie son PI et propose ses objectifs de PI.`,`Jour 2 matin : draft plans review, ajustements croisĂŠs entre ĂŠquipes.`,`Jour 2 aprĂ¨s-midi : finalisation des objectifs de PI, attribution Business Value, vote de confiance.`]},{heading:`Trois mouvements d'ĂŠlaboration`,icon:`wrench`,body:`L'objectif de PI n'apparaĂŽt pas de nulle part. Il naĂŽt du croisement de trois mouvements clairs, chacun portĂŠ par un acteur diffĂŠrent. Quand les objectifs arrivent tout ĂŠcrits dans le train, c'est le piĂ¨ge de l'objectif imposĂŠ : sa fiche dĂŠtaille comment le recadrer.`,bullets:[`**Descente du contexte** : Product Management donne la vision, les Business Owners donnent les enjeux stratĂŠgiques. Sans cette descente, l'ĂŠquipe planifie dans le vide.`,`**Descente des fonctionnalitĂŠs** : Product Management priorise et descend les fonctionnalitĂŠs candidates au PI. L'ĂŠquipe ne choisit pas tout, mais elle choisit comment les traduire.`,`**RemontĂŠe des objectifs de PI** : chaque ĂŠquipe traduit les fonctionnalitĂŠs en outcomes attendus, en intĂŠgrant ses contraintes de capacitĂŠ et ses dĂŠpendances. La traduction remonte au train.`]},{heading:`Le rĂ´le des acteurs clĂŠs`,icon:`good`,body:``,bullets:[`**Product Management** : descend les fonctionnalitĂŠs priorisĂŠes, dĂŠfend les arbitrages, ĂŠcoute les retours du train.`,`**Business Owners** : posent le contexte stratĂŠgique, attribuent la Business Value 1 Ă  10 en dialogue avec les ĂŠquipes.`,`**Release Train Engineer** : facilite l'ĂŠvĂŠnement, protĂ¨ge la qualitĂŠ du processus (ROAM, vote de confiance, time-box).`,`**Product Owners (ĂŠquipe)** : portent la voix produit dans la rĂŠdaction des objectifs de PI.`,`**Ăquipes (Devs + PO)** : rĂŠdigent les objectifs de PI, estiment la capacitĂŠ, soulĂ¨vent les dĂŠpendances.`]},{heading:`Source`,kind:`source`,body:`Scaled Agile Framework, section PI Planning (le seul ĂŠvĂŠnement non nĂŠgociable de SAFe). Voir aussi Dean Leffingwell sur l'importance de la co-localisation (physique ou bien orchestrĂŠe Ă  distance) pour la qualitĂŠ de la co-construction.`}]},{id:`pi.sheet.objective-met`,themeId:`pi.fondamentaux`,icon:`good`,title:`Comment savoir qu'un objectif de PI est atteint`,heroPhrase:`La revue de PI n'est pas un dĂŠbat. C'est une mesure contre ce qui a ĂŠtĂŠ dit en PI Planning.`,intro:``,practiceCtaLabel:`Va dĂŠfinir un critĂ¨re mesurable`,sections:[{heading:`Pourquoi dĂŠfinir le critĂ¨re en amont`,icon:`target`,body:`Si le critĂ¨re d'atteinte se discute Ă  la revue de PI, on retombe dans le piĂ¨ge classique : chacun dĂŠfend sa lecture, le Business Owner nĂŠgocie sa note de Business Value, et la conversation devient politique. Ă l'inverse, un critĂ¨re ĂŠcrit en PI Planning est un contrat tacite. La revue de PI devient une lecture, pas un dĂŠbat.`,bullets:[`Le critĂ¨re est observable : un chiffre, un pourcentage, une ĂŠtape franchie.`,`Il est posĂŠ au moment de l'ĂŠcriture du objectif de PI, pas dĂŠcouvert aprĂ¨s coup.`,`Il dit ÂŤ atteint / partiel / ratĂŠ Âť, pas ÂŤ plutĂ´t bien / plutĂ´t mal Âť.`]},{heading:`Le score rĂŠalisĂŠ Ă  la revue de PI`,icon:`wrench`,body:`Ă la revue de PI, le Business Owner rĂŠĂŠvalue la Business Value 1 Ă  10 selon ce qui a ĂŠtĂŠ rĂŠellement livrĂŠ. Le rapport entre la BV planifiĂŠe et la BV rĂŠalisĂŠe donne le score de prĂŠvisibilitĂŠ du train (objectif SAFe : 80 Ă  100 % sur la durĂŠe).`,bullets:[`**EngagĂŠ atteint** : BV rĂŠalisĂŠe = BV planifiĂŠe.`,`**EngagĂŠ partiel** : BV rĂŠalisĂŠe < BV planifiĂŠe (gĂŠnĂŠralement 50 Ă  80 %).`,`**Stretch atteint** : BV rĂŠalisĂŠe = BV planifiĂŠe (bonus pour le train).`,`**Stretch ratĂŠ** : BV rĂŠalisĂŠe = 0 (sans pĂŠnalitĂŠ, c'ĂŠtait un stretch).`]},{heading:`Le test ÂŤ comment le saura-t-on Âť`,icon:`good`,body:`Ă la fin du PI Planning, pour chaque objectif de PI, demander : ÂŤ comment saurons-nous, Ă  la revue de PI, si l'objectif est atteint ? Âť Si l'ĂŠquipe ne sait pas rĂŠpondre en 30 secondes, l'objectif de PI est mal posĂŠ. Reformuler avant de figer.`,examples:[{bad:`objectif de PI : ÂŤ Renforcer la fiabilitĂŠ du paiement. Âť CritĂ¨re d'atteinte : non posĂŠ. Ă la revue de PI, dĂŠbat sur ce qu'on entend par ÂŤ renforcer Âť.`,good:`objectif de PI : ÂŤ Faire passer le taux de rĂŠussite des paiements de 96,2 % Ă  99,5 % d'ici la revue de PI. Âť CritĂ¨re : taux de rĂŠussite mesurĂŠ sur les 4 derniĂ¨res semaines du PI, comparĂŠ Ă  la valeur de rĂŠfĂŠrence. Lecture immĂŠdiate.`,note:`Le critĂ¨re est implicite dans l'objectif de PI bien rĂŠdigĂŠ, mais le formuler explicitement ĂŠvite les divergences d'interprĂŠtation Ă  la Review.`}]},{heading:`Source`,kind:`source`,body:`Scaled Agile Framework, section PI System Demo et PI Predictability Measure. Convergent avec Mike Cohn sur l'importance du critĂ¨re d'acceptation posĂŠ en amont, transposĂŠ Ă  l'ĂŠchelle PI.`}]},{id:`pi.sheet.objective-impose`,isNamedPitfall:!0,themeId:`pi.engagement`,icon:`warn`,title:`L'objectif de PI imposĂŠ`,heroPhrase:`Un objectif descendu sans dialogue. L'ĂŠquipe hoche la tĂŞte. La revue de PI rĂŠvĂ¨le le malentendu.`,intro:``,practiceCtaLabel:`Va porter une objection constructive`,sections:[{heading:`Pourquoi c'est piĂŠgeux`,icon:`target`,body:`Quand le management ou les Business Owners arrivent en PI Planning avec un objectif dĂŠjĂ  rĂŠdigĂŠ et le prĂŠsentent comme non nĂŠgociable, l'ĂŠquipe a deux choix : hocher la tĂŞte (et perdre l'engagement rĂŠel) ou s'opposer (et passer pour difficile). Les deux mĂ¨nent au mĂŞme rĂŠsultat : un objectif inerte qu'on porte sans y croire.`,bullets:[`Un objectif imposĂŠ n'engage personne en pratique.`,`Le vote de confiance est faussĂŠ : l'ĂŠquipe vote ce qu'on attend d'elle.`,`Ă la revue de PI, l'ĂŠcart entre la promesse et la rĂŠalitĂŠ ĂŠrode la confiance des deux cĂ´tĂŠs.`]},{heading:`Comment Ă§a se voit`,icon:`warn`,kind:`signals`,body:``,bullets:[`L'objectif est annoncĂŠ, pas dĂŠbattu : ÂŤ voici ce qu'on attend de vous ce PI Âť.`,`Les questions de capacitĂŠ sont ĂŠludĂŠes (ÂŤ on verra Ă  mi-PI Âť).`,`Le ROAM ne contient que des risques mineurs.`,`Confidence vote convergent Ă  5/5 sans hĂŠsitation, signe d'un assentiment factice.`]},{heading:`Comment recadrer`,icon:`wrench`,body:`Le Release Train Engineer protĂ¨ge l'espace de nĂŠgociation. Les Business Owners apportent le contexte stratĂŠgique ; les ĂŠquipes apportent la traduction rĂŠaliste en objectif de PI. Le ROAM est utilisĂŠ honnĂŞtement, le vote de confiance est anonyme si nĂŠcessaire.`,examples:[{bad:`Business Owner : ÂŤ L'objectif de PI de votre ĂŠquipe est : atteindre 100 contrats Enterprise. C'est ce que le board attend. Âť`,good:`Business Owner : ÂŤ Le board pousse pour mettre Ă  l'ĂŠchelle l'offre Enterprise ce PI. Comment vous voyez votre contribution rĂŠaliste ? Âť Ăquipe : ÂŤ On peut viser 60 contrats engagĂŠs, et un stretch Ă  100 si la nouvelle vague de leads se confirme. Âť`,note:`Le contexte stratĂŠgique reste descendu. La traduction en objectif de PI remonte de l'ĂŠquipe.`}]},{heading:`Source`,kind:`source`,body:`Scaled Agile Framework, ROAM et vote de confiance en PI Planning. Patrick Lencioni, The Five Dysfunctions of a Team, sur la culture de dĂŠsaccord productif.`}]},{id:`pi.sheet.bv-uniforme`,isNamedPitfall:!0,themeId:`pi.valeur-business`,icon:`warn`,title:`La Business Value uniforme`,heroPhrase:`Tout Ă  10. Tout Ă  5. Aucune valeur ne se distingue. Le Business Owner abdique son rĂ´le.`,intro:``,practiceCtaLabel:`Va aider le Business Owner Ă  diffĂŠrencier`,sections:[{heading:`Pourquoi c'est piĂŠgeux`,icon:`target`,body:`La valeur business 1 Ă  10 existe pour permettre la priorisation : Ă  la revue de PI, le score rĂŠalisĂŠ pondĂ¨re selon la valeur. Si tout est notĂŠ pareil, plus de prioritĂŠ possible. C'est gĂŠnĂŠralement le signe d'un Business Owner qui n'a pas pris le temps de discriminer, ou qui ne veut pas faire de choix qu'il devrait dĂŠfendre.`,bullets:[`Tout Ă  10 : ÂŤ tout est important Âť, donc rien n'est prioritaire.`,`Tout Ă  5 : neutralitĂŠ par dĂŠfaut, ĂŠquivalent Ă  l'absence de note.`,`Hans Samios (Lean-Agile Knowledge Base) note ce piĂ¨ge comme l'anti-pattern le plus frĂŠquent en PI Planning.`]},{heading:`Comment Ă§a se voit`,icon:`warn`,kind:`signals`,body:``,bullets:[`Les valeurs business sont remplies en quelques secondes, sans discussion.`,`Aucune note infĂŠrieure Ă  5 (ÂŤ si je note bas, l'ĂŠquipe va le mal prendre Âť).`,`Pas de dialogue avec l'ĂŠquipe au moment de l'attribution.`]},{heading:`Comment recadrer`,icon:`wrench`,body:`L'attribution se fait dans un dialogue, pas en silence. Forcer une distribution : au moins une note basse, au moins une haute. Le Business Owner doit pouvoir justifier chaque ĂŠcart.`,examples:[{bad:`objectifs de PI notĂŠs : 10, 10, 10, 10, 10. Aucune prioritĂŠ ĂŠmerge Ă  la revue de PI.`,good:`objectifs de PI notĂŠs : 10 (compliance bloquante), 8 (croissance), 5 (dette technique), 3 (refonte UI). Le Business Owner dĂŠfend chaque ĂŠcart en moins de 30 secondes.`,note:`Une distribution variĂŠe rĂŠvĂ¨le qu'un choix stratĂŠgique a ĂŠtĂŠ fait. C'est ce qu'on attend du Business Owner.`}]},{heading:`Source`,kind:`source`,body:`Hans Samios (Personal Lean-Agile Knowledge Base), section how_do_we_assign_business_value_to_pi_objectives. Scaled Agile Framework, recommandation explicite contre la business value uniforme.`}]},{id:`pi.sheet.fonctionnalitĂŠ-vs-objective`,isNamedPitfall:!0,themeId:`pi.pieges-classiques`,icon:`warn`,title:`Une fonctionnalitĂŠ n'est pas un objectif de PI`,heroPhrase:`Une fonctionnalitĂŠ dit ce qu'on livre. Un objectif de PI dit ce qui aura changĂŠ pour le bĂŠnĂŠficiaire.`,intro:``,practiceCtaLabel:`Va traduire une fonctionnalitĂŠ en objectif de PI`,sections:[{heading:`Pourquoi c'est l'erreur la plus frĂŠquente`,icon:`target`,body:`Product Management descend des fonctionnalitĂŠs (ÂŤ SSO Enterprise Âť, ÂŤ refonte panier mobile Âť). Les ĂŠquipes, sous pression de temps en PI Planning, recopient ces fonctionnalitĂŠs dans leurs objectifs de PI. RĂŠsultat : le Business Owner ne sait pas quoi noter en valeur business, la revue de PI ne sait pas quoi mesurer, et la confusion grandit entre ce qu'on livre et ce qui doit changer.`,bullets:[`Une fonctionnalitĂŠ est un livrable. Un objectif de PI est un outcome attendu.`,`Une fonctionnalitĂŠ peut ĂŞtre livrĂŠe sans atteindre l'outcome (et inversement).`,`L'objectif de PI rend la fonctionnalitĂŠ falsifiable : on saura si elle a fait son effet.`]},{heading:`Comment Ă§a se voit`,icon:`warn`,kind:`signals`,body:``,bullets:[`L'objectif de PI porte un nom de fonctionnalitĂŠ ou de projet (ÂŤ Livrer X Âť, ÂŤ Refondre Y Âť).`,`Aucune mĂŠtrique n'est nommĂŠe.`,`Le Business Owner peine Ă  attribuer une valeur business (ÂŤ je note l'effort, pas la valeur Âť).`]},{heading:`Comment recadrer`,icon:`wrench`,body:`Devant chaque fonctionnalitĂŠ, poser la question : ÂŤ qu'est-ce que cette fonctionnalitĂŠ, une fois livrĂŠe, va faire bouger chez le bĂŠnĂŠficiaire ? Âť La rĂŠponse est l'objectif de PI. La fonctionnalitĂŠ reste, comme moyen pour y arriver.`,examples:[{bad:`FonctionnalitĂŠ recopiĂŠe : ÂŤ Livrer la fonctionnalitĂŠ SSO Enterprise ce PI. Âť`,good:`objectif de PI dĂŠrivĂŠ : ÂŤ Permettre Ă  80 % des clients entreprise d'activer le SSO en self-service avant la fin du PI. Âť La fonctionnalitĂŠ SSO Enterprise reste, mais comme moyen.`,note:`Le test : si la fonctionnalitĂŠ est livrĂŠe mais que l'outcome ne bouge pas, l'objectif de PI n'est pas atteint. Cette tension est exactement ce qu'on veut rĂŠvĂŠler.`}]},{heading:`Source`,kind:`source`,body:`Scaled Agile Framework, recommandations explicites contre le ÂŤ fonctionnalitĂŠ = objectif de PI Âť. Agile Seekers (article 2024) liste cet anti-pattern comme le plus frĂŠquent Ă  l'introduction de SAFe.`}]},{id:`pi.sheet.tous-committed`,isNamedPitfall:!0,themeId:`pi.pieges-classiques`,icon:`warn`,title:`Tous les objectifs de PI en engagĂŠ`,heroPhrase:`Un train sans stretch est un train sans ambition. Ou un train qui se ment sur sa capacitĂŠ.`,intro:``,practiceCtaLabel:`Va calibrer un mix engagĂŠ / stretch`,sections:[{heading:`Pourquoi c'est piĂŠgeux`,icon:`target`,body:`Quand un train classe tous ses objectifs de PI en engagĂŠ, deux interprĂŠtations possibles : (1) il sous-promet pour ĂŞtre sĂťr d'atteindre 100 % Ă  la revue de PI (sandbagging Ă  l'ĂŠchelle train), ou (2) il sur-promet en s'engageant sur des objectifs qu'il ratera. Les deux abĂŽment la confiance des Business Owners et coupent l'ĂŠquipe de tout apprentissage stretch.`,bullets:[`Le stretch est l'espace oĂš on tente quelque chose dont l'issue est incertaine, oĂš on apprend.`,`Un train Ă  100 % engagĂŠ se prive de cet espace.`,`Le Business Owner ne sait plus quel objectif compte vraiment.`]},{heading:`Comment Ă§a se voit`,icon:`warn`,kind:`signals`,body:``,bullets:[`Aucun objectif classĂŠ stretch sur la page de PI Planning.`,`Les objectifs rĂŠalisĂŠs Ă  100 % Ă  la revue de PI trois PI consĂŠcutifs (signe de sandbagging).`,`Ou inversement : taux de rĂŠalisation moyen sous 70 % (signe de sur-promesse).`]},{heading:`Comment recadrer`,icon:`wrench`,body:`Le RTE peut suggĂŠrer un mix de rĂŠfĂŠrence : autour de 60 Ă  70 % d'engagĂŠ, 30 Ă  40 % de stretch. Le Business Owner peut demander explicitement ÂŤ quel objectif vous engagez Ă  coup sĂťr, et quel objectif vous tentez sans garantir ? Âť. La discrimination crĂŠe la lisibilitĂŠ.`,examples:[{bad:`5 objectifs de PI ce trimestre, tous classĂŠs engagĂŠ. Aucun stretch.`,good:`3 objectifs de PI engagĂŠs (cap commercial, fiabilitĂŠ, conformitĂŠ), 2 stretch (marketplace pilote, intĂŠgration nouveau partenaire).`,note:`Le mix raconte une histoire stratĂŠgique : voici ce qu'on tient, voici ce qu'on tente.`}]},{heading:`Source`,kind:`source`,body:`Scaled Agile Framework, recommandations sur le mix engagĂŠ / stretch. Ben Lamorte (The OKRs Field Book) sur la valeur d'apprentissage du stretch, transposable Ă  PI.`}]},{id:`pi.sheet.ip-iteration-overloaded`,isNamedPitfall:!0,themeId:`pi.pieges-classiques`,icon:`warn`,title:`L'Innovation and Planning phagocytĂŠ`,heroPhrase:`L'itĂŠration IP existe pour respirer, innover et se stabiliser. Le train la remplit de tickets comme n'importe quelle autre itĂŠration.`,intro:``,practiceCtaLabel:`Va protĂŠger une itĂŠration IP menacĂŠe`,sections:[{heading:`Pourquoi c'est piĂŠgeux`,icon:`target`,body:`L'Innovation and Planning (IP) Iteration est prĂŠvue par SAFe comme un tampon : absorber l'incertitude d'estimation, dĂŠgager du temps d'innovation et de formation, stabiliser, prĂŠparer le PI suivant. Quand le train y planifie une charge normale, ce tampon disparaĂŽt, la marge de manĹuvre du train aussi, et le rythme devient intenable.`,bullets:[`L'itĂŠration IP est un espace tampon, pas une itĂŠration de plus pour rattraper le retard.`,`Sans cette marge, la moindre estimation optimiste rend tout le PI intenable.`,`Le temps d'innovation et de formation prĂŠvu par SAFe disparaĂŽt en premier.`]},{heading:`Comment Ă§a se voit`,icon:`warn`,kind:`signals`,body:``,bullets:[`La charge planifiĂŠe sur l'itĂŠration IP est proche de celle des autres itĂŠrations.`,`Le train n'a jamais de crĂŠneau formation ou hackathon sur un PI entier.`,`L'itĂŠration IP sert systĂŠmatiquement Ă  finir ce qui a dĂŠbordĂŠ des itĂŠrations prĂŠcĂŠdentes.`]},{heading:`Rendre le tampon Ă  l'itĂŠration IP`,icon:`wrench`,body:`ProtĂŠger explicitement l'itĂŠration IP comme du temps sans charge planifiĂŠe dĂŠdiĂŠe Ă  rattraper du retard, et suivre son taux de charge comme un indicateur de santĂŠ du train Ă  part entiĂ¨re.`,examples:[{bad:`ItĂŠration IP planifiĂŠe Ă  90 % de charge avec les tickets en retard des itĂŠrations prĂŠcĂŠdentes.`,good:`ItĂŠration IP rĂŠservĂŠe Ă  la stabilisation, l'innovation et la prĂŠparation du PI suivant : moins de 20 % de charge planifiĂŠe, le reste laissĂŠ ouvert.`,note:`Le tampon retrouve sa fonction : absorber l'imprĂŠvu du PI qui vient de se terminer, pas prolonger sa charge.`}]},{heading:`Source`,kind:`source`,body:`Scaled Agile Framework, description de l'Innovation and Planning Iteration comme espace de stabilisation, innovation et prĂŠparation, distinct des itĂŠrations de dĂŠveloppement.`}]},{id:`pi.sheet.iteration-by-iteration-planning`,isNamedPitfall:!0,themeId:`pi.pieges-classiques`,icon:`warn`,title:`Le plan iteration par iteration`,heroPhrase:`Le train dĂŠtaille l'itĂŠration 1 dans les moindres dĂŠtails. Le reste du PI n'existe encore nulle part.`,intro:``,practiceCtaLabel:`Va esquisser un PI entier avant de le dĂŠtailler`,sections:[{heading:`Pourquoi c'est piĂŠgeux`,icon:`target`,body:`Une itĂŠration parfaitement dĂŠtaillĂŠe ne dit rien sur la faisabilitĂŠ du PI entier. Quand le train ne construit sa vision qu'itĂŠration aprĂ¨s itĂŠration, les dĂŠpendances entre ĂŠquipes n'apparaissent qu'en fin de PI, quand il est trop tard pour les anticiper, et la revue du plan de draft ne peut challenger que ce qui a ĂŠtĂŠ rendu visible.`,bullets:[`Une itĂŠration parfaitement dĂŠtaillĂŠe ne dit rien sur la faisabilitĂŠ du PI entier.`,`Les dĂŠpendances entre ĂŠquipes n'apparaissent qu'en fin de PI, trop tard pour les anticiper.`,`La revue du plan de draft ne peut challenger que ce qui a ĂŠtĂŠ rendu visible.`]},{heading:`Comment Ă§a se voit`,icon:`warn`,kind:`signals`,body:``,bullets:[`Ă la revue du plan de draft, seule l'itĂŠration 1 a un contenu dĂŠtaillĂŠ.`,`Le Program Board reste vide au-delĂ  de l'itĂŠration 1.`,`Les risques identifiĂŠs portent tous sur le court terme, aucun sur la fin du PI.`]},{heading:`Planifier en largeur avant la profondeur`,icon:`wrench`,body:`Esquisser les 5 itĂŠrations Ă  haut niveau dĂ¨s la revue du plan de draft, avec les dĂŠpendances inter-ĂŠquipes posĂŠes sur le Program Board, avant d'affiner le dĂŠtail d'une seule itĂŠration.`,examples:[{bad:`ItĂŠration 1 planifiĂŠe rĂŠcit par rĂŠcit ; itĂŠrations 2 Ă  5 laissĂŠes en blanc en attendant d'y voir plus clair.`,good:`Les 5 itĂŠrations esquissĂŠes Ă  haut niveau dĂ¨s la revue du plan de draft, dĂŠpendances inter-ĂŠquipes posĂŠes sur le Program Board avant d'affiner le dĂŠtail de l'itĂŠration 1.`,note:`La vision d'ensemble prĂŠcĂ¨de le dĂŠtail, pas l'inverse.`}]},{heading:`Source`,kind:`source`,body:`Scaled Agile Journey, PI Planning â Plan to Discover the Next PI, sur la nĂŠcessitĂŠ d'un plan de bout en bout avant l'approfondissement itĂŠration par itĂŠration.`}]},{id:`pi.sheet.commitment-ceremony`,isNamedPitfall:!0,themeId:`pi.engagement`,icon:`warn`,title:`La cĂŠrĂŠmonie d'engagement`,heroPhrase:`Chaque rĂŠcit dĂŠcoupĂŠ, estimĂŠ, verrouillĂŠ au chiffre prĂ¨s. Le PI Planning devient un rituel de contrĂ´le, pas un dialogue sur la valeur.`,intro:``,practiceCtaLabel:`Va recentrer un PI Planning sur la valeur`,sections:[{heading:`Pourquoi c'est piĂŠgeux`,icon:`target`,body:`Le temps du PI Planning part dans le dĂŠcoupage et l'estimation des rĂŠcits, pas dans la discussion de la valeur avec le Business Owner. Les objectifs de PI deviennent une formalitĂŠ signĂŠe en fin de journĂŠe, pas le fil conducteur de l'ĂŠvĂŠnement : l'ĂŠquipe s'engage sur un chiffre d'estimation plus que sur un effet Ă  produire.`,bullets:[`Le temps de Planning part dans le dĂŠcoupage et l'estimation, pas dans la discussion de la valeur.`,`Les objectifs de PI sont rĂŠdigĂŠs en fin d'ĂŠvĂŠnement, dans la prĂŠcipitation.`,`Le vote de confiance porte sur ÂŤ avoir fini d'estimer Âť, pas sur l'atteinte de l'objectif.`]},{heading:`Comment Ă§a se voit`,icon:`warn`,kind:`signals`,body:``,bullets:[`La majoritĂŠ du temps de Planning est passĂŠe Ă  estimer et dĂŠcouper, pas Ă  discuter des objectifs.`,`Les objectifs de PI sont rĂŠdigĂŠs dans les derniĂ¨res minutes avant le vote de confiance.`,`Le Business Owner n'intervient jamais pendant les deux jours de l'ĂŠvĂŠnement.`]},{heading:`Remettre l'objectif avant l'estimation`,icon:`wrench`,body:`Garder le dĂŠcoupage et l'estimation comme des moyens, pas comme le centre de l'ĂŠvĂŠnement. Ouvrir la journĂŠe 1 par la discussion des objectifs de PI avec les Business Owners ; le dĂŠtail d'exĂŠcution vient ensuite, au service de ces objectifs dĂŠjĂ  clarifiĂŠs.`,examples:[{bad:`JournĂŠe 1 du PI Planning entiĂ¨rement consacrĂŠe au dĂŠcoupage et Ă  l'estimation des rĂŠcits ; les objectifs de PI rĂŠdigĂŠs en 20 minutes juste avant le vote de confiance.`,good:`La discussion des objectifs de PI avec le Business Owner ouvre la journĂŠe 1 ; le dĂŠcoupage des rĂŠcits vient ensuite, au service des objectifs dĂŠjĂ  clarifiĂŠs.`,note:`L'ordre du Planning matĂŠrialise ce qui compte vraiment : l'objectif d'abord, le dĂŠtail d'exĂŠcution ensuite.`}]},{heading:`Source`,kind:`source`,body:`Top 12 mistakes to avoid during PI Planning (LinkedIn), sur la dĂŠrive du PI Planning en cĂŠrĂŠmonie d'engagement centrĂŠe sur l'estimation plutĂ´t que sur la valeur.`}]},{id:`pi.sheet.unprepared-pi-planning`,isNamedPitfall:!0,themeId:`pi.pieges-classiques`,icon:`warn`,title:`Le PI Planning non prĂŠparĂŠ`,heroPhrase:`Les ĂŠquipes dĂŠcouvrent les fonctionnalitĂŠs en direct, pendant l'ĂŠvĂŠnement. La prĂŠparation qui devait prĂŠcĂŠder n'a pas eu lieu.`,intro:``,practiceCtaLabel:`Va prĂŠparer un PI Planning en amont`,sections:[{heading:`Pourquoi c'est piĂŠgeux`,icon:`target`,body:`Le backlog n'est pas prĂŠparĂŠ : les ĂŠquipes dĂŠcouvrent les fonctionnalitĂŠs pendant l'ĂŠvĂŠnement, pas avant. Les dĂŠpendances inter-ĂŠquipes ne sont pas identifiĂŠes en amont, elles surgissent en direct. Les objectifs de PI rĂŠdigĂŠs sur cette base restent fragiles, car personne n'a eu le temps d'en vĂŠrifier la faisabilitĂŠ.`,bullets:[`Le backlog n'est pas prĂŠparĂŠ : les ĂŠquipes dĂŠcouvrent les fonctionnalitĂŠs pendant l'ĂŠvĂŠnement.`,`Les dĂŠpendances inter-ĂŠquipes ne sont pas identifiĂŠes en amont, elles surgissent en direct.`,`Les objectifs de PI rĂŠdigĂŠs sur cette base restent fragiles, jamais vĂŠrifiĂŠs en amont.`]},{heading:`Comment Ă§a se voit`,icon:`warn`,kind:`signals`,body:``,bullets:[`Le Pre-PI Planning n'a pas eu lieu, ou sans les bonnes personnes.`,`Des questions de comprĂŠhension basique sur une fonctionnalitĂŠ se posent en pleine sĂŠance de Planning.`,`Le contenu proposĂŠ change significativement entre le dĂŠbut et la fin de l'ĂŠvĂŠnement.`]},{heading:`PrĂŠparer avant de planifier`,icon:`wrench`,body:`Investir dans le Pre-PI Planning : backlog relu et clarifiĂŠ, dĂŠpendances prĂŠ-identifiĂŠes, rĂ´les clĂŠs briefĂŠs avant l'ĂŠvĂŠnement.`,examples:[{bad:`Les Product Managers prĂŠsentent des fonctionnalitĂŠs inĂŠdites en sĂŠance ; les ĂŠquipes dĂŠcouvrent le pĂŠrimĂ¨tre en mĂŞme temps qu'elles doivent en tirer des objectifs de PI.`,good:`Le contenu du backlog est revu et clarifiĂŠ en Pre-PI Planning deux semaines avant ; les ĂŠquipes arrivent au PI Planning avec les questions de comprĂŠhension dĂŠjĂ  rĂŠsolues.`,note:`La qualitĂŠ des objectifs de PI dĂŠpend de la prĂŠparation qui prĂŠcĂ¨de l'ĂŠvĂŠnement, pas de l'ĂŠvĂŠnement lui-mĂŞme.`}]},{heading:`Source`,kind:`source`,body:`Agile Seekers, Overcoming Common PI Planning Anti-Patterns With Discovery Mindset, sur le manque de prĂŠparation comme cause principale d'un PI Planning dĂŠsorganisĂŠ.`}]},{id:`pi.sheet.empty-program-board`,isNamedPitfall:!0,themeId:`pi.pieges-classiques`,icon:`warn`,title:`Le Program Board vide`,heroPhrase:`Aucune dĂŠpendance inter-ĂŠquipes n'est rendue visible. L'objectif d'une ĂŠquipe dĂŠpend pourtant d'une autre, en silence.`,intro:``,practiceCtaLabel:`Va tracer une dĂŠpendance sur un Program Board`,sections:[{heading:`Pourquoi c'est piĂŠgeux`,icon:`target`,body:`Un objectif de PI peut dĂŠpendre d'une livraison d'une autre ĂŠquipe sans que ce lien soit jamais tracĂŠ. Sans Program Board rempli, personne ne voit venir le risque avant qu'il ne se matĂŠrialise, et le ROAM reste vide alors que les dĂŠpendances existent bel et bien.`,bullets:[`Un objectif de PI peut dĂŠpendre d'une autre ĂŠquipe sans que ce lien soit jamais tracĂŠ.`,`Sans le Program Board rempli, personne ne voit venir le risque avant qu'il ne se matĂŠrialise.`,`Le ROAM reste vide alors que les dĂŠpendances existent bel et bien.`]},{heading:`Comment Ă§a se voit`,icon:`warn`,kind:`signals`,body:``,bullets:[`Le Program Board est vide ou quasi vide Ă  la fin du PI Planning.`,`Un objectif de PI mentionne un livrable d'une autre ĂŠquipe sans fil visible vers cette ĂŠquipe.`,`Les glissements de dĂŠpendances sont dĂŠcouverts Ă  la revue de PI, jamais avant.`]},{heading:`Rendre la dĂŠpendance visible`,icon:`wrench`,body:`Rendre chaque dĂŠpendance explicite sur le Program Board pendant le Planning, et la rĂŠfĂŠrencer directement dans le ROAM de l'objectif de PI concernĂŠ.`,examples:[{bad:`Objectif de PI : ÂŤ Lancer le paiement en un clic Âť, qui suppose une API de tokenisation livrĂŠe par l'ĂŠquipe Paiement Plateforme, jamais tracĂŠe sur le Program Board.`,good:`Objectif de PI : ÂŤ Lancer le paiement en un clic Âť, dĂŠpendance vers l'ĂŠquipe Paiement Plateforme tracĂŠe sur le Program Board (API de tokenisation, semaine 3), risque inscrit au ROAM.`,note:`La dĂŠpendance devient un objet suivi, pas un pari silencieux.`}]},{heading:`Source`,kind:`source`,body:`Scaled Agile Framework, Program Board et ROAM, artefacts destinĂŠs Ă  rendre visibles les dĂŠpendances inter-ĂŠquipes dĂ¨s le PI Planning.`}]},{id:`pi.sheet.po-bypass`,isNamedPitfall:!0,themeId:`pi.pieges-classiques`,icon:`warn`,title:`Le contournement du Product Owner`,heroPhrase:`Le travail arrive directement Ă  l'ĂŠquipe, sans passer par le Product Owner. L'objectif de PI perd son garant.`,intro:``,practiceCtaLabel:`Va rediriger une demande qui a contournĂŠ le PO`,sections:[{heading:`Pourquoi c'est piĂŠgeux`,icon:`target`,body:`Le Product Owner est le garant du lien entre le travail rĂŠel et les objectifs de PI engagĂŠs. Une demande qui arrive en direct Ă  l'ĂŠquipe n'est jamais confrontĂŠe Ă  cet objectif, et le train perd la capacitĂŠ de dire non Ă  une demande qui ne sert aucun objectif validĂŠ.`,bullets:[`Le Product Owner est le garant du lien entre le travail rĂŠel et les objectifs de PI engagĂŠs.`,`Une demande qui arrive en direct Ă  l'ĂŠquipe n'est jamais confrontĂŠe Ă  cet objectif.`,`Le train perd la capacitĂŠ de dire non Ă  une demande qui ne sert aucun objectif validĂŠ.`]},{heading:`Comment Ă§a se voit`,icon:`warn`,kind:`signals`,body:``,bullets:[`Un manager ou un client sollicite directement un dĂŠveloppeur, sans passer par le Product Owner.`,`Du travail apparaĂŽt dans le sprint sans lien tracĂŠ vers un objectif de PI engagĂŠ.`,`Le Product Owner dĂŠcouvre aprĂ¨s coup qu'une demande a ĂŠtĂŠ traitĂŠe en dehors de son arbitrage.`]},{heading:`Rediriger vers le Product Owner`,icon:`wrench`,body:`Rappeler que toute demande entrante passe par le Product Owner, qui l'ĂŠvalue face aux objectifs de PI engagĂŠs avant qu'elle entre au plan.`,examples:[{bad:`Un directeur commercial demande directement Ă  un dĂŠveloppeur d'ajouter un champ au formulaire, en urgence, sans passer par le Product Owner.`,good:`La demande du directeur commercial est redirigĂŠe vers le Product Owner, qui l'ĂŠvalue face aux objectifs de PI engagĂŠs avant de dĂŠcider si et quand elle entre au plan.`,note:`Le Product Owner reste le point de passage qui protĂ¨ge la cohĂŠrence des objectifs, mĂŞme sous pression hiĂŠrarchique.`}]},{heading:`Source`,kind:`source`,body:`Top 12 mistakes to avoid during PI Planning (LinkedIn), sur le contournement du Product Owner comme cause de perte d'alignement et de vĂŠlocitĂŠ.`}]}];function O(e,t,n,r){return{kind:`text`,id:e,category:t,quality:n,text:r}}function Je(e,t,n,r){return{kind:`numericField`,id:e,category:`variation`,quality:t,template:n,fieldCount:r}}function Ye(e,t,n,r){return{kind:`numericField`,id:e,category:t,quality:`good`,template:n,fieldCount:r,fieldKind:`text`}}function Xe(e,t){return{kind:`numericField`,id:e,category:t,quality:`neutral`,template:`[X]`,fieldCount:1,fieldKind:`text`,handLabel:`Ăcrire moi-mĂŞmeâŚ`}}var Ze=[O(`pi-a-good-pass`,`action`,`good`,`Faire passer`),O(`pi-a-good-enable`,`action`,`good`,`Permettre Ă `),O(`pi-a-good-reach`,`action`,`good`,`Atteindre`),O(`pi-a-good-bring-in`,`action`,`good`,`Faire entrer`)],Qe=[O(`pi-a-neu-reduce`,`action`,`neutral`,`RĂŠduire`),O(`pi-a-neu-increase`,`action`,`neutral`,`Augmenter`),O(`pi-a-neu-divide`,`action`,`neutral`,`Diviser`),O(`pi-a-neu-keep`,`action`,`neutral`,`Mainten
